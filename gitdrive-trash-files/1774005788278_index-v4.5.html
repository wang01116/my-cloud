<!DOCTYPE html>
<html lang="zh-CN" class="transition-colors duration-500">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GitCloud Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        md3: {
                            primary: '#005AC1',
                            surface: '#FDFBFF',
                            surfaceContainer: '#F3F3F9',
                            secondary: '#535E78',
                            tertiary: '#725573'
                        }
                    },
                    animation: {
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'pop': 'pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)'
                    },
                    keyframes: {
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        pop: { '0%': { transform: 'scale(0.95)' }, '100%': { transform: 'scale(1)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        /* iMessage 堆叠效果 */
        .stack-item { transition: transform 0.3s ease; transform-origin: center bottom; }
        .stack-group:hover .stack-item:nth-child(1) { transform: rotate(-5deg) translateX(-15px); }
        .stack-group:hover .stack-item:nth-child(2) { transform: rotate(5deg) translateX(15px); }
        /* 网格动画 */
        .grid-enter { animation: pop 0.4s ease forwards; }
    </style>
</head>
<body class="bg-md3-surface dark:bg-[#111318] text-gray-900 dark:text-gray-100 overflow-hidden">

    <header class="h-20 flex items-center justify-between px-6 bg-white/60 dark:bg-black/20 backdrop-blur-xl z-50 sticky top-0">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-md3-primary rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                <span class="text-2xl">☁️</span>
            </div>
            <div>
                <h1 class="text-lg font-bold leading-none">GitCloud <span class="text-md3-primary">Ultra</span></h1>
                <p id="status-line" class="text-[10px] opacity-50 mt-1 font-medium tracking-widest uppercase">Ready to Sync</p>
            </div>
        </div>
        
        <div class="hidden md:flex items-center bg-md3-surfaceContainer dark:bg-white/5 px-4 py-2 rounded-2xl w-64 border border-transparent focus-within:border-md3-primary transition-all">
            <span>🔍</span>
            <input type="text" id="global-search" placeholder="搜索文件或记录..." class="bg-transparent border-none outline-none text-sm ml-2 w-full">
        </div>

        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="p-3 hover:bg-black/5 dark:hover:bg-white/5 rounded-full transition-all text-xl">🌓</button>
            <button onclick="toggleConfig()" class="p-3 hover:bg-black/5 dark:hover:bg-white/5 rounded-full transition-all text-xl">⚙️</button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto h-[calc(100vh-160px)] relative px-4 flex flex-col">
        
        <div class="flex justify-center my-4">
            <div class="bg-md3-surfaceContainer dark:bg-white/5 p-1 rounded-2xl flex gap-1">
                <button onclick="switchTab('chat')" id="tab-chat" class="px-6 py-2 rounded-xl text-sm font-semibold transition-all bg-white dark:bg-white/10 shadow-sm">对话流</button>
                <button onclick="switchTab('files')" id="tab-files" class="px-6 py-2 rounded-xl text-sm font-semibold transition-all opacity-50">资料库</button>
            </div>
        </div>

        <section id="view-chat" class="flex-1 overflow-y-auto space-y-6 pb-32 hide-scroll animate-fade-in">
            <div class="flex justify-center text-[10px] opacity-40 font-bold uppercase tracking-widest">Session Started</div>
        </section>

        <section id="view-files" class="hidden flex-1 flex flex-col overflow-hidden animate-fade-in">
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <div class="flex-1 flex gap-2 overflow-x-auto hide-scroll pb-2" id="folder-chips">
                    <button onclick="setFilter('folder','all')" class="px-4 py-2 rounded-full bg-md3-primary text-white text-xs font-bold whitespace-nowrap">全部目录</button>
                </div>
                <div class="flex bg-md3-surfaceContainer dark:bg-white/5 p-1 rounded-xl self-start">
                    <button onclick="setListView('grid')" class="p-2 rounded-lg hover:bg-white/10" title="网格展示">🖼️</button>
                    <button onclick="setListView('list')" class="p-2 rounded-lg hover:bg-white/10" title="列表展示">📝</button>
                </div>
            </div>
            
            <div class="md:hidden mb-4 bg-md3-surfaceContainer dark:bg-white/5 p-3 rounded-2xl flex items-center">
                <span>🔍</span>
                <input type="text" id="mobile-search" placeholder="快速搜索..." class="bg-transparent border-none outline-none text-sm ml-2 w-full">
            </div>

            <div id="file-container" class="flex-1 overflow-y-auto hide-scroll grid grid-cols-2 md:grid-cols-4 gap-4 pb-20">
                </div>
        </section>
    </main>

    <div id="bottom-console" class="fixed bottom-0 left-0 right-0 p-4 z-[60] bg-gradient-to-t from-md3-surface dark:from-[#111318] to-transparent">
        <div class="max-w-3xl mx-auto relative">
            
            <div id="category-menu" class="absolute bottom-20 left-0 right-0 flex gap-2 overflow-x-auto hide-scroll px-2 py-4 animate-slide-up pointer-events-auto">
                </div>

            <div class="bg-white dark:bg-[#232429] rounded-[28px] shadow-2xl shadow-blue-500/10 border border-gray-100 dark:border-white/5 p-2 flex items-end gap-2">
                <button onclick="toggleCategoryMenu()" class="w-12 h-12 rounded-full hover:bg-gray-100 dark:hover:bg-white/5 flex items-center justify-center transition-transform active:scale-90" id="cat-toggle-btn">
                    <span class="text-xl">📁</span>
                </button>
                
                <div class="flex-1 flex flex-col mb-1">
                    <span id="current-target-label" class="text-[9px] font-bold text-md3-primary ml-2 mb-1 uppercase tracking-tighter">存入：临时</span>
                    <textarea id="main-input" rows="1" placeholder="发送笔记或多个文件..." class="bg-transparent border-none outline-none text-sm px-2 py-1 resize-none max-h-32 hide-scroll"></textarea>
                </div>

                <div class="flex items-center gap-1 mb-1 pr-1">
                    <button onclick="document.getElementById('file-input').click()" class="w-10 h-10 rounded-full hover:bg-gray-100 dark:hover:bg-white/5 flex items-center justify-center">📎</button>
                    <button id="send-btn" class="w-11 h-11 bg-md3-primary text-white rounded-full flex items-center justify-center shadow-lg hover:brightness-110 active:scale-90 transition-all">
                        <span class="text-lg">➔</span>
                    </button>
                </div>
            </div>
            
            <div id="multi-file-preview" class="hidden absolute bottom-24 left-4 right-4 bg-blue-600 text-white px-4 py-2 rounded-2xl text-xs font-bold animate-pop flex justify-between items-center">
                <span id="preview-count">已选择 0 个文件</span>
                <button onclick="clearFiles()" class="opacity-70">取消</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" class="hidden" multiple>

    <div id="config-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-6">
        <div class="bg-white dark:bg-[#1C1B1F] w-full max-w-sm rounded-[32px] p-8 shadow-2xl animate-pop">
            <h2 class="text-2xl font-bold mb-2">Cloud Config</h2>
            <p class="text-xs opacity-50 mb-6">配置将存储在本地，享有完全读写权</p>
            <div class="space-y-4">
                <div class="group">
                    <label class="text-[10px] font-bold ml-4 mb-1 block text-md3-primary uppercase">GitHub User</label>
                    <input id="cfg-user" type="text" class="w-full p-4 bg-gray-50 dark:bg-white/5 rounded-2xl outline-none border-2 border-transparent focus:border-md3-primary transition-all">
                </div>
                <div class="group">
                    <label class="text-[10px] font-bold ml-4 mb-1 block text-md3-primary uppercase">Repository Name</label>
                    <input id="cfg-repo" type="text" class="w-full p-4 bg-gray-50 dark:bg-white/5 rounded-2xl outline-none border-2 border-transparent focus:border-md3-primary transition-all">
                </div>
                <div class="group">
                    <label class="text-[10px] font-bold ml-4 mb-1 block text-md3-primary uppercase">Personal Access Token</label>
                    <input id="cfg-token" type="password" class="w-full p-4 bg-gray-50 dark:bg-white/5 rounded-2xl outline-none border-2 border-transparent focus:border-md3-primary transition-all">
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="toggleConfig()" class="flex-1 py-4 text-sm font-bold opacity-50">Cancel</button>
                    <button onclick="saveConfig()" class="flex-1 py-4 bg-md3-primary text-white rounded-2xl text-sm font-bold shadow-lg shadow-blue-500/20">Apply & Sync</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * 📂 分类配置 - 修改此处即可同步全站
         */
        const CATEGORIES = {
            'notes': { label: '文字', emoji: '📝', color: 'bg-amber-500' },
            'env_law': { label: '环境法', emoji: '🌿', color: 'bg-emerald-500' },
            'law': { label: '法学', emoji: '⚖️', color: 'bg-indigo-500' },
            'office': { label: '办公', emoji: '💼', color: 'bg-blue-500' },
            'fun': { label: '娱乐', emoji: '🎮', color: 'bg-rose-500' },
            'others': { label: '其他', emoji: '📁', color: 'bg-slate-500' },
            'inbox': { label: '临时', emoji: '📥', color: 'bg-orange-500' }
        };

        let state = {
            user: '', repo: '', token: '',
            allFiles: [],
            currentFolder: 'inbox',
            viewMode: 'chat',
            listStyle: 'grid',
            searchQuery: '',
            selectedFiles: []
        };

        // --- 初始化 ---
        window.onload = () => {
            loadConfig();
            initUI();
            if(state.token) syncAll();
        };

        function initUI() {
            // 渲染悬浮菜单
            const menu = document.getElementById('category-menu');
            const chips = document.getElementById('folder-chips');
            const targetSelect = document.getElementById('target-folder');
            
            Object.keys(CATEGORIES).forEach(key => {
                const cat = CATEGORIES[key];
                // Telegram 风格悬浮菜单项
                menu.innerHTML += `
                    <button onclick="selectCategory('${key}')" class="flex flex-col items-center gap-2 min-w-[70px] group">
                        <div class="w-14 h-14 ${cat.color} text-white rounded-2xl flex items-center justify-center text-2xl shadow-lg transition-transform group-hover:scale-110 active:scale-95">${cat.emoji}</div>
                        <span class="text-[10px] font-bold dark:text-gray-400">${cat.label}</span>
                    </button>
                `;
                // 资料库 Chip
                chips.innerHTML += `
                    <button onclick="setFilter('folder','${key}')" class="chip-item px-4 py-2 rounded-full bg-md3-surfaceContainer dark:bg-white/5 text-xs font-bold whitespace-nowrap transition-all border border-transparent hover:border-md3-primary">${cat.emoji} ${cat.label}</button>
                `;
            });
        }

        // --- 核心逻辑：GitHub CRUD ---
        async function syncAll() {
            document.getElementById('status-line').innerText = '🔄 Syncing...';
            let filesCollected = [];
            try {
                const folders = Object.keys(CATEGORIES);
                const results = await Promise.all(folders.map(f => fetchFolder(f)));
                state.allFiles = results.flat().sort((a,b) => b.timestamp - a.timestamp);
                renderChat();
                renderFiles();
                document.getElementById('status-line').innerText = `● Connected to ${state.repo}`;
            } catch (e) {
                document.getElementById('status-line').innerText = '❌ Connection Error';
            }
        }

        async function fetchFolder(folder) {
            try {
                const res = await fetch(`https://api.github.com/repos/${state.user}/${state.repo}/contents/${folder}`, {
                    headers: { 'Authorization': `token ${state.token}` }
                });
                if(!res.ok) return [];
                const data = await res.json();
                return data.map(f => {
                    const parts = f.name.split('-');
                    return {
                        ...f,
                        folder,
                        timestamp: parts[1] || 0,
                        cleanName: parts.slice(2).join('-') || f.name,
                        ext: f.name.split('.').pop().toLowerCase()
                    };
                });
            } catch (e) { return []; }
        }

        async function handleSend() {
            const text = document.getElementById('main-input').value.trim();
            const files = document.getElementById('file-input').files;
            
            if(!text && files.length === 0) return;

            // 如果有文字，先发送文字
            if(text && files.length === 0) {
                await uploadSingle(new File([new Blob([text])], `msg-${Date.now()}.md`), true, text);
            } 
            // 如果有文件，执行多文件批量发送 (iMessage 堆叠模拟)
            else if(files.length > 0) {
                // UI 上显示堆叠气泡
                addStackBubble(files, 'me');
                for(let file of files) {
                    await uploadSingle(file, false);
                }
            }

            document.getElementById('main-input').value = '';
            clearFiles();
            setTimeout(syncAll, 1000);
        }

        async function uploadSingle(file, isNote, content = '') {
            const fileName = `${state.currentFolder}-${Date.now()}-${file.name}`;
            const url = `https://api.github.com/repos/${state.user}/${state.repo}/contents/${state.currentFolder}/${fileName}`;
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${state.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Cloud upload`, content: base64 })
                });
            };
        }

        // --- UI 渲染：iMessage 堆叠与聊天 ---
        function addStackBubble(files, side) {
            const container = document.getElementById('view-chat');
            const div = document.createElement('div');
            div.className = `flex ${side === 'me' ? 'justify-end' : 'justify-start'} animate-slide-up group stack-group`;
            
            let stackHtml = '';
            if(files.length === 1) {
                stackHtml = `<div class="bg-md3-primary text-white p-4 rounded-3xl text-sm shadow-md">📎 ${files[0].name}</div>`;
            } else {
                // 创建堆叠感
                stackHtml = `<div class="relative w-48 h-32">`;
                Array.from(files).slice(0, 3).forEach((f, i) => {
                    stackHtml += `
                        <div class="stack-item absolute inset-0 bg-white dark:bg-slate-800 border-2 border-md3-primary/20 rounded-2xl shadow-xl flex items-center justify-center p-2 text-[10px] text-center font-bold" style="z-index: ${10-i}; top: -${i*6}px; left: ${i*4}px">
                            ${f.name.substring(0, 15)}...
                        </div>`;
                });
                stackHtml += `<div class="absolute -bottom-2 -right-2 bg-blue-600 text-white text-[10px] px-2 py-1 rounded-full z-20 shadow-lg">${files.length} 个文件</div></div>`;
            }
            
            div.innerHTML = stackHtml;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function renderChat() {
            const container = document.getElementById('view-chat');
            container.innerHTML = `<div class="flex justify-center text-[10px] opacity-40 font-bold uppercase tracking-widest">History Synced</div>`;
            // 取最近 15 条
            state.allFiles.slice(0, 15).reverse().forEach(f => {
                const isNote = f.ext === 'md' && f.name.startsWith(f.folder);
                const side = 'system';
                const div = document.createElement('div');
                div.className = `flex justify-start mb-4 animate-slide-up`;
                div.innerHTML = `
                    <div class="bg-md3-surfaceContainer dark:bg-white/5 p-3 rounded-2xl max-w-[80%] shadow-sm border border-black/5 dark:border-white/5">
                        <p class="text-[13px] leading-relaxed">${isNote ? '📝 记录：'+f.cleanName : '📎 文件：'+f.cleanName}</p>
                        <div class="flex items-center gap-2 mt-2 opacity-40 text-[9px] font-bold">
                            <span>${CATEGORIES[f.folder]?.emoji} ${CATEGORIES[f.folder]?.label}</span>
                            <span>•</span>
                            <span>${new Date(parseInt(f.timestamp)).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        // --- 资料库：双视图与搜索 ---
        function renderFiles() {
            const container = document.getElementById('file-container');
            container.innerHTML = '';
            
            const q = state.searchQuery.toLowerCase();
            const filtered = state.allFiles.filter(f => {
                const matchesSearch = f.cleanName.toLowerCase().includes(q) || f.folder.includes(q) || f.ext.includes(q);
                const matchesFolder = state.currentFolder === 'all' || f.folder === state.currentFolder;
                return matchesSearch && matchesFolder;
            });

            if(state.listStyle === 'grid') {
                container.className = "flex-1 overflow-y-auto hide-scroll grid grid-cols-2 md:grid-cols-4 gap-4 pb-20";
                filtered.forEach(f => {
                    const card = document.createElement('div');
                    card.className = "bg-white dark:bg-white/5 p-4 rounded-3xl flex flex-col items-center text-center gap-3 border border-black/5 dark:border-white/10 grid-enter hover:shadow-xl transition-all group";
                    card.innerHTML = `
                        <div class="w-16 h-16 bg-md3-surfaceContainer dark:bg-white/10 rounded-2xl flex items-center justify-center text-3xl group-hover:scale-110 transition-transform">${getFileIcon(f.ext)}</div>
                        <div class="w-full">
                            <p class="text-xs font-bold truncate px-2">${f.cleanName}</p>
                            <p class="text-[9px] opacity-40 mt-1 uppercase">${f.folder} | ${f.ext}</p>
                        </div>
                        <div class="flex gap-2">
                            <a href="${f.download_url}" target="_blank" class="w-8 h-8 flex items-center justify-center bg-blue-500/10 text-blue-500 rounded-full text-xs">⬇️</a>
                            <button onclick="deleteFile('${f.path}','${f.sha}')" class="w-8 h-8 flex items-center justify-center bg-red-500/10 text-red-500 rounded-full text-xs">🗑️</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } else {
                container.className = "flex-1 overflow-y-auto hide-scroll flex flex-col gap-2 pb-20";
                filtered.forEach(f => {
                    const item = document.createElement('div');
                    item.className = "bg-white dark:bg-white/5 p-4 rounded-2xl flex items-center justify-between border border-black/5 dark:border-white/10 animate-fade-in";
                    item.innerHTML = `
                        <div class="flex items-center gap-4 truncate">
                            <span class="text-xl">${getFileIcon(f.ext)}</span>
                            <div class="truncate">
                                <p class="text-sm font-bold truncate">${f.cleanName}</p>
                                <p class="text-[9px] opacity-40 uppercase">${f.folder} • ${(f.size/1024).toFixed(1)} KB</p>
                            </div>
                        </div>
                        <div class="flex gap-1">
                            <a href="${f.download_url}" target="_blank" class="p-2 text-blue-500">⬇️</a>
                            <button onclick="deleteFile('${f.path}','${f.sha}')" class="p-2 text-red-400">🗑️</button>
                        </div>
                    `;
                    container.appendChild(item);
                });
            }
        }

        // --- 交互助手 ---
        function switchTab(t) {
            state.viewMode = t;
            document.getElementById('view-chat').classList.toggle('hidden', t !== 'chat');
            document.getElementById('view-files').classList.toggle('hidden', t !== 'files');
            document.getElementById('bottom-console').classList.toggle('hidden', t !== 'chat');
            
            document.getElementById('tab-chat').className = `px-6 py-2 rounded-xl text-sm font-semibold transition-all ${t === 'chat' ? 'bg-white dark:bg-white/10 shadow-sm' : 'opacity-50'}`;
            document.getElementById('tab-files').className = `px-6 py-2 rounded-xl text-sm font-semibold transition-all ${t === 'files' ? 'bg-white dark:bg-white/10 shadow-sm' : 'opacity-50'}`;
            if(t === 'files') renderFiles();
        }

        function toggleCategoryMenu() {
            document.getElementById('category-menu').classList.toggle('hidden');
            document.getElementById('cat-toggle-btn').classList.toggle('rotate-45');
        }

        function selectCategory(key) {
            state.currentFolder = key;
            document.getElementById('current-target-label').innerText = `存入：${CATEGORIES[key].label}`;
            toggleCategoryMenu();
        }

        function setListView(style) {
            state.listStyle = style;
            renderFiles();
        }

        function setFilter(type, val) {
            if(type === 'folder') state.currentFolder = val;
            renderFiles();
        }

        // 搜索同步
        document.getElementById('global-search').oninput = (e) => { state.searchQuery = e.target.value; renderFiles(); };
        document.getElementById('mobile-search').oninput = (e) => { state.searchQuery = e.target.value; renderFiles(); };

        function getFileIcon(ext) {
            if(['jpg','png','webp','gif'].includes(ext)) return '🖼️';
            if(['mp4','mov','avi'].includes(ext)) return '🎬';
            if(['pdf','docx','txt','md'].includes(ext)) return '📄';
            return '📁';
        }

        // --- 配置与权限 ---
        function saveConfig() {
            state.user = document.getElementById('cfg-user').value;
            state.repo = document.getElementById('cfg-repo').value;
            state.token = document.getElementById('cfg-token').value;
            localStorage.setItem('gh_ultra_cfg', JSON.stringify(state));
            toggleConfig();
            syncAll();
        }

        function loadConfig() {
            const cfg = localStorage.getItem('gh_ultra_cfg');
            if(cfg) {
                const p = JSON.parse(cfg);
                state = {...state, ...p};
                document.getElementById('cfg-user').value = state.user;
                document.getElementById('cfg-repo').value = state.repo;
                document.getElementById('cfg-token').value = state.token;
            }
        }

        async function deleteFile(path, sha) {
            if(!confirm("确定要删除云端文件吗？")) return;
            const res = await fetch(`https://api.github.com/repos/${state.user}/${state.repo}/contents/${path}`, {
                method: 'DELETE',
                headers: { 'Authorization': `token ${state.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Delete via GitCloud", sha: sha })
            });
            if(res.ok) syncAll();
        }

        function toggleConfig() { document.getElementById('config-modal').classList.toggle('hidden'); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        function clearFiles() {
            document.getElementById('file-input').value = '';
            document.getElementById('multi-file-preview').classList.add('hidden');
        }

        document.getElementById('file-input').onchange = (e) => {
            const count = e.target.files.length;
            if(count > 0) {
                document.getElementById('preview-count').innerText = `已准备好 ${count} 个文件`;
                document.getElementById('multi-file-preview').classList.remove('hidden');
            }
        };

        document.getElementById('send-btn').onclick = handleSend;
        document.getElementById('main-input').onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
    </script>
</body>
</html>
