<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 文件闪传</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #drop-zone.dragover { background-color: #ebf8ff; border-color: #4299e1; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">

    <div class="max-w-xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="p-8">
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">🚀 GitHub 闪传</h1>
            <p class="text-gray-500 mb-8">随时随地，碎片化文件快速入库</p>

            <details class="mb-6 bg-gray-100 rounded-lg p-4">
                <summary class="text-sm font-medium text-gray-700 cursor-pointer">⚙️ 配置仓库信息 (仅保存在本地)</summary>
                <div class="mt-4 space-y-3">
                    <input id="token" type="password" placeholder="GitHub Token" class="w-full p-2 border rounded-md">
                    <input id="repo" type="text" placeholder="用户名/仓库名 (例如: jack/my-files)" class="w-full p-2 border rounded-md">
                    <p class="text-xs text-gray-400 font-mono text-center">配置将加密存储于浏览器缓存</p>
                </div>
            </details>

            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2">📁 选择分类</label>
                <div class="grid grid-cols-2 gap-2" id="category-group">
                    <button onclick="selectCategory('inbox', this)" class="cat-btn border-2 border-blue-500 bg-blue-50 py-2 rounded-lg text-blue-700 font-medium">📥 临时收件箱</button>
                    <button onclick="selectCategory('work', this)" class="cat-btn border-2 border-transparent bg-gray-100 py-2 rounded-lg text-gray-600 font-medium hover:bg-gray-200">💼 工作文档</button>
                    <button onclick="selectCategory('images', this)" class="cat-btn border-2 border-transparent bg-gray-100 py-2 rounded-lg text-gray-600 font-medium hover:bg-gray-200">🖼️ 图片素材</button>
                    <button onclick="selectCategory('ideas', this)" class="cat-btn border-2 border-transparent bg-gray-100 py-2 rounded-lg text-gray-600 font-medium hover:bg-gray-200">💡 灵感碎片</button>
                </div>
            </div>

            <div id="drop-zone" class="border-3 border-dashed border-gray-300 rounded-xl p-10 text-center transition-all cursor-pointer hover:border-blue-400">
                <input type="file" id="file-input" class="hidden">
                <div class="space-y-2">
                    <div class="text-4xl">📤</div>
                    <p class="text-gray-600" id="file-name-display">点击或拖拽文件到这里</p>
                </div>
            </div>

            <button id="upload-btn" class="w-full mt-6 bg-blue-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700 transform active:scale-95 transition">
                确认上传到 GitHub
            </button>

            <div id="status" class="mt-4 text-center text-sm font-medium min-h-[1.5rem]"></div>
        </div>
    </div>

    <script>
        let currentCategory = 'inbox';
        const tokenInput = document.getElementById('token');
        const repoInput = document.getElementById('repo');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const status = document.getElementById('status');

        // 初始化时从本地加载配置
        window.onload = () => {
            tokenInput.value = localStorage.getItem('gh_token') || '';
            repoInput.value = localStorage.getItem('gh_repo') || '';
        };

        // 切换分类
        function selectCategory(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.replace('border-blue-500', 'border-transparent');
                btn.classList.replace('bg-blue-50', 'bg-gray-100');
                btn.classList.replace('text-blue-700', 'text-gray-600');
            });
            el.classList.replace('border-transparent', 'border-blue-500');
            el.classList.replace('bg-gray-100', 'bg-blue-50');
            el.classList.replace('text-gray-600', 'text-blue-700');
        }

        // 文件处理逻辑
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = () => {
            if (fileInput.files.length > 0) {
                document.getElementById('file-name-display').innerText = `已选择: ${fileInput.files[0].name}`;
            }
        };

        // 上传逻辑
        document.getElementById('upload-btn').onclick = async () => {
            const token = tokenInput.value;
            const repo = repoInput.value;
            const file = fileInput.files[0];

            if (!token || !repo || !file) {
                showStatus("❌ 请填写完整配置并选择文件", "text-red-600");
                return;
            }

            // 保存配置到本地
            localStorage.setItem('gh_token', token);
            localStorage.setItem('gh_repo', repo);

            showStatus("⏳ 正在全力上传...", "text-blue-600");

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Content = reader.result.split(',')[1];
                // 格式：分类/日期-文件名
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                const path = `${currentCategory}/${timestamp}-${file.name}`;
                const url = `https://api.github.com/repos/${repo}/contents/${path}`;

                try {
                    const res = await fetch(url, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Quick upload: ${file.name}`,
                            content: base64Content
                        })
                    });

                    if (res.ok) {
                        showStatus("✅ 上传成功！文件已存入 " + currentCategory, "text-green-600");
                        fileInput.value = ''; // 清空选择
                        document.getElementById('file-name-display').innerText = "点击或拖拽文件到这里";
                    } else {
                        const err = await res.json();
                        showStatus("❌ 上传失败: " + err.message, "text-red-600");
                    }
                } catch (e) {
                    showStatus("❌ 网络异常，无法连接 GitHub", "text-red-600");
                }
            };
        };

        function showStatus(text, colorClass) {
            status.innerText = text;
            status.className = `mt-4 text-center text-sm font-medium ${colorClass}`;
        }
    </script>
</body>
</html>
