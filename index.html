  页面顺序（通过代码中 HTML 块的顺序控制，调换块位置即可改变导航顺序）:
    [SCREEN-1] #chat-screen    对话云盘（含备忘录模式）
    [SCREEN-2] #files-screen   所有文件
    [SCREEN-3] #trash-screen   回收站
    [SCREEN-4] #stats-screen   统计

  如需新增功能:

<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-title" content="GitDrive">
<title>GitDrive</title>
<link rel="manifest" href="assets/manifest.json">
<!-- qrcodejs CDN：用于分享功能生成二维码 -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<!-- marked：用于 Markdown 渲染 -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ── CSS 变量（深色主题） ──────────────────────────────────── */
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--bg4:#22272e;--bg5:#2d333b;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.10);--b3:rgba(255,255,255,.18);
  --t1:#e6edf3;--t2:#8b949e;--t3:#6e7681;
  --ac:#4493f8;--ac2:#79b8ff;
  --gl:rgba(68,147,248,.15);--gl2:rgba(68,147,248,.07);
  --ob:#1c4fbe;--ib:#1c2128;
  --gr:#3fb950;--rd:#f85149;--or:#d29922;--pu:#bc8cff;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --dur:.15s;--ease:cubic-bezier(.4,0,.2,1);
}
/* ── CSS 变量（浅色主题） ──────────────────────────────────── */
[data-theme=light]{
  --bg:#f6f8fa;--bg2:#fff;--bg3:#f0f2f4;--bg4:#e8ebee;--bg5:#d8dbdf;
  --b1:rgba(0,0,0,.06);--b2:rgba(0,0,0,.10);--b3:rgba(0,0,0,.18);
  --t1:#1f2328;--t2:#656d76;--t3:#9198a1;
  --ac:#0969da;--ac2:#218bff;
  --gl:rgba(9,105,218,.12);--gl2:rgba(9,105,218,.06);
  --ob:#0969da;--ib:#fff;
  --gr:#1a7f37;--rd:#cf222e;--or:#9a6700;--pu:#8250df;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
#app{display:flex;height:100dvh;overflow:hidden}

/* ═══ LOGIN ═══════════════════════════════════════════════ */
#login-screen{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.lw{width:100%;max-width:380px}
.lw-logo{width:64px;height:64px;margin:0 auto 22px;background:linear-gradient(135deg,#4493f8,#bc8cff);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 0 0 8px rgba(68,147,248,.1),0 0 40px rgba(68,147,248,.2)}
.lw-h{font-size:24px;font-weight:700;text-align:center;margin-bottom:4px}
.lw-s{font-size:13px;color:var(--t2);text-align:center;margin-bottom:28px}
.lw-card{background:var(--bg2);border:1px solid var(--b2);border-radius:20px;padding:28px}
.lw-field{margin-bottom:14px}
.lw-field label{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.lw-field input{width:100%;padding:10px 13px;background:var(--bg3);border:1.5px solid var(--b2);border-radius:10px;color:var(--t1);font-size:14px;outline:none;transition:border-color var(--dur),box-shadow var(--dur)}
.lw-field input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--gl)}
.lw-btn{width:100%;padding:11px;margin-top:6px;background:var(--ac);border-radius:10px;color:#fff;font-size:14px;font-weight:600;transition:opacity var(--dur),transform var(--dur);cursor:pointer;border:none}
.lw-btn:hover{opacity:.88;transform:translateY(-1px)}
.lw-btn:active{transform:translateY(0)}
.lw-btn:disabled{opacity:.5;cursor:wait}
#lerr{color:var(--rd);font-size:12px;margin-top:10px;text-align:center;display:none;font-weight:500}
.lw-hint{margin-top:14px;font-size:11px;color:var(--t3);text-align:center;line-height:1.7}

/* ═══ SIDEBAR ══════════════════════════════════════════════ */
#sidebar{width:232px;min-width:232px;background:var(--bg2);border-right:1px solid var(--b1);display:flex;flex-direction:column;transition:transform .25s var(--ease);padding-top:var(--sat);overflow-y:auto;overflow-x:hidden}
.sb-hd{display:flex;align-items:center;gap:10px;padding:12px 13px 10px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sb-logo{width:34px;height:34px;flex-shrink:0;background:linear-gradient(135deg,#4493f8,#bc8cff);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.sb-title{font-weight:700;font-size:15px;flex:1}
.sb-acts{display:flex;gap:2px}
.ib{width:30px;height:30px;background:transparent;color:var(--t2);border-radius:7px;border:none;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background var(--dur),color var(--dur);cursor:pointer}
.ib:hover{background:var(--bg3);color:var(--t1)}
.sb-search{padding:8px 11px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sb-sq{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--b1);border-radius:8px;padding:7px 10px;cursor:pointer;transition:border-color var(--dur)}
.sb-sq:hover{border-color:var(--b2)}
.sb-sq-txt{font-size:12.5px;color:var(--t3);flex:1}
.sb-sq-kbd{font-size:10px;color:var(--t3);background:var(--bg4);padding:1px 5px;border-radius:4px}
/* 主导航：圆角卡片容器（区别于分类列表） */
.sb-nav-main{padding:10px 10px 4px;flex-shrink:0}
.sb-nav-main-inner{background:var(--bg3);border:1px solid var(--b1);border-radius:12px;overflow:hidden;padding:3px}
.ni{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;cursor:pointer;color:var(--t2);font-weight:500;font-size:13px;border:none;background:transparent;width:100%;text-align:left;transition:background var(--dur),color var(--dur)}
.ni:hover{background:var(--bg4);color:var(--t1)}
.ni:active{transform:scale(.98)}
.ni.on{background:var(--gl);color:var(--ac2);font-weight:600}
.ni .ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nb{margin-left:auto;background:var(--ac);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;min-width:18px;text-align:center}
/* 分类导航：扁平列表（与主导航视觉区分） */
.sb-sec{padding:10px 13px 5px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);display:flex;align-items:center;gap:6px;flex-shrink:0}
.sb-sec::after{content:"";flex:1;height:1px;background:var(--b1)}
.sb-nav-cats{padding:2px 8px 8px;flex-shrink:0}
.ni-cat{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;color:var(--t2);font-size:12.5px;border:none;background:transparent;width:100%;text-align:left;transition:background var(--dur),color var(--dur)}
.ni-cat:hover{background:var(--b1);color:var(--t1)}
.ni-cat.on{color:var(--ac2)}
.ni-cat .ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.ni-cat-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-left:auto;opacity:0}
.ni-cat.on .ni-cat-dot{opacity:1;background:var(--ac)}
.sb-ft{margin-top:auto;padding:10px 14px max(10px,var(--sab));border-top:1px solid var(--b1);font-size:11px;color:var(--t3);display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.sb-author{font-size:12px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:5px}
.sb-author .dot{width:6px;height:6px;border-radius:50%;background:var(--gr);box-shadow:0 0 5px var(--gr);flex-shrink:0}

/* ═══ MAIN LAYOUT ══════════════════════════════════════════ */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
/* 工具栏：宽屏显示图标+文字，窄屏只显示图标 */
.tb{display:flex;align-items:center;gap:4px;padding:8px 10px;padding-top:calc(8px + var(--sat));background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0;min-height:0}
.tb-btn{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:8px;background:var(--bg3);border:1px solid var(--b1);color:var(--t2);font-size:12px;font-weight:600;white-space:nowrap;transition:all var(--dur);cursor:pointer;flex-shrink:0}
.tb-btn:hover{background:var(--bg4);color:var(--t1);border-color:var(--b2)}
.tb-btn.active{background:var(--gl);color:var(--ac2);border-color:rgba(68,147,248,.3)}
.tb-btn .tb-ico{font-size:13px;flex-shrink:0}
.tb-btn .tb-lbl{display:inline}
@media(max-width:860px){.tb-btn .tb-lbl{display:none}.tb-btn{padding:5px 7px}}
.tb-info{flex:1;overflow:hidden;min-width:0}
.tb-title{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-sub{font-size:11px;color:var(--t2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.menu-btn{display:none}

/* ═══ [SCREEN-1] CHAT ══════════════════════════════════════ */
#chat-screen{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* 模式切换条（对话/备忘录） */
.chat-mode-bar{display:flex;gap:0;padding:0;background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
.cm-tab{flex:1;padding:8px;font-size:12px;font-weight:600;color:var(--t3);border:none;background:transparent;border-bottom:2px solid transparent;transition:all var(--dur);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.cm-tab:hover{color:var(--t2)}
.cm-tab.on{color:var(--ac2);border-bottom-color:var(--ac)}

#msg-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 12px 6px;display:flex;flex-direction:column;gap:0;scroll-behavior:smooth}
.ds{display:flex;align-items:center;gap:10px;margin:12px 0 8px;color:var(--t3);font-size:11px;font-weight:500}
.ds::before,.ds::after{content:"";flex:1;height:1px;background:var(--b1)}

/* PINNED BAR */
#pinned-bar{flex-shrink:0;max-height:88px;overflow-y:auto;border-bottom:1.5px solid rgba(68,147,248,.2)}
.pin-item{display:flex;align-items:center;gap:8px;padding:6px 13px;cursor:pointer;border-bottom:1px solid var(--b1);transition:background var(--dur)}
.pin-item:last-child{border-bottom:none}
.pin-item:hover{background:var(--bg3)}
.pin-icon{color:var(--ac2);font-size:12px;flex-shrink:0}
.pin-preview{flex:1;font-size:12px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pin-date{font-size:10px;color:var(--t3);flex-shrink:0}
.pin-rm{color:var(--t3);font-size:12px;flex-shrink:0;padding:2px 4px;border-radius:4px;transition:color var(--dur);cursor:pointer}
.pin-rm:hover{color:var(--rd)}

/* QUOTE BAR（引用预览条，显示在输入框上方） */
#quote-bar{display:none;align-items:center;gap:8px;padding:7px 12px;background:var(--gl2);border-top:1px solid rgba(68,147,248,.2);flex-shrink:0}
#quote-bar.on{display:flex}
.quote-bar-content{flex:1;font-size:12px;color:var(--ac2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.quote-bar-close{color:var(--t3);font-size:14px;cursor:pointer;padding:2px 4px;flex-shrink:0}
.quote-bar-close:hover{color:var(--t1)}

/* RESTORE / SEL BAR */
.chat-bar{flex-shrink:0;display:none;align-items:center;gap:8px;padding:7px 13px;font-size:12.5px;font-weight:600}
.chat-bar.on{display:flex}
#restore-bar{background:rgba(68,147,248,.09);border-bottom:1px solid rgba(68,147,248,.2);color:var(--ac2)}
#sel-bar{background:var(--gl2);border-bottom:1px solid var(--b1);color:var(--t1)}

/* MESSAGES */
.mg{display:flex;flex-direction:column;gap:2px;margin-bottom:10px}
.mr{display:flex;align-items:flex-end;gap:6px}
.mr.out{flex-direction:row-reverse}
.bw{display:flex;flex-direction:column;max-width:min(72%,480px);position:relative}
.mr.out .bw{align-items:flex-end}
.bl{padding:9px 13px;border-radius:16px;word-break:break-word;line-height:1.56;font-size:14px;animation:bIn .18s var(--ease)}
@keyframes bIn{from{opacity:0;transform:scale(.94) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.bl.in{background:var(--ib);border:1px solid var(--b2);border-bottom-left-radius:4px}
.bl.out{background:var(--ob);color:#fff;border-bottom-right-radius:4px;box-shadow:0 2px 8px rgba(28,79,190,.3)}
.bl.out .mt{color:rgba(255,255,255,.5)}
.bl p{margin-bottom:5px}.bl p:last-child{margin-bottom:0}
.bl code{background:rgba(0,0,0,.22);padding:1px 5px;border-radius:4px;font-size:12px}
.bl pre{background:rgba(0,0,0,.3);padding:10px 12px;border-radius:8px;overflow-x:auto;margin:6px 0}
.bl pre code{background:none;padding:0}
.bl h1,.bl h2,.bl h3{margin:7px 0 3px;font-weight:700}
.bl ul,.bl ol{padding-left:18px;margin:4px 0}
.bl.in code{background:rgba(0,0,0,.07)}
.bl.in pre{background:rgba(0,0,0,.05)}
.mt{font-size:10px;color:var(--t3);margin-top:3px;text-align:right}
/* 引用预览（消息气泡内） */
.quote-preview{background:rgba(68,147,248,.12);border-left:3px solid var(--ac);padding:5px 8px;border-radius:4px;font-size:12px;color:var(--ac2);margin-bottom:6px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bl.out .quote-preview{background:rgba(255,255,255,.15);border-left-color:rgba(255,255,255,.6);color:rgba(255,255,255,.8)}

/* FILE BUBBLE */
.bf{display:flex;flex-direction:column;gap:5px;padding:4px}
.fc-b{background:var(--bg3);border:1px solid var(--b2);border-radius:11px;padding:10px 12px;display:flex;align-items:center;gap:10px;max-width:300px;cursor:pointer;transition:background var(--dur)}
.fc-b:hover{background:var(--bg4)}
.bl.out .fc-b{background:rgba(0,0,0,.2);border-color:rgba(255,255,255,.12)}
.bl.out .fc-b:hover{background:rgba(0,0,0,.3)}
.fc-ic{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.fc-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc-meta{font-size:11px;color:var(--t2);margin-top:2px}
.bl.out .fc-meta{color:rgba(255,255,255,.6)}

/* IMAGE GRID */
.ig{display:grid;gap:3px;border-radius:12px;overflow:hidden;max-width:260px}
.ig.g1{grid-template-columns:1fr}
.ig.g2{grid-template-columns:1fr 1fr}
.ig.g3{grid-template-columns:2fr 1fr}
.ig.g3 .ic:first-child{grid-row:1/3}
.ig.gm{grid-template-columns:1fr 1fr}
.ic{position:relative;aspect-ratio:1;overflow:hidden;background:var(--bg3);cursor:pointer}
.ic img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.ic:hover img{transform:scale(1.04)}
.ic-more{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}

/* MSG ACTIONS */
.ma{display:none;flex-direction:row;gap:1px;margin-top:4px;flex-wrap:wrap}
.bw:hover .ma{display:flex}
.bw.open .ma{display:flex}
.ma-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 9px;background:var(--bg2);border:1px solid var(--b2);color:var(--t1);border-radius:10px;font-size:10px;font-weight:600;transition:background var(--dur);cursor:pointer}
.ma-btn:first-child{border-radius:10px 4px 4px 10px}
.ma-btn:last-child{border-radius:4px 10px 10px 4px}
.ma-btn:only-child{border-radius:10px}
.ma-btn:hover{background:var(--bg3)}
.ma-btn .mi{font-size:14px;font-weight:900}
.ma-btn.pin-on{color:var(--ac2)}
.ma-btn.del{color:var(--rd)}
.ma-btn.del:hover{background:rgba(248,81,73,.1)}
.ck{display:none;width:20px;height:20px;border-radius:50%;border:2px solid var(--b2);background:var(--bg3);flex-shrink:0;align-self:center;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all var(--dur);margin-right:2px;cursor:pointer}
.sel-mode .ck{display:flex}
.ck.on{background:var(--ac);border-color:var(--ac)}

/* PENDING FILES */
.pend{display:none;gap:6px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.pend::-webkit-scrollbar{display:none}
.pf{position:relative;flex-shrink:0;width:60px;height:60px;border-radius:10px;overflow:hidden;background:var(--bg3);border:1px solid var(--b2)}
.pf img{width:100%;height:100%;object-fit:cover;display:block}
.pf-icon{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;font-size:20px}
.pf-ext{font-size:8px;font-weight:800;color:var(--t3);text-transform:uppercase}
.pf-rm{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}

/* UPLOAD PROGRESS */
#up-area{padding:0 12px;max-height:100px;overflow-y:auto;flex-shrink:0}
.up{background:var(--bg3);border:1px solid var(--b2);border-radius:10px;padding:9px 12px;margin-bottom:5px}
.up-name{font-size:12px;font-weight:600;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb{background:var(--bg5);border-radius:3px;height:3px;overflow:hidden}
.pbar{height:100%;background:linear-gradient(90deg,var(--ac),var(--pu));border-radius:3px;transition:width .25s;width:0}

/* INPUT AREA（对话模式） */
.inp-wrap{background:var(--bg2);border-top:1px solid var(--b1);padding:8px 12px max(8px,var(--sab));flex-shrink:0}
.cat-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
.cc{display:flex;align-items:center;gap:4px;padding:4px 11px;border-radius:20px;border:1.5px solid var(--b2);background:var(--bg3);white-space:nowrap;font-size:12px;font-weight:600;color:var(--t2);transition:all var(--dur);flex-shrink:0;cursor:pointer}
.cc:hover{border-color:var(--ac2);color:var(--ac2);background:var(--bg4)}
.cc.on{border-color:var(--ac);background:var(--gl);color:var(--ac2)}
.inp-row{display:flex;align-items:flex-end;gap:7px}
.inp-box{flex:1;background:var(--bg3);border:1.5px solid var(--b2);border-radius:20px;display:flex;align-items:flex-end;padding:7px 11px;gap:7px;transition:border-color var(--dur),box-shadow var(--dur)}
.inp-box:focus-within{border-color:var(--ac);box-shadow:0 0 0 3px var(--gl)}
#ti{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:14px;resize:none;max-height:120px;min-height:22px;line-height:1.5;padding:0}
#ti::placeholder{color:var(--t3)}
.att,.snd{width:32px;height:32px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all var(--dur)}
.att{background:var(--bg4);color:var(--t2)}
.att:hover{background:var(--gl);color:var(--ac2)}
.snd{background:var(--ac);color:#fff}
.snd:hover{filter:brightness(1.1);transform:scale(1.05)}
.snd:active{transform:scale(.97)}
#fi,#fi-memo{display:none}
.dov{display:none;position:fixed;inset:0;z-index:90;background:rgba(68,147,248,.08);border:3px dashed var(--ac);align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--ac2)}
.dov.on{display:flex}

/* MEMO INPUT AREA（备忘录模式，嵌入 chat-screen） */
.memo-inp-area{background:var(--bg2);border-top:1px solid var(--b1);padding:8px 12px max(8px,var(--sab));flex-shrink:0;display:none}
.memo-inp-area.on{display:block}
.memo-type-row{display:flex;gap:6px;margin-bottom:7px}
.memo-tbtn{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--b2);background:var(--bg3);color:var(--t2);transition:all var(--dur);cursor:pointer}
.memo-tbtn.on{border-color:var(--ac);background:var(--gl);color:var(--ac2)}
.memo-row{display:flex;align-items:flex-end;gap:7px}
#memo-inp{flex:1;background:var(--bg3);border:1.5px solid var(--b2);border-radius:12px;padding:8px 12px;color:var(--t1);font-size:14px;resize:none;min-height:40px;max-height:120px;outline:none;line-height:1.5;transition:border-color var(--dur),box-shadow var(--dur)}
#memo-inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--gl)}
#memo-inp::placeholder{color:var(--t3)}
.memo-snd{width:32px;height:32px;border-radius:50%;background:var(--ac);border:none;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:filter var(--dur);flex-shrink:0}
.memo-snd:hover{filter:brightness(1.1)}
/* 备忘录附件预览行 */
.memo-att-row{display:flex;gap:5px;overflow-x:auto;padding-top:6px;scrollbar-width:none}
.memo-att-row::-webkit-scrollbar{display:none}
.memo-att-chip{display:flex;align-items:center;gap:4px;padding:3px 8px 3px 6px;background:var(--bg3);border:1px solid var(--b2);border-radius:20px;font-size:11px;color:var(--t2);flex-shrink:0;white-space:nowrap}
.memo-att-chip-rm{width:14px;height:14px;border-radius:50%;background:var(--bg4);border:none;color:var(--t3);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.memo-att-chip-rm:hover{color:var(--rd)}

/* MEMO LIST（在 msg-list 中展示，与消息混合） */
.memo-card-wrap{display:flex;flex-direction:column;margin-bottom:10px}
.memo-card{background:var(--bg2);border:1px solid var(--b2);border-radius:13px;padding:11px 13px;animation:bIn .18s var(--ease)}
.memo-card.todo-done{opacity:.55}
.memo-body{font-size:13.5px;line-height:1.65}
.memo-body p{margin-bottom:4px}.memo-body p:last-child{margin-bottom:0}
.memo-body code{background:rgba(0,0,0,.12);padding:1px 5px;border-radius:4px;font-size:12px}
.memo-body pre{background:var(--bg3);padding:9px 12px;border-radius:8px;overflow-x:auto;margin:5px 0}
.memo-body ul,.memo-body ol{padding-left:18px;margin:4px 0}
.memo-ft{display:flex;align-items:center;gap:7px;margin-top:9px;padding-top:7px;border-top:1px solid var(--b1)}
.memo-date{font-size:11px;color:var(--t3);flex:1}
.memo-act{background:none;border:none;color:var(--t2);font-size:11px;cursor:pointer;padding:3px 7px;border-radius:6px;transition:background var(--dur),color var(--dur)}
.memo-act:hover{background:var(--bg3);color:var(--t1)}
.memo-act.del:hover{background:rgba(248,81,73,.1);color:var(--rd)}
/* 备忘录附件列表 */
.memo-atts{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.memo-att-link{display:flex;align-items:center;gap:4px;padding:3px 8px;background:var(--bg3);border:1px solid var(--b2);border-radius:20px;font-size:11px;color:var(--ac2);text-decoration:none;cursor:pointer;transition:background var(--dur)}
.memo-att-link:hover{background:var(--bg4)}
/* 备忘录筛选栏 */
.memo-filter-bar{display:none;align-items:center;gap:6px;padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.memo-filter-bar::-webkit-scrollbar{display:none}
.memo-filter-bar.on{display:flex}
.memo-fbt{padding:4px 11px;border-radius:14px;font-size:12px;font-weight:600;border:1.5px solid var(--b2);background:var(--bg3);color:var(--t2);transition:all var(--dur);cursor:pointer;white-space:nowrap;flex-shrink:0}
.memo-fbt:hover{border-color:var(--ac);color:var(--ac2)}
.memo-fbt.on{border-color:var(--ac);background:var(--gl);color:var(--ac2)}

/* ═══ [SCREEN-2] FILES ═════════════════════════════════════ */
#files-screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.ft{display:flex;align-items:center;flex-wrap:wrap;gap:7px;padding:9px 12px;padding-top:calc(9px + var(--sat));background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
.ft-title{font-size:15px;font-weight:700;flex:1;min-width:80px}
.ft-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.ftb{padding:5px 11px;border-radius:16px;font-size:12px;font-weight:600;border:1.5px solid var(--b2);background:var(--bg3);color:var(--t2);transition:all var(--dur);white-space:nowrap;cursor:pointer}
.ftb:hover{border-color:var(--ac);color:var(--ac2)}
.ftb.on{border-color:var(--ac);background:var(--gl);color:var(--ac2)}
.ftb.danger{color:var(--rd)}
.vtog{display:flex;border:1px solid var(--b2);border-radius:7px;overflow:hidden}
.vb{padding:5px 8px;background:var(--bg3);border:none;color:var(--t2);font-size:14px;transition:all var(--dur);cursor:pointer}
.vb.on{background:var(--gl);color:var(--ac2)}
.fr{padding:6px 11px;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;gap:5px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.fr::-webkit-scrollbar{display:none}
.fc2{padding:4px 11px;border-radius:14px;font-size:12px;font-weight:600;border:1.5px solid var(--b2);background:var(--bg3);color:var(--t2);transition:all var(--dur);white-space:nowrap;flex-shrink:0;cursor:pointer}
.fc2:hover{border-color:var(--ac);color:var(--ac2)}
.fc2.on{border-color:var(--ac);background:var(--gl);color:var(--ac2)}
.fc2-sep{width:1px;height:14px;background:var(--b2);flex-shrink:0;margin:0 2px}
.fsb{padding:6px 11px;background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
.fsb-box{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1.5px solid var(--b1);border-radius:8px;padding:5px 11px;transition:border-color var(--dur)}
.fsb-box:focus-within{border-color:var(--ac)}
.fsb-box input{background:none;border:none;outline:none;color:var(--t1);font-size:13px;flex:1}
.fsb-box input::placeholder{color:var(--t3)}
.fg-selbar{display:none;align-items:center;gap:7px;flex-shrink:0;padding:7px 12px;background:var(--gl2);border-bottom:1px solid var(--b1);font-size:13px;font-weight:600;color:var(--ac2)}
.fg-selbar.on{display:flex}
/* 文件网格（紧凑卡片） */
#fg{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(min(138px,44vw),1fr));gap:6px;align-content:start}
#fg.lv{grid-template-columns:1fr;gap:4px;padding:6px}
.gc{background:var(--bg2);border:1px solid var(--b1);border-radius:12px;overflow:hidden;position:relative;display:flex;flex-direction:column;transition:border-color var(--dur),box-shadow var(--dur),transform var(--dur);animation:fu .2s var(--ease) both;min-width:0}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.gc:hover{border-color:var(--ac);box-shadow:0 3px 12px var(--gl);transform:translateY(-1px)}
.gc.sel{border-color:var(--ac);background:var(--gl2)}
.gc-ck{position:absolute;top:6px;left:6px;z-index:3;width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.6);background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;font-size:9px;color:#fff;transition:all var(--dur)}
.sel-mode .gc-ck{display:flex}
.gc.sel .gc-ck{background:var(--ac);border-color:var(--ac)}
.gc-fav{position:absolute;top:5px;right:5px;z-index:3;font-size:12px;color:#fbbf24;text-shadow:0 1px 3px rgba(0,0,0,.5)}
/* 4:3 缩略图，减少卡片高度 */
.gc-thumb{width:100%;aspect-ratio:4/3;overflow:hidden;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.gc-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.gc:hover .gc-thumb img{transform:scale(1.04)}
.gc-icon{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-size:26px}
.gc-ext{font-size:9px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);background:var(--bg4);padding:2px 5px;border-radius:4px}
.gc-info{padding:5px 7px 2px;flex-shrink:0}
/* 修复：移动端两列网格文件名强制显示 */
.gc-name{font-size:11px;font-weight:600;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word;min-height:calc(1.35em * 1);max-height:calc(1.35em * 2)}
.gc-meta{font-size:9.5px;color:var(--t2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gc-acts{display:flex;align-items:center;justify-content:space-around;padding:3px 2px 5px;border-top:1px solid var(--b1);margin-top:auto;flex-shrink:0}
.ga{background:none;border:none;color:var(--t2);font-size:11.5px;font-weight:700;padding:2px 3px;border-radius:5px;min-width:21px;height:22px;display:flex;align-items:center;justify-content:center;transition:background var(--dur),color var(--dur);cursor:pointer}
.ga:hover{background:var(--bg3);color:var(--t1)}
.ga:active{background:var(--bg4)}
.ga.del{color:var(--rd)}.ga.del:hover{background:rgba(248,81,73,.1)}
.ga.fav-on{color:#fbbf24}
/* 列表项 */
.li{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;min-height:54px;background:var(--bg2);border:1px solid var(--b1);width:100%;overflow:hidden;min-width:0;box-sizing:border-box}
.li:hover{border-color:var(--b2)}
.li.sel{border-color:var(--ac);background:var(--gl2)}
.li-ck{width:18px;height:18px;border-radius:50%;border:2px solid var(--b2);background:var(--bg3);display:none;align-items:center;justify-content:center;font-size:9px;color:#fff;flex-shrink:0;transition:all var(--dur);cursor:pointer}
.sel-mode .li-ck{display:flex}
.li-ck.on{background:var(--ac);border-color:var(--ac)}
.li-thumb{width:38px;height:38px;border-radius:7px;overflow:hidden;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.li-thumb img{width:38px;height:38px;object-fit:cover}
.li-icon{font-size:18px;display:flex;flex-direction:column;align-items:center;gap:1px}
.li-icon .gc-ext{font-size:7px;padding:1px 3px}
.li-info{flex:1;overflow:hidden;min-width:0}
.li-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;max-width:100%}
.li-meta{font-size:11px;color:var(--t2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-acts-d{display:flex;gap:3px;align-items:center;flex-shrink:0}
.li-acts-m{display:flex;gap:2px;align-items:center;flex-shrink:0}
.la{width:28px;height:28px;background:transparent;border:none;color:var(--t2);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:background var(--dur),color var(--dur)}
.la:hover{background:var(--bg3);color:var(--t1)}
.la.del{color:var(--rd)}.la.del:hover{background:rgba(248,81,73,.1)}
.la.fav-on{color:#fbbf24;font-size:14px}

/* ═══ [SCREEN-3] TRASH ═════════════════════════════════════ */
#trash-screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.trash-toolbar{display:flex;align-items:center;gap:7px;padding:9px 12px;padding-top:calc(9px + var(--sat));background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
#trash-list{flex:1;overflow-y:auto;padding:8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(min(138px,44vw),1fr));gap:6px;align-content:start}
#trash-list.lv{grid-template-columns:1fr;gap:4px;padding:6px}
/* 回收站网格卡片 */
.tr-gc{background:var(--bg2);border:1px solid var(--b1);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;animation:fu .2s var(--ease) both}
.tr-gc-thumb{width:100%;aspect-ratio:4/3;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.tr-gc-body{padding:5px 7px 7px;flex:1;display:flex;flex-direction:column;gap:3px}
.tr-gc-name{font-size:11px;font-weight:600;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word;min-height:1.35em}
.tr-gc-meta{font-size:10px;color:var(--t2)}
.tr-gc-remain{font-size:10px;font-weight:600}
.tr-gc-acts{display:flex;gap:4px;margin-top:4px}
.tr-gc-acts button{flex:1;padding:4px 0;font-size:11px;font-weight:600;border-radius:6px;border:none;cursor:pointer;font-family:inherit;transition:opacity var(--dur)}
.tr-gc-acts .tr-restore{background:var(--gl);border:1px solid rgba(68,147,248,.3);color:var(--ac2)}
.tr-gc-acts .tr-del{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--rd)}
.tr-gc-acts button:hover{opacity:.8}
/* 回收站列表项 */
.tr-li{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;background:var(--bg2);border:1px solid var(--b1)}
.tr-li-ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tr-li-info{flex:1;overflow:hidden;min-width:0}
.tr-li-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-li-meta{font-size:11px;color:var(--t2);margin-top:1px}
.tr-li-remain{font-size:11px;font-weight:600;margin-top:1px}
.tr-li-acts{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.tr-li-acts button{padding:4px 10px;font-size:11px;font-weight:600;border-radius:6px;border:none;cursor:pointer;font-family:inherit;white-space:nowrap}
.tr-li-acts .tr-restore{background:var(--gl);border:1px solid rgba(68,147,248,.3);color:var(--ac2)}
.tr-li-acts .tr-del{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--rd)}

/* ═══ [SCREEN-4] STATS ═════════════════════════════════════ */
#stats-screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.screen-body{flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:9px}
.stat-hero{background:linear-gradient(135deg,#1b3d8a,#4e1a8a);border-radius:16px;padding:20px 22px;color:#fff}
.stat-sz{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.stat-sub{font-size:13px;opacity:.75}
.stat-sec{background:var(--bg2);border:1px solid var(--b2);border-radius:14px;padding:15px 16px}
.stat-sec-t{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.stat-row{margin-bottom:11px}
.stat-row-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.stat-row-label{font-size:13px;font-weight:600}
.stat-row-val{font-size:11px;color:var(--t2)}
.stat-bar{height:5px;border-radius:3px;background:var(--bg4);overflow:hidden}
.stat-fill{height:100%;border-radius:3px;transition:width .5s var(--ease)}

/* ═══ SEARCH OVERLAY ═══════════════════════════════════════ */
#search-ov{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;padding:50px 16px 16px}
#search-ov.on{display:flex}
.sm{background:var(--bg2);border:1px solid var(--b2);border-radius:18px;width:100%;max-width:520px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.sm-inp{display:flex;align-items:center;gap:9px;padding:14px 15px;border-bottom:1px solid var(--b1)}
.sm-inp input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:15px;font-weight:500}
.sm-inp input::placeholder{color:var(--t3)}
.sr{max-height:360px;overflow-y:auto}
.sr-empty{padding:28px;text-align:center;color:var(--t3);font-size:13px}
.sri{display:flex;align-items:center;gap:11px;padding:10px 15px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background var(--dur)}
.sri:hover{background:var(--bg3)}
.sri:last-child{border-bottom:none}
.sri-ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sri-info{flex:1;overflow:hidden}
.sri-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sri-meta{font-size:11px;color:var(--t2);margin-top:1px}
.hl{color:var(--ac2)}

/* ═══ MEDIA PREVIEW ════════════════════════════════════════ */
#mp{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.94);backdrop-filter:blur(14px);display:none;flex-direction:column;align-items:center;justify-content:center}
#mp.on{display:flex}
.mp-top{position:absolute;top:0;left:0;right:0;padding:14px 18px;padding-top:calc(14px + var(--sat));display:flex;align-items:center;gap:10px;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent)}
.mp-name{flex:1;font-size:13px;font-weight:600;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-btn{width:34px;height:34px;border:none;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background var(--dur);cursor:pointer}
.mp-btn:hover{background:rgba(255,255,255,.22)}
#mp-content{max-width:92vw;max-height:78vh;display:flex;align-items:center;justify-content:center}
#mp-content img{max-width:90vw;max-height:78vh;border-radius:8px;object-fit:contain}
#mp-content video{max-width:90vw;max-height:70vh;border-radius:8px;background:#000}
#mp-content audio{min-width:260px}
.mp-arr{position:absolute;width:42px;height:42px;border:none;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:20px;top:50%;transform:translateY(-50%);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background var(--dur)}
.mp-arr:hover{background:rgba(255,255,255,.22)}
#mp-pr{left:14px}#mp-nx{right:14px}

/* ═══ SHARE MODAL ══════════════════════════════════════════ */
.share-modal{padding:0}
.share-tabs{display:flex;border-bottom:1px solid var(--b1)}
.share-tab{flex:1;padding:11px;font-size:13px;font-weight:600;color:var(--t3);border:none;background:transparent;border-bottom:2px solid transparent;transition:all var(--dur);cursor:pointer}
.share-tab.on{color:var(--ac2);border-bottom-color:var(--ac)}
.share-body{padding:18px}
#share-qr-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 0}
#share-qr-img{background:#fff;padding:10px;border-radius:10px;display:flex;align-items:center;justify-content:center;min-height:150px}
.share-nav{display:flex;align-items:center;justify-content:center;gap:12px;font-size:12px;color:var(--t2)}
.share-nav-btn{background:var(--bg3);border:1px solid var(--b2);color:var(--t1);width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
.share-nav-btn:hover{background:var(--bg4)}
#share-link-box{display:flex;flex-direction:column;gap:9px}
.share-url-row{display:flex;gap:7px;align-items:center}
.share-url-input{flex:1;background:var(--bg3);border:1px solid var(--b2);border-radius:8px;padding:8px 11px;color:var(--t1);font-size:12px;outline:none;font-family:monospace}
.share-copy-btn{padding:8px 14px;background:var(--ac);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.share-copy-btn:hover{filter:brightness(1.1)}

/* ═══ FILE DETAIL MODAL ════════════════════════════════════ */
.file-detail-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)}
.file-detail-row:last-child{border-bottom:none}
.file-detail-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;width:60px;flex-shrink:0;padding-top:1px}
.file-detail-val{font-size:13px;color:var(--t1);flex:1;word-break:break-all;line-height:1.5}

/* ═══ MODALS ═══════════════════════════════════════════════ */
.mov{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px}
.md{background:var(--bg2);border:1px solid var(--b2);border-radius:18px;padding:22px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.5);max-height:90vh;overflow-y:auto}
.md-t{font-size:16px;font-weight:700;margin-bottom:13px}
.md-p{color:var(--t2);font-size:13px;margin-bottom:15px;line-height:1.65;white-space:pre-wrap}
.md-inp{width:100%;padding:10px 12px;background:var(--bg3);border:1.5px solid var(--b2);border-radius:10px;color:var(--t1);font-size:14px;outline:none;margin-bottom:14px;resize:vertical;min-height:44px;transition:border-color var(--dur),box-shadow var(--dur)}
.md-inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--gl)}
.md-btns{display:flex;gap:7px;justify-content:flex-end;flex-wrap:wrap}
.btn-g{padding:8px 16px;border-radius:8px;background:var(--bg3);border:1px solid var(--b2);color:var(--t1);font-family:inherit;font-size:13px;font-weight:600;transition:all var(--dur);cursor:pointer}
.btn-g:hover{background:var(--bg4)}
.btn-d{padding:8px 16px;border-radius:8px;background:var(--rd);border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:opacity var(--dur)}
.btn-d:hover{opacity:.85}
.btn-a{padding:8px 16px;border-radius:8px;background:var(--ac);border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:filter var(--dur)}
.btn-a:hover{filter:brightness(1.08)}
.btn-or{padding:8px 16px;border-radius:8px;background:var(--or);border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.cmg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.cm-it{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 7px;border-radius:10px;border:1.5px solid var(--b2);background:var(--bg3);font-size:12px;font-weight:600;color:var(--t2);transition:all var(--dur);cursor:pointer}
.cm-it:hover,.cm-it.on{border-color:var(--ac);background:var(--gl);color:var(--ac2)}
.cm-it span{font-size:22px}

/* ═══ BOTTOM SHEET ═════════════════════════════════════════ */
.bs-ov{position:fixed;inset:0;z-index:260;background:rgba(0,0,0,.5);display:flex;align-items:flex-end}
.bs{width:100%;background:var(--bg2);border-radius:18px 18px 0 0;padding:12px 14px max(16px,var(--sab));max-height:85vh;overflow-y:auto}
.bs-handle{width:32px;height:3px;background:var(--b2);border-radius:2px;margin:0 auto 12px}
.bs-nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px 12px;color:var(--t1)}
.bs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
.bs-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 7px;background:var(--bg3);border-radius:10px;border:none;color:var(--t2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:background var(--dur)}
.bs-btn:hover{background:var(--bg4)}
.bs-btn span{font-size:20px}
.bs-del{width:100%;padding:12px;background:rgba(248,81,73,.1);border:1.5px solid rgba(248,81,73,.3);border-radius:10px;color:var(--rd);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}

/* ═══ CTX MENU ═════════════════════════════════════════════ */
.cm-menu{position:fixed;z-index:260;background:var(--bg2);border:1px solid var(--b2);border-radius:13px;padding:5px;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:170px}
.cmi{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:background var(--dur),color var(--dur)}
.cmi:hover{background:var(--bg3);color:var(--t1)}
.cmi.d{color:var(--rd)}.cmi.d:hover{background:rgba(248,81,73,.1)}
.cm-sep{height:1px;background:var(--b1);margin:4px 0}

/* ═══ TOASTS ═══════════════════════════════════════════════ */
#toasts{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:5px;align-items:center;pointer-events:none}
.ts{background:var(--bg2);border:1px solid var(--b2);color:var(--t1);padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap}
.ts.ok{border-color:var(--gr);color:var(--gr)}
.ts.err{border-color:var(--rd);color:var(--rd)}
.ts.warn{border-color:var(--or);color:var(--or)}

/* ═══ EMPTY STATE ══════════════════════════════════════════ */
.emp{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:36px;text-align:center;color:var(--t2)}
.emp-ic{font-size:48px;opacity:.28}
.emp-t{font-size:17px;font-weight:700;color:var(--t1)}
.emp-s{font-size:13px;max-width:240px;line-height:1.7}

/* ═══ RESPONSIVE ═══════════════════════════════════════════ */
@media(max-width:640px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:60;transform:translateX(-100%);box-shadow:8px 0 32px rgba(0,0,0,.5)}
  #sidebar.open{transform:translateX(0)}
  .menu-btn{display:flex !important}
  #sb-ov{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.45);display:none}
  #sb-ov.on{display:block}
  .bw{max-width:88%}
  .mp-arr{display:none}
  .li-acts-d{display:none !important}
  /* 移动端两列网格，文件名强制显示 */
  #fg:not(.lv){grid-template-columns:repeat(2,1fr) !important;padding:6px !important;gap:5px !important}
  #trash-list:not(.lv){grid-template-columns:repeat(2,1fr) !important}
  .gc-name{font-size:10.5px !important;-webkit-line-clamp:2 !important;display:-webkit-box !important;min-height:calc(1.35em * 1) !important}
  .gc-meta{font-size:9px !important}
  .ga{min-width:19px !important;height:20px !important;font-size:11px !important;padding:1px 2px !important}
  .li{padding:8px 9px;gap:7px}
  .li-info{min-width:0;flex:1;overflow:hidden}
  .li-name{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bs-grid{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:641px){
  .li-acts-m{display:none}
  .li-acts-d{display:flex}
}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<body>
<div id="sb-ov"></div>
<div class="dov" id="dov">&#128193; 拖入文件上传</div>
<div id="ctx-c"></div>

<!-- ═══════════════════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="lw">
    <div class="lw-logo">&#9729;&#65039;</div>
    <div class="lw-h">GitDrive</div>
    <div class="lw-s">以对话方式使用 GitHub 仓库作为私人云盘</div>
    <div class="lw-card">
      <div class="lw-field"><label>GitHub 用户名</label><input type="text" id="lu" placeholder="octocat" autocomplete="username" spellcheck="false"></div>
      <div class="lw-field"><label>仓库名称</label><input type="text" id="lr" placeholder="my-drive" spellcheck="false"></div>
      <div class="lw-field"><label>Personal Access Token</label><input type="password" id="lt" placeholder="ghp_xxxxxxxx" autocomplete="current-password"></div>
      <button class="lw-btn" id="lbtn">连接仓库</button>
      <div id="lerr"></div>
    </div>
    <div class="lw-hint">凭据仅存于本设备浏览器。Fine-grained token 需开启目标仓库 Contents 读写权限。</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     APP SHELL
═══════════════════════════════════════════════════════ -->
<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="sb-hd">
      <div class="sb-logo">&#9729;&#65039;</div>
      <div class="sb-title">GitDrive</div>
      <div class="sb-acts">
        <button class="ib" id="btn-search-sb" title="搜索 &#8984;K">&#128269;</button>
        <button class="ib" id="btn-theme" title="切换主题">&#127769;</button>
        <button class="ib" id="btn-logout" title="退出">&#128682;</button>
      </div>
    </div>
    <div class="sb-search">
      <div class="sb-sq" id="sb-search-box">
        <span style="font-size:12px;color:var(--t3)">&#128269;</span>
        <span class="sb-sq-txt">搜索文件&#8230;</span>
        <span class="sb-sq-kbd">&#8984;K</span>
      </div>
    </div>
    <!-- 主导航（圆角卡片容器，区别于分类列表） -->
    <div class="sb-nav-main">
      <div class="sb-nav-main-inner">
        <button class="ni on" id="n-chat"><span class="ico">&#128172;</span>对话云盘</button>
        <button class="ni" id="n-files"><span class="ico">&#128193;</span>所有文件 <span class="nb" id="fcnt">0</span></button>
        <button class="ni" id="n-fav"><span class="ico">&#9733;</span>收藏 <span class="nb" id="fav-cnt"></span></button>
        <button class="ni" id="n-trash"><span class="ico">&#128465;</span>回收站 <span class="nb" id="trash-cnt"></span></button>
        <button class="ni" id="n-stats"><span class="ico">&#128202;</span>统计</button>
      </div>
    </div>
    <!-- 文件分类（扁平列表，由 CATS 配置自动生成） -->
    <div class="sb-sec">文件分类</div>
    <div class="sb-nav-cats" id="cat-nav"></div>
    <div class="sb-ft">
      <div class="sb-author"><span class="dot"></span><span id="sb-author"></span></div>
      <span id="sb-repo" style="font-size:10px">-</span>
      <span id="sb-stat">就绪</span>
    </div>
  </aside>

  <main id="main">

    <!-- ══════════════════════════════════════════════════
         [SCREEN-1] 对话云盘（含备忘录模式）
         调整此块在 main 中的位置可改变页面顺序
    ══════════════════════════════════════════════════ -->
    <div id="chat-screen">
      <!-- 顶部工具栏 -->
      <div class="tb">
        <button class="ib menu-btn" id="btn-menu">&#9776;</button>
        <button class="ib" id="btn-help" style="font-weight:800;font-size:13px">?</button>
        <div class="tb-info">
          <div class="tb-title" id="hd-t">GitDrive</div>
          <div class="tb-sub" id="hd-s">连接中&#8230;</div>
        </div>
        <button class="tb-btn" id="btn-chat-search"><span class="tb-ico">&#128269;</span><span class="tb-lbl">搜索</span></button>
        <button class="tb-btn" id="btn-sel-toggle"><span class="tb-ico">&#9745;</span><span class="tb-lbl">多选</span></button>
        <button class="tb-btn" id="btn-clear"><span class="tb-ico">&#128465;</span><span class="tb-lbl">清空</span></button>
        <button class="tb-btn" id="btn-refresh"><span class="tb-ico">&#8635;</span><span class="tb-lbl">同步</span></button>
      </div>
      <!-- 恢复历史条 -->
      <div class="chat-bar" id="restore-bar">
        <span>&#128194; 历史记录已隐藏</span>
        <span style="flex:1"></span>
        <button class="btn-a" id="btn-restore" style="font-size:12px;padding:5px 12px">恢复显示</button>
      </div>
      <!-- 多选操作条 -->
      <div class="chat-bar" id="sel-bar">
        <span id="sel-cnt" style="flex:1">已选 0 条</span>
        <button class="btn-g" id="btn-share-sel" style="font-size:12px;padding:5px 10px">&#128228; 分享</button>
        <button class="btn-g" id="btn-dl-sel" style="font-size:12px;padding:5px 10px;color:var(--ac2)">&#8595; 下载</button>
        <button class="btn-g" id="btn-exit-sel" style="font-size:12px;padding:5px 10px">取消</button>
        <button class="btn-d" id="btn-del-sel" style="font-size:12px;padding:5px 10px">删除</button>
      </div>
      <!-- 置顶消息条 -->
      <div id="pinned-bar"></div>
      <!-- 模式切换（对话/备忘录） -->
      <div class="chat-mode-bar">
        <button class="cm-tab on" id="tab-chat">&#128172; 对话</button>
        <button class="cm-tab" id="tab-memo">&#128211; 备忘录</button>
      </div>
      <!-- 备忘录筛选条（备忘录模式时显示） -->
      <div class="memo-filter-bar" id="memo-filter-bar">
        <button class="memo-fbt on" id="mf-all">全部</button>
        <button class="memo-fbt" id="mf-todo">&#9744; 待办</button>
        <button class="memo-fbt" id="mf-note">&#128221; 笔记</button>
        <button class="memo-fbt" id="mf-done">&#10003; 已完成</button>
      </div>
      <!-- 消息/备忘录列表 -->
      <div id="msg-list">
        <div class="emp" id="empty-chat">
          <div class="emp-ic">&#128172;</div>
          <div class="emp-t">开始使用 GitDrive</div>
          <div class="emp-s">发送文字或上传文件，以聊天方式存入 GitHub 仓库</div>
        </div>
      </div>
      <!-- 上传进度区 -->
      <div id="up-area"></div>
      <!-- 引用预览条 -->
      <div id="quote-bar">
        <span style="font-size:12px;color:var(--ac2);flex-shrink:0">&#128073;</span>
        <span class="quote-bar-content" id="quote-bar-text"></span>
        <button class="quote-bar-close" id="btn-clear-quote">&#10005;</button>
      </div>
      <!-- 对话输入区 -->
      <div class="inp-wrap" id="chat-inp-area">
        <div class="pend" id="pend"></div>
        <div class="cat-row" id="cat-chips"></div>
        <div class="inp-row">
          <button class="att" id="btn-att">&#128206;</button>
          <div class="inp-box">
            <textarea id="ti" placeholder="发送消息&#8230; 支持 Markdown" rows="1"></textarea>
          </div>
          <button class="snd" id="btn-snd">&#9654;</button>
        </div>
        <input type="file" id="fi" multiple>
      </div>
      <!-- 备忘录输入区（备忘录模式时显示） -->
      <div class="memo-inp-area" id="memo-inp-area">
        <div class="memo-type-row">
          <button class="memo-tbtn on" id="mbtn-todo">&#9744; 待办</button>
          <button class="memo-tbtn" id="mbtn-note">&#128221; 笔记</button>
          <button class="att" id="btn-memo-att" style="margin-left:auto;width:28px;height:28px;font-size:13px" title="添加附件">&#128206;</button>
        </div>
        <div class="memo-att-row" id="memo-att-row"></div>
        <div class="memo-row">
          <div class="inp-box" style="border-radius:12px">
            <textarea id="memo-inp" placeholder="输入备忘内容&#8230; 支持 Markdown，⌘Enter 发送" rows="1"></textarea>
          </div>
          <button class="memo-snd" id="btn-memo-snd">&#9654;</button>
        </div>
        <input type="file" id="fi-memo" multiple>
      </div>
    </div>
    <!-- ══ END [SCREEN-1] ══ -->

    <!-- ══════════════════════════════════════════════════
         [SCREEN-2] 所有文件
    ══════════════════════════════════════════════════ -->
    <div id="files-screen">
      <div class="ft">
        <button class="ib menu-btn" id="btn-files-menu">&#9776;</button>
        <div class="ft-title" id="files-t">所有文件</div>
        <div class="ft-row">
          <select id="sort-sel" style="padding:5px 9px;border-radius:7px;background:var(--bg3);border:1px solid var(--b2);color:var(--t1);font-family:inherit;font-size:12px;outline:none;cursor:pointer">
            <option value="time-d">最新优先</option>
            <option value="time-a">最早优先</option>
            <option value="name">文件名</option>
            <option value="size">大小</option>
          </select>
          <button class="ftb" id="btn-fg-sel">多选</button>
          <button class="ftb" id="btn-sync">&#8635; 同步</button>
          <div class="vtog">
            <button class="vb on" id="vb-g">&#8862;</button>
            <button class="vb" id="vb-l">&#9776;</button>
          </div>
        </div>
      </div>
      <div class="fr" id="fg-cats"></div>
      <div class="fr" id="fg-types"></div>
      <div class="fsb"><div class="fsb-box"><span style="color:var(--t3)">&#128269;</span><input id="fg-q" placeholder="搜索文件名&#8230;"><button class="ib" id="btn-fgq-clear" style="font-size:11px">&#10005;</button></div></div>
      <div class="fg-selbar" id="fg-selbar">
        <span id="fg-selcnt" style="flex:1">已选 0 个</span>
        <button class="btn-g" id="btn-share-fgsel" style="font-size:12px;padding:5px 10px">&#128228; 分享</button>
        <button class="btn-g" id="btn-mv-sel" style="font-size:12px;padding:5px 10px">&#8599; 移动</button>
        <button class="btn-g" id="btn-dl-fgsel" style="font-size:12px;padding:5px 10px;color:var(--ac2)">&#8595; 下载</button>
        <button class="btn-d" id="btn-del-fgsel" style="font-size:12px;padding:5px 10px">删除</button>
      </div>
      <div id="fg"></div>
    </div>
    <!-- ══ END [SCREEN-2] ══ -->

    <!-- ══════════════════════════════════════════════════
         [SCREEN-3] 回收站
    ══════════════════════════════════════════════════ -->
    <div id="trash-screen">
      <div class="trash-toolbar">
        <button class="ib menu-btn" id="btn-trash-menu">&#9776;</button>
        <div class="ft-title" style="flex:1;font-size:15px;font-weight:700">&#128465; 回收站</div>
        <div class="vtog">
          <button class="vb on" id="tvb-g" title="网格">&#8862;</button>
          <button class="vb" id="tvb-l" title="列表">&#9776;</button>
        </div>
        <button class="ftb danger" id="btn-empty-trash" style="margin-left:6px">清空</button>
      </div>
      <div style="padding:7px 13px;background:var(--bg2);border-bottom:1px solid var(--b1);font-size:12px;color:var(--t3);flex-shrink:0">
        删除文件保留 <span id="trash-days-hint">30</span> 天后永久清除，可随时恢复。
      </div>
      <div id="trash-list"></div>
    </div>
    <!-- ══ END [SCREEN-3] ══ -->

    <!-- ══════════════════════════════════════════════════
         [SCREEN-4] 存储统计
    ══════════════════════════════════════════════════ -->
    <div id="stats-screen">
      <div class="ft">
        <button class="ib menu-btn" id="btn-stats-menu">&#9776;</button>
        <div class="ft-title">&#128202; 存储统计</div>
      </div>
      <div class="screen-body" id="stats-panel"></div>
    </div>
    <!-- ══ END [SCREEN-4] ══ -->

  </main>
</div>

<!-- ═══ 搜索浮层 ════════════════════════════════════════════ -->
<div id="search-ov">
  <div class="sm">
    <div class="sm-inp">
      <span style="font-size:17px">&#128269;</span>
      <input id="g-q" placeholder="搜索文件名、消息内容&#8230;">
      <button class="ib" id="btn-search-close">&#10005;</button>
    </div>
    <div class="sr" id="g-res"><div class="sr-empty">输入关键词开始搜索</div></div>
  </div>
</div>

<script src="config.js"></script>
<script>
// ★ config.js 在根目录（唯一需要修改的文件）已由外部 script 标签加载
// ★ 以下所有代码无需修改，修改配置请编辑 config.js

// ══════════════════════════════════════════════════════════════
// SECTION 1: 工具函数 (GitHub API / Base64 / 文件类型 / 格式化)
// ══════════════════════════════════════════════════════════════
function apiUrl(p){return 'https://api.github.com/repos/'+S.user+'/'+S.repo+'/contents/'+p;}
function apiHd(){return{'Authorization':'Bearer '+S.token,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'};}
function ghGet(p){return fetch(apiUrl(p),{headers:apiHd()});}
function ghPut(p,b){return fetch(apiUrl(p),{method:'PUT',headers:apiHd(),body:JSON.stringify(b)});}
function ghDel(p,sha){return fetch(apiUrl(p),{method:'DELETE',headers:apiHd(),body:JSON.stringify({message:'Delete [GitDrive]',sha:sha})});}
function ghPath(path){return path.split('/').map(function(p){try{return encodeURIComponent(decodeURIComponent(p));}catch(e){return encodeURIComponent(p);}}).join('/');}
function rawUrl(path){return 'https://raw.githubusercontent.com/'+S.user+'/'+S.repo+'/main/'+path.split('/').map(function(p){try{return encodeURIComponent(decodeURIComponent(p));}catch(e){return encodeURIComponent(p);}}).join('/');}
function toB64(s){var bytes=new TextEncoder().encode(s),bin='';bytes.forEach(function(b){bin+=String.fromCharCode(b);});return btoa(bin);}
function fromB64(b){var raw=atob(b.replace(/\n/g,'')),bytes=Uint8Array.from(raw,function(c){return c.charCodeAt(0);});return new TextDecoder('utf-8').decode(bytes);}
function isImage(n){return /\.(jpg|jpeg|png|gif|webp|svg|avif|bmp|heic)$/i.test(n);}
function isVid(n){return /\.(mp4|mov|avi|mkv|webm|m4v)$/i.test(n);}
function isAud(n){return /\.(mp3|wav|flac|aac|ogg|m4a)$/i.test(n);}
function xExt(n){return(n.split('.').pop()||'').toLowerCase();}
function fileIconColor(n){var e=xExt(n);if(/^(jpg|jpeg|png|gif|webp|svg|avif|bmp|heic)$/.test(e))return{l:'IMG',c:'#1a7f37',bg:'#d1fae5'};if(/^(mp4|mov|avi|mkv|webm|m4v)$/.test(e))return{l:'VID',c:'#cf222e',bg:'#fee2e2'};if(/^(mp3|wav|flac|aac|ogg|m4a)$/.test(e))return{l:'AUD',c:'#8250df',bg:'#ede9fe'};if(/^pdf$/.test(e))return{l:'PDF',c:'#cf222e',bg:'#fee2e2'};if(/^(doc|docx)$/.test(e))return{l:'DOC',c:'#0969da',bg:'#dbeafe'};if(/^(xls|xlsx|csv|ods)$/.test(e))return{l:'XLS',c:'#1a7f37',bg:'#d1fae5'};if(/^(ppt|pptx|key|odp)$/.test(e))return{l:'PPT',c:'#bc4c00',bg:'#ffedd5'};if(/^(txt|md|log|rtf)$/.test(e))return{l:'TXT',c:'#656d76',bg:'#f0f2f4'};if(/^(js|ts|jsx|tsx|py|java|c|cpp|html|css|json|go|rs|php|sh)$/.test(e))return{l:'</>',c:'#0550ae',bg:'#cffafe'};if(/^(zip|rar|7z|tar|gz|bz2)$/.test(e))return{l:'ZIP',c:'#7d4e00',bg:'#fef3c7'};if(/^(apk|exe|ipa|dmg|pkg|deb)$/.test(e))return{l:'APP',c:'#6e40c9',bg:'#e0d7ff'};return{l:'FILE',c:'#656d76',bg:'#f0f2f4'};}
function fileIcon(n){var e=xExt(n);if(/^(jpg|jpeg|png|gif|webp|svg|avif|bmp|heic)$/.test(e))return '\u{1F5BC}\uFE0F';if(/^(mp4|mov|avi|mkv|webm|m4v)$/.test(e))return '\u{1F3AC}';if(/^(mp3|wav|flac|aac|ogg|m4a)$/.test(e))return '\u{1F3B5}';var fc=fileIconColor(n);return '<span style="font-size:11px;font-weight:900;color:'+fc.c+';background:'+fc.bg+';padding:2px 5px;border-radius:4px;line-height:1">'+fc.l+'</span>';}
function fmtSz(b){if(!b||b<0)return '';if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function dlFile(url,name){var a=document.createElement('a');a.href=url;a.download=name;a.target='_blank';a.click();}
function arTA(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

// ══════════════════════════════════════════════════════════════
// SECTION 2: 全局状态 S
// ══════════════════════════════════════════════════════════════
var S={
  user:'',repo:'',token:'',
  msgs:[],msgSha:null,
  files:[],meta:{favorites:[],archived:[]},metaSha:null,
  trash:[],trashSha:null,
  memos:[],memoSha:null,
  cur:null,
  fCat:'all',fType:'all',fView:'grid',
  fgSel:false,fgSeled:{},
  selMode:false,seled:{},
  darkMode:true,
  mpItems:[],mpIdx:0,
  pend:[],
  memoAttPending:[],  // 备忘录待附件
  clearTime:null,
  pinned:[],
  memoType:'todo',
  memoFilter:'all',
  chatMode:'chat',   // 'chat' | 'memo'
  trashView:'grid',
  quoteMsg:null,     // 当前引用的消息对象
};
var catMap={};
function initCatMap(){catMap={};CATS.forEach(function(c){catMap[c.id]=c;});S.cur=CATS[0].id;}

// ══════════════════════════════════════════════════════════════
// SECTION 3: 数据加载与保存
// ══════════════════════════════════════════════════════════════
function loadAll(){
  document.getElementById('hd-s').textContent='\u52A0\u8F7D\u4E2D\u2026';
  return Promise.all([loadMsgs(),loadMeta(),loadFiles(),loadMemos()])
    .then(function(){updateStats();})
    .catch(function(e){document.getElementById('hd-s').textContent='\u52A0\u8F7D\u5931\u8D25';toast('\u52A0\u8F7D\u5931\u8D25: '+e.message,'err');});
}
function loadMsgs(){
  return ghGet(ghPath(PATHS.messages)).then(function(r){
    if(r.ok)return r.json().then(function(d){S.msgs=JSON.parse(fromB64(d.content));S.msgSha=d.sha;});
    else{S.msgs=[];S.msgSha=null;}
  }).then(function(){renderMsgs();renderPinnedBar();});
}
function loadMeta(){
  return ghGet(ghPath(PATHS.meta)).then(function(r){
    if(r.ok)return r.json().then(function(d){S.meta=JSON.parse(fromB64(d.content));S.metaSha=d.sha;});
    else{S.meta={favorites:[],archived:[]};S.metaSha=null;}
  }).then(function(){document.getElementById('fav-cnt').textContent=S.meta.favorites.length||'';});
}
function loadFiles(){
  S.files=[];
  var proms=CATS.map(function(cat){
    return ghGet(cat.id).then(function(r){
      if(r.ok)return r.json().then(function(items){if(Array.isArray(items))items.forEach(function(f){if(f.type==='file')S.files.push(Object.assign({},f,{category:cat.id}));});});
    }).catch(function(){});
  });
  return Promise.all(proms).then(function(){
    var paths={};S.files.forEach(function(f){paths[f.path]=true;});
    var changed=false;
    S.msgs=S.msgs.map(function(m){if(m.type!=='file')return m;var before=m.files.length;m.files=m.files.filter(function(f){return paths[f.path];});if(m.files.length<before)changed=true;return m;}).filter(function(m){return m.type==='text'||(m.files&&m.files.length>0);});
    if(changed)return saveMsgs();
  }).then(function(){
    return ghGet(ghPath(PATHS.trash)).then(function(r){if(r.ok)return r.json().then(function(d){S.trash=JSON.parse(fromB64(d.content));S.trashSha=d.sha;});else{S.trash=[];S.trashSha=null;}});
  }).then(function(){
    var now=Date.now(),cutoff=APP_CONFIG.trashDays*24*3600*1000,before=S.trash.length;
    S.trash=S.trash.filter(function(t){return(now-new Date(t.deletedAt).getTime())<cutoff;});
    if(S.trash.length<before)return saveTrash();
  }).then(function(){document.getElementById('trash-cnt').textContent=S.trash.length||'';});
}
function loadMemos(){
  return ghGet(ghPath(PATHS.memos)).then(function(r){
    if(r.ok)return r.json().then(function(d){S.memos=JSON.parse(fromB64(d.content));S.memoSha=d.sha;});
    else{S.memos=[];S.memoSha=null;}
  });
}
function saveMsgs(){var body={message:'Update messages [GitDrive]',content:toB64(JSON.stringify(S.msgs,null,2))};if(S.msgSha)body.sha=S.msgSha;return ghPut(ghPath(PATHS.messages),body).then(function(r){if(r.ok)return r.json().then(function(d){S.msgSha=d.content.sha;});else return r.json().then(function(e){toast('\u4FDD\u5B58\u5931\u8D25: '+(e.message||r.status),'err');});});}
function saveMeta(){var body={message:'Update meta [GitDrive]',content:toB64(JSON.stringify(S.meta))};if(S.metaSha)body.sha=S.metaSha;return ghPut(ghPath(PATHS.meta),body).then(function(r){if(r.ok)return r.json().then(function(d){S.metaSha=d.content.sha;});});}
function saveTrash(){var body={message:'Update trash [GitDrive]',content:toB64(JSON.stringify(S.trash))};if(S.trashSha)body.sha=S.trashSha;return ghPut(ghPath(PATHS.trash),body).then(function(r){if(r.ok)return r.json().then(function(d){S.trashSha=d.content.sha;});}).then(function(){document.getElementById('trash-cnt').textContent=S.trash.length||'';});}
function saveMemos(){var body={message:'Update memos [GitDrive]',content:toB64(JSON.stringify(S.memos,null,2))};if(S.memoSha)body.sha=S.memoSha;return ghPut(ghPath(PATHS.memos),body).then(function(r){if(r.ok)return r.json().then(function(d){S.memoSha=d.content.sha;});});}
function updateStats(){var cnt=S.files.length,sz=S.files.reduce(function(a,f){return a+(f.size||0);},0);document.getElementById('fcnt').textContent=cnt;var label=cnt+' \u4E2A\u6587\u4EF6 \u00B7 '+fmtSz(sz);document.getElementById('hd-s').textContent=label;document.getElementById('sb-stat').textContent=label;renderFG();}
function refresh(){toast('\u540C\u6B65\u4E2D\u2026');loadAll().then(function(){toast('\u540C\u6B65\u5B8C\u6210','ok');});}
function syncFiles(){toast('\u540C\u6B65\u4E2D\u2026');Promise.all([loadMeta(),loadFiles()]).then(function(){updateStats();toast('\u540C\u6B65\u5B8C\u6210','ok');});}

// ══════════════════════════════════════════════════════════════
// SECTION 4: UI 工具函数（Toast / Modal / Sidebar / 主题 / 媒体预览）
// ══════════════════════════════════════════════════════════════
function toast(msg,type){var t=document.createElement('div');t.className='ts'+(type?' '+type:'');t.textContent=msg;document.getElementById('toasts').appendChild(t);setTimeout(function(){t.remove();},2500);}
function showMd(html){var mc=document.getElementById('mc');mc.innerHTML='<div class="mov" id="md-ov"><div class="md">'+html+'</div></div>';document.getElementById('md-ov').addEventListener('click',function(e){if(e.target===this)closeMd();});}
function closeMd(){document.getElementById('mc').innerHTML='';}
function showConfirm(title,text,onOk){showMd('<div class="md-t">'+title+'</div><div class="md-p">'+esc(text)+'</div><div class="md-btns"><button class="btn-g" id="cf-n">\u53D6\u6D88</button><button class="btn-d" id="cf-y">\u786E\u8BA4</button></div>');document.getElementById('cf-n').addEventListener('click',closeMd);document.getElementById('cf-y').addEventListener('click',function(){closeMd();if(onOk)onOk();});}
function showInput(title,label,def,onSave){var long=(def||'').length>60||(def||'').includes('\n');showMd('<div class="md-t">'+title+'</div><label style="font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block">'+label+'</label><textarea class="md-inp" id="md-inp" style="min-height:'+(long?'110px':'44px')+'">'+esc(def||'')+'</textarea><div class="md-btns"><button class="btn-g" id="inp-n">\u53D6\u6D88</button><button class="btn-a" id="inp-y">\u4FDD\u5B58</button></div>');setTimeout(function(){var inp=document.getElementById('md-inp');if(inp)inp.focus();},40);document.getElementById('inp-n').addEventListener('click',closeMd);document.getElementById('inp-y').addEventListener('click',function(){var v=document.getElementById('md-inp').value;closeMd();if(onSave)onSave(v);});}
function showHelp(){var items=HELP_ITEMS.map(function(h){return'<div style="display:flex;align-items:flex-start;gap:11px;margin-bottom:11px;padding:11px 13px;background:var(--bg3);border-radius:11px"><span style="font-size:19px;flex-shrink:0;margin-top:1px">'+h[0]+'</span><div><div style="font-size:13px;font-weight:700;margin-bottom:3px">'+h[1]+'</div><div style="font-size:12px;color:var(--t2);line-height:1.68">'+h[2]+'</div></div></div>';}).join('');showMd('<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px"><div style="width:44px;height:44px;background:linear-gradient(135deg,#4493f8,#bc8cff);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">\u26C5\uFE0F</div><div><div class="md-t" style="margin-bottom:2px;font-size:17px">GitDrive '+APP_CONFIG.version+' \u4F7F\u7528\u6307\u5357</div><div style="font-size:12px;color:var(--t2)">\u4F5C\u8005: '+APP_CONFIG.author+'</div></div></div><div style="max-height:55vh;overflow-y:auto;margin-bottom:14px">'+items+'</div><div class="md-btns"><button class="btn-a" id="help-ok">\u77E5\u9053\u4E86</button></div>');document.getElementById('help-ok').addEventListener('click',closeMd);}
function openSb(){document.getElementById('sidebar').classList.add('open');document.getElementById('sb-ov').classList.add('on');}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-ov').classList.remove('on');}
function toggleTheme(){S.darkMode=!S.darkMode;document.documentElement.setAttribute('data-theme',S.darkMode?'dark':'light');localStorage.setItem(APP_CONFIG.themeKey,S.darkMode?'dark':'light');document.getElementById('btn-theme').textContent=S.darkMode?'\u{1F319}':'\u2600\uFE0F';}
function openMP(url,name,imgs,idx){S.mpItems=(imgs&&imgs.length)?imgs:[url];S.mpIdx=(imgs&&imgs.length)?(idx||0):0;_showMP();}
function _showMP(){var url=S.mpItems[S.mpIdx],name=url.split('/').pop().split('?')[0];try{name=decodeURIComponent(name);}catch(e){}document.getElementById('mp-nm').textContent=name;document.getElementById('btn-mp-dl').onclick=function(){dlFile(url,name);};document.getElementById('mp-pr').style.display=S.mpItems.length>1?'flex':'none';document.getElementById('mp-nx').style.display=S.mpItems.length>1?'flex':'none';var ct=document.getElementById('mp-content');if(isVid(name))ct.innerHTML='<video controls autoplay style="max-width:90vw;max-height:70vh;border-radius:8px"><source src="'+url+'"></video>';else if(isAud(name))ct.innerHTML='<div style="padding:28px;text-align:center"><div style="font-size:44px;margin-bottom:14px">\u{1F3B5}</div><div style="font-size:13px;color:rgba(255,255,255,.7);margin-bottom:14px">'+esc(name)+'</div><audio controls autoplay><source src="'+url+'"></audio></div>';else ct.innerHTML='<img src="'+url+'" alt="'+esc(name)+'">';document.getElementById('mp').classList.add('on');}
function mpNav(d){S.mpIdx=(S.mpIdx+d+S.mpItems.length)%S.mpItems.length;_showMP();}
function closeMP(){document.getElementById('mp').classList.remove('on');document.getElementById('mp-content').innerHTML='';}

// ══════════════════════════════════════════════════════════════
// SECTION 5: 分享功能
// ══════════════════════════════════════════════════════════════
// items = [{name, url}]
function showShareModal(items){
  if(!items||!items.length){toast('\u6CA1\u6709\u53EF\u5206\u4EAB\u7684\u6587\u4EF6','warn');return;}
  var idx=0;
  function renderShare(){
    var cur=items[idx];
    var qrBox=document.getElementById('share-qr-img');
    qrBox.innerHTML='';
    try{
      new QRCode(qrBox,{text:cur.url,width:160,height:160,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
    }catch(e){qrBox.textContent='\u4EAC\u5911\u751F\u6210\u5931\u8D25';}
    document.getElementById('share-qr-name').textContent=cur.name;
    document.getElementById('share-link-url').value=cur.url;
    if(items.length>1){
      document.getElementById('share-nav-info').textContent=(idx+1)+'/'+items.length+' '+esc(cur.name.slice(0,20));
      document.getElementById('share-nav').style.display='flex';
    } else {
      document.getElementById('share-nav').style.display='none';
    }
  }
  var html='<div class="md-t">\u5206\u4EAB\u6587\u4EF6</div>'
    +'<div class="share-tabs"><button class="share-tab on" id="st-qr">\u4E8C\u7EF4\u7801</button><button class="share-tab" id="st-link">\u590D\u5236\u94FE\u63A5</button></div>'
    +'<div class="share-body">'
    +'<div id="share-qr-pane">'
      +'<div id="share-qr-box"><div id="share-qr-img"></div><div style="font-size:12px;color:var(--t2);text-align:center;margin-top:6px" id="share-qr-name"></div></div>'
      +'<div class="share-nav" id="share-nav" style="display:none">'
        +'<button class="share-nav-btn" id="share-prev">&#8249;</button><span id="share-nav-info"></span><button class="share-nav-btn" id="share-next">&#8250;</button>'
      +'</div>'
    +'</div>'
    +'<div id="share-link-pane" style="display:none">'
      +'<div id="share-link-box">'
        +'<div style="font-size:12px;color:var(--t2);margin-bottom:6px">\u5206\u4EAB\u94FE\u63A5\uFF08\u4ED6\u4EBA\u70B9\u51FB\u5373\u53EF\u76F4\u63A5\u4E0B\u8F7D\uFF09</div>'
        +'<div class="share-url-row"><input class="share-url-input" id="share-link-url" readonly><button class="share-copy-btn" id="share-copy-btn">\u590D\u5236</button></div>'
      +'</div>'
    +'</div>'
    +'</div>'
    +'<div class="md-btns" style="margin-top:12px"><button class="btn-g" id="share-close">\u5173\u95ED</button></div>';
  showMd(html);
  renderShare();
  document.getElementById('st-qr').addEventListener('click',function(){this.classList.add('on');document.getElementById('st-link').classList.remove('on');document.getElementById('share-qr-pane').style.display='';document.getElementById('share-link-pane').style.display='none';});
  document.getElementById('st-link').addEventListener('click',function(){this.classList.add('on');document.getElementById('st-qr').classList.remove('on');document.getElementById('share-link-pane').style.display='';document.getElementById('share-qr-pane').style.display='none';});
  document.getElementById('share-copy-btn').addEventListener('click',function(){
    var url=document.getElementById('share-link-url').value;
    navigator.clipboard.writeText(url).then(function(){toast('\u94FE\u63A5\u5DF2\u590D\u5236','ok');}).catch(function(){document.getElementById('share-link-url').select();document.execCommand('copy');toast('\u94FE\u63A5\u5DF2\u590D\u5236','ok');});
  });
  var prevBtn=document.getElementById('share-prev'),nextBtn=document.getElementById('share-next');
  if(prevBtn){prevBtn.addEventListener('click',function(){idx=(idx-1+items.length)%items.length;renderShare();});}
  if(nextBtn){nextBtn.addEventListener('click',function(){idx=(idx+1)%items.length;renderShare();});}
  document.getElementById('share-close').addEventListener('click',closeMd);
}
// 分享单个文件（文件对象）
function shareFile(f){
  var url=rawUrl(f.path);
  showShareModal([{name:f.name,url:url}]);
}
// 批量分享（path 数组 from fgSeled）
function shareFGSel(){
  var ps=Object.keys(S.fgSeled);
  if(!ps.length)return;
  var items=ps.map(function(path){var f=S.files.find(function(x){return x.path===path;});return f?{name:f.name,url:rawUrl(f.path)}:null;}).filter(Boolean);
  showShareModal(items);
}
// 分享消息中的文件
function shareMsg(id){
  var m=S.msgs.find(function(x){return x.id===id;});if(!m)return;
  if(m.type==='text'){toast('\u6587\u5B57\u6D88\u606F\u65E0\u6CD5\u5206\u4EAB','warn');return;}
  var items=(m.files||[]).map(function(f){return{name:f.name,url:rawUrl(f.path)};});
  showShareModal(items);
}
// 批量消息分享
function shareSelMsgs(){
  var items=[];
  Object.keys(S.seled).forEach(function(id){
    var m=S.msgs.find(function(x){return x.id===id;});
    if(m&&m.files)m.files.forEach(function(f){items.push({name:f.name,url:rawUrl(f.path)});});
  });
  if(!items.length){toast('\u9009\u4E2D\u7684\u6D88\u606F\u6CA1\u6709\u6587\u4EF6','warn');return;}
  showShareModal(items);
}

// ══════════════════════════════════════════════════════════════
// SECTION 6: 文件详情
// ══════════════════════════════════════════════════════════════
function showFileDetail(f){
  var cat=catMap[f.category]||CATS[0];
  var fav=S.meta.favorites.indexOf(f.path)>=0;
  // 从消息中找上传时间
  var uploadTime='';

  var rows=[
    ['\u6587\u4EF6\u540D',esc(f.name)],

function setTrashView(v){
  S.trashView=v;
  var tvg=document.getElementById('tvb-g'),tvl=document.getElementById('tvb-l');
  if(tvg)tvg.classList.toggle('on',v==='grid');
  if(tvl)tvl.classList.toggle('on',v==='list');

function renderTrash(){
  var el=document.getElementById('trash-list');if(!el)return;
  if(!S.trash.length){el.innerHTML='<div class="emp" style="grid-column:1/-1"><div class="emp-ic">\u{1F5D1}\uFE0F</div><div class="emp-t">\u56DE\u6536\u7AD9\u4E3A\u7A7A</div><div class="emp-s">\u5220\u9664\u7684\u6587\u4EF6\u4F1A\u4FDD\u7559 '+APP_CONFIG.trashDays+' \u5929\u540E\u6C38\u4E45\u6E05\u9664</div></div>';return;}
  var now=Date.now();el.innerHTML='';
  S.trash.forEach(function(item,i){
    var elapsed=now-new Date(item.deletedAt).getTime();
    var remain=Math.ceil((APP_CONFIG.trashDays*24*3600*1000-elapsed)/(24*3600*1000));
    var cat=catMap[item.category]||CATS[0];
    var col=remain<=3?'var(--rd)':remain<=7?'var(--or)':'var(--t3)';
    var d=document.createElement('div');
    if(S.trashView==='list'){
      d.className='tr-li';
      d.innerHTML='<div class="tr-li-ic" style="background:'+cat.bg+'">'+fileIcon(item.name)+'</div>'
        +'<div class="tr-li-info"><div class="tr-li-name">'+esc(item.name)+'</div>'
        +'<div class="tr-li-meta">'+cat.icon+' '+cat.label+' \u00B7 '+fmtSz(item.size)+'</div>'
        +'<div class="tr-li-remain" style="color:'+col+'">\u23F3 \u5269\u4F59 '+remain+' \u5929</div></div>'
        +'<div class="tr-li-acts"><button class="tr-restore" data-restore="'+i+'">\u21A9 \u6062\u590D</button><button class="tr-del" data-hd="'+i+'">\u2715 \u6C38\u4E45</button></div>';
    }else{
      d.className='tr-gc';
      d.innerHTML='<div class="tr-gc-thumb" style="background:'+cat.bg+'">'+fileIcon(item.name)+'</div>'
        +'<div class="tr-gc-body"><div class="tr-gc-name">'+esc(item.name)+'</div>'
        +'<div class="tr-gc-meta">'+cat.icon+' '+cat.label+' \u00B7 '+fmtSz(item.size)+'</div>'
        +'<div class="tr-gc-remain" style="color:'+col+'">\u23F3 '+remain+'\u5929</div>'
        +'<div class="tr-gc-acts"><button class="tr-restore" data-restore="'+i+'">\u21A9 \u6062\u590D</button><button class="tr-del" data-hd="'+i+'">\u2715 \u5220</button></div></div>';
    }
    el.appendChild(d);
  });
  el.querySelectorAll('[data-restore]').forEach(function(b){b.addEventListener('click',function(){restoreFromTrash(parseInt(this.dataset.restore));});});
  el.querySelectorAll('[data-hd]').forEach(function(b){b.addEventListener('click',function(){hardDelTrash(parseInt(this.dataset.hd));});});
}
function renderStats(){
  var panel=document.getElementById('stats-panel');if(!panel)return;
  var total=S.files.reduce(function(a,f){return a+(f.size||0);},0),cnt=S.files.length;
  var byCat={};CATS.forEach(function(c){byCat[c.id]={cnt:0,sz:0,cat:c};});
  S.files.forEach(function(f){var k=f.category||'other';if(!byCat[k])byCat[k]={cnt:0,sz:0,cat:catMap[k]||CATS[0]};byCat[k].cnt++;byCat[k].sz+=(f.size||0);});
  var byType={};TYPE_GROUPS.slice(1).forEach(function(g){byType[g.id]={cnt:0,sz:0,label:g.label};});
  S.files.forEach(function(f){var e=xExt(f.name);for(var j=1;j<TYPE_GROUPS.length;j++){if(TYPE_GROUPS[j].exts.indexOf(e)>=0){byType[TYPE_GROUPS[j].id].cnt++;byType[TYPE_GROUPS[j].id].sz+=(f.size||0);break;}}});
  function pct(s){return total?Math.round(s/total*100):0;}
  function barH(s,color){return'<div class="stat-bar"><div class="stat-fill" style="width:'+pct(s)+'%;background:'+color+'"></div></div>';}
  var cr=Object.values(byCat).filter(function(x){return x.cnt>0;}).sort(function(a,b){return b.sz-a.sz;}).map(function(x){return'<div class="stat-row"><div class="stat-row-hd"><span class="stat-row-label">'+x.cat.icon+' '+x.cat.label+'</span><span class="stat-row-val">'+x.cnt+' \u4E2A \u00B7 '+fmtSz(x.sz)+'</span></div>'+barH(x.sz,x.cat.color)+'</div>';}).join('');
  var tr=Object.entries(byType).filter(function(kv){return kv[1].cnt>0;}).sort(function(a,b){return b[1].sz-a[1].sz;}).map(function(kv){return'<div class="stat-row"><div class="stat-row-hd"><span class="stat-row-label">'+kv[1].label+'</span><span class="stat-row-val">'+kv[1].cnt+' \u4E2A \u00B7 '+fmtSz(kv[1].sz)+'</span></div>'+barH(kv[1].sz,'var(--ac)')+'</div>';}).join('');
  panel.innerHTML='<div class="stat-hero"><div class="stat-sz">'+fmtSz(total)+'</div><div class="stat-sub">'+cnt+' \u4E2A\u6587\u4EF6 \u00B7 '+S.trash.length+' \u4E2A\u5728\u56DE\u6536\u7AD9</div></div><div class="stat-sec"><div class="stat-sec-t">\u6309\u5206\u7C7B</div>'+cr+'</div><div class="stat-sec"><div class="stat-sec-t">\u6309\u7C7B\u578B</div>'+tr+'</div>';
}
