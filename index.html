<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GitDrive">
<title>GitDrive — 你的私人云盘</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  /* ===== CSS VARIABLES ===== */
  :root {
    --bg: #0f1117;
    --bg2: #161b22;
    --bg3: #1c2333;
    --bg4: #21262d;
    --surface: #1e2433;
    --surface2: #252d3d;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --accent-glow: rgba(59,130,246,0.25);
    --bubble-out: #1d4ed8;
    --bubble-out2: #2563eb;
    --bubble-in: #1e2433;
    --green: #3fb950;
    --orange: #f97316;
    --red: #f85149;
    --purple: #a78bfa;
    --yellow: #f59e0b;
    --radius: 20px;
    --radius-sm: 10px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="light"] {
    --bg: #f0f2f5;
    --bg2: #ffffff;
    --bg3: #f8f9fa;
    --bg4: #eef0f3;
    --surface: #ffffff;
    --surface2: #f4f6f8;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #0d1117;
    --text2: #57606a;
    --text3: #8c959f;
    --accent: #2563eb;
    --accent2: #3b82f6;
    --accent-glow: rgba(37,99,235,0.2);
    --bubble-out: #2563eb;
    --bubble-out2: #3b82f6;
    --bubble-in: #ffffff;
    --shadow: 0 4px 20px rgba(0,0,0,0.1);
  }

  /* ===== RESET ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== LAYOUT ===== */
  #app { display: flex; height: 100dvh; position: relative; overflow: hidden; }

  /* ===== LOGIN SCREEN ===== */
  #login-screen {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .login-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 40px;
    width: 100%; max-width: 400px;
    box-shadow: var(--shadow), 0 0 60px rgba(59,130,246,0.08);
  }
  .login-logo {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; margin-bottom: 24px;
    box-shadow: 0 0 30px rgba(59,130,246,0.3);
  }
  .login-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .login-sub { color: var(--text2); font-size: 13px; margin-bottom: 28px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
  .field input {
    width: 100%; padding: 12px 14px;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 12px; color: var(--text);
    font-family: inherit; font-size: 14px;
    transition: border-color var(--transition), box-shadow var(--transition);
    outline: none;
  }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .btn-primary {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border: none; border-radius: 12px;
    color: white; font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity var(--transition), transform var(--transition);
    margin-top: 8px;
  }
  .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  #login-error { color: var(--red); font-size: 12px; margin-top: 10px; text-align: center; display: none; }

  /* ===== SIDEBAR ===== */
  #sidebar {
    width: 280px; min-width: 280px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    position: relative; z-index: 20;
  }
  .sidebar-header {
    padding: 16px 18px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
  }
  .sidebar-logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .sidebar-title { font-weight: 700; font-size: 16px; flex: 1; }
  .sidebar-actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 32px; height: 32px;
    background: transparent; border: none;
    color: var(--text2); border-radius: 8px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: background var(--transition), color var(--transition);
  }
  .icon-btn:hover { background: var(--bg3); color: var(--text); }

  .sidebar-nav { padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 12px;
    cursor: pointer; transition: background var(--transition), color var(--transition);
    color: var(--text2); font-weight: 500; font-size: 14px;
    border: none; background: transparent; width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--accent-glow); color: var(--accent2); }
  .nav-item .nav-icon { font-size: 18px; width: 24px; text-align: center; }
  .nav-badge {
    margin-left: auto; background: var(--accent); color: white;
    font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 999px;
  }

  .sidebar-section-title {
    padding: 16px 22px 6px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text3);
  }

  /* ===== MAIN AREA ===== */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

  /* ===== CHAT HEADER ===== */
  .chat-header {
    padding: 12px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    backdrop-filter: blur(20px);
    z-index: 10; flex-shrink: 0;
  }
  .chat-header-info { flex: 1; }
  .chat-header-title { font-weight: 700; font-size: 16px; }
  .chat-header-sub { font-size: 12px; color: var(--text2); }
  .menu-btn { display: none; }

  /* ===== CHAT MESSAGES ===== */
  #chat-messages {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 2px;
    scroll-behavior: smooth;
  }
  #chat-messages::-webkit-scrollbar { width: 4px; }
  #chat-messages::-webkit-scrollbar-track { background: transparent; }
  #chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .msg-group { display: flex; flex-direction: column; gap: 2px; margin-bottom: 12px; }
  .msg-row { display: flex; align-items: flex-end; gap: 8px; }
  .msg-row.out { flex-direction: row-reverse; }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; align-self: flex-end;
  }
  .msg-row.out .msg-avatar { display: none; }

  .bubble-wrap { display: flex; flex-direction: column; max-width: min(72%, 480px); }
  .msg-row.out .bubble-wrap { align-items: flex-end; }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    position: relative; word-break: break-word;
    animation: bubbleIn 0.2s cubic-bezier(0.4,0,0.2,1);
    line-height: 1.55;
  }
  @keyframes bubbleIn {
    from { opacity: 0; transform: scale(0.9) translateY(6px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .bubble.in { background: var(--bubble-in); border: 1px solid var(--border2); border-bottom-left-radius: 6px; }
  .bubble.out { background: var(--bubble-out); color: #fff; border-bottom-right-radius: 6px; }
  .bubble.out .msg-time { color: rgba(255,255,255,0.6); }

  .msg-sender { font-size: 11px; font-weight: 600; color: var(--accent2); margin-bottom: 3px; margin-left: 2px; }
  .msg-time { font-size: 10px; color: var(--text3); margin-top: 4px; margin-right: 2px; text-align: right; }
  .msg-row.out .msg-time { text-align: right; }

  /* Markdown in bubble */
  .bubble p { margin-bottom: 6px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble code { background: rgba(0,0,0,0.25); padding: 1px 5px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .bubble pre { background: rgba(0,0,0,0.3); padding: 10px 12px; border-radius: 8px; overflow-x: auto; margin: 6px 0; }
  .bubble pre code { background: none; padding: 0; }
  .bubble h1,.bubble h2,.bubble h3 { margin: 8px 0 4px; font-weight: 700; }
  .bubble ul,.bubble ol { padding-left: 18px; margin: 4px 0; }
  .bubble a { color: var(--accent2); }
  .bubble.in code { background: rgba(0,0,0,0.1); }
  .bubble.in pre { background: rgba(0,0,0,0.06); }

  /* ===== FILE BUBBLE ===== */
  .file-stack { display: flex; flex-direction: column; gap: 6px; }
  .file-card {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 14px; padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
    min-width: 200px; max-width: 300px;
    transition: background var(--transition);
    cursor: pointer; position: relative; overflow: hidden;
  }
  .file-card:hover { background: var(--bg4); }
  .bubble.out .file-card { background: rgba(0,0,0,0.25); border-color: rgba(255,255,255,0.15); }
  .bubble.out .file-card:hover { background: rgba(0,0,0,0.35); }
  .file-icon-wrap {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .file-info { flex: 1; overflow: hidden; }
  .file-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .bubble.out .file-meta { color: rgba(255,255,255,0.65); }

  /* ===== IMAGE STACK ===== */
  .img-stack { display: flex; flex-direction: column; gap: 4px; }
  .img-thumb-wrap {
    border-radius: 14px; overflow: hidden;
    max-width: 260px; cursor: pointer; position: relative;
  }
  .img-thumb { width: 100%; display: block; border-radius: 14px; object-fit: cover; max-height: 220px; }
  .img-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0);
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition); border-radius: 14px;
  }
  .img-thumb-wrap:hover .img-overlay { background: rgba(0,0,0,0.35); }

  /* ===== MSG ACTIONS ===== */
  .msg-actions {
    display: none; gap: 2px; align-items: center;
    position: absolute; top: -6px;
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 20px; padding: 3px 5px;
    box-shadow: var(--shadow); z-index: 5;
  }
  .msg-row.out .msg-actions { left: -100px; right: auto; }
  .msg-row .msg-actions { right: -8px; }
  .bubble-wrap:hover .msg-actions { display: flex; }
  .action-btn {
    background: none; border: none; color: var(--text2);
    cursor: pointer; padding: 4px 7px; border-radius: 8px;
    font-size: 13px; transition: background var(--transition), color var(--transition);
  }
  .action-btn:hover { background: var(--bg3); color: var(--text); }

  /* ===== INPUT AREA ===== */
  .input-area {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    flex-shrink: 0; z-index: 10;
  }
  /* Category picker row */
  .cat-row {
    display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px;
    scrollbar-width: none;
  }
  .cat-row::-webkit-scrollbar { display: none; }
  .cat-chip {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 11px; border-radius: 20px; border: 1.5px solid var(--border2);
    background: var(--bg3); cursor: pointer; white-space: nowrap;
    font-size: 12px; font-weight: 600; transition: all var(--transition);
    color: var(--text2);
  }
  .cat-chip:hover { border-color: var(--accent); color: var(--accent2); }
  .cat-chip.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent2); }
  .cat-chip .cat-icon { font-size: 14px; }

  .input-row { display: flex; align-items: flex-end; gap: 10px; }
  .input-box-wrap {
    flex: 1; background: var(--bg3);
    border: 1.5px solid var(--border2); border-radius: 22px;
    display: flex; align-items: flex-end; gap: 8px; padding: 8px 12px;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .input-box-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  #text-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: inherit; font-size: 14px;
    resize: none; max-height: 120px; min-height: 22px;
    line-height: 1.5; padding: 0;
  }
  #text-input::placeholder { color: var(--text3); }
  .attach-btn, .send-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    transition: all var(--transition);
  }
  .attach-btn { background: var(--bg4); color: var(--text2); }
  .attach-btn:hover { background: var(--accent-glow); color: var(--accent2); }
  .send-btn { background: var(--accent); color: white; }
  .send-btn:hover { background: var(--accent2); transform: scale(1.05); }
  .send-btn:active { transform: scale(0.97); }
  #file-input { display: none; }

  /* ===== FILE VIEWER (all files page) ===== */
  #files-screen {
    display: none; flex-direction: column; height: 100%;
  }
  .files-header {
    padding: 16px 20px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
    flex-shrink: 0;
  }
  .files-title { font-size: 18px; font-weight: 700; flex: 1; min-width: 120px; }
  .files-toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 1.5px solid var(--border2); background: var(--bg3);
    color: var(--text2); cursor: pointer; transition: all var(--transition);
  }
  .filter-btn.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent2); }
  .view-toggle { display: flex; border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; }
  .view-btn {
    padding: 6px 10px; background: var(--bg3); border: none;
    color: var(--text2); cursor: pointer; font-size: 14px;
    transition: all var(--transition);
  }
  .view-btn.active { background: var(--accent-glow); color: var(--accent2); }

  .cat-filter-row {
    padding: 10px 16px; background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 6px; overflow-x: auto; flex-shrink: 0;
    scrollbar-width: none;
  }
  .cat-filter-row::-webkit-scrollbar { display: none; }

  #files-grid {
    flex: 1; overflow-y: auto; padding: 16px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px; align-content: start;
  }
  #files-grid.list-view {
    grid-template-columns: 1fr;
  }
  #files-grid::-webkit-scrollbar { width: 4px; }
  #files-grid::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .file-grid-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; cursor: pointer;
    transition: all var(--transition);
    animation: fadeUp 0.25s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .file-grid-item:hover { border-color: var(--accent); box-shadow: 0 4px 20px var(--accent-glow); transform: translateY(-2px); }
  .file-grid-thumb {
    width: 100%; aspect-ratio: 4/3; object-fit: cover;
    background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 32px;
  }
  .file-grid-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .file-grid-info { padding: 10px 12px; }
  .file-grid-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-grid-meta { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .file-grid-cat { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; margin-top: 5px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }

  /* list view item */
  .file-grid-item.list-item {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px; border-radius: 12px;
  }
  .file-grid-item.list-item .file-grid-thumb {
    width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
    aspect-ratio: unset; font-size: 22px;
  }
  .file-grid-item.list-item .file-grid-info { padding: 0; flex: 1; overflow: hidden; }
  .file-grid-item.list-item .file-grid-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-grid-item.list-item .list-actions { display: flex; gap: 4px; flex-shrink: 0; }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center; padding: 20px;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 20px; padding: 28px;
    width: 100%; max-width: 440px;
    box-shadow: var(--shadow);
    animation: slideUp 0.2s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .modal-input {
    width: 100%; padding: 11px 14px;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 10px; color: var(--text);
    font-family: inherit; font-size: 14px; outline: none; margin-bottom: 16px;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-ghost {
    padding: 10px 20px; border-radius: 10px;
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600;
    transition: all var(--transition);
  }
  .btn-ghost:hover { background: var(--bg4); }
  .btn-danger {
    padding: 10px 20px; border-radius: 10px;
    background: var(--red); border: none; color: white;
    cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600;
    transition: opacity var(--transition);
  }
  .btn-danger:hover { opacity: 0.85; }
  .btn-accent {
    padding: 10px 20px; border-radius: 10px;
    background: var(--accent); border: none; color: white;
    cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600;
    transition: all var(--transition);
  }
  .btn-accent:hover { background: var(--accent2); }

  /* ===== LIGHTBOX ===== */
  #lightbox {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.92); backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.15s ease;
  }
  #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 12px; box-shadow: 0 0 60px rgba(0,0,0,0.8); }
  #lightbox-close {
    position: absolute; top: 20px; right: 20px;
    background: rgba(255,255,255,0.12); border: none; color: white;
    width: 40px; height: 40px; border-radius: 50%;
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background var(--transition);
  }
  #lightbox-close:hover { background: rgba(255,255,255,0.22); }

  /* ===== TOAST ===== */
  #toast-container {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    z-index: 999; display: flex; flex-direction: column; gap: 6px; pointer-events: none;
  }
  .toast {
    background: var(--bg2); border: 1px solid var(--border2);
    color: var(--text); padding: 10px 18px;
    border-radius: 20px; font-size: 13px; font-weight: 600;
    box-shadow: var(--shadow); white-space: nowrap;
    animation: toastIn 0.2s ease;
  }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(10px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ===== LOADING ===== */
  .loading-dots { display: inline-flex; gap: 4px; align-items: center; }
  .loading-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text2); animation: dot 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

  /* ===== UPLOAD PROGRESS ===== */
  .upload-progress {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 14px; padding: 14px 16px;
    margin-bottom: 8px; animation: fadeUp 0.2s ease;
  }
  .upload-progress-name { font-size: 13px; font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .progress-bar { background: var(--bg4); border-radius: 4px; height: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #8b5cf6); border-radius: 4px; transition: width 0.3s ease; width: 0%; }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    padding: 40px; text-align: center; color: var(--text2);
  }
  .empty-icon { font-size: 48px; opacity: 0.4; }
  .empty-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .empty-sub { font-size: 14px; max-width: 280px; line-height: 1.6; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 640px) {
    #sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; z-index: 50;
      transform: translateX(-100%);
      box-shadow: 4px 0 30px rgba(0,0,0,0.4);
    }
    #sidebar.open { transform: translateX(0); }
    .menu-btn { display: flex !important; }
    #sidebar-overlay {
      position: fixed; inset: 0; z-index: 40;
      background: rgba(0,0,0,0.5); display: none;
    }
    #sidebar-overlay.show { display: block; }
    .bubble-wrap { max-width: 85%; }
  }

  /* ===== DATE DIVIDER ===== */
  .date-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 16px 0 8px; color: var(--text3); font-size: 11px; font-weight: 600;
  }
  .date-divider::before,.date-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ===== SYSTEM MSG ===== */
  .system-msg {
    text-align: center; font-size: 12px; color: var(--text3);
    margin: 8px 0; padding: 4px 12px;
    background: var(--bg3); border-radius: 20px;
    display: inline-flex; margin: 8px auto;
  }

  /* ===== SCROLLBAR ===== */
  * { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }

  /* ===== UPLOAD AREA DROP ===== */
  #chat-messages.drag-over { border: 2px dashed var(--accent); background: var(--accent-glow); }
</style>
</head>
<body>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">☁️</div>
    <div class="login-title">GitDrive</div>
    <div class="login-sub">用 GitHub 仓库作为你的私人云盘</div>
    <div class="field">
      <label>GitHub 用户名</label>
      <input type="text" id="login-user" placeholder="octocat" autocomplete="username">
    </div>
    <div class="field">
      <label>仓库名称</label>
      <input type="text" id="login-repo" placeholder="my-cloud-drive">
    </div>
    <div class="field">
      <label>Personal Access Token</label>
      <input type="password" id="login-token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="doLogin()">连接仓库</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app" style="display:none">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">☁️</div>
      <div class="sidebar-title">GitDrive</div>
      <div class="sidebar-actions">
        <button class="icon-btn" onclick="toggleTheme()" title="切换主题">🌙</button>
        <button class="icon-btn" onclick="doLogout()" title="退出">🚪</button>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="showScreen('chat')" id="nav-chat">
        <span class="nav-icon">💬</span> 聊天云盘
      </button>
      <button class="nav-item" onclick="showScreen('files')" id="nav-files">
        <span class="nav-icon">📁</span> 所有文件
      </button>
    </nav>

    <div class="sidebar-section-title">文件分类</div>
    <!-- ===== CATEGORIES — 修改此处调整分类 ===== -->
    <nav class="sidebar-nav" id="cat-nav"></nav>
    <!-- ===== END CATEGORIES ===== -->

    <div style="flex:1"></div>
    <div style="padding:12px 18px; font-size:11px; color:var(--text3); border-top:1px solid var(--border); display:flex; flex-direction:column; gap:3px;">
      <span id="sb-repo">-</span>
      <span id="sb-count">0 个文件</span>
    </div>
  </aside>

  <!-- Main content -->
  <main id="main">
    <!-- Chat screen -->
    <div id="chat-screen" style="display:flex; flex-direction:column; height:100%">
      <div class="chat-header">
        <button class="icon-btn menu-btn" onclick="openSidebar()" style="display:flex">☰</button>
        <div class="chat-header-info">
          <div class="chat-header-title" id="header-title">GitDrive</div>
          <div class="chat-header-sub" id="header-sub">连接中...</div>
        </div>
        <button class="icon-btn" onclick="refreshMessages()">🔄</button>
      </div>

      <div id="chat-messages">
        <div class="empty-state" id="empty-chat">
          <div class="empty-icon">💬</div>
          <div class="empty-title">开始使用 GitDrive</div>
          <div class="empty-sub">发送文字或上传文件，它们将保存到你的 GitHub 仓库中</div>
        </div>
      </div>

      <!-- Upload progresses area -->
      <div id="upload-area" style="padding:0 16px; max-height:140px; overflow-y:auto;"></div>

      <div class="input-area">
        <!-- Category row -->
        <div class="cat-row" id="cat-chips"></div>
        <!-- Input row -->
        <div class="input-row">
          <button class="attach-btn" onclick="document.getElementById('file-input').click()">📎</button>
          <div class="input-box-wrap">
            <textarea id="text-input" placeholder="发送消息或拖入文件…" rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
          </div>
          <button class="send-btn" onclick="sendText()">➤</button>
        </div>
        <input type="file" id="file-input" multiple onchange="handleFiles(this.files)">
      </div>
    </div>

    <!-- Files screen -->
    <div id="files-screen">
      <div class="files-header">
        <button class="icon-btn menu-btn" onclick="openSidebar()" style="display:flex">☰</button>
        <div class="files-title">所有文件</div>
        <div class="files-toolbar">
          <select id="sort-select" onchange="renderFilesGrid()" style="padding:6px 10px; border-radius:8px; background:var(--bg3); border:1px solid var(--border2); color:var(--text); font-family:inherit; font-size:12px; cursor:pointer; outline:none;">
            <option value="time-desc">最新优先</option>
            <option value="time-asc">最早优先</option>
            <option value="name">文件名</option>
          </select>
          <div class="view-toggle">
            <button class="view-btn active" id="grid-btn" onclick="setView('grid')">⊞</button>
            <button class="view-btn" id="list-btn" onclick="setView('list')">☰</button>
          </div>
        </div>
      </div>
      <div class="cat-filter-row" id="files-cat-filter"></div>
      <div id="files-grid"></div>
    </div>
  </main>
</div>

<!-- Lightbox -->
<div id="lightbox" style="display:none" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Modal placeholder -->
<div id="modal-container"></div>

<script>
// ===== STATE =====
let state = {
  user: '', repo: '', token: '',
  messages: [],      // {id, type, content, files, category, timestamp, sha}
  allFiles: [],      // from GitHub API
  currentCat: 'all',
  filesCat: 'all',
  filesView: 'grid',
  darkMode: true,
  loaded: false,
};

// ===== CATEGORIES — 修改此处可自定义分类 =====
const CATEGORIES = [
  { id: 'law',       label: '法学',   icon: '⚖️',  color: '#3b82f6', bg: 'rgba(59,130,246,0.15)' },
  { id: 'envlaw',    label: '环境法', icon: '🌿',  color: '#22c55e', bg: 'rgba(34,197,94,0.15)'  },
  { id: 'entertain', label: '娱乐',   icon: '🎬',  color: '#f97316', bg: 'rgba(249,115,22,0.15)' },
  { id: 'work',      label: '办公',   icon: '💼',  color: '#a78bfa', bg: 'rgba(167,139,250,0.15)'},
  { id: 'other',     label: '其他',   icon: '📦',  color: '#8b949e', bg: 'rgba(139,148,158,0.15)'},
  { id: 'text',      label: '文字',   icon: '📝',  color: '#f59e0b', bg: 'rgba(245,158,11,0.15)' },
];
// ===== END CATEGORIES =====

const catById = {};
CATEGORIES.forEach(c => catById[c.id] = c);

// ===== INIT =====
window.onload = () => {
  const saved = localStorage.getItem('gitdrive-creds');
  if (saved) {
    const d = JSON.parse(saved);
    state.user = d.user; state.repo = d.repo; state.token = d.token;
    launchApp();
  }
  // Dark mode from storage
  const theme = localStorage.getItem('gitdrive-theme') || 'dark';
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme','light');
    state.darkMode = false;
  }
  // Drag-drop on chat
  document.getElementById('chat-messages').addEventListener('dragover', e => {
    e.preventDefault();
    document.getElementById('chat-messages').classList.add('drag-over');
  });
  document.getElementById('chat-messages').addEventListener('dragleave', () => {
    document.getElementById('chat-messages').classList.remove('drag-over');
  });
  document.getElementById('chat-messages').addEventListener('drop', e => {
    e.preventDefault();
    document.getElementById('chat-messages').classList.remove('drag-over');
    if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
  });
};

// ===== LOGIN / LOGOUT =====
async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const repo = document.getElementById('login-repo').value.trim();
  const token = document.getElementById('login-token').value.trim();
  const errEl = document.getElementById('login-error');
  if (!user || !repo || !token) { errEl.textContent = '请填写所有字段'; errEl.style.display='block'; return; }
  errEl.style.display = 'none';
  const btn = document.querySelector('.btn-primary');
  btn.textContent = '连接中...'; btn.disabled = true;
  // Test API
  try {
    const r = await ghFetch(`/repos/${user}/${repo}`, {}, token);
    if (!r.ok) throw new Error('仓库访问失败，请检查用户名、仓库名和 Token');
    state.user = user; state.repo = repo; state.token = token;
    localStorage.setItem('gitdrive-creds', JSON.stringify({user, repo, token}));
    launchApp();
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  }
  btn.textContent = '连接仓库'; btn.disabled = false;
}

function doLogout() {
  if (!confirm('确定退出？')) return;
  localStorage.removeItem('gitdrive-creds');
  location.reload();
}

async function launchApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('sb-repo').textContent = `${state.user}/${state.repo}`;
  document.getElementById('header-title').textContent = state.repo;
  buildCatUI();
  await loadAllData();
}

// ===== BUILD CATEGORY UI =====
function buildCatUI() {
  // Sidebar nav
  const nav = document.getElementById('cat-nav');
  nav.innerHTML = CATEGORIES.map(c => `
    <button class="nav-item" onclick="filterCat('${c.id}')" id="cat-nav-${c.id}">
      <span class="nav-icon">${c.icon}</span> ${c.label}
    </button>`).join('');

  // Chat chips
  const chips = document.getElementById('cat-chips');
  chips.innerHTML = CATEGORIES.map(c => `
    <button class="cat-chip ${state.currentCat===c.id?'active':''}" onclick="selectCat('${c.id}')" id="chip-${c.id}">
      <span class="cat-icon">${c.icon}</span>${c.label}
    </button>`).join('');
  // Default select first
  if (state.currentCat === 'all') selectCat('other');

  // Files category filter
  const fcf = document.getElementById('files-cat-filter');
  fcf.innerHTML = `<button class="filter-btn active" onclick="setFilesCat('all')" id="fc-all">全部</button>` +
    CATEGORIES.map(c => `<button class="filter-btn" onclick="setFilesCat('${c.id}')" id="fc-${c.id}">${c.icon} ${c.label}</button>`).join('');
}

function selectCat(id) {
  state.currentCat = id;
  document.querySelectorAll('.cat-chip').forEach(el => el.classList.remove('active'));
  const chip = document.getElementById('chip-'+id);
  if (chip) chip.classList.add('active');
}

function filterCat(id) {
  showScreen('files');
  setFilesCat(id);
}

// ===== DATA LOADING =====
async function loadAllData() {
  document.getElementById('header-sub').textContent = '加载中...';
  try {
    // Load messages index
    await loadMessages();
    // Load all files from repo
    await loadRepoFiles();
    document.getElementById('header-sub').textContent = `${state.allFiles.length} 个文件`;
    document.getElementById('sb-count').textContent = `${state.allFiles.length} 个文件`;
  } catch(e) {
    document.getElementById('header-sub').textContent = '连接失败';
    toast('加载失败: ' + e.message, 'error');
  }
}

async function loadMessages() {
  const r = await ghFetch(`/repos/${state.user}/${state.repo}/contents/gitdrive-messages.json`);
  if (r.ok) {
    const d = await r.json();
    const content = atob(d.content.replace(/\n/g,''));
    state.messages = JSON.parse(content);
    state.messagesSha = d.sha;
  } else {
    state.messages = [];
    state.messagesSha = null;
  }
  renderMessages();
}

async function loadRepoFiles() {
  // Recursively get all files
  const files = [];
  await fetchTree('', files);
  state.allFiles = files.filter(f => !f.path.startsWith('gitdrive-'));
  renderFilesGrid();
}

async function fetchTree(path, files) {
  const url = `/repos/${state.user}/${state.repo}/contents/${path}`;
  const r = await ghFetch(url);
  if (!r.ok) return;
  const items = await r.json();
  for (const item of items) {
    if (item.type === 'file') {
      if (!item.name.startsWith('gitdrive-')) files.push(item);
    } else if (item.type === 'dir') {
      await fetchTree(item.path, files);
    }
  }
}

async function refreshMessages() {
  toast('刷新中…');
  await loadAllData();
  toast('已刷新', 'success');
}

// ===== SAVE MESSAGES =====
async function saveMessages() {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(state.messages, null, 2))));
  const body = {
    message: `Update messages [GitDrive]`,
    content,
  };
  if (state.messagesSha) body.sha = state.messagesSha;
  const r = await ghFetch(`/repos/${state.user}/${state.repo}/contents/gitdrive-messages.json`, {
    method: 'PUT', body: JSON.stringify(body)
  });
  if (r.ok) {
    const d = await r.json();
    state.messagesSha = d.content.sha;
  }
}

// ===== SEND TEXT =====
async function sendText() {
  const el = document.getElementById('text-input');
  const text = el.value.trim();
  if (!text) return;
  el.value = ''; autoResize(el);

  const msg = {
    id: Date.now().toString(),
    type: 'text',
    content: text,
    category: state.currentCat,
    timestamp: new Date().toISOString(),
  };
  state.messages.push(msg);
  renderMessages();
  scrollToBottom();
  await saveMessages();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendText();
  }
}

// ===== UPLOAD FILES =====
async function handleFiles(files) {
  const arr = Array.from(files);
  for (const file of arr) {
    await uploadFile(file);
  }
  // Reload files list
  await loadRepoFiles();
}

async function uploadFile(file) {
  const cat = catById[state.currentCat] || catById['other'];
  const folder = cat.id;
  const path = `${folder}/${file.name}`;

  // Add progress
  const progressId = 'prog-' + Date.now();
  const progEl = document.createElement('div');
  progEl.className = 'upload-progress'; progEl.id = progressId;
  progEl.innerHTML = `<div class="upload-progress-name">${file.name}</div><div class="progress-bar"><div class="progress-fill" id="pf-${progressId}"></div></div>`;
  document.getElementById('upload-area').appendChild(progEl);

  try {
    const content = await readFileAsBase64(file, pct => {
      const el = document.getElementById('pf-'+progressId);
      if (el) el.style.width = Math.round(pct/2) + '%';
    });

    // Check if file exists (to get sha for update)
    let sha;
    const check = await ghFetch(`/repos/${state.user}/${state.repo}/contents/${path}`);
    if (check.ok) {
      const d = await check.json();
      sha = d.sha;
    }

    // Create directory if needed (GitHub creates it automatically with file)
    const body = {
      message: `Add ${file.name} [GitDrive]`,
      content,
    };
    if (sha) body.sha = sha;

    const fill = document.getElementById('pf-'+progressId);
    if (fill) fill.style.width = '80%';

    const r = await ghFetch(`/repos/${state.user}/${state.repo}/contents/${path}`, {
      method: 'PUT', body: JSON.stringify(body)
    });

    if (!r.ok) throw new Error('上传失败');
    const rd = await r.json();

    if (fill) fill.style.width = '100%';

    // Add message
    const msg = {
      id: Date.now().toString(),
      type: 'file',
      files: [{
        name: file.name,
        path,
        size: file.size,
        mime: file.type,
        sha: rd.content.sha,
        downloadUrl: rd.content.download_url,
      }],
      category: state.currentCat,
      timestamp: new Date().toISOString(),
    };
    state.messages.push(msg);
    renderMessages();
    scrollToBottom();
    await saveMessages();
    toast(`${file.name} 已上传`, 'success');
  } catch(e) {
    toast(e.message, 'error');
  } finally {
    setTimeout(() => progEl.remove(), 800);
  }
}

function readFileAsBase64(file, onProgress) {
  return new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onprogress = e => { if (e.lengthComputable && onProgress) onProgress(e.loaded/e.total*100); };
    fr.onload = () => {
      const b64 = fr.result.split(',')[1];
      res(b64);
    };
    fr.onerror = rej;
    fr.readAsDataURL(file);
  });
}

// ===== RENDER MESSAGES =====
function renderMessages() {
  const container = document.getElementById('chat-messages');
  const empty = document.getElementById('empty-chat');
  if (state.messages.length === 0) {
    empty.style.display = 'flex'; return;
  }
  empty.style.display = 'none';

  // Group by day
  const groups = {};
  state.messages.forEach(msg => {
    const d = new Date(msg.timestamp);
    const key = d.toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric'});
    if (!groups[key]) groups[key] = [];
    groups[key].push(msg);
  });

  let html = '';
  for (const [date, msgs] of Object.entries(groups)) {
    html += `<div class="date-divider">${date}</div>`;
    msgs.forEach(msg => { html += renderMessage(msg); });
  }
  container.innerHTML = html + `<div id="empty-chat" style="display:none" class="empty-state"></div>`;
}

function renderMessage(msg) {
  const time = new Date(msg.timestamp).toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
  const cat = catById[msg.category] || catById['other'];
  let bubbleContent = '';

  if (msg.type === 'text') {
    const rendered = marked.parse(msg.content || '');
    bubbleContent = `<div class="bubble out" data-id="${msg.id}">${rendered}<div class="msg-time">${time}</div></div>`;
  } else if (msg.type === 'file') {
    const files = msg.files || [];
    const isImages = files.every(f => f.mime && f.mime.startsWith('image/'));
    if (isImages) {
      const imgHtml = files.map(f => `
        <div class="img-thumb-wrap" onclick="openLightbox('${f.downloadUrl||''}')">
          <img class="img-thumb" src="${f.downloadUrl||''}" loading="lazy" alt="${f.name}">
          <div class="img-overlay"></div>
        </div>`).join('');
      bubbleContent = `<div class="bubble out" data-id="${msg.id}" style="padding:4px">
        <div class="img-stack">${imgHtml}</div>
        <div class="msg-time" style="padding:4px 8px 0">${time}</div>
      </div>`;
    } else {
      const cardsHtml = files.map(f => `
        <div class="file-card" onclick="downloadFile('${f.downloadUrl||''}', '${f.name}')">
          <div class="file-icon-wrap" style="background:${cat.bg}">${getFileIcon(f.name, f.mime)}</div>
          <div class="file-info">
            <div class="file-name">${f.name}</div>
            <div class="file-meta">${formatSize(f.size)} · ${cat.icon} ${cat.label}</div>
          </div>
        </div>`).join('');
      bubbleContent = `<div class="bubble out" data-id="${msg.id}" style="padding:8px">
        <div class="file-stack">${cardsHtml}</div>
        <div class="msg-time" style="padding:2px 6px 0">${time}</div>
      </div>`;
    }
  }

  return `<div class="msg-group">
    <div class="msg-row out" data-id="${msg.id}">
      <div class="bubble-wrap">
        ${bubbleContent}
        <div class="msg-actions">
          <button class="action-btn" onclick="downloadMsg('${msg.id}')" title="下载">⬇</button>
          <button class="action-btn" onclick="renameMsg('${msg.id}')" title="重命名">✏️</button>
          <button class="action-btn" onclick="deleteMsg('${msg.id}')" title="删除">🗑</button>
        </div>
      </div>
    </div>
  </div>`;
}

function scrollToBottom() {
  const c = document.getElementById('chat-messages');
  c.scrollTop = c.scrollHeight;
}

// ===== FILES GRID =====
function renderFilesGrid() {
  const grid = document.getElementById('files-grid');
  let files = [...state.allFiles];

  // Filter by category
  if (state.filesCat !== 'all') {
    files = files.filter(f => f.path.startsWith(state.filesCat + '/'));
  }

  // Sort
  const sort = document.getElementById('sort-select')?.value || 'time-desc';
  // GitHub doesn't provide timestamps in tree, use message data
  const msgByPath = {};
  state.messages.forEach(m => {
    if (m.files) m.files.forEach(f => { msgByPath[f.path] = m.timestamp; });
  });

  if (sort === 'time-desc') files.sort((a,b) => (msgByPath[b.path]||'') > (msgByPath[a.path]||'') ? 1 : -1);
  else if (sort === 'time-asc') files.sort((a,b) => (msgByPath[a.path]||'') > (msgByPath[b.path]||'') ? 1 : -1);
  else files.sort((a,b) => a.name.localeCompare(b.name));

  if (files.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1"><div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">没有文件</div><div class="empty-sub">上传一些文件试试</div></div></div>`;
    return;
  }

  const isList = state.filesView === 'list';
  if (isList) grid.classList.add('list-view'); else grid.classList.remove('list-view');

  grid.innerHTML = files.map((f, i) => {
    const cat = getCatFromPath(f.path);
    const catInfo = catById[cat] || catById['other'];
    const isImg = /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(f.name);
    const downloadUrl = `https://raw.githubusercontent.com/${state.user}/${state.repo}/main/${f.path}`;
    const msgTime = msgByPath[f.path] ? new Date(msgByPath[f.path]).toLocaleDateString('zh-CN') : '';

    if (isList) {
      return `<div class="file-grid-item list-item" style="animation-delay:${i*0.03}s">
        <div class="file-grid-thumb" style="background:${catInfo.bg}">
          ${isImg ? `<img src="${downloadUrl}" loading="lazy" alt="" style="width:44px;height:44px;border-radius:10px;object-fit:cover">` : getFileIcon(f.name, '')}
        </div>
        <div class="file-grid-info">
          <div class="file-grid-name">${f.name}</div>
          <div class="file-grid-meta">${catInfo.icon} ${catInfo.label}${msgTime?' · '+msgTime:''} · ${formatSize(f.size)}</div>
        </div>
        <div class="list-actions">
          <button class="icon-btn" onclick="downloadFile('${downloadUrl}','${f.name}')" title="下载">⬇</button>
          <button class="icon-btn" onclick="renameFile('${f.path}','${f.name}')" title="重命名">✏️</button>
          <button class="icon-btn" onclick="deleteFile('${f.path}','${f.sha}')" title="删除">🗑</button>
        </div>
      </div>`;
    } else {
      return `<div class="file-grid-item" style="animation-delay:${i*0.03}s" onclick="${isImg?`openLightbox('${downloadUrl}')`:`downloadFile('${downloadUrl}','${f.name}')`}">
        <div class="file-grid-thumb" style="background:${catInfo.bg}; display:flex; align-items:center; justify-content:center; font-size:32px; height:110px;">
          ${isImg ? `<img src="${downloadUrl}" loading="lazy" alt="" style="width:100%;height:110px;object-fit:cover">` : getFileIcon(f.name, '')}
        </div>
        <div class="file-grid-info">
          <div class="file-grid-name">${f.name}</div>
          <div class="file-grid-meta">${formatSize(f.size)}${msgTime?' · '+msgTime:''}</div>
          <span class="file-grid-cat" style="background:${catInfo.bg}; color:${catInfo.color}">${catInfo.icon} ${catInfo.label}</span>
        </div>
      </div>`;
    }
  }).join('');
}

function getCatFromPath(path) {
  const parts = path.split('/');
  if (parts.length > 1) {
    const folder = parts[0];
    if (catById[folder]) return folder;
  }
  return 'other';
}

function setFilesCat(id) {
  state.filesCat = id;
  document.querySelectorAll('#files-cat-filter .filter-btn').forEach(el => el.classList.remove('active'));
  const btn = document.getElementById('fc-' + (id === 'all' ? 'all' : id));
  if (btn) btn.classList.add('active');
  renderFilesGrid();
}

function setView(v) {
  state.filesView = v;
  document.getElementById('grid-btn').classList.toggle('active', v==='grid');
  document.getElementById('list-btn').classList.toggle('active', v==='list');
  renderFilesGrid();
}

// ===== SCREENS =====
function showScreen(name) {
  document.getElementById('chat-screen').style.display = name==='chat' ? 'flex' : 'none';
  document.getElementById('files-screen').style.display = name==='files' ? 'flex' : 'none';
  document.getElementById('nav-chat').classList.toggle('active', name==='chat');
  document.getElementById('nav-files').classList.toggle('active', name==='files');
  if (name === 'files') renderFilesGrid();
  closeSidebar();
}

// ===== ACTIONS =====
function downloadFile(url, name) {
  if (!url) return;
  const a = document.createElement('a');
  a.href = url; a.download = name; a.target = '_blank';
  a.click();
}

function downloadMsg(id) {
  const msg = state.messages.find(m => m.id === id);
  if (!msg) return;
  if (msg.type === 'text') {
    const blob = new Blob([msg.content], {type:'text/plain'});
    const url = URL.createObjectURL(blob);
    downloadFile(url, 'message-'+id+'.txt');
  } else if (msg.files) {
    msg.files.forEach(f => downloadFile(f.downloadUrl, f.name));
  }
}

async function deleteMsg(id) {
  const msg = state.messages.find(m => m.id === id);
  if (!msg) return;
  showConfirmModal('删除消息', '确认删除这条消息？如果是文件消息，文件也将从仓库中删除。', async () => {
    // Delete files from repo
    if (msg.files) {
      for (const f of msg.files) {
        if (f.sha) {
          await ghFetch(`/repos/${state.user}/${state.repo}/contents/${f.path}`, {
            method: 'DELETE',
            body: JSON.stringify({ message: `Delete ${f.name} [GitDrive]`, sha: f.sha })
          });
        }
      }
    }
    state.messages = state.messages.filter(m => m.id !== id);
    renderMessages();
    await saveMessages();
    await loadRepoFiles();
    toast('已删除', 'success');
  });
}

async function deleteFile(path, sha) {
  showConfirmModal('删除文件', `确认删除 ${path.split('/').pop()}？`, async () => {
    // Get latest sha
    const r = await ghFetch(`/repos/${state.user}/${state.repo}/contents/${path}`);
    const d = await r.json();
    await ghFetch(`/repos/${state.user}/${state.repo}/contents/${path}`, {
      method: 'DELETE',
      body: JSON.stringify({ message: `Delete ${path} [GitDrive]`, sha: d.sha })
    });
    // Also remove from messages
    state.messages = state.messages.map(m => {
      if (m.files) m.files = m.files.filter(f => f.path !== path);
      return m;
    }).filter(m => m.type === 'text' || (m.files && m.files.length > 0));
    await saveMessages();
    await loadRepoFiles();
    renderMessages();
    toast('已删除', 'success');
  });
}

async function renameMsg(id) {
  const msg = state.messages.find(m => m.id === id);
  if (!msg) return;
  if (msg.type === 'text') {
    showInputModal('编辑文本', '修改内容', msg.content, async (val) => {
      msg.content = val;
      renderMessages();
      await saveMessages();
      toast('已修改', 'success');
    });
  } else if (msg.files && msg.files.length > 0) {
    renameFile(msg.files[0].path, msg.files[0].name, id);
  }
}

async function renameFile(path, oldName, msgId) {
  showInputModal('重命名文件', '新文件名', oldName, async (newName) => {
    if (!newName || newName === oldName) return;
    const folder = path.includes('/') ? path.substring(0, path.lastIndexOf('/')) : '';
    const newPath = folder ? folder + '/' + newName : newName;
    // Get file content
    const r = await ghFetch(`/repos/${state.user}/${state.repo}/contents/${path}`);
    const d = await r.json();
    // Create new file
    await ghFetch(`/repos/${state.user}/${state.repo}/contents/${newPath}`, {
      method: 'PUT',
      body: JSON.stringify({ message: `Rename to ${newName} [GitDrive]`, content: d.content.replace(/\n/g,'') })
    });
    // Delete old
    await ghFetch(`/repos/${state.user}/${state.repo}/contents/${path}`, {
      method: 'DELETE',
      body: JSON.stringify({ message: `Delete ${oldName} [GitDrive]`, sha: d.sha })
    });
    // Update messages
    state.messages.forEach(m => {
      if (m.files) m.files.forEach(f => {
        if (f.path === path) { f.path = newPath; f.name = newName; }
      });
    });
    await saveMessages();
    await loadRepoFiles();
    renderMessages();
    toast(`已重命名为 ${newName}`, 'success');
  });
}

// ===== MODALS =====
function showConfirmModal(title, text, onConfirm) {
  const c = document.getElementById('modal-container');
  c.innerHTML = `<div class="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">${title}</div>
      <p style="color:var(--text2); margin-bottom:20px; line-height:1.6">${text}</p>
      <div class="modal-btns">
        <button class="btn-ghost" onclick="closeModal()">取消</button>
        <button class="btn-danger" onclick="confirmAndClose()">确认删除</button>
      </div>
    </div>
  </div>`;
  window._confirmCb = onConfirm;
}

function showInputModal(title, label, defaultVal, onSave) {
  const c = document.getElementById('modal-container');
  c.innerHTML = `<div class="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">${title}</div>
      <label style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block">${label}</label>
      <textarea class="modal-input" id="modal-input" style="resize:vertical;min-height:60px">${defaultVal}</textarea>
      <div class="modal-btns">
        <button class="btn-ghost" onclick="closeModal()">取消</button>
        <button class="btn-accent" onclick="saveModalAndClose()">保存</button>
      </div>
    </div>
  </div>`;
  window._saveCb = onSave;
  setTimeout(() => document.getElementById('modal-input')?.focus(), 50);
}

function closeModal() { document.getElementById('modal-container').innerHTML = ''; }
async function confirmAndClose() { closeModal(); if (window._confirmCb) await window._confirmCb(); }
async function saveModalAndClose() {
  const val = document.getElementById('modal-input')?.value;
  closeModal();
  if (window._saveCb && val !== undefined) await window._saveCb(val);
}

// ===== LIGHTBOX =====
function openLightbox(url) {
  if (!url) return;
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').style.display = 'flex';
}
function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

// ===== SIDEBAR (mobile) =====
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

// ===== THEME =====
function toggleTheme() {
  state.darkMode = !state.darkMode;
  document.documentElement.setAttribute('data-theme', state.darkMode ? 'dark' : 'light');
  localStorage.setItem('gitdrive-theme', state.darkMode ? 'dark' : 'light');
  document.querySelector('[onclick="toggleTheme()"]').textContent = state.darkMode ? '🌙' : '☀️';
}

// ===== HELPERS =====
async function ghFetch(path, options={}, token=null) {
  const t = token || state.token;
  const url = path.startsWith('http') ? path : `https://api.github.com${path}`;
  return fetch(url, {
    ...options,
    headers: {
      'Authorization': `token ${t}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
      ...(options.headers || {}),
    }
  });
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function getFileIcon(name, mime) {
  const ext = name.split('.').pop().toLowerCase();
  if (/^(jpg|jpeg|png|gif|webp|svg|bmp)$/.test(ext)) return '🖼️';
  if (/^(mp4|mov|avi|mkv|webm)$/.test(ext)) return '🎬';
  if (/^(mp3|wav|flac|aac|ogg)$/.test(ext)) return '🎵';
  if (/^(pdf)$/.test(ext)) return '📄';
  if (/^(doc|docx)$/.test(ext)) return '📝';
  if (/^(xls|xlsx|csv)$/.test(ext)) return '📊';
  if (/^(ppt|pptx)$/.test(ext)) return '📑';
  if (/^(zip|rar|7z|tar|gz)$/.test(ext)) return '🗜️';
  if (/^(js|ts|jsx|tsx|py|java|c|cpp|html|css|json|md)$/.test(ext)) return '💻';
  if (/^(txt|log)$/.test(ext)) return '📃';
  return '📎';
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes/1024/1024).toFixed(1) + 'MB';
}

function toast(msg, type='') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

// PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
