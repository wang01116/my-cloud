      const cat=catMap[f.category]||catMap['other'];
      const hi=f.name.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<span class="sr-highlight">${m}</span>`);
      const url=rawUrl(f.path);
      return `<div class="sr-item" onclick="closeSearch();dlFile('${url}','${f.name}')">
        <div class="sr-icon" style="background:${cat.bg}">${fileIcon(f.name)}</div>
        <div class="sr-info"><div class="sr-name">${hi}</div><div class="sr-meta">${cat.icon} ${cat.label} · ${fmtSize(f.size)}</div></div>
      </div>`;
    } else {
      const m=item.m;
      const snippet=(m.content||'').slice(0,80).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),x=>`<span class="sr-highlight">${x}</span>`);
      return `<div class="sr-item" onclick="closeSearch();scrollToMsg('${m.id}')">
        <div class="sr-icon" style="background:var(--bg4)">💬</div>
        <div class="sr-info"><div class="sr-name">${snippet}</div><div class="sr-meta">文字消息 · ${new Date(m.timestamp).toLocaleDateString('zh-CN')}</div></div>
      </div>`;
    }
  }).join('');
}

function scrollToMsg(id){
  showScreen('chat');
  setTimeout(()=>{
    const el=document.querySelector(`.mr[data-id="${id}"]`);
    if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='2px solid var(--accent)';setTimeout(()=>el.style.outline='',1800);}
  },200);
}

      <button class="btn-g" onclick="closeModal()">取消</button>

async function _confirmOk(){closeModal();if(window._confirmCb)await window._confirmCb();}

function showInputModal(title,label,def,onSave){
  const mc=document.getElementById('mc');
  const isLong=(def||'').length>80||(def||'').includes('\n');
  mc.innerHTML=`<div class="m-ov" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-t">${title}</div>
    <label style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block">${label}</label>
    <textarea class="modal-inp" id="mi" style="min-height:${isLong?'120px':'48px'}">${def||''}</textarea>
    <div class="modal-btns">
      <button class="btn-g" onclick="closeModal()">取消</button>
      <button class="btn-a" onclick="_saveOk()">保存</button>
    </div>
  </div></div>`;
  window._saveCb=onSave;
  setTimeout(()=>document.getElementById('mi')?.focus(),50);
}
async function _saveOk(){const v=document.getElementById('mi')?.value;closeModal();if(window._saveCb&&v!==undefined)await window._saveCb(v);}
function closeModal(){document.getElementById('mc').innerHTML='';}

/* ============================================================
   SIDEBAR
============================================================ */
function openSb(){document.getElementById('sidebar').classList.add('open');document.getElementById('sb-ov').classList.add('show');}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-ov').classList.remove('show');}

/* ============================================================
   THEME
============================================================ */
function toggleTheme(){
  S.darkMode=!S.darkMode;
  document.documentElement.setAttribute('data-theme',S.darkMode?'dark':'light');
  localStorage.setItem('gd-theme',S.darkMode?'dark':'light');
  document.getElementById('theme-btn').textContent=S.darkMode?'🌙':'☀️';
}

/* ============================================================
   HELPERS
============================================================ */
async function gh(path,opts={},token=null){
  const t=token||S.token;
  const url=path.startsWith('http')?path:`https://api.github.com${path}`;
  return fetch(url,{...opts,headers:{'Authorization':`token ${t}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json',...(opts.headers||{})}});
}

function rawUrl(path){return `https://raw.githubusercontent.com/${S.user}/${S.repo}/main/${path}`;}

function dlFile(url,name){
  const a=document.createElement('a');a.href=url;a.download=name;a.target='_blank';a.click();
}

function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px';}

function isImg(name){return /\.(jpg|jpeg|png|gif|webp|svg|avif|bmp)$/i.test(name);}

function ext(name){return (name.split('.').pop()||'').toLowerCase();}

function fileIcon(name){
  const e=ext(name);
  if(/^(jpg|jpeg|png|gif|webp|svg|avif|bmp)$/.test(e)) return '🖼️';
  if(/^(mp4|mov|avi|mkv|webm|m4v)$/.test(e)) return '🎬';
  if(/^(mp3|wav|flac|aac|ogg|m4a)$/.test(e)) return '🎵';
  if(/^pdf$/.test(e)) return '📄';
  if(/^(doc|docx)$/.test(e)) return '📝';
  if(/^(xls|xlsx|csv|ods)$/.test(e)) return '📊';
  if(/^(ppt|pptx|key)$/.test(e)) return '📑';
  if(/^(zip|rar|7z|tar|gz|bz2)$/.test(e)) return '🗜️';
  if(/^(js|ts|jsx|tsx|py|java|c|cpp|html|css|json|xml|yaml|go|rs|php)$/.test(e)) return '💻';
  if(/^(txt|md|log|rtf)$/.test(e)) return '📃';
  return '📎';
}

function fmtSize(b){if(!b)return '';if(b<1024)return b+'B';if(b<1048576)return (b/1024).toFixed(1)+'KB';return (b/1048576).toFixed(1)+'MB';}

function toast(msg,type=''){
  const c=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className='toast '+(type==='ok'?'ok':type==='err'?'err':type==='warn'?'warn':'');
  el.textContent=msg;c.appendChild(el);
  setTimeout(()=>el.remove(),2800);
}

// PWA service worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
