<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#111318">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GitDrive">
<title>GitDrive</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ===== CSS VARIABLES ===== */
:root{
  --bg:#111318;--bg2:#18191f;--bg3:#1e2028;--bg4:#252830;--bg5:#2c3040;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.11);--border3:rgba(255,255,255,.18);
  --text:#eef0f4;--text2:#9098aa;--text3:#5a6172;
  --accent:#4f8ef7;--accent2:#6fa3ff;--accent3:#3870e0;
  --glow:rgba(79,142,247,.18);--glow2:rgba(79,142,247,.08);
  --out-bg:#1a4dd4;--in-bg:#1e2028;
  --green:#34d058;--red:#f85149;--orange:#fb923c;--yellow:#fbbf24;--purple:#a78bfa;
  --r:22px;--r-sm:12px;--r-xs:8px;
  --sh:0 8px 40px rgba(0,0,0,.5);--sh2:0 2px 12px rgba(0,0,0,.3);
  --dur:.18s;--ease:cubic-bezier(.4,0,.2,1);
  /* PWA safe areas */
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);
}
[data-theme="light"]{
  --bg:#f2f3f7;--bg2:#fff;--bg3:#f8f9fb;--bg4:#eef0f5;--bg5:#e4e7ef;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.11);--border3:rgba(0,0,0,.18);
  --text:#0d1117;--text2:#5a6478;--text3:#9098aa;
  --accent:#2563eb;--accent2:#3b7ef0;--accent3:#1d56d4;
  --glow:rgba(37,99,235,.14);--glow2:rgba(37,99,235,.06);
  --out-bg:#2563eb;--in-bg:#fff;
  --sh:0 4px 24px rgba(0,0,0,.1);--sh2:0 2px 8px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Outfit',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ===== LAYOUT ===== */
#app{display:flex;height:100dvh;position:relative}

/* ===== LOGIN ===== */
#login-screen{
  position:fixed;inset:0;z-index:200;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-wrap{width:100%;max-width:400px;animation:fadeSlideUp .4s var(--ease) both}
.login-logo-ring{
  width:72px;height:72px;margin:0 auto 24px;
  background:linear-gradient(135deg,#4f8ef7,#a78bfa);border-radius:22px;
  display:flex;align-items:center;justify-content:center;font-size:34px;
  box-shadow:0 0 0 8px rgba(79,142,247,.12),0 0 40px rgba(79,142,247,.3);
}
.login-h{font-size:26px;font-weight:800;text-align:center;margin-bottom:4px}
.login-sub{color:var(--text2);font-size:13px;text-align:center;margin-bottom:32px}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:24px;padding:32px;box-shadow:var(--sh)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase}
.field input{
  width:100%;padding:12px 14px;
  background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--r-sm);color:var(--text);
  font-size:14px;outline:none;transition:border-color var(--dur),box-shadow var(--dur);
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.btn-login{
  width:100%;padding:14px;
  background:linear-gradient(135deg,#4f8ef7,#a78bfa);
  border:none;border-radius:var(--r-sm);color:#fff;
  font-size:15px;font-weight:700;
  transition:opacity var(--dur),transform var(--dur);margin-top:8px;
}
.btn-login:hover{opacity:.9;transform:translateY(-1px)}
.login-hint{margin-top:16px;font-size:11px;color:var(--text3);text-align:center;line-height:1.7}
#login-err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;display:none;font-weight:500}

/* ===== SIDEBAR ===== */
#sidebar{
  width:260px;min-width:260px;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:relative;z-index:20;
  transition:transform .28s var(--ease);
  /* FIX #7: PWA safe area - push sidebar below status bar on iOS */
  padding-top:var(--sat);
}
.sb-top{
  padding:14px 14px 10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.sb-logo{
  width:38px;height:38px;flex-shrink:0;
  background:linear-gradient(135deg,#4f8ef7,#a78bfa);
  border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;
}
.sb-title{font-weight:800;font-size:15px;flex:1}
.sb-acts{display:flex;gap:4px}
.ib{
  width:30px;height:30px;border:none;background:transparent;
  color:var(--text2);border-radius:var(--r-xs);
  display:flex;align-items:center;justify-content:center;font-size:15px;
  transition:background var(--dur),color var(--dur);
}
.ib:hover{background:var(--bg3);color:var(--text)}
.sb-search{padding:10px 12px;border-bottom:1px solid var(--border)}
.sb-search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:7px 10px;
  transition:border-color var(--dur);cursor:pointer;
}
.sb-search-box:hover,.sb-search-box:focus-within{border-color:var(--accent)}
.sb-search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;flex:1}
.sb-search-box input::placeholder{color:var(--text3)}
.sb-nav{padding:8px 8px 0;display:flex;flex-direction:column;gap:1px}
.nav-it{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:11px;
  color:var(--text2);font-weight:600;font-size:13.5px;
  border:none;background:transparent;width:100%;text-align:left;
  transition:background var(--dur),color var(--dur);
}
.nav-it:hover{background:var(--bg3);color:var(--text)}
.nav-it.active{background:var(--glow);color:var(--accent2)}
.nav-it .ni{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px;min-width:18px;text-align:center}
.sb-sec{padding:16px 18px 5px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.sb-foot{
  margin-top:auto;padding:12px 16px;border-top:1px solid var(--border);
  font-size:11px;color:var(--text3);display:flex;flex-direction:column;gap:3px;
  /* FIX #7: safe area bottom */
  padding-bottom:max(12px, var(--sab));
}
.sb-foot-author{font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px}
.sb-foot-author .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0}

/* ===== MAIN ===== */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* FIX #7: topbar accounts for safe area on PWA iOS */
.topbar{
  padding:11px 18px;
  /* push below notch/dynamic island */
  padding-top:calc(11px + var(--sat));
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;z-index:10;
}
.topbar-info{flex:1;overflow:hidden}
.topbar-title{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-sub{font-size:11px;color:var(--text2);margin-top:1px}
.menu-btn{display:none}

/* ===== CHAT SCREEN ===== */
#chat-screen{display:flex;flex-direction:column;height:100%;min-height:0}
#msg-list{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px 14px 8px;
  display:flex;flex-direction:column;gap:1px;
  scroll-behavior:smooth;
  min-height:0;
}
.date-sep{
  display:flex;align-items:center;gap:10px;
  margin:14px 0 10px;color:var(--text3);font-size:11px;font-weight:600;
}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}

/* ===== MESSAGE ROWS ===== */
.mg{display:flex;flex-direction:column;gap:2px;margin-bottom:10px}
.mr{display:flex;align-items:flex-end;gap:7px;position:relative}
.mr.out{flex-direction:row-reverse}
.mr.out .av{display:none}
.av{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#4f8ef7,#a78bfa);
  display:flex;align-items:center;justify-content:center;font-size:12px;align-self:flex-end;
}

/* FIX #1,#2: bubble wrap — no overflow clip, actions appear below bubble */
.bw{
  display:flex;flex-direction:column;
  max-width:min(74%,500px);position:relative;
}
.mr.out .bw{align-items:flex-end}

/* FIX #1,#2: message actions — vertical Chinese-text buttons BELOW bubble */
.m-acts{
  display:none;
  flex-direction:row;
  gap:2px;margin-top:4px;
  /* FIX #2: more visible bg with stronger border in dark mode */
  background:var(--bg2);border:1.5px solid var(--border3);
  border-radius:14px;padding:4px 5px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:10;
}
.bw:hover .m-acts{display:flex}
/* On touch, show via JS .act-open class */
.bw.act-open .m-acts{display:flex}

/* FIX #2: each action = icon + Chinese label, vertical stack */
.ma{
  display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:7px 11px;border:none;background:transparent;
  color:var(--text);border-radius:10px;
  font-size:11px;font-weight:700;line-height:1.2;
  transition:background var(--dur),color var(--dur);white-space:nowrap;
}
.ma:hover{background:var(--bg4)}
/* FIX #2: icon is larger and brighter for dark mode visibility */
.ma .ma-icon{font-size:18px;font-weight:900;line-height:1;color:var(--accent2)}
.ma .ma-label{font-size:10px;color:var(--text2);margin-top:1px}
.ma.danger .ma-icon{color:var(--red)}
.ma.danger:hover{background:rgba(248,81,73,.12)}

/* Selection checkbox */
.msg-check{
  display:none;width:20px;height:20px;border-radius:50%;
  border:2px solid var(--border2);background:var(--bg3);
  flex-shrink:0;align-self:center;
  transition:all var(--dur);margin-right:2px;
  align-items:center;justify-content:center;font-size:11px;color:#fff;
}
.select-mode .msg-check{display:flex}
.msg-check.checked{background:var(--accent);border-color:var(--accent)}

/* ===== BUBBLE ===== */
.bl{
  padding:9px 13px;border-radius:18px;
  position:relative;word-break:break-word;
  animation:bIn .22s var(--ease) both;
  line-height:1.58;font-size:14px;
}
@keyframes bIn{from{opacity:0;transform:scale(.92) translateY(5px)}to{opacity:1;transform:scale(1) translateY(0)}}
.bl.in{background:var(--in-bg);border:1px solid var(--border2);border-bottom-left-radius:5px;color:var(--text)}
.bl.out{background:var(--out-bg);color:#fff;border-bottom-right-radius:5px;box-shadow:0 2px 12px rgba(79,142,247,.3)}
.bl.out .mtime{color:rgba(255,255,255,.55)}
.bl p{margin-bottom:5px}.bl p:last-child{margin-bottom:0}
.bl code{background:rgba(0,0,0,.25);padding:1px 5px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px}
.bl pre{background:rgba(0,0,0,.35);padding:10px 12px;border-radius:8px;overflow-x:auto;margin:6px 0}
.bl pre code{background:none;padding:0}
.bl h1,.bl h2,.bl h3{margin:8px 0 4px;font-weight:700}
.bl ul,.bl ol{padding-left:18px;margin:4px 0}
.bl a{color:var(--accent2);text-decoration:none}
.bl.in code{background:rgba(0,0,0,.07)}
.bl.in pre{background:rgba(0,0,0,.05)}
.mtime{font-size:10px;color:var(--text3);margin-top:3px;text-align:right;display:flex;align-items:center;gap:4px;justify-content:flex-end}
.mtime-pinned{color:var(--yellow);font-size:9px}

/* ===== FILE CARDS in bubble ===== */
/* FIX #5: image stack — square rounded thumbnails */
.msg-img-grid{
  display:grid;gap:3px;border-radius:14px;overflow:hidden;
  max-width:260px;
}
.msg-img-grid.g1{grid-template-columns:1fr}
.msg-img-grid.g2{grid-template-columns:1fr 1fr}
.msg-img-grid.g3{grid-template-columns:2fr 1fr}
.msg-img-grid.g3 .img-cell:first-child{grid-row:1/3}
.msg-img-grid.g4plus{grid-template-columns:1fr 1fr}

/* FIX #5: all images as square */
.img-cell{
  position:relative;overflow:hidden;
  aspect-ratio:1/1;background:var(--bg3);cursor:pointer;
}
.img-cell img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .2s var(--ease);
}
.img-cell:hover img{transform:scale(1.04)}
.img-cell .img-ov{
  position:absolute;inset:0;background:rgba(0,0,0,0);
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;font-size:22px;
}
.img-cell:hover .img-ov{background:rgba(0,0,0,.3)}
.img-more{
  position:absolute;inset:0;background:rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;color:#fff;
}

/* FIX #5: mixed img+doc in same bubble — wrap vertically */
.bubble-files{display:flex;flex-direction:column;gap:6px;padding:4px}
.fstack{display:flex;flex-direction:column;gap:4px}

/* file card */
.fc{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:12px;padding:10px 12px;
  display:flex;align-items:center;gap:10px;
  min-width:180px;max-width:100%;
  transition:background var(--dur);
}
.fc:hover{background:var(--bg4)}
.bl.out .fc{background:rgba(0,0,0,.22);border-color:rgba(255,255,255,.13)}
.bl.out .fc:hover{background:rgba(0,0,0,.32)}
.fi-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.fi-info{flex:1;overflow:hidden;min-width:0}
.fi-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-meta{font-size:11px;color:var(--text2);margin-top:2px}
.bl.out .fi-meta{color:rgba(255,255,255,.6)}

/* ===== UPLOAD PROGRESS ===== */
#upload-area{padding:0 14px;max-height:120px;overflow-y:auto}
.up-prog{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:11px 14px;margin-bottom:6px;animation:fadeUp .2s var(--ease)}
.up-name{font-size:12px;font-weight:600;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbar{background:var(--bg5);border-radius:3px;height:3px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:3px;transition:width .25s var(--ease);width:0%}

/* ===== INPUT AREA ===== */
.input-wrap{
  background:var(--bg2);border-top:1px solid var(--border);
  padding:10px 14px;
  /* FIX #7: safe area bottom */
  padding-bottom:max(10px, var(--sab));
  flex-shrink:0;z-index:10;
}
.select-bar{display:none;align-items:center;gap:10px;padding:8px 14px;background:var(--glow);border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--accent2)}
.select-bar.show{display:flex}
.sel-count{flex:1}
.sel-del{padding:6px 14px;background:var(--red);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;transition:opacity var(--dur)}
.sel-del:hover{opacity:.85}
.sel-cancel{padding:6px 12px;background:var(--bg3);color:var(--text2);border:1px solid var(--border2);border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;transition:background var(--dur)}
.sel-cancel:hover{background:var(--bg4)}

/* FIX #11: Multi-file pending area (iMessage-style stacked preview) */
.pending-files{
  display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;
  scrollbar-width:none;
}
.pending-files::-webkit-scrollbar{display:none}
.pending-file{
  position:relative;flex-shrink:0;
  width:68px;height:68px;border-radius:12px;overflow:hidden;
  background:var(--bg3);border:1.5px solid var(--border2);
  animation:fadeUp .18s var(--ease);
}
.pending-file img{width:100%;height:100%;object-fit:cover}
.pending-file .pf-icon{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;flex-direction:column;gap:2px}
.pending-file .pf-ext{font-size:9px;font-weight:800;color:var(--text3);text-transform:uppercase}
.pending-file .pf-rm{
  position:absolute;top:2px;right:2px;
  width:18px;height:18px;border-radius:50%;
  background:rgba(0,0,0,.65);color:#fff;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  border:none;line-height:1;
}

.cat-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;margin-top:4px}
.cat-row::-webkit-scrollbar{display:none}
.cat-chip{
  display:flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:20px;border:1.5px solid var(--border2);background:var(--bg3);
  white-space:nowrap;font-size:12px;font-weight:700;color:var(--text2);
  transition:all var(--dur);flex-shrink:0;
}
.cat-chip:hover{border-color:var(--accent2);color:var(--accent2)}
.cat-chip.active{border-color:var(--accent);background:var(--glow);color:var(--accent2)}
.cat-chip .ci{font-size:14px}

.inp-row{display:flex;align-items:flex-end;gap:8px}
.inp-box{
  flex:1;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:22px;display:flex;align-items:flex-end;padding:8px 12px;gap:8px;
  transition:border-color var(--dur),box-shadow var(--dur);
}
.inp-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
#ti{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;resize:none;max-height:130px;min-height:22px;line-height:1.52;padding:0}
#ti::placeholder{color:var(--text3)}
.att-btn,.snd-btn{width:36px;height:36px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all var(--dur)}
.att-btn{background:var(--bg4);color:var(--text2)}
.att-btn:hover{background:var(--glow);color:var(--accent2)}
.snd-btn{background:var(--accent);color:#fff;box-shadow:0 2px 10px var(--glow)}
.snd-btn:hover{background:var(--accent2);transform:scale(1.06)}
.snd-btn:active{transform:scale(.97)}
#fi{display:none}

.drag-ov{
  display:none;position:fixed;inset:0;z-index:99;
  background:rgba(79,142,247,.08);border:3px dashed var(--accent);
  align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:var(--accent2);
  backdrop-filter:blur(4px);animation:fadeIn .15s var(--ease);
}
.drag-ov.show{display:flex}

/* ===== FILES SCREEN ===== */
#files-screen{display:none;flex-direction:column;height:100%}
.files-top{
  padding:12px 16px;
  /* FIX #7 */
  padding-top:calc(12px + var(--sat));
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;flex-wrap:wrap;gap:8px;flex-shrink:0;
}
.files-title{font-size:17px;font-weight:800;flex:1;min-width:100px}
.files-tb{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tb-btn{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all var(--dur);white-space:nowrap}
.tb-btn:hover{border-color:var(--accent);color:var(--accent2)}
.tb-btn.active{border-color:var(--accent);background:var(--glow);color:var(--accent2)}
.view-tog{display:flex;border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.vb{padding:6px 9px;background:var(--bg3);border:none;color:var(--text2);font-size:14px;transition:all var(--dur)}
.vb.active{background:var(--glow);color:var(--accent2)}
.filter-row{padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;align-items:center}
.filter-row::-webkit-scrollbar{display:none}
.fr-chip{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;border:1.5px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all var(--dur);white-space:nowrap;flex-shrink:0}
.fr-chip:hover{border-color:var(--accent);color:var(--accent2)}
.fr-chip.active{border-color:var(--accent);background:var(--glow);color:var(--accent2)}
.fr-sep{width:1px;height:16px;background:var(--border2);flex-shrink:0;margin:0 2px}
.files-search{padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.fs-box{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:7px 12px;transition:border-color var(--dur)}
.fs-box:focus-within{border-color:var(--accent)}
.fs-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;flex:1}
.fs-box input::placeholder{color:var(--text3)}

/* FIX #8: files grid with select-mode */
#fg{flex:1;overflow-y:auto;padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;align-content:start}
#fg.list-view{grid-template-columns:1fr;gap:5px}
.fgi{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;position:relative;animation:fadeUp .22s var(--ease) both;transition:border-color var(--dur),transform var(--dur),box-shadow var(--dur)}
.fgi:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 24px var(--glow)}
.fgi.selected{border-color:var(--accent);background:var(--glow2)}
.fgi-check{position:absolute;top:8px;left:8px;z-index:3;width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.6);background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all var(--dur);backdrop-filter:blur(4px)}
.select-mode .fgi-check{display:flex}
.fgi.selected .fgi-check{background:var(--accent);border-color:var(--accent)}

/* FIX #5: square img in grid */
.fgi-img-wrap{width:100%;aspect-ratio:1/1;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.fgi-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s var(--ease);border-radius:0}
.fgi:hover .fgi-img-wrap img{transform:scale(1.05)}
.fgi-icon-wrap{width:100%;height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-size:36px}
.fgi-ext{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);background:var(--bg4);padding:2px 6px;border-radius:4px}
.fgi-info{padding:7px 10px 0}
/* FIX #5: filename wraps to 2 lines, always visible */
.fgi-name{font-size:12px;font-weight:700;line-height:1.35;max-height:2.7em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;white-space:normal}
.fgi-meta{font-size:10.5px;color:var(--text2);margin-top:2px}
.fgi-cat{display:inline-flex;align-items:center;gap:3px;font-size:10px;margin-top:5px;padding:2px 7px;border-radius:8px;font-weight:700}
.fav-star{position:absolute;top:7px;right:7px;z-index:3;font-size:14px;line-height:1;text-shadow:0 1px 4px rgba(0,0,0,.5)}
/* FIX #5: grid card action buttons row */
.fgi-card-acts{
  display:flex;align-items:center;justify-content:space-around;
  padding:5px 4px 7px;border-top:1px solid var(--border);margin-top:6px;
}
.fgi-card-acts button{
  background:none;border:none;color:var(--text2);
  font-size:14px;font-weight:700;padding:4px 5px;border-radius:7px;
  cursor:pointer;transition:background var(--dur),color var(--dur);
  display:flex;align-items:center;justify-content:center;
  min-width:28px;height:28px;
}
.fgi-card-acts button:hover{background:var(--bg3);color:var(--text)}

/* FIX #8: list item — more space for filename, minimal actions on mobile */
.fgi.list-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px}
.fgi.list-item .fgi-thumb-sm{width:44px;height:44px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.fgi.list-item .fgi-thumb-sm img{width:44px;height:44px;object-fit:cover}
.fgi.list-item .fgi-icon-sm{font-size:22px;display:flex;flex-direction:column;align-items:center;gap:1px}
.fgi.list-item .fgi-icon-sm .fgi-ext{font-size:8px;padding:1px 3px}
.fgi.list-item .fgi-info{padding:0;flex:1;overflow:hidden;min-width:0}
/* FIX #8: filename gets more space */
.fgi.list-item .fgi-name{font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:none}

/* FIX #8: mobile list only shows fav + delete, rest in long-press menu */
.li-acts{display:flex;gap:4px;flex-shrink:0;align-items:center}
.li-fav,.li-del{
  width:32px;height:32px;border:none;background:transparent;
  border-radius:8px;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:background var(--dur);
}
.li-fav:hover{background:var(--bg3)}
.li-del{color:var(--red)}
.li-del:hover{background:rgba(248,81,73,.12)}
.fgi.list-item .fgi-check{position:static;width:20px;height:20px;flex-shrink:0;display:none}
.select-mode .fgi.list-item .fgi-check{display:flex}

/* ===== SEARCH OVERLAY ===== */
#search-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;padding:60px 20px 20px;animation:fadeIn .15s var(--ease)}
#search-overlay.show{display:flex}
.search-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:540px;overflow:hidden;box-shadow:var(--sh);animation:slideUp .2s var(--ease)}
.search-inp-row{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
.search-inp-row input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:16px;font-weight:500}
.search-inp-row input::placeholder{color:var(--text3)}
.search-results{max-height:400px;overflow-y:auto}
.sr-empty{padding:32px;text-align:center;color:var(--text3);font-size:13px}
.sr-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.sr-item:hover{background:var(--bg3)}
.sr-item:last-child{border-bottom:none}
.sr-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sr-info{flex:1;overflow:hidden}
.sr-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-meta{font-size:11px;color:var(--text2);margin-top:2px}
.sr-highlight{color:var(--accent2)}

/* ===== MEDIA PREVIEW MODAL ===== */
#media-preview{
  position:fixed;inset:0;z-index:250;
  background:rgba(0,0,0,.93);backdrop-filter:blur(16px);
  display:none;flex-direction:column;align-items:center;justify-content:center;
}
.mp-top{
  position:absolute;top:0;left:0;right:0;
  padding:16px 20px;
  padding-top:calc(16px + var(--sat));
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);
}
.mp-name{flex:1;font-size:13px;font-weight:600;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-act{width:36px;height:36px;border:none;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background var(--dur)}
.mp-act:hover{background:rgba(255,255,255,.22)}
#mp-content{max-width:94vw;max-height:80vh;display:flex;align-items:center;justify-content:center}
#mp-content img{max-width:90vw;max-height:80vh;border-radius:10px;object-fit:contain;box-shadow:0 0 80px rgba(0,0,0,.8)}
#mp-content video,#mp-content audio{max-width:90vw;border-radius:10px;background:#000}
#mp-content video{max-height:70vh}
#mp-content audio{min-width:280px}
.mp-arrow{
  position:absolute;width:44px;height:44px;border:none;border-radius:50%;
  background:rgba(255,255,255,.12);color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:background var(--dur);top:50%;transform:translateY(-50%);
}
.mp-arrow:hover{background:rgba(255,255,255,.22)}
#mp-prev{left:16px}
#mp-next{right:16px}

/* ===== MODAL ===== */
.m-ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s var(--ease)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:26px;width:100%;max-width:420px;box-shadow:var(--sh);animation:slideUp .2s var(--ease)}
.modal-t{font-size:17px;font-weight:800;margin-bottom:16px}
.modal-p{color:var(--text2);font-size:13px;margin-bottom:18px;line-height:1.65}
.modal-inp{width:100%;padding:11px 13px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;color:var(--text);font-size:14px;outline:none;margin-bottom:16px;resize:vertical;min-height:50px;transition:border-color var(--dur),box-shadow var(--dur)}
.modal-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-g{padding:9px 18px;border-radius:9px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:inherit;font-size:13px;font-weight:700;transition:all var(--dur)}
.btn-g:hover{background:var(--bg4)}
.btn-d{padding:9px 18px;border-radius:9px;background:var(--red);border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:700;transition:opacity var(--dur)}
.btn-d:hover{opacity:.85}
.btn-a{padding:9px 18px;border-radius:9px;background:var(--accent);border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:700;transition:all var(--dur)}
.btn-a:hover{background:var(--accent2)}
.cat-move-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.cat-move-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;border-radius:12px;border:1.5px solid var(--border2);background:var(--bg3);font-size:12px;font-weight:700;color:var(--text2);transition:all var(--dur)}
.cat-move-item:hover,.cat-move-item.selected{border-color:var(--accent);background:var(--glow);color:var(--accent2)}
.cat-move-item span{font-size:24px}

/* ===== CONTEXT MENU ===== */
.ctx-menu{
  position:fixed;z-index:300;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:16px;padding:6px;
  box-shadow:var(--sh);min-width:180px;
  animation:fadeIn .12s var(--ease);
}
.ctx-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;font-size:13px;font-weight:600;
  color:var(--text2);transition:background var(--dur),color var(--dur);
}
.ctx-item:hover{background:var(--bg3);color:var(--text)}
.ctx-item .ctx-icon{font-size:17px;width:24px;text-align:center;flex-shrink:0}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger:hover{background:rgba(248,81,73,.12)}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}

/* ===== TOAST ===== */
#toasts{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:5px;align-items:center;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:var(--sh);white-space:nowrap;animation:toastIn .2s var(--ease)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
.toast.warn{border-color:var(--yellow);color:var(--yellow)}

/* ===== EMPTY STATE ===== */
.empty-st{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px;text-align:center;color:var(--text2)}
.empty-ic{font-size:52px;opacity:.3}
.empty-t{font-size:18px;font-weight:800;color:var(--text)}
.empty-s{font-size:13px;max-width:260px;line-height:1.7}

/* ===== KEYFRAMES ===== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:scale(.88) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  #sidebar{
    position:fixed;left:0;top:0;bottom:0;z-index:50;
    transform:translateX(-100%);
    box-shadow:8px 0 40px rgba(0,0,0,.5);
    /* FIX #7: sidebar also needs safe area on mobile PWA */
    padding-top:var(--sat);
  }
  #sidebar.open{transform:translateX(0)}
  .menu-btn{display:flex !important}
  #sb-ov{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.45);display:none}
  #sb-ov.show{display:block}
  .bw{max-width:88%}
  /* FIX #7: topbar on mobile PWA */
  .topbar{padding-top:calc(14px + var(--sat))}
  .mp-arrow{display:none}
  /* FIX #8: on mobile, list items show condensed actions */
  .li-acts-desktop{display:none !important}
}
@media(min-width:641px){
  /* On desktop, show all list actions */
  .li-acts-mobile{display:none !important}
  .li-acts-desktop{display:flex !important}
}
</style>
</head>
<body>

<div id="sb-ov" onclick="closeSb()"></div>
<div class="drag-ov" id="drag-ov">📂 拖放文件上传</div>
<div id="ctx-container"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo-ring">☁️</div>
    <div class="login-h">GitDrive</div>
    <div class="login-sub">以对话方式使用 GitHub 仓库作为私人云盘</div>
    <div class="login-card">
      <div class="field"><label>GitHub 用户名</label><input id="lu" placeholder="octocat" autocomplete="username"></div>
      <div class="field"><label>仓库名称</label><input id="lr" placeholder="my-drive"></div>
      <div class="field"><label>Personal Access Token</label><input id="lt" type="password" placeholder="ghp_xxxxxxxx" autocomplete="current-password"></div>
      <button class="btn-login" onclick="doLogin()">连接仓库</button>
      <div id="login-err"></div>
    </div>
    <div class="login-hint">凭据仅保存在本地浏览器，Fine-grained token 需要 Contents 读写权限</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="sb-top">
      <div class="sb-logo">☁️</div>
      <div class="sb-title">GitDrive</div>
      <div class="sb-acts">
        <button class="ib" onclick="openSearch()" title="搜索">🔍</button>
        <button class="ib" id="theme-btn" onclick="toggleTheme()">🌙</button>
        <button class="ib" onclick="doLogout()">🚪</button>
      </div>
    </div>
    <div class="sb-search">
      <div class="sb-search-box" onclick="openSearch()">
        <span style="color:var(--text3);font-size:13px">🔍</span>
        <input readonly placeholder="搜索文件… ⌘K">
      </div>
    </div>
    <nav class="sb-nav">
      <button class="nav-it active" onclick="showScreen('chat')" id="n-chat"><span class="ni">💬</span>对话云盘</button>
      <button class="nav-it" onclick="showScreen('files')" id="n-files"><span class="ni">📁</span>所有文件<span class="nav-badge" id="files-cnt">0</span></button>
      <button class="nav-it" onclick="showFilesFiltered('fav')" id="n-fav"><span class="ni">★</span>收藏<span class="nav-badge" id="fav-cnt"></span></button>
    </nav>
    <div class="sb-sec">文件分类</div>
    <!-- ===== CATEGORIES NAV ===== -->
    <nav class="sb-nav" id="cat-nav"></nav>
    <div class="sb-foot">
      <div class="sb-foot-author"><span class="dot"></span>Wangcy</div>
      <span id="sb-repo" style="font-family:'JetBrains Mono',monospace;font-size:10px">-</span>
      <span id="sb-stat">就绪</span>
    </div>
  </aside>

  <main id="main">
    <!-- CHAT SCREEN -->
    <div id="chat-screen">
      <div class="topbar">
        <button class="ib menu-btn" onclick="openSb()">☰</button>
        <button class="ib" onclick="showHelp()" title="使用说明" style="font-size:14px;font-weight:700">?</button>
        <div class="topbar-info">
          <div class="topbar-title" id="hd-title">GitDrive</div>
          <div class="topbar-sub" id="hd-sub">连接中…</div>
        </div>
        <button class="ib" onclick="openSearch()" title="搜索 ⌘K">🔍</button>
        <button class="ib" onclick="toggleSelectMode()" title="多选">☑️</button>
        <button class="ib" onclick="clearChat()" title="清空对话视图">🗑</button>
        <button class="ib" onclick="refreshAll()" title="刷新">🔄</button>
      </div>
      <div class="select-bar" id="sel-bar">
        <span class="sel-count" id="sel-cnt">已选 0 条</span>
        <button class="sel-cancel" onclick="exitSelectMode()">取消</button>
        <button class="btn-g" onclick="downloadSelectedMsgs()" style="font-size:12px;padding:6px 12px;color:var(--accent2)">↓ 下载</button>
        <button class="sel-del" onclick="deleteSelected()">删除所选</button>
      </div>
      <div id="msg-list">
        <div class="empty-st" id="empty-chat">
          <div class="empty-ic">💬</div>
          <div class="empty-t">开始使用 GitDrive</div>
          <div class="empty-s">发送文字或上传文件，以聊天方式存入 GitHub 仓库</div>
        </div>
      </div>
      <div id="upload-area"></div>
      <div class="input-wrap">
        <!-- FIX #11: pending files preview -->
        <div class="pending-files" id="pending-files" style="display:none"></div>
        <div class="cat-row" id="cat-chips"></div>
        <div class="inp-row">
          <button class="att-btn" onclick="document.getElementById('fi').click()">📎</button>
          <div class="inp-box">
            <textarea id="ti" placeholder="发送消息…支持 Markdown" rows="1" oninput="ar(this)" onkeydown="hk(event)"></textarea>
          </div>
          <button class="snd-btn" onclick="sendAll()">➤</button>
        </div>
        <input type="file" id="fi" multiple onchange="addPendingFiles(this.files);this.value=''">
      </div>
    </div>

    <!-- FILES SCREEN -->
    <div id="files-screen">
      <div class="files-top">
        <button class="ib menu-btn" onclick="openSb()">☰</button>
        <div class="files-title" id="files-screen-title">所有文件</div>
        <div class="files-tb">
          <select id="sort-sel" onchange="renderFG()" style="padding:6px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:inherit;font-size:12px;outline:none">
            <option value="time-desc">最新优先</option>
            <option value="time-asc">最早优先</option>
            <option value="name">文件名</option>
            <option value="size">大小</option>
          </select>
          <button class="tb-btn" id="sel-all-btn" onclick="toggleFGSelect()">多选</button>
          <button class="tb-btn" onclick="syncFiles()">🔄</button>
          <div class="view-tog">
            <button class="vb active" id="vb-g" onclick="setView('grid')">⊞</button>
            <button class="vb" id="vb-l" onclick="setView('list')">☰</button>
          </div>
        </div>
      </div>
      <div class="filter-row" id="fg-cat-row"></div>
      <!-- FIX #10: simplified type filter -->
      <div class="filter-row" id="fg-type-row"></div>
      <div class="files-search">
        <div class="fs-box">
          <span style="color:var(--text3)">🔍</span>
          <input id="fg-search" placeholder="搜索文件名…" oninput="renderFG()">
          <button class="ib" onclick="document.getElementById('fg-search').value='';renderFG()" style="font-size:12px">✕</button>
        </div>
      </div>
      <div class="select-bar" id="fg-sel-bar" style="display:none">
        <span class="sel-count" id="fg-sel-cnt">已选 0 个</span>
        <button class="sel-cancel" onclick="exitFGSelect()">取消</button>
        <button class="btn-g" onclick="moveSelectedFiles()" style="font-size:12px;padding:6px 12px">移动分类</button>

<script>
/* ============================================================
   STATE
============================================================ */
const S={
  user:'',repo:'',token:'',
  messages:[],msgSha:null,
  allFiles:[],
  favorites:new Set(),archived:new Set(),metaSha:null,
  currentCat:'uncat',
  filesCat:'all',filesType:'all',filesView:'grid',filesMode:'all',
  selectMode:false,selectedMsgs:new Set(),
  fgSelectMode:false,fgSelected:new Set(),
  darkMode:true,
  chatClearTime:null,  // ISO timestamp: messages BEFORE this time are hidden in chat view
  mpItems:[],mpIdx:0,       // media preview
  pendingFiles:[],           // FIX #11: multi-file pending
};

/* ============================================================
   ===== CATEGORIES — 修改此数组自定义分类 =====
   ★ 第一项为默认选中分类（当前为"无分类"）
   ★ 每项字段说明:
       id:    GitHub 仓库中对应的文件夹名（仅限英文、数字、连字符）
       label: 界面显示名称
       icon:  分类图标（emoji）
       color: 标签文字颜色
       bg:    标签背景色
   ★ 调整顺序即可改变显示顺序，删除/新增行即可增减分类
============================================================ */
const CATEGORIES=[
  /* 默认分类 — 新上传文件的默认落点 */
  {id:'uncat',    label:'无分类', icon:'📂', color:'#9098aa',bg:'rgba(144,152,170,.18)'},
  /* 学科/专业分类 */
  {id:'law',      label:'法学',   icon:'⚖️', color:'#4f8ef7',bg:'rgba(79,142,247,.15)'},
  {id:'envlaw',   label:'环境法', icon:'🌿', color:'#34d058',bg:'rgba(52,208,88,.15)'},
  /* 生活/工作分类 */
  {id:'entertain',label:'娱乐',   icon:'🎬', color:'#fb923c',bg:'rgba(251,146,60,.15)'},
  {id:'work',     label:'办公',   icon:'💼', color:'#a78bfa',bg:'rgba(167,139,250,.15)'},
  /* 通用分类 */
  {id:'text',     label:'文字',   icon:'📝', color:'#fbbf24',bg:'rgba(251,191,36,.15)'},
  {id:'other',    label:'其他',   icon:'📦', color:'#9098aa',bg:'rgba(144,152,170,.15)'},
  {id:'muse',     label:'艺术',   icon:'🎵', color:'#FFD966',bg:'rgba(255,217,102,.15)'},
];
/* ===== END CATEGORIES — 以上为全部分类配置 ===== */
const catMap=Object.fromEntries(CATEGORIES.map(c=>[c.id,c]));

/* FIX #10: simplified type groups */
const TYPE_GROUPS=[
  {id:'all',   label:'全部',   exts:[]},
  {id:'img',   label:'图片',   exts:['jpg','jpeg','png','gif','webp','svg','bmp','avif','heic']},
  {id:'doc',   label:'文档',   exts:['pdf','doc','docx','txt','md','rtf','odt','xls','xlsx','csv','ods','ppt','pptx','key','odp']},
  {id:'video', label:'视频',   exts:['mp4','mov','avi','mkv','webm','m4v']},
  {id:'audio', label:'音频',   exts:['mp3','wav','flac','aac','ogg','m4a']},
  {id:'code',  label:'代码',   exts:['js','ts','jsx','tsx','py','java','c','cpp','html','css','json','xml','yaml','go','rs','php','sh','rb']},
  {id:'arch',  label:'压缩包', exts:['zip','rar','7z','tar','gz','bz2']},
  {id:'app',   label:'应用',   exts:['apk','exe','ipa','dmg','pkg','deb','rpm']},
];

/* ============================================================
   INIT
============================================================ */
window.onload=()=>{
  const saved=localStorage.getItem('gd-creds');
  if(saved){const d=JSON.parse(saved);S.user=d.user;S.repo=d.repo;S.token=d.token;launchApp();}
  const th=localStorage.getItem('gd-theme')||'dark';
  if(th==='light'){document.documentElement.setAttribute('data-theme','light');S.darkMode=false;document.getElementById('theme-btn').textContent='☀️';}
  document.addEventListener('dragover',e=>{e.preventDefault();document.getElementById('drag-ov').classList.add('show');});
  document.addEventListener('dragleave',e=>{if(!e.relatedTarget)document.getElementById('drag-ov').classList.remove('show');});
  document.addEventListener('drop',e=>{e.preventDefault();document.getElementById('drag-ov').classList.remove('show');if(e.dataTransfer.files.length)addPendingFiles(e.dataTransfer.files);});
  document.addEventListener('keydown',e=>{
    if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();}
    if(e.key==='Escape'){closeSearch();closeMP();closeModal();closeCtx();}
  });
  // Close context menu on click outside
  document.addEventListener('click',()=>closeCtx());
};

/* ============================================================
   LOGIN
============================================================ */
async function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const r=document.getElementById('lr').value.trim();
  const t=document.getElementById('lt').value.trim();
  const err=document.getElementById('login-err');
  if(!u||!r||!t){err.textContent='请填写所有字段';err.style.display='block';return;}
  err.style.display='none';
  const btn=document.querySelector('.btn-login');
  btn.innerHTML='连接中…';btn.disabled=true;
  try{
    const res=await ghRaw(`/repos/${u}/${r}`,{},t);
    if(res.status===401)throw new Error('Token 无效或已过期');
    if(res.status===403)throw new Error('权限不足，需开启 Contents 读写权限');
    if(res.status===404)throw new Error('仓库不存在，请检查用户名和仓库名');
    if(!res.ok)throw new Error(`连接失败（HTTP ${res.status}）`);
    S.user=u;S.repo=r;S.token=t;
    localStorage.setItem('gd-creds',JSON.stringify({user:u,repo:r,token:t}));
    launchApp();
  }catch(e){err.textContent=e.message;err.style.display='block';}
  btn.innerHTML='连接仓库';btn.disabled=false;
}
function doLogout(){if(!confirm('确定退出？'))return;localStorage.removeItem('gd-creds');location.reload();}
async function launchApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('sb-repo').textContent=`${S.user}/${S.repo}`;
  document.getElementById('hd-title').textContent=S.repo;
  // FIX #1: restore clear timestamp per repo
  S.chatClearTime=localStorage.getItem('gd-clearedAt-'+S.user+'/'+S.repo)||null;
  buildCatUI();
  await loadAll();
}

/* ============================================================
   CATEGORY UI
============================================================ */
function buildCatUI(){
  document.getElementById('cat-nav').innerHTML=CATEGORIES.map(c=>`
    <button class="nav-it" onclick="showFilesFiltered('${c.id}')" id="cn-${c.id}">
      <span class="ni">${c.icon}</span>${c.label}
    </button>`).join('');
  document.getElementById('cat-chips').innerHTML=CATEGORIES.map(c=>`
    <button class="cat-chip ${S.currentCat===c.id?'active':''}" onclick="selCat('${c.id}')" id="cc-${c.id}">
      <span class="ci">${c.icon}</span>${c.label}
    </button>`).join('');
  if(S.currentCat==='all'||!catMap[S.currentCat])selCat(CATEGORIES[0].id);
  document.getElementById('fg-cat-row').innerHTML=
    `<button class="fr-chip active" onclick="setFCat('all')" id="fc-all">全部</button>
     <button class="fr-chip" onclick="setFCat('fav')" id="fc-fav">★ 收藏</button>
     <span class="fr-sep"></span>`+
    CATEGORIES.map(c=>`<button class="fr-chip" onclick="setFCat('${c.id}')" id="fc-${c.id}">${c.icon} ${c.label}</button>`).join('');
  document.getElementById('fg-type-row').innerHTML=
    TYPE_GROUPS.map((g,i)=>`<button class="fr-chip ${i===0?'active':''}" onclick="setFType('${g.id}')" id="ft-${g.id}">${g.label}</button>`).join('');
}
function selCat(id){
  S.currentCat=id;
  document.querySelectorAll('.cat-chip').forEach(el=>el.classList.remove('active'));
  const c=document.getElementById('cc-'+id);if(c)c.classList.add('active');
}

/* ============================================================
   DATA LOADING
============================================================ */
async function loadAll(){
  document.getElementById('hd-sub').textContent='加载中…';
  document.getElementById('sb-stat').textContent='同步中…';
  try{
    await Promise.all([loadMessages(),loadMeta(),loadRepoFiles()]);
    updateStats();
  }catch(e){document.getElementById('hd-sub').textContent='加载失败';toast('加载失败: '+e.message,'err');}
}
async function loadMessages(){
  const r=await gh(`/repos/${S.user}/${S.repo}/contents/gitdrive-messages.json`);
  if(r.ok){
    const d=await r.json();
    /* FIX #3: decode中文文件名 — use TextDecoder after base64 decode */
    const raw=d.content.replace(/\n/g,'');
    const bytes=Uint8Array.from(atob(raw),c=>c.charCodeAt(0));
    S.messages=JSON.parse(new TextDecoder('utf-8').decode(bytes));
    S.msgSha=d.sha;
  }else{S.messages=[];S.msgSha=null;}
  renderMsgs();
}
async function loadMeta(){
  const r=await gh(`/repos/${S.user}/${S.repo}/contents/gitdrive-meta.json`);
  if(r.ok){
    const d=await r.json();
    const raw=d.content.replace(/\n/g,'');
    const bytes=Uint8Array.from(atob(raw),c=>c.charCodeAt(0));
    const meta=JSON.parse(new TextDecoder('utf-8').decode(bytes));
    S.favorites=new Set(meta.favorites||[]);
    S.archived=new Set(meta.archived||[]);
    S.metaSha=d.sha;
  }else{S.favorites=new Set();S.archived=new Set();S.metaSha=null;}
  updateFavCount();
}
async function loadRepoFiles(){
  const files=[];
  for(const cat of CATEGORIES){
    const r=await gh(`/repos/${S.user}/${S.repo}/contents/${cat.id}`);
    if(r.ok){
      const items=await r.json();
      if(Array.isArray(items))items.forEach(item=>{if(item.type==='file')files.push({...item,category:cat.id});});
    }
  }
  S.allFiles=files;
}
async function syncFiles(){toast('同步中…');await loadAll();toast('同步完成','ok');}
async function refreshAll(){toast('刷新中…');await loadAll();toast('已刷新','ok');}
function updateStats(){
  const cnt=S.allFiles.length;
  document.getElementById('files-cnt').textContent=cnt;
  document.getElementById('hd-sub').textContent=`${cnt} 个文件`;
  document.getElementById('sb-stat').textContent=`${cnt} 个文件 · 就绪`;
  updateFavCount();renderFG();
}
function updateFavCount(){document.getElementById('fav-cnt').textContent=S.favorites.size||'';}

/* ============================================================
   SAVE — FIX #3,#4: encode with TextEncoder for correct UTF-8
============================================================ */
function toBase64UTF8(str){
  /* FIX #3: properly encode UTF-8 strings (Chinese filenames etc.) */
  const bytes=new TextEncoder().encode(str);
  let bin='';
  bytes.forEach(b=>bin+=String.fromCharCode(b));
  return btoa(bin);
}

async function saveMsgs(){
  /* FIX #4: text messages DO save to GitHub — use correct UTF-8 encoding */
  const json=JSON.stringify(S.messages,null,2);
  const body={message:'Update messages [GitDrive]',content:toBase64UTF8(json)};
  if(S.msgSha)body.sha=S.msgSha;
  const r=await gh(`/repos/${S.user}/${S.repo}/contents/gitdrive-messages.json`,{method:'PUT',body:JSON.stringify(body)});
  if(r.ok){const d=await r.json();S.msgSha=d.content.sha;}
  else{const e=await r.json();toast('保存失败: '+(e.message||r.status),'err');}
}
async function saveMeta(){
  const meta={favorites:[...S.favorites],archived:[...S.archived]};
  const body={message:'Update meta [GitDrive]',content:toBase64UTF8(JSON.stringify(meta))};
  if(S.metaSha)body.sha=S.metaSha;
  const r=await gh(`/repos/${S.user}/${S.repo}/contents/gitdrive-meta.json`,{method:'PUT',body:JSON.stringify(body)});
  if(r.ok){const d=await r.json();S.metaSha=d.content.sha;}
}

/* ============================================================
   FIX #11: PENDING FILES (iMessage multi-file)
============================================================ */
function addPendingFiles(files){
  Array.from(files).forEach(f=>{
    S.pendingFiles.push(f);
  });
  renderPending();
}
function removePending(idx){
  S.pendingFiles.splice(idx,1);
  renderPending();
}
function renderPending(){
  const area=document.getElementById('pending-files');
  if(!S.pendingFiles.length){area.style.display='none';return;}
  area.style.display='flex';
  area.innerHTML=S.pendingFiles.map((f,i)=>{
    const isImage=isImg(f.name);
    let inner='';
    if(isImage){
      const url=URL.createObjectURL(f);
      inner=`<img src="${url}" alt="${f.name}" onload="URL.revokeObjectURL(this.src)">`;
    }else{
      inner=`<div class="pf-icon">${fileIcon(f.name)}<span class="pf-ext">${ext(f.name).toUpperCase()}</span></div>`;
    }
    return `<div class="pending-file" title="${f.name}">
      ${inner}
      <button class="pf-rm" onclick="removePending(${i})">✕</button>
    </div>`;
  }).join('');
}

/* ============================================================
   SEND ALL (text + pending files as one message)
============================================================ */
async function sendAll(){
  const txt=document.getElementById('ti').value.trim();
  const files=[...S.pendingFiles];
  if(!txt&&!files.length)return;

  // Clear input
  document.getElementById('ti').value='';
  ar(document.getElementById('ti'));
  S.pendingFiles=[];
  renderPending();

  if(files.length){
    /* FIX #11: upload all pending files, group them into ONE message */
    await uploadFiles(files,txt);
  }else if(txt){
    /* FIX #4: text-only message, saved to GitHub */
    const msg={id:Date.now().toString(),type:'text',content:txt,category:S.currentCat,timestamp:new Date().toISOString()};
    S.messages.push(msg);
    renderMsgs();scrollBot();
    await saveMsgs();
  }
}

function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAll();}}

/* ============================================================
   UPLOAD FILES — FIX #3,#11
============================================================ */
async function uploadFiles(files,textCaption=''){
  const cat=catMap[S.currentCat]||catMap['other'];
  const uploadedFiles=[];

  for(const file of files){
    const path=`${cat.id}/${file.name}`;
    const pid='p'+Date.now()+Math.random();
    const pEl=document.createElement('div');
    pEl.className='up-prog';
    pEl.innerHTML=`<div class="up-name">${file.name}</div><div class="pbar"><div class="pfill" id="pf${pid}"></div></div>`;
    document.getElementById('upload-area').appendChild(pEl);
    try{
      /* FIX #3: use proper binary FileReader for upload — avoids encoding issues */
      const b64=await fileToB64(file,pct=>{
        const el=document.getElementById('pf'+pid);if(el)el.style.width=Math.round(pct*.7)+'%';
      });
      let sha;
      const chk=await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`);
      if(chk.ok){const d=await chk.json();sha=d.sha;}
      const body={message:`Add ${file.name} [GitDrive]`,content:b64};
      if(sha)body.sha=sha;
      const pf=document.getElementById('pf'+pid);if(pf)pf.style.width='85%';
      const r=await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`,{method:'PUT',body:JSON.stringify(body)});
      if(!r.ok)throw new Error('上传失败: '+file.name);
      const rd=await r.json();
      if(pf)pf.style.width='100%';
      uploadedFiles.push({name:file.name,path,size:file.size,mime:file.type,sha:rd.content.sha,downloadUrl:rd.content.download_url});
    }catch(e){toast(e.message,'err');}
    finally{setTimeout(()=>pEl.remove(),700);}
  }

  if(!uploadedFiles.length)return;

  /* FIX #11: all files go into ONE message bubble */
  const msgObj={
    id:Date.now().toString(),
    type:'file',
    files:uploadedFiles,
    caption:textCaption||'',
    category:cat.id,
    timestamp:new Date().toISOString(),
  };
  S.messages.push(msgObj);
  renderMsgs();scrollBot();
  await saveMsgs();
  await loadRepoFiles();updateStats();
  toast(`${uploadedFiles.length} 个文件已上传`,'ok');
}

function fileToB64(file,onProgress){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onprogress=e=>{if(e.lengthComputable&&onProgress)onProgress(e.loaded/e.total*100);};
    fr.onload=()=>res(fr.result.split(',')[1]);
    fr.onerror=rej;
    fr.readAsDataURL(file);
  });
}

/* ============================================================
   RENDER MESSAGES
============================================================ */
function renderMsgs(){
  const el=document.getElementById('msg-list');
  const empt=document.getElementById('empty-chat');
  /* FIX #1,2,3: filter messages by clearTime — only hide OLD messages, new ones always show */
  const visibleMsgs = S.chatClearTime
    ? S.messages.filter(m=>m.timestamp>S.chatClearTime)
    : S.messages;

  if(!visibleMsgs.length){
    empt.style.display='flex';
    if(S.chatClearTime){
      empt.innerHTML=`<div class="empty-ic">🗂️</div>
        <div class="empty-t">历史记录已清空</div>
        <div class="empty-s">新发送的内容会正常显示在这里<br>文件均已安全保存在仓库中</div>
        <button onclick="restoreChat()" style="margin-top:16px;padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">恢复全部历史记录</button>`;
    }else{
      empt.innerHTML=`<div class="empty-ic">💬</div>
        <div class="empty-t">开始使用 GitDrive</div>
        <div class="empty-s">发送文字或上传文件，以聊天方式存入 GitHub 仓库</div>`;
    }
    return;
  }
  if(S.chatClearTime&&S.messages.length>visibleMsgs.length){
    // There are hidden old messages — show a notice banner at top
    el.innerHTML=`<div style="text-align:center;padding:10px 16px;margin-bottom:8px">
      <span style="font-size:12px;color:var(--text3);background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:6px 14px;display:inline-flex;align-items:center;gap:8px">
        📂 历史记录已隐藏
        <button onclick="restoreChat()" style="background:none;border:none;color:var(--accent2);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:0">恢复</button>
      </span>
    </div>`;
  }else{
    el.innerHTML='';
  }
  empt.style.display='none';
  const days={};
  visibleMsgs.forEach(m=>{
    const d=new Date(m.timestamp).toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
    if(!days[d])days[d]=[];
    days[d].push(m);
  });
  let html='';
  for(const[date,msgs] of Object.entries(days)){
    html+=`<div class="date-sep">${date}</div>`;
    msgs.forEach(m=>{html+=renderMsg(m);});
  }
  html+=`<div id="empty-chat" style="display:none" class="empty-st"></div>`;
  el.innerHTML=(el.innerHTML||'')+html;
  if(S.selectMode){
    el.classList.add('select-mode');
    S.selectedMsgs.forEach(id=>{
      const cb=document.querySelector(`.msg-check[data-id="${id}"]`);
      if(cb)cb.classList.add('checked');
    });
  }
  // FIX #6: tap bubble on mobile to show actions + scroll into view
  el.querySelectorAll('.bw').forEach(bw=>{
    let timer, startY=0;
    bw.addEventListener('touchstart',e=>{
      startY=e.touches[0].clientY;
      timer=setTimeout(()=>{
        // Long press: toggle actions
        const wasOpen=bw.classList.contains('act-open');
        el.querySelectorAll('.bw.act-open').forEach(b=>b.classList.remove('act-open'));
        if(!wasOpen){
          bw.classList.add('act-open');
          // FIX #6: scroll bubble + actions fully into view
          requestAnimationFrame(()=>{
            const acts=bw.querySelector('.m-acts');
            if(acts){
              const rect=acts.getBoundingClientRect();
              const inputH=document.querySelector('.input-wrap')?.offsetHeight||120;
              const bottomLimit=window.innerHeight-inputH-8;
              if(rect.bottom>bottomLimit){
                const scrollBy=rect.bottom-bottomLimit+8;
                el.scrollBy({top:scrollBy,behavior:'smooth'});
              }
            }
          });
        }
      },400);
    },{passive:true});
    bw.addEventListener('touchend',e=>{
      clearTimeout(timer);
      // Short tap: if not dragging, also show actions + scroll
      const dy=Math.abs(e.changedTouches[0].clientY-startY);
      if(dy<6){
        // Brief tap toggles act-open
        const wasOpen=bw.classList.contains('act-open');
        if(!wasOpen){
          el.querySelectorAll('.bw.act-open').forEach(b=>b.classList.remove('act-open'));
          bw.classList.add('act-open');
          requestAnimationFrame(()=>{
            const acts=bw.querySelector('.m-acts');
            if(acts){
              const rect=acts.getBoundingClientRect();
              const inputH=document.querySelector('.input-wrap')?.offsetHeight||120;
              const bottomLimit=window.innerHeight-inputH-8;
              if(rect.bottom>bottomLimit){
                el.scrollBy({top:rect.bottom-bottomLimit+8,behavior:'smooth'});
              }
            }
          });
        }
      }
    },{passive:true});
    bw.addEventListener('touchmove',()=>clearTimeout(timer),{passive:true});
    bw.addEventListener('mouseleave',()=>bw.classList.remove('act-open'));
  });
  // Close all act-open when tapping outside
  el.addEventListener('touchstart',e=>{
    if(!e.target.closest('.bw'))
      el.querySelectorAll('.bw.act-open').forEach(b=>b.classList.remove('act-open'));
  },{passive:true});
}

function renderMsg(m){
  const time=new Date(m.timestamp).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  const cat=catMap[m.category]||catMap['other'];
  let inner='';

  if(m.type==='text'){
    const md=marked.parse(m.content||'');
    inner=`<div class="bl out" data-id="${m.id}">${md}
      <div class="mtime">${time}</div>
    </div>`;
  }else if(m.type==='file'){
    const files=m.files||[];
    const imgs=files.filter(f=>isImg(f.name));
    const docs=files.filter(f=>!isImg(f.name));

    /* FIX #5: square image grid */
    let imgHtml='';
    if(imgs.length){
      let gridCls='g1';
      if(imgs.length===2)gridCls='g2';
      else if(imgs.length===3)gridCls='g3';
      else if(imgs.length>=4)gridCls='g4plus';

      const shown=imgs.slice(0,4);
      const extra=imgs.length-4;
      const cells=shown.map((f,i)=>{
        const url=rawUrl(f.path);
        const isLast=i===3&&extra>0;
        return `<div class="img-cell" onclick="openMP('${url}','${esc(f.name)}',${JSON.stringify(imgs.map(x=>rawUrl(x.path)))},${i})">
          <img src="${url}" loading="lazy" alt="${esc(f.name)}">
          <div class="img-ov">🔍</div>
          ${isLast?`<div class="img-more">+${extra+1}</div>`:''}
        </div>`;
      }).join('');
      imgHtml=`<div class="msg-img-grid ${gridCls}">${cells}</div>`;
    }

    let docHtml='';
    if(docs.length){
      docHtml=docs.map(f=>{
        const url=rawUrl(f.path);
        const isMedia=isVideo(f.name)||isAudio(f.name);
        const onclick=isMedia
          ?`openMP('${url}','${esc(f.name)}',[],0)`
          :`dlFile('${url}','${esc(f.name)}')`;
        return `<div class="fc" onclick="${onclick}">
          <div class="fi-icon" style="background:${cat.bg}">${fileIcon(f.name)}</div>
          <div class="fi-info">
            <div class="fi-name">${f.name}</div>
            <div class="fi-meta">${fmtSize(f.size)} · ${cat.icon} ${cat.label}${isMedia?' · 点击播放':''}</div>
          </div>
        </div>`;
      }).join('');
    }

    const cap=m.caption?`<div style="font-size:13px;margin-bottom:6px;opacity:.9">${m.caption}</div>`:'';
    inner=`<div class="bl out" data-id="${m.id}" style="padding:6px">
      <div class="bubble-files">
        ${cap}
        ${imgHtml?`<div class="fstack">${imgHtml}</div>`:''}
        ${docHtml?`<div class="fstack">${docHtml}</div>`:''}
      </div>
      <div class="mtime" style="padding:2px 6px 0">${time}</div>
    </div>`;
  }

  /* FIX #7: simplified actions — no pin/archive; keep download, rename/edit, delete */
  const isFile=m.type==='file';
  const actions=`<div class="m-acts">
    <button class="ma" onclick="dlMsg('${m.id}')">
      <span class="ma-icon">↓</span>
      <span class="ma-label">下载</span>
    </button>
    ${isFile?`<button class="ma" onclick="editFileMsg('${m.id}')">
      <span class="ma-icon">✎</span>
      <span class="ma-label">重命名</span>
    </button>`:`<button class="ma" onclick="editTextMsg('${m.id}')">
      <span class="ma-icon">✎</span>
      <span class="ma-label">编辑</span>
    </button>`}
    <button class="ma danger" onclick="delMsg('${m.id}')">
      <span class="ma-icon">✕</span>
      <span class="ma-label">删除</span>
    </button>
  </div>`;

  return `<div class="mg">
    <div class="mr out" data-id="${m.id}">
      <div class="msg-check ${S.selectedMsgs.has(m.id)?'checked':''}" data-id="${m.id}" onclick="toggleMsgSelect('${m.id}')">✓</div>
      <div class="bw">
        ${inner}

        ${actions}
      </div>
    </div>
  </div>`;
}

/* ============================================================
   MESSAGE ACTIONS
============================================================ */

function dlMsg(id){
  const m=S.messages.find(x=>x.id===id);if(!m)return;
  if(m.type==='text'){
    const blob=new Blob([m.content],{type:'text/plain'});
    dlFile(URL.createObjectURL(blob),'msg-'+id+'.txt');
  }else if(m.files)m.files.forEach(f=>dlFile(rawUrl(f.path),f.name));
}
/* FIX #6: download all files from selected chat messages */
function downloadSelectedMsgs(){
  if(!S.selectedMsgs.size)return;
  let count=0;
  S.selectedMsgs.forEach(id=>{
    const m=S.messages.find(x=>x.id===id);if(!m)return;
    if(m.type==='text'){
      const blob=new Blob([m.content],{type:'text/plain'});
      setTimeout(()=>dlFile(URL.createObjectURL(blob),'msg-'+id+'.txt'),count*200);count++;
    }else if(m.files){
      m.files.forEach(f=>{setTimeout(()=>dlFile(rawUrl(f.path),f.name),count*200);count++;});
    }
  });
  toast(`已触发 ${count} 个下载`,'ok');
}

function editTextMsg(id){
  const m=S.messages.find(x=>x.id===id);if(!m)return;
  showInputModal('编辑内容','内容',m.content,async val=>{
    m.content=val;renderMsgs();await saveMsgs();toast('已保存','ok');
  });
}
/* FIX #6: for file messages only rename NON-image files; images show warning */
async function editFileMsg(id){
  const m=S.messages.find(x=>x.id===id);if(!m||!m.files||!m.files.length)return;
  const nonImgs=m.files.filter(f=>!isImg(f.name));
  if(!nonImgs.length){
    toast('图片文件重命名后 URL 会变化，暂不支持重命名图片','warn');
    return;
  }
  /* If multiple non-image files, rename first one only */
  renameFileInMsg(m,nonImgs[0]);
}
async function renameFileInMsg(m,f){
  showInputModal('重命名文件','新文件名',f.name,async newName=>{
    if(!newName||newName===f.name)return;
    const folder=f.path.includes('/')?f.path.substring(0,f.path.lastIndexOf('/')):(catMap[m.category]?.id||'other');
    const newPath=`${folder}/${newName}`;
    const r=await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(f.path).replace(/%2F/g,'/')}`);
    const d=await r.json();
    await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(newPath).replace(/%2F/g,'/')}`,{method:'PUT',body:JSON.stringify({message:`Rename to ${newName} [GitDrive]`,content:d.content.replace(/\n/g,'')})});
    await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(f.path).replace(/%2F/g,'/')}`,{method:'DELETE',body:JSON.stringify({message:`Delete old ${f.name} [GitDrive]`,sha:d.sha})});
    f.path=newPath;f.name=newName;
    await saveMsgs();await loadRepoFiles();updateStats();renderMsgs();
    toast(`已重命名为 ${newName}`,'ok');
  });
}
async function delMsg(id){
  const m=S.messages.find(x=>x.id===id);if(!m)return;
  showConfirm('删除消息','确认删除？文件消息会同时从仓库删除文件。',async()=>{
    if(m.files)for(const f of m.files){
      const r=await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(f.path).replace(/%2F/g,'/')}`);
      if(r.ok){const d=await r.json();await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(f.path).replace(/%2F/g,'/')}`,{method:'DELETE',body:JSON.stringify({message:`Delete ${f.name} [GitDrive]`,sha:d.sha})});}
    }
    S.messages=S.messages.filter(x=>x.id!==id);
    renderMsgs();await saveMsgs();await loadRepoFiles();updateStats();
    toast('已删除','ok');
  });
}

============================================================ */
function toggleSelectMode(){S.selectMode=!S.selectMode;S.selectedMsgs.clear();document.getElementById('msg-list').classList.toggle('select-mode',S.selectMode);document.getElementById('sel-bar').classList.toggle('show',S.selectMode);if(!S.selectMode)renderMsgs();}
function exitSelectMode(){S.selectMode=false;S.selectedMsgs.clear();document.getElementById('msg-list').classList.remove('select-mode');document.getElementById('sel-bar').classList.remove('show');renderMsgs();}
function toggleMsgSelect(id){
  if(S.selectedMsgs.has(id))S.selectedMsgs.delete(id);else S.selectedMsgs.add(id);
  const cb=document.querySelector(`.msg-check[data-id="${id}"]`);
  if(cb)cb.classList.toggle('checked',S.selectedMsgs.has(id));
  document.getElementById('sel-cnt').textContent=`已选 ${S.selectedMsgs.size} 条`;
}
async function deleteSelected(){
  if(!S.selectedMsgs.size)return;
  showConfirm('批量删除',`确认删除 ${S.selectedMsgs.size} 条消息？`,async()=>{
    for(const id of S.selectedMsgs){
      const m=S.messages.find(x=>x.id===id);if(!m)continue;
      if(m.files)for(const f of m.files){
        const r=await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(f.path).replace(/%2F/g,'/')}`);
        if(r.ok){const d=await r.json();await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(f.path).replace(/%2F/g,'/')}`,{method:'DELETE',body:JSON.stringify({message:`Delete ${f.name} [GitDrive]`,sha:d.sha})});}
      }
    }
    S.messages=S.messages.filter(x=>!S.selectedMsgs.has(x.id));
    exitSelectMode();await saveMsgs();await loadRepoFiles();updateStats();
    toast('批量删除完成','ok');
  });
}

function clearChat(){
  showConfirm(
    '清空对话记录',
    '之前的对话记录将从视图中隐藏，但仓库文件完全保留。\n之后新发送的内容照常显示。\n可随时点击"恢复"重新显示历史记录。',
    async()=>{
      // FIX #1,3: record the clear timestamp; only messages BEFORE this time are hidden
      const now=new Date().toISOString();
      S.chatClearTime=now;
      localStorage.setItem('gd-clearedAt-'+S.user+'/'+S.repo, now);
      renderMsgs();
      toast('已清空历史记录（新消息照常显示）','ok');
    }
  );
}
function restoreChat(){
  // FIX #2: restore shows ALL messages including the previously hidden ones
  S.chatClearTime=null;
  localStorage.removeItem('gd-clearedAt-'+S.user+'/'+S.repo);
  renderMsgs();
  toast('已恢复全部对话记录');
}

function setView(v){

  document.getElementById('vb-l').classList.toggle('active',v==='list');

function renderFG(){
  const grid=document.getElementById('fg');
  let files=[...S.allFiles];
  if(S.filesCat==='fav')files=files.filter(f=>S.favorites.has(f.path));
  else if(S.filesCat==='archive')files=files.filter(f=>S.archived.has(f.path));
  else if(S.filesCat!=='all')files=files.filter(f=>f.category===S.filesCat);
  if(S.filesType!=='all'){
    const grp=TYPE_GROUPS.find(g=>g.id===S.filesType);
    if(grp)files=files.filter(f=>grp.exts.includes(ext(f.name)));
  }
  const q=(document.getElementById('fg-search')?.value||'').trim().toLowerCase();
  if(q)files=files.filter(f=>f.name.toLowerCase().includes(q));
  const sort=document.getElementById('sort-sel')?.value||'time-desc';
  const msgByPath={};
  S.messages.forEach(m=>{if(m.files)m.files.forEach(f=>{msgByPath[f.path]=m.timestamp;});});
  if(sort==='time-desc')files.sort((a,b)=>(msgByPath[b.path]||'')>(msgByPath[a.path]||'')?1:-1);
  else if(sort==='time-asc')files.sort((a,b)=>(msgByPath[a.path]||'')>(msgByPath[b.path]||'')?1:-1);
  else if(sort==='name')files.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='size')files.sort((a,b)=>(b.size||0)-(a.size||0));

  if(!files.length){
    grid.innerHTML=`<div style="grid-column:1/-1"><div class="empty-st"><div class="empty-ic">📭</div><div class="empty-t">没有文件</div><div class="empty-s">上传文件后显示在这里</div></div></div>`;
    grid.className=S.filesView==='list'?'list-view':'';return;
  }

  const isList=S.filesView==='list';
  if(isList)grid.classList.add('list-view');else grid.classList.remove('list-view');

  grid.innerHTML=files.map((f,i)=>{
    const cat=catMap[f.category]||catMap['other'];
    const image=isImg(f.name);
    const url=rawUrl(f.path);
    const msgT=msgByPath[f.path]?new Date(msgByPath[f.path]).toLocaleDateString('zh-CN'):'';
    const isFav=S.favorites.has(f.path);
    const isArc=S.archived.has(f.path);
    const isSel=S.fgSelected.has(f.path);
    const fileExt=ext(f.name).toUpperCase();
    const isMedia=isVideo(f.name)||isAudio(f.name);

    const thumb=image
      ?`<div class="fgi-img-wrap"><img src="${url}" loading="lazy" alt="${esc(f.name)}"></div>`
      :`<div class="fgi-icon-wrap" style="background:${cat.bg}">${fileIcon(f.name)}<span class="fgi-ext">${fileExt}</span></div>`;

    const onclick=image
      ?`openMP('${url}','${esc(f.name)}',${JSON.stringify(files.filter(x=>isImg(x.name)).map(x=>rawUrl(x.path)))},${files.filter(x=>isImg(x.name)).findIndex(x=>x.path===f.path)})`
      :isMedia
        ?`openMP('${url}','${esc(f.name)}',[],0)`
        :`dlFile('${url}','${esc(f.name)}')`;

    if(isList){
      /* FIX #8: list view — filename gets all space, mobile shows only ⭐ + red × */
      return `<div class="fgi list-item ${isSel?'selected':''}" style="animation-delay:${i*.02}s" data-path="${f.path}">
        <div class="fgi-check ${isSel?'selected':''}" onclick="toggleFGItem('${f.path}',event)">✓</div>
        <div class="fgi-thumb-sm" onclick="${onclick}" style="cursor:pointer">
          ${image?`<img src="${url}" loading="lazy" alt="">`:`<div class="fgi-icon-sm">${fileIcon(f.name)}<span class="fgi-ext">${fileExt}</span></div>`}
        </div>
        <div class="fgi-info" onclick="${onclick}" style="cursor:pointer">
          <div class="fgi-name">${f.name}</div>
          <div class="fgi-meta">${cat.icon} ${cat.label} · ${fmtSize(f.size)}${msgT?' · '+msgT:''}</div>
        </div>
        <!-- Mobile: only fav + delete -->
        <div class="li-acts li-acts-mobile">
          <button class="li-fav" onclick="toggleFav('${f.path}')" title="${isFav?'取消收藏':'收藏'}" style="color:${isFav?'#fbbf24':'var(--text3)'};font-size:18px">${isFav?'★':'☆'}</button>
          <button class="li-del" onclick="delFile('${f.path}','${f.sha}')" title="删除">✕</button>
        </div>
        <!-- Desktop: all actions -->
        <div class="li-acts li-acts-desktop" style="gap:4px">
          <button class="ib" onclick="toggleFav('${f.path}')" style="color:${isFav?'#fbbf24':'var(--text2)'};font-size:16px" title="${isFav?'取消收藏':'收藏'}">${isFav?'★':'☆'}</button>
          <button class="ib" onclick="moveFile('${f.path}','${esc(f.name)}')" title="移动分类" style="font-size:13px;color:var(--accent2)">移动</button>
          ${!image?`<button class="ib" onclick="renameGH('${f.path}','${esc(f.name)}')" title="重命名" style="font-size:13px;color:var(--text)">改名</button>`:''}
          <button class="ib" onclick="dlFile('${url}','${esc(f.name)}')" title="下载" style="color:var(--accent2)">↓</button>
          <button class="ib" onclick="delFile('${f.path}','${f.sha}')" title="删除" style="color:var(--red);font-weight:800">✕</button>
        </div>
      </div>`;
    }else{
      // FIX #5: grid card with visible filename and tap-to-show actions on mobile
      return `<div class="fgi ${isSel?'selected':''}" style="animation-delay:${i*.02}s" data-path="${f.path}">
        <div class="fgi-check ${isSel?'selected':''}" onclick="toggleFGItem('${f.path}',event)">✓</div>
        ${isFav?`<div class="fav-star" style="color:#fbbf24;font-size:16px">★</div>`:''}
        <div onclick="${onclick}" style="cursor:pointer">
          ${thumb}
        </div>
        <div class="fgi-info">
          <div class="fgi-name" style="font-size:12px;line-height:1.35;max-height:2.7em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;white-space:normal">${f.name}</div>
          <div class="fgi-meta">${fmtSize(f.size)}</div>
        </div>
        <!-- FIX #5: action bar always visible on grid card -->
        <div class="fgi-card-acts">
          <button onclick="toggleFav('${f.path}')" title="${isFav?'取消收藏':'收藏'}" style="color:${isFav?'#fbbf24':'var(--text3)'}">${isFav?'★':'☆'}</button>
          <button onclick="moveFile('${f.path}','${esc(f.name)}')" title="移动">↗</button>
          ${!image?`<button onclick="renameGH('${f.path}','${esc(f.name)}')" title="重命名">✎</button>`:''}
          <button onclick="dlFile('${url}','${esc(f.name)}')" title="下载">↓</button>
          <button onclick="delFile('${f.path}','${f.sha}')" title="删除" style="color:var(--red)">✕</button>
        </div>
      </div>`;
    }
  }).join('');

  // Long-press context menu for list items (mobile)
  grid.querySelectorAll('.fgi.list-item').forEach(el=>{
    let timer;
    el.addEventListener('touchstart',()=>{
      timer=setTimeout(()=>{
        const path=el.dataset.path;
        const f=S.allFiles.find(x=>x.path===path);
        if(f)showMobileCtxMenu(f);
      },500);
    },{passive:true});
    el.addEventListener('touchend',()=>clearTimeout(timer),{passive:true});
    el.addEventListener('touchmove',()=>clearTimeout(timer),{passive:true});
  });

  // Right-click context for grid items
  grid.querySelectorAll('.fgi:not(.list-item)').forEach(el=>{
    el.addEventListener('contextmenu',e=>{
      e.preventDefault();
      const path=el.dataset.path;
      const f=S.allFiles.find(x=>x.path===path);
      if(f)showCtxMenu(e.clientX,e.clientY,f);
    });
  });
}

/* ============================================================
   MOVE FILE
============================================================ */
async function moveFile(path,name){
  const curCat=path.split('/')[0];
  window._moveCat=curCat;
  const mc=document.getElementById('mc');
  mc.innerHTML=`<div class="m-ov"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-t">移动到分类</div>
    <div class="cat-move-grid">${CATEGORIES.map(c=>`<div class="cat-move-item ${c.id===curCat?'selected':''}" onclick="pickMoveCat('${c.id}')" id="cmi-${c.id}"><span>${c.icon}</span>${c.label}</div>`).join('')}</div>
    <div class="modal-btns">
      <button class="btn-g" onclick="closeModal()">取消</button>
      <button class="btn-a" onclick="doMoveFile('${path}','${esc(name)}')">确认移动</button>
    </div>
  </div></div>`;
}
function pickMoveCat(id){window._moveCat=id;document.querySelectorAll('.cat-move-item').forEach(el=>el.classList.remove('selected'));document.getElementById('cmi-'+id).classList.add('selected');}
async function doMoveFile(oldPath,name){
  const newCat=window._moveCat;const newPath=`${newCat}/${name}`;
  if(oldPath===newPath){closeModal();return;}
  closeModal();
  try{
    const r=await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(oldPath).replace(/%2F/g,'/')}`);
    const d=await r.json();
    await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(newPath).replace(/%2F/g,'/')}`,{method:'PUT',body:JSON.stringify({message:`Move ${name} [GitDrive]`,content:d.content.replace(/\n/g,'')})});
    await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(oldPath).replace(/%2F/g,'/')}`,{method:'DELETE',body:JSON.stringify({message:`Remove old ${name} [GitDrive]`,sha:d.sha})});
    if(S.favorites.has(oldPath)){S.favorites.delete(oldPath);S.favorites.add(newPath);}
    if(S.archived.has(oldPath)){S.archived.delete(oldPath);S.archived.add(newPath);}
    S.messages.forEach(m=>{if(m.files)m.files.forEach(f=>{if(f.path===oldPath){f.path=newPath;f.category=newCat;}});});
    await Promise.all([saveMsgs(),saveMeta()]);
    await loadRepoFiles();updateStats();
    toast(`已移动到 ${catMap[newCat].label}`,'ok');
  }catch(e){toast('移动失败: '+e.message,'err');}
}
