async function delFile(path,sha){
  const name=path.split('/').pop();
  showConfirm('移至回收站','将 '+name+' 移至回收站？30天后自动清除。',async()=>{
    const f=S.files.find(x=>x.path===path);
    await moveToTrash(path,name,f?.size||0);
    S.meta.favorites=S.meta.favorites.filter(x=>x!==path);
    S.msgs=S.msgs.map(m=>{if(m.files)m.files=m.files.filter(f=>f.path!==path);return m;}).filter(m=>m.type==='text'||(m.files&&m.files.length>0));
    await Promise.all([saveMsgs(),saveMeta()]);
    await loadFiles();updateStats();renderMsgs();
    toast('已移至回收站','ok');
  });
}

// ── TRASH ─────────────────────────────────────────────────
async function moveToTrash(origPath,name,size){
  const trashPath='gitdrive-trash-files/'+Date.now()+'_'+name;
  try{
    const r=await ghGet(ghPath(origPath));
    if(r.ok){
      const d=await r.json();
      await ghPut(ghPath(trashPath),{message:'Trash '+name+' [GitDrive]',content:d.content.replace(/\n/g,'')});
      await ghDel(ghPath(origPath),d.sha);
      S.trash.push({origPath,trashPath,name,deletedAt:new Date().toISOString(),size:size||0,category:origPath.split('/')[0]});
      await saveTrash();
    }
  }catch(e){toast('回收站操作失败: '+e.message,'err');}
}
async function restoreFromTrash(idx){
  const item=S.trash[idx];if(!item)return;
  const cat=catMap[item.category]||CATS[0];
  const dest=cat.id+'/'+item.name;
  try{
    const r=await ghGet(ghPath(item.trashPath));if(!r.ok)throw new Error('文件不存在');
    const d=await r.json();
    await ghPut(ghPath(dest),{message:'Restore '+item.name+' [GitDrive]',content:d.content.replace(/\n/g,'')});
    await ghDel(ghPath(item.trashPath),d.sha);
    S.trash.splice(idx,1);await saveTrash();
    await loadFiles();updateStats();renderTrash();
    toast('已恢复到 '+cat.label,'ok');
  }catch(e){toast('恢复失败: '+e.message,'err');}
}
async function hardDel(idx){
  const item=S.trash[idx];if(!item)return;
  showConfirm('永久删除','永久删除 '+item.name+'？此操作不可撤销。',async()=>{
    try{const r=await ghGet(ghPath(item.trashPath));if(r.ok){const d=await r.json();await ghDel(ghPath(item.trashPath),d.sha);}}catch(e){}
    S.trash.splice(idx,1);await saveTrash();renderTrash();
    toast('已永久删除');
  });
}
async function emptyTrash(){
  if(!S.trash.length){toast('回收站为空');return;}
  showConfirm('清空回收站','永久删除回收站中全部 '+S.trash.length+' 个文件？',async()=>{
    for(const item of S.trash){
      try{const r=await ghGet(ghPath(item.trashPath));if(r.ok){const d=await r.json();await ghDel(ghPath(item.trashPath),d.sha);}}catch(e){}
    }
    S.trash=[];await saveTrash();renderTrash();
    toast('回收站已清空','ok');
  });
}
function renderTrash(){
  const el=document.getElementById('trash-list');if(!el)return;
  if(!S.trash.length){el.innerHTML='<div class="emp"><div class="emp-ic">🗑</div><div class="emp-t">回收站为空</div><div class="emp-s">删除的文件会在这里保留 30 天</div></div>';return;}
  const now=Date.now();
  el.innerHTML=S.trash.map((item,i)=>{
    const elapsed=now-new Date(item.deletedAt).getTime();
    const remain=Math.ceil((30*24*3600*1000-elapsed)/(24*3600*1000));
    const cat=catMap[item.category]||CATS[0];
    const col=remain<=3?'var(--rd)':remain<=7?'var(--or)':'var(--t3)';
    return '<div style="background:var(--bg2);border:1px solid var(--b2);border-radius:12px;padding:12px 13px;display:flex;align-items:center;gap:11px">'
      +'<div style="width:38px;height:38px;border-radius:9px;background:'+cat.bg+';display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">'+fileIcon(item.name)+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+item.name+'</div>'
      +'<div style="font-size:11px;color:var(--t2);margin-top:2px">'+cat.icon+' '+cat.label+' · '+fmtSz(item.size)+'</div>'
      +'<div style="font-size:11px;margin-top:1px;color:'+col+'">⏱ 剩余 '+remain+' 天</div></div>'
      +'<div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">'
      +'<button onclick="restoreFromTrash('+i+')" style="padding:5px 11px;background:var(--gl);border:1px solid var(--ac);border-radius:7px;color:var(--ac2);font-family:inherit;font-size:12px;font-weight:600;white-space:nowrap">↩ 恢复</button>'
      +'<button onclick="hardDel('+i+')" style="padding:5px 11px;background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);border-radius:7px;color:var(--rd);font-family:inherit;font-size:12px;font-weight:600;white-space:nowrap">✕ 永久删除</button>'
      +'</div></div>';
  }).join('');
}

// ── STATS ─────────────────────────────────────────────────
function renderStats(){
  const panel=document.getElementById('stats-panel');if(!panel)return;
  const total=S.files.reduce((a,f)=>a+(f.size||0),0),cnt=S.files.length;
  const byCat={};CATS.forEach(c=>{byCat[c.id]={cnt:0,sz:0,cat:c};});
  S.files.forEach(f=>{const k=f.category||'other';if(!byCat[k])byCat[k]={cnt:0,sz:0,cat:catMap[k]||CATS[0]};byCat[k].cnt++;byCat[k].sz+=(f.size||0);});
  const byType={};TYPE_GROUPS.slice(1).forEach(g=>{byType[g.id]={cnt:0,sz:0,label:g.label};});
  S.files.forEach(f=>{const e=xExt(f.name);for(const g of TYPE_GROUPS.slice(1)){if(g.exts.includes(e)){byType[g.id].cnt++;byType[g.id].sz+=(f.size||0);break;}}});
  const pct=s=>total?Math.round(s/total*100):0;
  const bar=(s,color)=>'<div class="stat-bar"><div class="stat-fill" style="width:'+pct(s)+'%;background:'+color+'"></div></div>';
  panel.innerHTML='<div class="stat-hero"><div class="stat-sz">'+fmtSz(total)+'</div><div class="stat-sub">'+cnt+' 个文件 · '+S.trash.length+' 个在回收站</div></div>'
    +'<div class="stat-sec"><div class="stat-sec-t">按分类</div>'
    +Object.values(byCat).filter(x=>x.cnt>0).sort((a,b)=>b.sz-a.sz).map(x=>'<div class="stat-row"><div class="stat-row-hd"><span class="stat-row-label">'+x.cat.icon+' '+x.cat.label+'</span><span class="stat-row-val">'+x.cnt+' 个 · '+fmtSz(x.sz)+'</span></div>'+bar(x.sz,x.cat.color)+'</div>').join('')+'</div>'
    +'<div class="stat-sec"><div class="stat-sec-t">按类型</div>'
    +Object.entries(byType).filter(([,v])=>v.cnt>0).sort((a,b)=>b[1].sz-a[1].sz).map(([,v])=>'<div class="stat-row"><div class="stat-row-hd"><span class="stat-row-label">'+v.label+'</span><span class="stat-row-val">'+v.cnt+' 个 · '+fmtSz(v.sz)+'</span></div>'+bar(v.sz,'var(--ac)')+'</div>').join('')+'</div>';
}

function doSearch(){
  const q=document.getElementById('g-q').value.trim().toLowerCase();
  const res=document.getElementById('g-res');
  if(!q){res.innerHTML='<div class="sr-empty">输入关键词开始搜索</div>';return;}
  const matches=[];
  S.files.forEach(f=>{if(f.name.toLowerCase().includes(q))matches.push({t:'file',f});});
  S.msgs.filter(m=>m.type==='text').forEach(m=>{if((m.content||'').toLowerCase().includes(q))matches.push({t:'msg',m});});
  if(!matches.length){res.innerHTML='<div class="sr-empty">没有找到匹配结果</div>';return;}
  const hi=s=>s.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>'<span class="hl">'+m+'</span>');
  res.innerHTML=matches.slice(0,20).map(item=>{
    if(item.t==='file'){
      const f=item.f,cat=catMap[f.category]||CATS[0];
      return '<div class="sri" onclick="closeSearch();dlFile(\''+rawUrl(f.path)+'\',\''+esc(f.name)+'\')">'
        +'<div class="sri-ic" style="background:'+cat.bg+'">'+fileIcon(f.name)+'</div>'
        +'<div class="sri-info"><div class="sri-name">'+hi(f.name)+'</div><div class="sri-meta">'+cat.icon+' '+cat.label+' · '+fmtSz(f.size)+'</div></div></div>';
    } else {
      const m=item.m,sn=hi((m.content||'').slice(0,70));
      return '<div class="sri" onclick="closeSearch();scrollToMsg(\''+m.id+'\')">'
        +'<div class="sri-ic" style="background:var(--bg3)">💬</div>'
        +'<div class="sri-info"><div class="sri-name">'+sn+'</div><div class="sri-meta">文字消息 · '+new Date(m.timestamp).toLocaleDateString('zh-CN')+'</div></div></div>';
    }
  }).join('');
}

  _memoType=t;
  document.getElementById('mbtn-todo').style.cssText='padding:5px 13px;border-radius:20px;border:1.5px solid '+(t==='todo'?'var(--ac)':'var(--b2)')+';background:'+(t==='todo'?'var(--gl)':'var(--bg3)')+';color:'+(t==='todo'?'var(--ac2)':'var(--t2)')+';font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .16s';
  document.getElementById('mbtn-note').style.cssText='padding:5px 13px;border-radius:20px;border:1.5px solid '+(t==='note'?'var(--ac)':'var(--b2)')+';background:'+(t==='note'?'var(--gl)':'var(--bg3)')+';color:'+(t==='note'?'var(--ac2)':'var(--t2)')+';font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .16s';
}
function setMemoFilter(f){
  _memoFilter=f;
  document.querySelectorAll('#memo-screen .ft-row .ftb').forEach(b=>b.classList.remove('on'));
  const map={'all':0,'todo':1,'note':2};
  const btns=document.querySelectorAll('#memo-screen .ft-row .ftb');
  if(btns[map[f]]) btns[map[f]].classList.add('on');
  renderMemos();
}
function memoKey(e){if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){e.preventDefault();addMemo();}}
async function addMemo(){
  const inp=document.getElementById('memo-inp');
  const txt=inp.value.trim();if(!txt)return;
  const memo={id:Date.now().toString(),type:_memoType,content:txt,done:false,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
  S.memos.unshift(memo);
  inp.value='';ar(inp);
  renderMemos();await saveMemos();
}
async function saveMemos(){
  const body={message:'Update memos [GitDrive]',content:toB64(JSON.stringify(S.memos,null,2))};
  if(S.memoSha) body.sha=S.memoSha;
  const r=await ghPut('gitdrive-memos.json',body);
  if(r.ok){const d=await r.json();S.memoSha=d.content.sha;}
}
async function loadMemos(){
  const r=await ghGet('gitdrive-memos.json');
  if(r.ok){const d=await r.json();S.memos=JSON.parse(fromB64(d.content));S.memoSha=d.sha;}
  else{S.memos=[];S.memoSha=null;}
}
async function toggleMemoDone(id){
  const m=S.memos.find(x=>x.id===id);if(!m)return;
  m.done=!m.done;m.updatedAt=new Date().toISOString();
  renderMemos();await saveMemos();
}
async function editMemo(id){
  const m=S.memos.find(x=>x.id===id);if(!m)return;
  showInput('编辑备忘','内容',m.content,async v=>{m.content=v;m.updatedAt=new Date().toISOString();renderMemos();await saveMemos();toast('已保存','ok');});
}
async function delMemo(id){
  S.memos=S.memos.filter(x=>x.id!==id);
  renderMemos();await saveMemos();toast('已删除');
}
function renderMemos(){
  const el=document.getElementById('memo-list');if(!el)return;
  let list=S.memos;
  if(_memoFilter!=='all') list=list.filter(m=>m.type===_memoFilter);
  if(!list.length){el.innerHTML='<div class="emp"><div class="emp-ic">📓</div><div class="emp-t">备忘录为空</div><div class="emp-s">用上方输入框添加待办事项或笔记</div></div>';return;}
  el.innerHTML=list.map(m=>{
    const t=new Date(m.createdAt).toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
    const content=m.type==='note'?marked.parse(m.content||''):'<span style="'+(m.done?'text-decoration:line-through;color:var(--t3)':'')+'">'+(m.content||'')+'</span>';
    return '<div style="background:var(--bg2);border:1px solid var(--b'+(m.done?'1':'2')+');border-radius:13px;padding:13px 14px;transition:opacity .2s;'+(m.done?'opacity:.6':'')+'">'
      +'<div style="display:flex;align-items:flex-start;gap:10px">'
      +(m.type==='todo'?'<button onclick="toggleMemoDone(''+m.id+'')" style="flex-shrink:0;width:20px;height:20px;border-radius:5px;border:2px solid '+(m.done?'var(--gr)':'var(--b3)')+';background:'+(m.done?'var(--gr)':'transparent')+';color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px">'+(m.done?'✓':'')+'</button>':'<span style="flex-shrink:0;font-size:15px;margin-top:1px">📝</span>')
      +'<div style="flex:1;min-width:0;font-size:13.5px;line-height:1.6">'+content+'</div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:8px;border-top:1px solid var(--b1)">'
      +'<span style="font-size:11px;color:var(--t3);flex:1">'+t+'</span>'
      +'<button onclick="editMemo(''+m.id+'')" style="background:none;border:none;color:var(--t2);font-size:13px;cursor:pointer;padding:3px 7px;border-radius:6px;transition:background .14s" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''">✎ 编辑</button>'
      +'<button onclick="delMemo(''+m.id+'')" style="background:none;border:none;color:var(--rd);font-size:13px;cursor:pointer;padding:3px 7px;border-radius:6px;transition:background .14s" onmouseover="this.style.background='rgba(248,81,73,.1)'" onmouseout="this.style.background=''">✕ 删除</button>'
      +'</div></div>';
  }).join('');
}

// ── SIDEBAR ───────────────────────────────────────────────
function openSb(){document.getElementById('sidebar').classList.add('open');document.getElementById('sb-ov').classList.add('on');}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-ov').classList.remove('on');}

// ── THEME ─────────────────────────────────────────────────
function toggleTheme(){
  S.darkMode=!S.darkMode;
  document.documentElement.setAttribute('data-theme',S.darkMode?'dark':'light');
  localStorage.setItem('gd-theme',S.darkMode?'dark':'light');
  document.getElementById('theme-btn').textContent=S.darkMode?'🌙':'☀️';
}

// ── HELPERS ───────────────────────────────────────────────
function dlFile(url,name){const a=document.createElement('a');a.href=url;a.download=name;a.target='_blank';a.click();}
function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function isImage(n){return /\.(jpg|jpeg|png|gif|webp|svg|avif|bmp|heic)$/i.test(n);}
function isVid(n){return /\.(mp4|mov|avi|mkv|webm|m4v)$/i.test(n);}
function isAud(n){return /\.(mp3|wav|flac|aac|ogg|m4a)$/i.test(n);}
function xExt(n){return(n.split('.').pop()||'').toLowerCase();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmtSz(b){if(!b||b<0)return '';if(b<1024)return b+'B';if(b<1048576)return (b/1024).toFixed(1)+'KB';return (b/1048576).toFixed(1)+'MB';}
function fileIconColor(n){
  const e=xExt(n);
  if(/^(jpg|jpeg|png|gif|webp|svg|avif|bmp|heic)$/.test(e))return {l:'IMG',c:'#1a7f37',bg:'#d1fae5'};
  if(/^(mp4|mov|avi|mkv|webm|m4v)$/.test(e))return {l:'VID',c:'#cf222e',bg:'#fee2e2'};
  if(/^(mp3|wav|flac|aac|ogg|m4a)$/.test(e))return {l:'AUD',c:'#8250df',bg:'#ede9fe'};
  if(/^pdf$/.test(e))return {l:'PDF',c:'#cf222e',bg:'#fee2e2'};
  if(/^(doc|docx)$/.test(e))return {l:'DOC',c:'#0969da',bg:'#dbeafe'};
  if(/^(xls|xlsx|csv|ods)$/.test(e))return {l:'XLS',c:'#1a7f37',bg:'#d1fae5'};
  if(/^(ppt|pptx|key|odp)$/.test(e))return {l:'PPT',c:'#bc4c00',bg:'#ffedd5'};
  if(/^(txt|md|log|rtf)$/.test(e))return {l:'TXT',c:'#656d76',bg:'#f0f2f4'};
  if(/^(js|ts|jsx|tsx|py|java|c|cpp|html|css|json|go|rs|php|sh)$/.test(e))return {l:'</> ',c:'#0550ae',bg:'#cffafe'};
  if(/^(zip|rar|7z|tar|gz|bz2)$/.test(e))return {l:'ZIP',c:'#7d4e00',bg:'#fef3c7'};
  if(/^(apk|exe|ipa|dmg|pkg|deb)$/.test(e))return {l:'APP',c:'#6e40c9',bg:'#e0d7ff'};
  return {l:'FILE',c:'#656d76',bg:'#f0f2f4'};
}
function fileIcon(n){
  const e=xExt(n);
  if(/^(jpg|jpeg|png|gif|webp|svg|avif|bmp|heic)$/.test(e))return '🖼️';
  if(/^(mp4|mov|avi|mkv|webm|m4v)$/.test(e))return '🎬';
  if(/^(mp3|wav|flac|aac|ogg|m4a)$/.test(e))return '🎵';
  const fc=fileIconColor(n);
  return '<span style="font-size:11px;font-weight:900;color:'+fc.c+';background:'+fc.bg+';padding:2px 5px;border-radius:4px;font-family:\'JetBrains Mono\',monospace;line-height:1">'+fc.l+'</span>';
}
if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
