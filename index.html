<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GitDrive">
<title>GitDrive</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--bg4:#22272e;--bg5:#2d333b;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.10);--b3:rgba(255,255,255,.18);
  --t1:#e6edf3;--t2:#8b949e;--t3:#6e7681;
  --ac:#4493f8;--ac2:#79b8ff;
  --gl:rgba(68,147,248,.15);--gl2:rgba(68,147,248,.07);
  --ob:#1c4fbe;--ib:#1c2128;
  --gr:#3fb950;--rd:#f85149;--or:#d29922;--pu:#bc8cff;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --dur:.15s;--ease:cubic-bezier(.4,0,.2,1);
}
[data-theme=light]{
  --bg:#f6f8fa;--bg2:#fff;--bg3:#f0f2f4;--bg4:#e8ebee;--bg5:#d8dbdf;
  --b1:rgba(0,0,0,.06);--b2:rgba(0,0,0,.10);--b3:rgba(0,0,0,.18);
  --t1:#1f2328;--t2:#656d76;--t3:#9198a1;
  --ac:#0969da;--ac2:#218bff;
  --gl:rgba(9,105,218,.12);--gl2:rgba(9,105,218,.06);
  --ob:#0969da;--ib:#fff;
  --gr:#1a7f37;--rd:#cf222e;--or:#9a6700;--pu:#8250df;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
#app{display:flex;height:100dvh;overflow:hidden}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.lw{width:100%;max-width:380px}
.lw-logo{width:64px;height:64px;margin:0 auto 22px;background:linear-gradient(135deg,#4493f8,#bc8cff);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 0 0 8px rgba(68,147,248,.1),0 0 40px rgba(68,147,248,.2)}
.lw-h{font-size:24px;font-weight:700;text-align:center;margin-bottom:4px}
.lw-s{font-size:13px;color:var(--t2);text-align:center;margin-bottom:28px}
.lw-card{background:var(--bg2);border:1px solid var(--b2);border-radius:20px;padding:28px}
.lw-field{margin-bottom:14px}
.lw-field label{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.lw-field input{width:100%;padding:10px 13px;background:var(--bg3);border:1.5px solid var(--b2);border-radius:10px;color:var(--t1);font-size:14px;outline:none;transition:border-color var(--dur),box-shadow var(--dur)}
.lw-field input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--gl)}
.lw-btn{width:100%;padding:11px;margin-top:6px;background:var(--ac);border-radius:10px;color:#fff;font-size:14px;font-weight:600;transition:opacity var(--dur),transform var(--dur);cursor:pointer;border:none}
.lw-btn:hover{opacity:.88;transform:translateY(-1px)}
.lw-btn:active{transform:translateY(0)}
.lw-btn:disabled{opacity:.5;cursor:wait}
#lerr{color:var(--rd);font-size:12px;margin-top:10px;text-align:center;display:none;font-weight:500}
.lw-hint{margin-top:14px;font-size:11px;color:var(--t3);text-align:center;line-height:1.7}

/* SIDEBAR */
#sidebar{width:252px;min-width:252px;background:var(--bg2);border-right:1px solid var(--b1);display:flex;flex-direction:column;transition:transform .25s var(--ease);padding-top:var(--sat)}
.sb-hd{display:flex;align-items:center;gap:10px;padding:12px 13px 10px;border-bottom:1px solid var(--b1)}
.sb-logo{width:34px;height:34px;flex-shrink:0;background:linear-gradient(135deg,#4493f8,#bc8cff);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.sb-title{font-weight:700;font-size:15px;flex:1}
.sb-acts{display:flex;gap:2px}
.ib{width:30px;height:30px;background:transparent;color:var(--t2);border-radius:7px;border:none;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background var(--dur),color var(--dur);cursor:pointer}
.ib:hover{background:var(--bg3);color:var(--t1)}
.sb-search{padding:8px 11px;border-bottom:1px solid var(--b1)}
.sb-sq{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--b1);border-radius:8px;padding:7px 10px;cursor:pointer;transition:border-color var(--dur)}
.sb-sq:hover{border-color:var(--b2)}
.sb-sq-txt{font-size:12.5px;color:var(--t3);flex:1}
.sb-sq-kbd{font-size:10px;color:var(--t3);background:var(--bg4);padding:1px 5px;border-radius:4px}
.sb-nav{padding:8px 8px 0;display:flex;flex-direction:column;gap:1px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer;color:var(--t2);font-weight:500;font-size:13.5px;border:none;background:transparent;width:100%;text-align:left;transition:background var(--dur),color var(--dur)}
.ni:hover{background:var(--bg3);color:var(--t1)}
.ni:active{transform:scale(.98)}
.ni.on{background:var(--gl);color:var(--ac2);font-weight:600}
.ni .ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nb{margin-left:auto;background:var(--ac);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;min-width:18px;text-align:center}
.sb-sec{padding:14px 18px 4px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.sb-ft{margin-top:auto;padding:12px 16px max(12px,var(--sab));border-top:1px solid var(--b1);font-size:11px;color:var(--t3);display:flex;flex-direction:column;gap:3px}
.sb-author{font-size:12px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:5px}
.sb-author .dot{width:6px;height:6px;border-radius:50%;background:var(--gr);box-shadow:0 0 5px var(--gr);flex-shrink:0}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tb{display:flex;align-items:center;gap:6px;padding:9px 13px;padding-top:calc(9px + var(--sat));background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
.tb-info{flex:1;overflow:hidden;min-width:0}
.tb-title{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-sub{font-size:11px;color:var(--t2);margin-top:1px}
.menu-btn{display:none}

/* CHAT */
#chat-screen{display:flex;flex-direction:column;height:100%;overflow:hidden}
#msg-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 12px 6px;display:flex;flex-direction:column;gap:0;scroll-behavior:smooth}
.ds{display:flex;align-items:center;gap:10px;margin:12px 0 8px;color:var(--t3);font-size:11px;font-weight:500}
.ds::before,.ds::after{content:"";flex:1;height:1px;background:var(--b1)}

/* PINNED BAR */
#pinned-bar{flex-shrink:0;max-height:110px;overflow-y:auto;border-bottom:1.5px solid rgba(68,147,248,.2)}
.pin-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;border-bottom:1px solid var(--b1);transition:background var(--dur)}
.pin-item:last-child{border-bottom:none}
.pin-item:hover{background:var(--bg3)}
.pin-icon{color:var(--ac2);font-size:13px;flex-shrink:0}
.pin-preview{flex:1;font-size:12px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pin-date{font-size:10px;color:var(--t3);flex-shrink:0}
.pin-rm{color:var(--t3);font-size:13px;flex-shrink:0;padding:2px 4px;border-radius:4px;transition:color var(--dur);cursor:pointer}
.pin-rm:hover{color:var(--rd)}

/* RESTORE / SEL BAR */
.chat-bar{flex-shrink:0;display:none;align-items:center;gap:8px;padding:7px 13px;font-size:12.5px;font-weight:600}
.chat-bar.on{display:flex}
#restore-bar{background:rgba(68,147,248,.09);border-bottom:1px solid rgba(68,147,248,.2);color:var(--ac2)}
#sel-bar{background:var(--gl2);border-bottom:1px solid var(--b1);color:var(--t1)}

/* MESSAGES */
.mg{display:flex;flex-direction:column;gap:2px;margin-bottom:10px}
.mr{display:flex;align-items:flex-end;gap:6px}
.mr.out{flex-direction:row-reverse}
.bw{display:flex;flex-direction:column;max-width:min(72%,480px);position:relative}
.mr.out .bw{align-items:flex-end}
.bl{padding:9px 13px;border-radius:16px;word-break:break-word;line-height:1.56;font-size:14px;animation:bIn .18s var(--ease)}
@keyframes bIn{from{opacity:0;transform:scale(.94) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.bl.in{background:var(--ib);border:1px solid var(--b2);border-bottom-left-radius:4px}
.bl.out{background:var(--ob);color:#fff;border-bottom-right-radius:4px;box-shadow:0 2px 8px rgba(28,79,190,.3)}
.bl.out .mt{color:rgba(255,255,255,.5)}
.bl p{margin-bottom:5px}.bl p:last-child{margin-bottom:0}
.bl code{background:rgba(0,0,0,.22);padding:1px 5px;border-radius:4px;font-size:12px}
.bl pre{background:rgba(0,0,0,.3);padding:10px 12px;border-radius:8px;overflow-x:auto;margin:6px 0}
.bl pre code{background:none;padding:0}
.bl h1,.bl h2,.bl h3{margin:7px 0 3px;font-weight:700}
.bl ul,.bl ol{padding-left:18px;margin:4px 0}
.bl.in code{background:rgba(0,0,0,.07)}
.bl.in pre{background:rgba(0,0,0,.05)}
.mt{font-size:10px;color:var(--t3);margin-top:3px;text-align:right}

/* FILE BUBBLE */
.bf{display:flex;flex-direction:column;gap:5px;padding:4px}
.fc-b{background:var(--bg3);border:1px solid var(--b2);border-radius:11px;padding:10px 12px;display:flex;align-items:center;gap:10px;max-width:300px;cursor:pointer;transition:background var(--dur)}
.fc-b:hover{background:var(--bg4)}
.bl.out .fc-b{background:rgba(0,0,0,.2);border-color:rgba(255,255,255,.12)}
.bl.out .fc-b:hover{background:rgba(0,0,0,.3)}
.fc-ic{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.fc-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc-meta{font-size:11px;color:var(--t2);margin-top:2px}
.bl.out .fc-meta{color:rgba(255,255,255,.6)}

/* IMAGE GRID */
.ig{display:grid;gap:3px;border-radius:12px;overflow:hidden;max-width:260px}
.ig.g1{grid-template-columns:1fr}
.ig.g2{grid-template-columns:1fr 1fr}
.ig.g3{grid-template-columns:2fr 1fr}
.ig.g3 .ic:first-child{grid-row:1/3}
.ig.gm{grid-template-columns:1fr 1fr}
.ic{position:relative;aspect-ratio:1;overflow:hidden;background:var(--bg3);cursor:pointer}
.ic img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.ic:hover img{transform:scale(1.04)}
.ic-more{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}

/* MSG ACTIONS */
.ma{display:none;flex-direction:row;gap:1px;margin-top:4px}
.bw:hover .ma{display:flex}
.bw.open .ma{display:flex}
.ma-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 10px;background:var(--bg2);border:1px solid var(--b2);color:var(--t1);border-radius:10px;font-size:10px;font-weight:600;transition:background var(--dur);cursor:pointer}
.ma-btn:first-child{border-radius:10px 4px 4px 10px}
.ma-btn:last-child{border-radius:4px 10px 10px 4px}
.ma-btn:only-child{border-radius:10px}
.ma-btn:hover{background:var(--bg3)}
.ma-btn .mi{font-size:15px;font-weight:900}
.ma-btn.pin-on{color:var(--ac2)}
.ma-btn.del{color:var(--rd)}
.ma-btn.del:hover{background:rgba(248,81,73,.1)}
.ck{display:none;width:20px;height:20px;border-radius:50%;border:2px solid var(--b2);background:var(--bg3);flex-shrink:0;align-self:center;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all var(--dur);margin-right:2px;cursor:pointer}
.sel-mode .ck{display:flex}
.ck.on{background:var(--ac);border-color:var(--ac)}

/* PENDING */
.pend{display:none;gap:6px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.pend::-webkit-scrollbar{display:none}
.pf{position:relative;flex-shrink:0;width:62px;height:62px;border-radius:10px;overflow:hidden;background:var(--bg3);border:1px solid var(--b2)}
.pf img{width:100%;height:100%;object-fit:cover;display:block}
.pf-icon{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;font-size:22px}
.pf-ext{font-size:8px;font-weight:800;color:var(--t3);text-transform:uppercase}
.pf-rm{position:absolute;top:2px;right:2px;width:17px;height:17px;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}

/* UPLOAD PROGRESS */
#up-area{padding:0 12px;max-height:108px;overflow-y:auto;flex-shrink:0}
.up{background:var(--bg3);border:1px solid var(--b2);border-radius:10px;padding:10px 12px;margin-bottom:5px}
.up-name{font-size:12px;font-weight:600;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb{background:var(--bg5);border-radius:3px;height:3px;overflow:hidden}
.pbar{height:100%;background:linear-gradient(90deg,var(--ac),var(--pu));border-radius:3px;transition:width .25s;width:0}

/* INPUT */
.inp-wrap{background:var(--bg2);border-top:1px solid var(--b1);padding:9px 12px max(9px,var(--sab));flex-shrink:0}
.cat-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:7px;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
.cc{display:flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--b2);background:var(--bg3);white-space:nowrap;font-size:12px;font-weight:600;color:var(--t2);transition:all var(--dur);flex-shrink:0;cursor:pointer}
.cc:hover{border-color:var(--ac2);color:var(--ac2);background:var(--bg4)}
.cc.on{border-color:var(--ac);background:var(--gl);color:var(--ac2);box-shadow:0 0 0 2px var(--gl)}
.inp-row{display:flex;align-items:flex-end;gap:8px}
.inp-box{flex:1;background:var(--bg3);border:1.5px solid var(--b2);border-radius:20px;display:flex;align-items:flex-end;padding:7px 11px;gap:8px;transition:border-color var(--dur),box-shadow var(--dur)}
.inp-box:focus-within{border-color:var(--ac);box-shadow:0 0 0 3px var(--gl)}
#ti{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:14px;resize:none;max-height:120px;min-height:22px;line-height:1.5;padding:0}
#ti::placeholder{color:var(--t3)}
.att,.snd{width:34px;height:34px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:all var(--dur)}
.att{background:var(--bg4);color:var(--t2)}
.att:hover{background:var(--gl);color:var(--ac2)}
.snd{background:var(--ac);color:#fff}
.snd:hover{filter:brightness(1.1);transform:scale(1.05)}
.snd:active{transform:scale(.97)}
#fi{display:none}
.dov{display:none;position:fixed;inset:0;z-index:90;background:rgba(68,147,248,.08);border:3px dashed var(--ac);align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--ac2)}
.dov.on{display:flex}

/* FILES SCREEN */
#files-screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.ft{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:10px 13px calc(10px + var(--sat));padding-top:calc(10px + var(--sat));background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
.ft-title{font-size:16px;font-weight:700;flex:1;min-width:80px}
.ft-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.ftb{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;border:1.5px solid var(--b2);background:var(--bg3);color:var(--t2);transition:all var(--dur);white-space:nowrap;cursor:pointer}
.ftb:hover{border-color:var(--ac);color:var(--ac2)}
.ftb.on{border-color:var(--ac);background:var(--gl);color:var(--ac2)}
.ftb.danger{color:var(--rd)}
.vtog{display:flex;border:1px solid var(--b2);border-radius:7px;overflow:hidden}
.vb{padding:5px 8px;background:var(--bg3);border:none;color:var(--t2);font-size:14px;transition:all var(--dur);cursor:pointer}
.vb.on{background:var(--gl);color:var(--ac2)}
.fr{padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;gap:5px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.fr::-webkit-scrollbar{display:none}
.fc2{padding:4px 11px;border-radius:14px;font-size:12px;font-weight:600;border:1.5px solid var(--b2);background:var(--bg3);color:var(--t2);transition:all var(--dur);white-space:nowrap;flex-shrink:0;cursor:pointer}
.fc2:hover{border-color:var(--ac);color:var(--ac2)}
.fc2.on{border-color:var(--ac);background:var(--gl);color:var(--ac2)}
.fc2-sep{width:1px;height:14px;background:var(--b2);flex-shrink:0;margin:0 2px}
.fsb{padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
.fsb-box{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1.5px solid var(--b1);border-radius:8px;padding:6px 11px;transition:border-color var(--dur)}
.fsb-box:focus-within{border-color:var(--ac)}
.fsb-box input{background:none;border:none;outline:none;color:var(--t1);font-size:13px;flex:1}
.fsb-box input::placeholder{color:var(--t3)}
.fg-selbar{display:none;align-items:center;gap:7px;flex-shrink:0;padding:7px 12px;background:var(--gl2);border-bottom:1px solid var(--b1);font-size:13px;font-weight:600;color:var(--ac2)}
.fg-selbar.on{display:flex}

/* FILE GRID -- FIX #1 #2 */
#fg{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(min(148px,45vw),1fr));gap:8px;align-content:start}
#fg.lv{grid-template-columns:1fr;gap:5px;padding:8px}

/* GRID CARD */
.gc{background:var(--bg2);border:1px solid var(--b1);border-radius:14px;overflow:hidden;position:relative;display:flex;flex-direction:column;transition:border-color var(--dur),box-shadow var(--dur),transform var(--dur);animation:fu .2s var(--ease) both;min-width:0}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.gc:hover{border-color:var(--ac);box-shadow:0 4px 16px var(--gl);transform:translateY(-1px)}
.gc.sel{border-color:var(--ac);background:var(--gl2)}
.gc-ck{position:absolute;top:7px;left:7px;z-index:3;width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.6);background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;font-size:10px;color:#fff;transition:all var(--dur)}
.sel-mode .gc-ck{display:flex}
.gc.sel .gc-ck{background:var(--ac);border-color:var(--ac)}
.gc-fav{position:absolute;top:7px;right:7px;z-index:3;font-size:14px;color:#fbbf24;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.gc-thumb{width:100%;aspect-ratio:1/1;overflow:hidden;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.gc-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.gc:hover .gc-thumb img{transform:scale(1.04)}
.gc-icon{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-size:30px}
.gc-ext{font-size:9px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);background:var(--bg4);padding:2px 5px;border-radius:4px}
/* FIX #1: always show info + acts in grid */
.gc-info{padding:7px 8px 3px;flex-shrink:0}
.gc-name{font-size:11.5px;font-weight:600;line-height:1.38;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word}
.gc-meta{font-size:10px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gc-acts{display:flex;align-items:center;justify-content:space-around;padding:4px 2px 6px;border-top:1px solid var(--b1);margin-top:auto;flex-shrink:0}
.ga{background:none;border:none;color:var(--t2);font-size:13px;font-weight:700;padding:3px 4px;border-radius:6px;min-width:24px;height:26px;display:flex;align-items:center;justify-content:center;transition:background var(--dur),color var(--dur);cursor:pointer}
.ga:hover{background:var(--bg3);color:var(--t1)}
.ga:active{background:var(--bg4)}
.ga.del{color:var(--rd)}.ga.del:hover{background:rgba(248,81,73,.1)}
.ga.fav-on{color:#fbbf24}

/* LIST ITEM -- FIX #2 */
.li{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:11px;min-height:60px;background:var(--bg2);border:1px solid var(--b1);width:100%;overflow:hidden;min-width:0;box-sizing:border-box}
.li:hover{border-color:var(--b2)}
.li.sel{border-color:var(--ac);background:var(--gl2)}
.li-ck{width:20px;height:20px;border-radius:50%;border:2px solid var(--b2);background:var(--bg3);display:none;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0;transition:all var(--dur);cursor:pointer}
.sel-mode .li-ck{display:flex}
.li-ck.on{background:var(--ac);border-color:var(--ac)}
.li-thumb{width:42px;height:42px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.li-thumb img{width:42px;height:42px;object-fit:cover}
.li-icon{font-size:20px;display:flex;flex-direction:column;align-items:center;gap:1px}
.li-icon .gc-ext{font-size:7px;padding:1px 3px}
.li-info{flex:1;overflow:hidden;min-width:0}
.li-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;max-width:100%}
.li-meta{font-size:11px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-acts-d{display:flex;gap:3px;align-items:center;flex-shrink:0}
.li-acts-m{display:flex;gap:2px;align-items:center;flex-shrink:0}
.la{width:30px;height:30px;background:transparent;border:none;color:var(--t2);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;transition:background var(--dur),color var(--dur)}
.la:hover{background:var(--bg3);color:var(--t1)}
.la.del{color:var(--rd)}.la.del:hover{background:rgba(248,81,73,.1)}
.la.fav-on{color:#fbbf24;font-size:16px}

/* STATS/TRASH/MEMO */
#trash-screen,#stats-screen,#memo-screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.screen-body{flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:9px}
.stat-hero{background:linear-gradient(135deg,#1b3d8a,#4e1a8a);border-radius:16px;padding:20px 22px;color:#fff}
.stat-sz{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.stat-sub{font-size:13px;opacity:.75}
.stat-sec{background:var(--bg2);border:1px solid var(--b2);border-radius:14px;padding:15px 16px}
.stat-sec-t{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.stat-row{margin-bottom:11px}
.stat-row-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.stat-row-label{font-size:13px;font-weight:600}
.stat-row-val{font-size:11px;color:var(--t2)}
.stat-bar{height:5px;border-radius:3px;background:var(--bg4);overflow:hidden}
.stat-fill{height:100%;border-radius:3px;transition:width .5s var(--ease)}

/* MEMO */
.memo-inp-wrap{padding:10px 12px;background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
.memo-type-row{display:flex;gap:6px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
.memo-tbtn{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--b2);background:var(--bg3);color:var(--t2);transition:all var(--dur);cursor:pointer}
.memo-tbtn.on{border-color:var(--ac);background:var(--gl);color:var(--ac2)}
.memo-row{display:flex;align-items:flex-end;gap:8px}
#memo-inp{flex:1;background:var(--bg3);border:1.5px solid var(--b2);border-radius:12px;padding:9px 12px;color:var(--t1);font-size:14px;resize:none;min-height:42px;max-height:130px;outline:none;line-height:1.5;transition:border-color var(--dur),box-shadow var(--dur)}
#memo-inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--gl)}
#memo-inp::placeholder{color:var(--t3)}
.memo-snd{width:34px;height:34px;border-radius:50%;background:var(--ac);border:none;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:filter var(--dur)}
.memo-snd:hover{filter:brightness(1.1)}
.memo-frow{display:flex;gap:5px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
.memo-fbt{padding:4px 11px;border-radius:14px;font-size:12px;font-weight:600;border:1.5px solid var(--b2);background:var(--bg3);color:var(--t2);transition:all var(--dur);cursor:pointer;white-space:nowrap}
.memo-fbt:hover{border-color:var(--ac);color:var(--ac2)}
.memo-fbt.on{border-color:var(--ac);background:var(--gl);color:var(--ac2)}
.memo-card{background:var(--bg2);border:1px solid var(--b2);border-radius:13px;padding:12px 13px}
.memo-body{font-size:13.5px;line-height:1.65}
.memo-body p{margin-bottom:4px}.memo-body p:last-child{margin-bottom:0}
.memo-body code{background:rgba(0,0,0,.12);padding:1px 5px;border-radius:4px;font-size:12px}
.memo-body pre{background:var(--bg3);padding:9px 12px;border-radius:8px;overflow-x:auto;margin:5px 0}
.memo-body ul,.memo-body ol{padding-left:18px;margin:4px 0}
.memo-ft{display:flex;align-items:center;gap:7px;margin-top:10px;padding-top:8px;border-top:1px solid var(--b1)}
.memo-date{font-size:11px;color:var(--t3);flex:1}
.memo-act{background:none;border:none;color:var(--t2);font-size:12px;cursor:pointer;padding:3px 8px;border-radius:6px;transition:background var(--dur),color var(--dur)}
.memo-act:hover{background:var(--bg3);color:var(--t1)}
.memo-act.del:hover{background:rgba(248,81,73,.1);color:var(--rd)}

/* SEARCH OVERLAY */
#search-ov{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;padding:50px 16px 16px}
#search-ov.on{display:flex}
.sm{background:var(--bg2);border:1px solid var(--b2);border-radius:18px;width:100%;max-width:520px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.sm-inp{display:flex;align-items:center;gap:9px;padding:14px 15px;border-bottom:1px solid var(--b1)}
.sm-inp input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:15px;font-weight:500}
.sm-inp input::placeholder{color:var(--t3)}
.sr{max-height:360px;overflow-y:auto}
.sr-empty{padding:28px;text-align:center;color:var(--t3);font-size:13px}
.sri{display:flex;align-items:center;gap:11px;padding:10px 15px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background var(--dur)}
.sri:hover{background:var(--bg3)}
.sri:last-child{border-bottom:none}
.sri-ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sri-info{flex:1;overflow:hidden}
.sri-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sri-meta{font-size:11px;color:var(--t2);margin-top:1px}
.hl{color:var(--ac2)}

/* MEDIA PREVIEW */
#mp{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.94);backdrop-filter:blur(14px);display:none;flex-direction:column;align-items:center;justify-content:center}
#mp.on{display:flex}
.mp-top{position:absolute;top:0;left:0;right:0;padding:14px 18px calc(14px + var(--sat));padding-top:calc(14px + var(--sat));display:flex;align-items:center;gap:10px;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent)}
.mp-name{flex:1;font-size:13px;font-weight:600;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-btn{width:34px;height:34px;border:none;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background var(--dur);cursor:pointer}
.mp-btn:hover{background:rgba(255,255,255,.22)}
#mp-content{max-width:92vw;max-height:78vh;display:flex;align-items:center;justify-content:center}
#mp-content img{max-width:90vw;max-height:78vh;border-radius:8px;object-fit:contain}
#mp-content video{max-width:90vw;max-height:70vh;border-radius:8px;background:#000}
#mp-content audio{min-width:260px}
.mp-arr{position:absolute;width:42px;height:42px;border:none;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:20px;top:50%;transform:translateY(-50%);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background var(--dur)}
.mp-arr:hover{background:rgba(255,255,255,.22)}
#mp-pr{left:14px}#mp-nx{right:14px}

/* MODALS */
.mov{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px}
.md{background:var(--bg2);border:1px solid var(--b2);border-radius:18px;padding:22px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.md-t{font-size:16px;font-weight:700;margin-bottom:13px}
.md-p{color:var(--t2);font-size:13px;margin-bottom:15px;line-height:1.65;white-space:pre-wrap}
.md-inp{width:100%;padding:10px 12px;background:var(--bg3);border:1.5px solid var(--b2);border-radius:10px;color:var(--t1);font-size:14px;outline:none;margin-bottom:14px;resize:vertical;min-height:44px;transition:border-color var(--dur),box-shadow var(--dur)}
.md-inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--gl)}
.md-btns{display:flex;gap:7px;justify-content:flex-end;flex-wrap:wrap}
.btn-g{padding:8px 16px;border-radius:8px;background:var(--bg3);border:1px solid var(--b2);color:var(--t1);font-family:inherit;font-size:13px;font-weight:600;transition:all var(--dur);cursor:pointer}
.btn-g:hover{background:var(--bg4)}
.btn-d{padding:8px 16px;border-radius:8px;background:var(--rd);border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:opacity var(--dur)}
.btn-d:hover{opacity:.85}
.btn-a{padding:8px 16px;border-radius:8px;background:var(--ac);border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:filter var(--dur)}
.btn-a:hover{filter:brightness(1.08)}
.btn-or{padding:8px 16px;border-radius:8px;background:var(--or);border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.cmg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.cm-it{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 7px;border-radius:10px;border:1.5px solid var(--b2);background:var(--bg3);font-size:12px;font-weight:600;color:var(--t2);transition:all var(--dur);cursor:pointer}
.cm-it:hover,.cm-it.on{border-color:var(--ac);background:var(--gl);color:var(--ac2)}
.cm-it span{font-size:22px}

/* BOTTOM SHEET */
.bs-ov{position:fixed;inset:0;z-index:260;background:rgba(0,0,0,.5);display:flex;align-items:flex-end}
.bs{width:100%;background:var(--bg2);border-radius:18px 18px 0 0;padding:12px 14px max(16px,var(--sab))}
.bs-handle{width:32px;height:3px;background:var(--b2);border-radius:2px;margin:0 auto 12px}
.bs-nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px 12px}
.bs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
.bs-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 7px;background:var(--bg3);border-radius:10px;border:none;color:var(--t2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:background var(--dur)}
.bs-btn:hover{background:var(--bg4)}
.bs-btn span{font-size:20px}
.bs-del{width:100%;padding:12px;background:rgba(248,81,73,.1);border:1.5px solid rgba(248,81,73,.3);border-radius:10px;color:var(--rd);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}

/* CTX MENU */
.cm-menu{position:fixed;z-index:260;background:var(--bg2);border:1px solid var(--b2);border-radius:13px;padding:5px;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:170px}
.cmi{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:background var(--dur),color var(--dur)}
.cmi:hover{background:var(--bg3);color:var(--t1)}
.cmi.d{color:var(--rd)}.cmi.d:hover{background:rgba(248,81,73,.1)}
.cm-sep{height:1px;background:var(--b1);margin:4px 0}

/* TOASTS */
#toasts{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:5px;align-items:center;pointer-events:none}
.ts{background:var(--bg2);border:1px solid var(--b2);color:var(--t1);padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap}
.ts.ok{border-color:var(--gr);color:var(--gr)}
.ts.err{border-color:var(--rd);color:var(--rd)}
.ts.warn{border-color:var(--or);color:var(--or)}

/* EMPTY */
.emp{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:36px;text-align:center;color:var(--t2)}
.emp-ic{font-size:48px;opacity:.28}
.emp-t{font-size:17px;font-weight:700;color:var(--t1)}
.emp-s{font-size:13px;max-width:240px;line-height:1.7}

/* RESPONSIVE */
@media(max-width:640px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:60;transform:translateX(-100%);box-shadow:8px 0 32px rgba(0,0,0,.5)}
  #sidebar.open{transform:translateX(0)}
  .menu-btn{display:flex !important}
  #sb-ov{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.45);display:none}
  #sb-ov.on{display:block}
  .bw{max-width:88%}
  .mp-arr{display:none}
  .li-acts-d{display:none}
  /* FIX #1: mobile grid */
  #fg:not(.lv){grid-template-columns:repeat(2,1fr) !important;padding:8px;gap:7px}
  .gc-name{font-size:11px}
  .gc-meta{font-size:9.5px}
  .ga{min-width:22px;height:24px;font-size:12px;padding:2px 3px}
  /* FIX #2: mobile list no overflow */
  #fg.lv{padding:8px}
  .li{padding:9px 10px;gap:8px;max-width:100%}
  .li-info{min-width:0;flex:1;overflow:hidden}
  .li-name{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
}
@media(min-width:641px){
  .li-acts-m{display:none}
  .li-acts-d{display:flex}
}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<body>
<div id="sb-ov"></div>
<div class="dov" id="dov">&#128193; 拖入文件上传</div>
<div id="ctx-c"></div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="lw">
    <div class="lw-logo">&#9729;&#65039;</div>
    <div class="lw-h">GitDrive</div>
    <div class="lw-s">以对话方式使用 GitHub 仓库作为私人云盘</div>
    <div class="lw-card">
      <div class="lw-field"><label>GitHub 用户名</label><input type="text" id="lu" placeholder="octocat" autocomplete="username" spellcheck="false"></div>
      <div class="lw-field"><label>仓库名称</label><input type="text" id="lr" placeholder="my-drive" spellcheck="false"></div>
      <div class="lw-field"><label>Personal Access Token</label><input type="password" id="lt" placeholder="ghp_xxxxxxxx" autocomplete="current-password"></div>
      <button class="lw-btn" id="lbtn">连接仓库</button>
      <div id="lerr"></div>
    </div>
    <div class="lw-hint">凭据仅存于本设备浏览器。Fine-grained token 需开启目标仓库 Contents 读写权限。</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="sb-hd">
      <div class="sb-logo">&#9729;&#65039;</div>
      <div class="sb-title">GitDrive</div>
      <div class="sb-acts">
        <button class="ib" id="btn-search-sb" title="搜索 &#8984;K">&#128269;</button>
        <button class="ib" id="btn-theme" title="切换主题">&#127769;</button>
        <button class="ib" id="btn-logout" title="退出">&#128682;</button>
      </div>
    </div>
    <div class="sb-search">
      <div class="sb-sq" id="sb-search-box">
        <span style="font-size:12px;color:var(--t3)">&#128269;</span>
        <span class="sb-sq-txt">搜索文件&#8230;</span>
        <span class="sb-sq-kbd">&#8984;K</span>
      </div>
    </div>
    <nav class="sb-nav">
      <button class="ni on" id="n-chat"><span class="ico">&#128172;</span>对话云盘</button>
      <button class="ni" id="n-files"><span class="ico">&#128193;</span>所有文件 <span class="nb" id="fcnt">0</span></button>
      <button class="ni" id="n-fav"><span class="ico">&#9733;</span>收藏 <span class="nb" id="fav-cnt"></span></button>
      <button class="ni" id="n-memo"><span class="ico">&#128211;</span>备忘录</button>
      <button class="ni" id="n-trash"><span class="ico">&#128465;</span>回收站 <span class="nb" id="trash-cnt"></span></button>
      <button class="ni" id="n-stats"><span class="ico">&#128202;</span>统计</button>
    </nav>
    <!-- ===== CATEGORIES NAV: 由 CATS 数组自动生成，修改 CATS 即可 ===== -->
    <div class="sb-sec">文件分类</div>
    <nav class="sb-nav" id="cat-nav"></nav>
    <div class="sb-ft">
      <div class="sb-author"><span class="dot"></span>Wangcy</div>
      <span id="sb-repo" style="font-size:10px">-</span>
      <span id="sb-stat">就绪</span>
    </div>
  </aside>

  <main id="main">
    <!-- CHAT -->
    <div id="chat-screen">
      <div class="tb">
        <button class="ib menu-btn" id="btn-menu">&#9776;</button>
        <button class="ib" id="btn-help" style="font-weight:800;font-size:13px">?</button>
        <div class="tb-info">
          <div class="tb-title" id="hd-t">GitDrive</div>
          <div class="tb-sub" id="hd-s">连接中&#8230;</div>
        </div>
        <button class="ib" id="btn-chat-search">&#128269;</button>
        <button class="ib" id="btn-sel-toggle" title="多选">&#9745;</button>
        <button class="ib" id="btn-clear" title="清空历史视图">&#128465;</button>
        <button class="ib" id="btn-refresh" title="刷新">&#128260;</button>
      </div>
      <!-- FIX #3: Restore bar always shown when clearTime set -->
      <div class="chat-bar" id="restore-bar">
        <span>&#128194; 历史记录已隐藏</span>
        <span style="flex:1"></span>
        <button class="btn-a" id="btn-restore" style="font-size:12px;padding:5px 12px">恢复显示</button>
      </div>
      <!-- Select bar -->
      <div class="chat-bar" id="sel-bar">
        <span id="sel-cnt" style="flex:1">已选 0 条</span>
        <button class="btn-g" id="btn-dl-sel" style="font-size:12px;padding:5px 11px;color:var(--ac2)">&#8595; 下载</button>

// ============================================================
//  LOGIN
// ============================================================
function doLogin() {
  var u=document.getElementById('lu').value.trim();
  var r=document.getElementById('lr').value.trim();
  var t=document.getElementById('lt').value.trim();
  var err=document.getElementById('lerr');
  if(!u||!r||!t){ err.textContent='\u8BF7\u586B\u5199\u6240\u6709\u5B57\u6BB5'; err.style.display='block'; return; }
  err.style.display='none';
  var btn=document.getElementById('lbtn');
  btn.textContent='\u8FDE\u63A5\u4E2D\u2026'; btn.disabled=true;
  fetch('https://api.github.com/repos/'+u+'/'+r, {
    headers:{'Authorization':'Bearer '+t,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}
  }).then(function(res){
    if(res.status===401) throw new Error('Token \u65E0\u6548\u6216\u5DF2\u8FC7\u671F');
    if(res.status===403) throw new Error('\u6743\u9650\u4E0D\u8DB3\uFF0C\u8BF7\u5F00\u542F Contents \u8BFB\u5199\u6743\u9650');
    if(res.status===404) throw new Error('\u4ED3\u5E93\u4E0D\u5B58\u5728\uFF0C\u8BF7\u68C0\u67E5\u7528\u6237\u540D\u548C\u4ED3\u5E93\u540D');
    if(!res.ok) throw new Error('\u8FDE\u63A5\u5931\u8D25\uFF08HTTP '+res.status+'\uFF09');
    S.user=u; S.repo=r; S.token=t;
    localStorage.setItem('gd-creds',JSON.stringify({user:u,repo:r,token:t}));
    launchApp();
  }).catch(function(e){
    err.textContent=e.message; err.style.display='block';
    btn.textContent='\u8FDE\u63A5\u4ED3\u5E93'; btn.disabled=false;
  }).then(function(){
    btn.textContent='\u8FDE\u63A5\u4ED3\u5E93'; btn.disabled=false;
  });
}

function doLogout(){ if(!confirm('\u786E\u5B9A\u9000\u51FA\uFF1F')) return; localStorage.removeItem('gd-creds'); location.reload(); }

function launchApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('sb-repo').textContent=S.user+'/'+S.repo;
  document.getElementById('hd-t').textContent=S.repo;
  S.clearTime=localStorage.getItem('gd-ct-'+S.user+'/'+S.repo)||null;
  try{ S.pinned=JSON.parse(localStorage.getItem('gd-pins-'+S.user+'/'+S.repo)||'[]'); }catch(e){ S.pinned=[]; }
  buildUI();
  loadAll();
}

// ============================================================
//  GITHUB API
// ============================================================
function apiUrl(p){ return 'https://api.github.com/repos/'+S.user+'/'+S.repo+'/contents/'+p; }
function apiHd(){ return {'Authorization':'Bearer '+S.token,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'}; }
function ghGet(p){ return fetch(apiUrl(p),{headers:apiHd()}); }
function ghPut(p,b){ return fetch(apiUrl(p),{method:'PUT',headers:apiHd(),body:JSON.stringify(b)}); }
function ghDel(p,sha){ return fetch(apiUrl(p),{method:'DELETE',headers:apiHd(),body:JSON.stringify({message:'Delete [GitDrive]',sha:sha})}); }
function toB64(s){ var bytes=new TextEncoder().encode(s),bin=''; bytes.forEach(function(b){ bin+=String.fromCharCode(b); }); return btoa(bin); }
function fromB64(b){ var raw=atob(b.replace(/\n/g,'')),bytes=Uint8Array.from(raw,function(c){ return c.charCodeAt(0); }); return new TextDecoder('utf-8').decode(bytes); }
function rawUrl(path){ return 'https://raw.githubusercontent.com/'+S.user+'/'+S.repo+'/main/'+path.split('/').map(function(p){ try{ return encodeURIComponent(decodeURIComponent(p)); }catch(e){ return encodeURIComponent(p); } }).join('/'); }
function ghPath(path){ return path.split('/').map(function(p){ try{ return encodeURIComponent(decodeURIComponent(p)); }catch(e){ return encodeURIComponent(p); } }).join('/'); }

//  BUILD UI
// ============================================================
function buildUI(){

  CATS.forEach(function(c){ cf+='<button class="fc2" data-fcat="'+c.id+'">'+c.icon+' '+c.label+'</button>'; });
  document.getElementById('fg-cats').innerHTML=cf;
  document.querySelectorAll('#fg-cats .fc2').forEach(function(b){ b.addEventListener('click',function(){ setFCat(this.dataset.fcat); }); });
  var tf=''; TYPE_GROUPS.forEach(function(g,i){ tf+='<button class="fc2'+(i===0?' on':'')+'" data-ftype="'+g.id+'">'+g.label+'</button>'; });
  document.getElementById('fg-types').innerHTML=tf;
  document.querySelectorAll('#fg-types .fc2').forEach(function(b){ b.addEventListener('click',function(){ setFType(this.dataset.ftype); }); });
}
function selCat(id){ S.cur=id; document.querySelectorAll('#cat-chips .cc').forEach(function(b){ b.classList.toggle('on',b.dataset.cid===id); }); }
function setFCat(id){ S.fCat=id; document.querySelectorAll('#fg-cats .fc2').forEach(function(b){ b.classList.toggle('on',b.dataset.fcat===id); }); renderFG(); }
function setFType(id){ S.fType=id; document.querySelectorAll('#fg-types .fc2').forEach(function(b){ b.classList.toggle('on',b.dataset.ftype===id); }); renderFG(); }

// ============================================================
//  DATA
// ============================================================
function loadAll(){
  document.getElementById('hd-s').textContent='\u52A0\u8F7D\u4E2D\u2026';
  Promise.all([loadMsgs(),loadMeta(),loadFiles(),loadMemos()]).then(function(){ updateStats(); }).catch(function(e){ document.getElementById('hd-s').textContent='\u52A0\u8F7D\u5931\u8D25'; toast('\u52A0\u8F7D\u5931\u8D25: '+e.message,'err'); });
}
function loadMsgs(){
  return ghGet('gitdrive-messages.json').then(function(r){
    if(r.ok) return r.json().then(function(d){ S.msgs=JSON.parse(fromB64(d.content)); S.msgSha=d.sha; });
    else { S.msgs=[]; S.msgSha=null; }
  }).then(function(){ renderMsgs(); renderPinnedBar(); });
}
function loadMeta(){
  return ghGet('gitdrive-meta.json').then(function(r){
    if(r.ok) return r.json().then(function(d){ S.meta=JSON.parse(fromB64(d.content)); S.metaSha=d.sha; });
    else { S.meta={favorites:[],archived:[]}; S.metaSha=null; }
  }).then(function(){ document.getElementById('fav-cnt').textContent=S.meta.favorites.length||''; });
}
function loadFiles(){
  var promises=CATS.map(function(cat){
    return ghGet(cat.id).then(function(r){
      if(r.ok) return r.json().then(function(items){ if(Array.isArray(items)) items.forEach(function(f){ if(f.type==='file') S.files.push(Object.assign({},f,{category:cat.id})); }); });
    });
  });
  S.files=[];
  return Promise.all(promises).then(function(){
    // sync stale refs
    var paths={}; S.files.forEach(function(f){ paths[f.path]=true; });
    var changed=false;
    S.msgs=S.msgs.map(function(m){
      if(m.type!=='file') return m;
      var before=m.files.length; m.files=m.files.filter(function(f){ return paths[f.path]; });
      if(m.files.length<before) changed=true; return m;
    }).filter(function(m){ return m.type==='text'||(m.files&&m.files.length>0); });
    if(changed) return saveMsgs();
  }).then(function(){
    return ghGet('gitdrive-trash.json').then(function(r){
      if(r.ok) return r.json().then(function(d){ S.trash=JSON.parse(fromB64(d.content)); S.trashSha=d.sha; });
      else { S.trash=[]; S.trashSha=null; }
    });
  }).then(function(){
    var now=Date.now(),before=S.trash.length;
    S.trash=S.trash.filter(function(t){ return (now-new Date(t.deletedAt).getTime())<30*24*3600*1000; });
    if(S.trash.length<before) return saveTrash();
  }).then(function(){ document.getElementById('trash-cnt').textContent=S.trash.length||''; });
}
function loadMemos(){
  return ghGet('gitdrive-memos.json').then(function(r){
    if(r.ok) return r.json().then(function(d){ S.memos=JSON.parse(fromB64(d.content)); S.memoSha=d.sha; });
    else { S.memos=[]; S.memoSha=null; }

}

}

// ============================================================
function sendAll(){
  var txt=document.getElementById('ti').value.trim();
  var files=S.pend.slice();
  if(!txt&&!files.length) return;
  if(files.length){
    var dupes=files.filter(function(f){ return S.files.some(function(e){ return e.name===f.name; }); });
    if(dupes.length){
      var cat=catMap[S.cur]||CATS[0];
      var info=dupes.map(function(f){ var ex=S.files.find(function(e){ return e.name===f.name; }); return f.name+' (\u5DF2\u5728\u300C'+(catMap[ex.category]&&catMap[ex.category].label||ex.category)+'\u300D\u4E2D)'; }).join('\n');
      var md=document.createElement('div'); md.innerHTML='<div class="md-t" style="color:var(--or)">\u26A0\uFE0F \u53D1\u73B0\u540C\u540D\u6587\u4EF6</div><div class="md-p">\u4EE5\u4E0B\u6587\u4EF6\u5728\u4ED3\u5E93\u4E2D\u5DF2\u5B58\u5728\uFF1A\n<strong style="color:var(--t1)">'+esc(info)+'</strong>\n\n\u7EE7\u7EED\u5C06\u4E0A\u4F20\u5230\u300C<strong style="color:var(--ac2)">'+esc(cat.label)+'</strong>\u300D\u5E76\u8986\u76D6\u540C\u540D\u6587\u4EF6\u3002</div><div class="md-btns"><button class="btn-g" id="dc-cancel">\u53D6\u6D88\u4E0A\u4F20</button><button class="btn-or" id="dc-ok">\u8986\u76D6\u4E0A\u4F20</button></div>';
      showMd(md.innerHTML);
      document.getElementById('dc-cancel').addEventListener('click', closeMd);
      document.getElementById('dc-ok').addEventListener('click', function(){
        closeMd();
        document.getElementById('ti').value=''; arTA(document.getElementById('ti'));
        S.pend=[]; renderPend();
        doUpload(files,txt);
      });
      return;
    }
  }
  document.getElementById('ti').value=''; arTA(document.getElementById('ti'));
  S.pend=[]; renderPend();
  if(files.length) doUpload(files,txt);
  else {
    var msg={id:Date.now().toString(),type:'text',content:txt,category:S.cur,timestamp:new Date().toISOString()};
    S.msgs.push(msg); renderMsgs(); scrollBot();
    saveMsgs();
  }
}

function doUpload(files,caption){
  var cat=catMap[S.cur]||CATS[0];
  var uploaded=[];
  var chain=Promise.resolve();
  files.forEach(function(f){
    chain=chain.then(function(){
      var path=cat.id+'/'+f.name;
      var pid='p'+Date.now()+Math.random().toString(36).slice(2);
      var pEl=document.createElement('div'); pEl.className='up';
      pEl.innerHTML='<div class="up-name">'+esc(f.name)+'</div><div class="pb"><div class="pbar" id="pb-'+pid+'"></div></div>';
      document.getElementById('up-area').appendChild(pEl);
      return new Promise(function(res,rej){
        var fr=new FileReader();
        fr.onprogress=function(ev){ if(ev.lengthComputable){ var pb=document.getElementById('pb-'+pid); if(pb) pb.style.width=Math.round(ev.loaded/ev.total*70)+'%'; } };
        fr.onload=function(){ res(fr.result.split(',')[1]); };
        fr.onerror=rej; fr.readAsDataURL(f);
      }).then(function(b64){
        var pb=document.getElementById('pb-'+pid); if(pb) pb.style.width='85%';
        return ghGet(ghPath(path)).then(function(chk){ if(chk.ok) return chk.json().then(function(cd){ return cd.sha; }); }).then(function(sha){
          var body={message:'Add '+f.name+' [GitDrive]',content:b64}; if(sha) body.sha=sha;
          return ghPut(ghPath(path),body);
        }).then(function(r){ if(!r.ok) throw new Error('\u4E0A\u4F20\u5931\u8D25: '+f.name); return r.json(); }).then(function(rd){
          if(pb) pb.style.width='100%';
          uploaded.push({name:f.name,path:path,size:f.size,mime:f.type,sha:rd.content.sha});
        });
      }).catch(function(e){ toast(e.message,'err'); }).then(function(){ setTimeout(function(){ pEl.remove(); },600); });
    });
  });
  chain.then(function(){
    if(!uploaded.length) return;
    var msg={id:Date.now().toString(),type:'file',files:uploaded,caption:caption||'',category:cat.id,timestamp:new Date().toISOString()};
    S.msgs.push(msg); renderMsgs(); scrollBot();
    return saveMsgs().then(function(){ return Promise.all([loadMeta(),loadFiles()]); }).then(function(){ updateStats(); toast(uploaded.length+' \u4E2A\u6587\u4EF6\u5DF2\u4E0A\u4F20','ok'); });
  });
}

// ============================================================

function renderMsgs(){
  var el=document.getElementById('msg-list');
  // FIX #3: vis = messages AFTER clearTime only; new msgs always appear

  // Update restore bar

    el.innerHTML=''; empty.style.display='flex';
    if(S.clearTime && S.msgs.length>0){
      empty.innerHTML='<div class="emp-ic">\u{1F5C2}\uFE0F</div><div class="emp-t">\u5386\u53F2\u8BB0\u5F55\u5DF2\u6E05\u7A7A</div><div class="emp-s">\u65B0\u53D1\u9001\u7684\u5185\u5BB9\u4F1A\u663E\u793A\u5728\u8FD9\u91CC<br>\u70B9\u51FB\u4E0A\u65B9\u300A\u6062\u590D\u663E\u793A\u300B\u67E5\u770B\u5386\u53F2</div>';
    } else {
      empty.innerHTML='<div class="emp-ic">\u{1F4AC}</div><div class="emp-t">\u5F00\u59CB\u4F7F\u7528 GitDrive</div><div class="emp-s">\u53D1\u9001\u6587\u5B57\u6216\u4E0A\u4F20\u6587\u4EF6\uFF0C\u4EE5\u804A\u5929\u65B9\u5F0F\u5B58\u5165 GitHub \u4ED3\u5E93</div>';
    }
    return;
  }
  empty.style.display='none';
  var days={};
  vis.forEach(function(m){ var d=new Date(m.timestamp).toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'}); if(!days[d]) days[d]=[]; days[d].push(m); });

  });
  if(S.selMode) el.classList.add('sel-mode'); else el.classList.remove('sel-mode');
  attachMsgTouch(el);
}

function buildMsgEl(m){
  var time=new Date(m.timestamp).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  var cat=catMap[m.category]||CATS[0];
  var isPinned=S.pinned.indexOf(m.id)>=0;

  var blDiv=document.createElement('div'); blDiv.className='bl out'; blDiv.dataset.id=m.id;
  if(m.type==='text'){
    blDiv.innerHTML=marked.parse(m.content||'');
    var mt=document.createElement('div'); mt.className='mt'; mt.textContent=time; blDiv.appendChild(mt);
  } else {
    var files=m.files||[]; var imgs=files.filter(function(f){ return isImage(f.name); }); var docs=files.filter(function(f){ return !isImage(f.name); });
    blDiv.style.padding='5px';
    var bf=document.createElement('div'); bf.className='bf';
    if(m.caption){ var cap=document.createElement('div'); cap.style.cssText='font-size:13px;margin-bottom:5px;opacity:.9'; cap.textContent=m.caption; bf.appendChild(cap); }
    if(imgs.length){
      var gc='g1'; if(imgs.length===2)gc='g2'; else if(imgs.length===3)gc='g3'; else if(imgs.length>=4)gc='gm';
      var ig=document.createElement('div'); ig.className='ig '+gc;
      imgs.slice(0,4).forEach(function(f,i){
        var ic=document.createElement('div'); ic.className='ic';
        var url=rawUrl(f.path);
        if(i===3&&imgs.length>4){ var ov=document.createElement('div'); ov.className='ic-more'; ov.textContent='+'+(imgs.length-3); ic.appendChild(ov); }
        var img=document.createElement('img'); img.src=url; img.loading='lazy'; img.alt=f.name;
        ic.appendChild(img);
        var allUrls=imgs.map(function(x){ return rawUrl(x.path); });
        ic.addEventListener('click',function(){ openMP(url,f.name,allUrls,i); }); ig.appendChild(ic);
      }); bf.appendChild(ig);
    }
    if(docs.length){
      docs.forEach(function(f){
        var url=rawUrl(f.path),isMedia=isVid(f.name)||isAud(f.name);
        var fc=document.createElement('div'); fc.className='fc-b';
        var ic=document.createElement('div'); ic.className='fc-ic'; ic.style.background=cat.bg; ic.innerHTML=fileIcon(f.name);
        var info=document.createElement('div'); info.style.cssText='flex:1;overflow:hidden;min-width:0';
        info.innerHTML='<div class="fc-name">'+esc(f.name)+'</div><div class="fc-meta">'+fmtSz(f.size)+' \u00B7 '+cat.icon+' '+cat.label+(isMedia?' \u00B7 \u70B9\u51FB\u64AD\u653E':'')+'</div>';
        fc.appendChild(ic); fc.appendChild(info);
        if(isMedia) fc.addEventListener('click',function(){ openMP(url,f.name,[],0); });
        else fc.addEventListener('click',function(){ dlFile(url,f.name); });
        bf.appendChild(fc);
      });
    }
    var mt=document.createElement('div'); mt.className='mt'; mt.style.cssText='padding:2px 6px 0'; mt.textContent=time; bf.appendChild(mt);
    blDiv.appendChild(bf);
  }

  var maDiv=document.createElement('div'); maDiv.className='ma';
  function mkBtn(icon,label,cls,fn){
    var b=document.createElement('button'); b.className='ma-btn'+(cls?' '+cls:'');
    b.innerHTML='<span class="mi">'+icon+'</span>'+label;
    b.addEventListener('click',fn); return b;
  }
  maDiv.appendChild(mkBtn(isPinned?'\u{1F4CC}':'\u{1F4CD}',isPinned?'\u53D6\u6D88\u7F6E\u9876':'\u7F6E\u9876',isPinned?'pin-on':'',function(){ togglePin(m.id); }));
  maDiv.appendChild(mkBtn('\u2193','\u4E0B\u8F7D','',function(){ dlMsg(m.id); }));
  if(m.type==='file') maDiv.appendChild(mkBtn('\u270E','\u91CD\u547D\u540D','',function(){ renMsg(m.id); }));
  else maDiv.appendChild(mkBtn('\u270E','\u7F16\u8F91','',function(){ editMsg(m.id); }));
  maDiv.appendChild(mkBtn('\u2715','\u5220\u9664','del',function(){ delMsg(m.id); }));

  var ck=document.createElement('div'); ck.className='ck'+(S.seled[m.id]?' on':''); ck.textContent='\u2713';
  ck.addEventListener('click',function(){ toggleSeled(m.id); });

  var bw=document.createElement('div'); bw.className='bw'; bw.appendChild(blDiv); bw.appendChild(maDiv);
  var mr=document.createElement('div'); mr.className='mr out'; mr.dataset.id=m.id; mr.appendChild(ck); mr.appendChild(bw);
  var mg=document.createElement('div'); mg.className='mg'; mg.appendChild(mr); return mg;
}

function attachMsgTouch(el){
  el.querySelectorAll('.bw').forEach(function(bw){
    var timer;
    bw.addEventListener('touchstart',function(e){ timer=setTimeout(function(){ el.querySelectorAll('.bw.open').forEach(function(b){ if(b!==bw) b.classList.remove('open'); }); bw.classList.toggle('open'); },380); },{passive:true});
    bw.addEventListener('touchend',function(){ clearTimeout(timer); },{passive:true});
    bw.addEventListener('touchmove',function(){ clearTimeout(timer); },{passive:true});
    bw.addEventListener('mouseleave',function(){ bw.classList.remove('open'); });
  });
}
function scrollBot(){ var el=document.getElementById('msg-list'); el.scrollTop=el.scrollHeight; }

// ============================================================
//  MSG ACTIONS
// ============================================================
function dlMsg(id){ var m=S.msgs.find(function(x){ return x.id===id; }); if(!m) return; if(m.type==='text'){ dlFile(URL.createObjectURL(new Blob([m.content],{type:'text/plain'})),'msg-'+id+'.txt'); } else if(m.files) m.files.forEach(function(f){ dlFile(rawUrl(f.path),f.name); }); }
function editMsg(id){ var m=S.msgs.find(function(x){ return x.id===id; }); if(!m) return; showInput('\u7F16\u8F91\u5185\u5BB9','\u5185\u5BB9',m.content,function(v){ m.content=v; renderMsgs(); saveMsgs(); toast('\u5DF2\u4FDD\u5B58','ok'); }); }
function renMsg(id){
  var m=S.msgs.find(function(x){ return x.id===id; }); if(!m||!m.files||!m.files.length) return;
  var f=m.files.find(function(f){ return !isImage(f.name); });
  if(!f){ toast('\u56FE\u7247\u4E0D\u652F\u6301\u91CD\u547D\u540D','warn'); return; }
  showInput('\u91CD\u547D\u540D','\u65B0\u6587\u4EF6\u540D',f.name,function(newName){
    if(!newName||newName===f.name) return;
    var folder=f.path.includes('/')?f.path.substring(0,f.path.lastIndexOf('/')):'';
    var newPath=folder?folder+'/'+newName:newName;
    ghGet(ghPath(f.path)).then(function(r){ if(!r.ok) return; return r.json().then(function(d){
      return ghPut(ghPath(newPath),{message:'Rename [GitDrive]',content:d.content.replace(/\n/g,'')}).then(function(){ return ghDel(ghPath(f.path),d.sha); });
    }); }).then(function(){ f.path=newPath; f.name=newName; return saveMsgs(); }).then(function(){ return loadFiles(); }).then(function(){ updateStats(); renderMsgs(); toast('\u5DF2\u91CD\u547D\u540D\u4E3A '+newName,'ok'); });
  });
}
function delMsg(id){
  var m=S.msgs.find(function(x){ return x.id===id; }); if(!m) return;
  showConfirm('\u5220\u9664\u6D88\u606F','\u786E\u8BA4\u5220\u9664\uFF1F\u6587\u4EF6\u4F1A\u79FB\u81F3\u56DE\u6536\u7AD9\u3002',function(){
    var chain=Promise.resolve();
    if(m.files) m.files.forEach(function(f){ chain=chain.then(function(){ return moveToTrash(f.path,f.name,f.size); }); });
    chain.then(function(){ S.msgs=S.msgs.filter(function(x){ return x.id!==id; }); renderMsgs(); return saveMsgs(); }).then(function(){ return loadFiles(); }).then(function(){ updateStats(); toast('\u5DF2\u5220\u9664','ok'); });
  });
}

// ============================================================
//  FIX #4: PIN SYSTEM
// ============================================================
function togglePin(id){
  var idx=S.pinned.indexOf(id); if(idx>=0) S.pinned.splice(idx,1); else S.pinned.push(id);
  localStorage.setItem('gd-pins-'+S.user+'/'+S.repo,JSON.stringify(S.pinned));
  renderMsgs(); renderPinnedBar();
  toast(S.pinned.indexOf(id)>=0?'\u5DF2\u7F6E\u9876':'\u5DF2\u53D6\u6D88\u7F6E\u9876');
}
function renderPinnedBar(){
  var bar=document.getElementById('pinned-bar'); if(!bar) return;
  bar.innerHTML='';
  if(!S.pinned.length) return;
  S.pinned.forEach(function(id){
    var m=S.msgs.find(function(x){ return x.id===id; }); if(!m) return;
    var preview='';
    if(m.type==='text') preview=(m.content||'').replace(/[#*>`_~\[\]]/g,'').slice(0,55).trim();
    else if(m.files&&m.files.length) preview='\u{1F4CE} '+m.files.map(function(f){ return f.name; }).join(', ').slice(0,45);
    var t=new Date(m.timestamp).toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
    var item=document.createElement('div'); item.className='pin-item';
    item.innerHTML='<span class="pin-icon">\u{1F4CC}</span><span class="pin-preview">'+esc(preview)+'</span><span class="pin-date">'+t+'</span><button class="pin-rm">\u00D7</button>';
    item.querySelector('.pin-rm').addEventListener('click',function(e){ e.stopPropagation(); togglePin(id); });
    item.addEventListener('click',function(){ jumpToPin(id); }); bar.appendChild(item);
  });
}
function jumpToPin(id){
  var m=S.msgs.find(function(x){ return x.id===id; }); if(!m) return;
  if(S.clearTime&&m.timestamp<=S.clearTime){ S.clearTime=null; localStorage.removeItem('gd-ct-'+S.user+'/'+S.repo); renderMsgs(); setTimeout(function(){ scrollToId(id); },300); }
  else scrollToId(id);
}
function scrollToId(id){ var el=document.querySelector('.mr[data-id="'+id+'"]'); if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.outline='2px solid var(--ac)'; setTimeout(function(){ el.style.outline=''; },2000); } }

function toggleSel(){ S.selMode=!S.selMode; S.seled={}; document.getElementById('sel-bar').classList.toggle('on',S.selMode); if(!S.selMode) renderMsgs(); }
function exitSel(){ S.selMode=false; S.seled={}; document.getElementById('sel-bar').classList.remove('on'); renderMsgs(); }
function toggleSeled(id){ if(S.seled[id]) delete S.seled[id]; else S.seled[id]=true; var ck=document.querySelector('.ck[data-id], .mr[data-id="'+id+'"] .ck'); if(ck) ck.classList.toggle('on',!!S.seled[id]); document.getElementById('sel-cnt').textContent='\u5DF2\u9009 '+Object.keys(S.seled).length+' \u6761'; }
function dlSelMsgs(){ var n=0; Object.keys(S.seled).forEach(function(id,i){ var m=S.msgs.find(function(x){ return x.id===id; }); if(!m) return; if(m.type==='text'){ setTimeout(function(){ dlFile(URL.createObjectURL(new Blob([m.content],{type:'text/plain'})),'msg-'+id+'.txt'); },n*200); n++; } else if(m.files) m.files.forEach(function(f){ setTimeout(function(){ dlFile(rawUrl(f.path),f.name); },n*200); n++; }); }); toast('\u5DF2\u89E6\u53D1 '+n+' \u4E2A\u4E0B\u8F7D','ok'); }
function delSelMsgs(){
  var ids=Object.keys(S.seled); if(!ids.length) return;
  showConfirm('\u6279\u91CF\u5220\u9664','\u786E\u8BA4\u5220\u9664\u9009\u4E2D\u7684 '+ids.length+' \u6761\uFF1F',function(){
    var chain=Promise.resolve();
    ids.forEach(function(id){ var m=S.msgs.find(function(x){ return x.id===id; }); if(m&&m.files) m.files.forEach(function(f){ chain=chain.then(function(){ return moveToTrash(f.path,f.name,f.size); }); }); });
    chain.then(function(){ S.msgs=S.msgs.filter(function(x){ return !S.seled[x.id]; }); exitSel(); return saveMsgs(); }).then(function(){ return loadFiles(); }).then(function(){ updateStats(); toast('\u6279\u91CF\u5220\u9664\u5B8C\u6210','ok'); });
  });
}
