function toggleFGSelect(){S.fgSelectMode=!S.fgSelectMode;S.fgSelected.clear();document.getElementById('fg-sel-bar').style.display=S.fgSelectMode?'flex':'none';document.getElementById('sel-all-btn').textContent=S.fgSelectMode?'取消':'多选';document.getElementById('fg').classList.toggle('select-mode',S.fgSelectMode);renderFG();}
function exitFGSelect(){S.fgSelectMode=false;S.fgSelected.clear();document.getElementById('fg-sel-bar').style.display='none';document.getElementById('sel-all-btn').textContent='多选';document.getElementById('fg').classList.remove('select-mode');renderFG();}
function toggleFGItem(path,e){
  e.stopPropagation();
  if(!S.fgSelectMode)return;
  if(S.fgSelected.has(path))S.fgSelected.delete(path);else S.fgSelected.add(path);
  document.getElementById('fg-sel-cnt').textContent=`已选 ${S.fgSelected.size} 个`;
  // FIX #4: only update the specific card, no full re-render
  const card=document.querySelector(`#fg [data-path="${CSS.escape(path)}"]`);
  if(card){
    const isSel=S.fgSelected.has(path);
    card.classList.toggle('selected',isSel);
    const chk=card.querySelector('.fgi-check');
    if(chk){chk.classList.toggle('selected',isSel);}
  }
}
async function deleteSelectedFiles(){
  if(!S.fgSelected.size)return;
  showConfirm('批量删除',`确认删除 ${S.fgSelected.size} 个文件？`,async()=>{
    for(const path of S.fgSelected){
      const r=await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`);
      if(r.ok){const d=await r.json();await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`,{method:'DELETE',body:JSON.stringify({message:`Delete ${path.split('/').pop()} [GitDrive]`,sha:d.sha})});}
      S.favorites.delete(path);S.archived.delete(path);
    }
    S.messages=S.messages.map(m=>{if(m.files)m.files=m.files.filter(f=>!S.fgSelected.has(f.path));return m;}).filter(m=>m.type==='text'||(m.files&&m.files.length));
    await Promise.all([saveMsgs(),saveMeta()]);
    exitFGSelect();await loadRepoFiles();updateStats();renderMsgs();
    toast('批量删除完成','ok');
  });
}
/* FIX #6: Batch download selected files */
async function downloadSelectedFiles(){
  if(!S.fgSelected.size)return;
  const paths=[...S.fgSelected];
  if(paths.length>10){toast('批量下载最多10个文件','warn');return;}
  toast(`开始下载 ${paths.length} 个文件…`);
  for(const path of paths){
    const f=S.allFiles.find(x=>x.path===path);
    if(!f)continue;
    await new Promise(res=>{
      setTimeout(()=>{dlFile(rawUrl(f.path),f.name);res();},200);
    });
  }
  toast(`已触发 ${paths.length} 个文件的下载`,'ok');
}

async function moveSelectedFiles(){
  if(!S.fgSelected.size)return;
  const paths=[...S.fgSelected];window._moveCat=CATEGORIES[0].id;
  const mc=document.getElementById('mc');
  mc.innerHTML=`<div class="m-ov"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-t">批量移动 ${paths.length} 个文件</div>
    <div class="cat-move-grid">${CATEGORIES.map(c=>`<div class="cat-move-item ${c.id===CATEGORIES[0].id?'selected':''}" onclick="pickMoveCat('${c.id}')" id="cmi-${c.id}"><span>${c.icon}</span>${c.label}</div>`).join('')}</div>
    <div class="modal-btns">
      <button class="btn-g" onclick="closeModal()">取消</button>
      <button class="btn-a" onclick="doBatchMove(${JSON.stringify(paths)})">移动</button>
    </div>
  </div></div>`;
}
async function doBatchMove(paths){
  const newCat=window._moveCat;closeModal();
  for(const oldPath of paths){
    const name=oldPath.split('/').pop();const newPath=`${newCat}/${name}`;
    if(oldPath===newPath)continue;
    try{
      const r=await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(oldPath).replace(/%2F/g,'/')}`);
      const d=await r.json();
      await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(newPath).replace(/%2F/g,'/')}`,{method:'PUT',body:JSON.stringify({message:`Move ${name} [GitDrive]`,content:d.content.replace(/\n/g,'')})});
      await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(oldPath).replace(/%2F/g,'/')}`,{method:'DELETE',body:JSON.stringify({message:`Remove old ${name} [GitDrive]`,sha:d.sha})});
      if(S.favorites.has(oldPath)){S.favorites.delete(oldPath);S.favorites.add(newPath);}
      if(S.archived.has(oldPath)){S.archived.delete(oldPath);S.archived.add(newPath);}
      S.messages.forEach(m=>{if(m.files)m.files.forEach(f=>{if(f.path===oldPath){f.path=newPath;f.category=newCat;}});});
    }catch(e){toast('移动失败: '+e.message,'err');}
  }
  await Promise.all([saveMsgs(),saveMeta()]);
  exitFGSelect();await loadRepoFiles();updateStats();
  toast(`已移动到 ${catMap[newCat].label}`,'ok');
}

/* ============================================================
   RENAME / DELETE FILE (from files grid)
============================================================ */
async function renameGH(path,oldName){
  /* FIX #6: only allow renaming non-image files */
  if(isImg(oldName)){toast('图片重命名会导致 URL 失效，已禁用此操作','warn');return;}
  showInputModal('重命名','新文件名',oldName,async newName=>{
    if(!newName||newName===oldName)return;
    const folder=path.includes('/')?path.substring(0,path.lastIndexOf('/')):'';
    const newPath=folder?`${folder}/${newName}`:newName;
    const r=await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`);
    const d=await r.json();
    await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(newPath).replace(/%2F/g,'/')}`,{method:'PUT',body:JSON.stringify({message:`Rename to ${newName} [GitDrive]`,content:d.content.replace(/\n/g,'')})});
    await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`,{method:'DELETE',body:JSON.stringify({message:`Delete old ${oldName} [GitDrive]`,sha:d.sha})});
    if(S.favorites.has(path)){S.favorites.delete(path);S.favorites.add(newPath);}
    if(S.archived.has(path)){S.archived.delete(path);S.archived.add(newPath);}
    S.messages.forEach(m=>{if(m.files)m.files.forEach(f=>{if(f.path===path){f.path=newPath;f.name=newName;}});});
    await Promise.all([saveMsgs(),saveMeta()]);
    await loadRepoFiles();updateStats();renderMsgs();
    toast(`已重命名为 ${newName}`,'ok');
  });
}
async function delFile(path,sha){
  closeCtx();
  showConfirm('删除文件',`确认删除 ${path.split('/').pop()}？`,async()=>{
    const r=await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`);
    if(r.ok){const d=await r.json();await gh(`/repos/${S.user}/${S.repo}/contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`,{method:'DELETE',body:JSON.stringify({message:`Delete ${path.split('/').pop()} [GitDrive]`,sha:d.sha})});}
    S.favorites.delete(path);S.archived.delete(path);
    S.messages=S.messages.map(m=>{if(m.files)m.files=m.files.filter(f=>f.path!==path);return m;}).filter(m=>m.type==='text'||(m.files&&m.files.length));
    await Promise.all([saveMsgs(),saveMeta()]);
    await loadRepoFiles();updateStats();renderMsgs();
    toast('已删除','ok');
  });
}

============================================================ */
function openSearch(){document.getElementById('search-overlay').classList.add('show');setTimeout(()=>document.getElementById('g-search').focus(),100);}
function closeSearch(){document.getElementById('search-overlay').classList.remove('show');}
function doGlobalSearch(){
  const q=document.getElementById('g-search').value.trim().toLowerCase();
  const results=document.getElementById('g-results');
  if(!q){results.innerHTML='<div class="sr-empty">输入关键词开始搜索</div>';return;}
  const matches=[];
  S.allFiles.forEach(f=>{if(f.name.toLowerCase().includes(q))matches.push({type:'file',f});});
  S.messages.filter(m=>m.type==='text').forEach(m=>{if((m.content||'').toLowerCase().includes(q))matches.push({type:'msg',m});});
  if(!matches.length){results.innerHTML='<div class="sr-empty">没有找到匹配结果</div>';return;}
  results.innerHTML=matches.slice(0,20).map(item=>{
    if(item.type==='file'){
      const f=item.f;const cat=catMap[f.category]||catMap['other'];
      const hi=f.name.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<span class="sr-highlight">${m}</span>`);
      const url=rawUrl(f.path);
      return `<div class="sr-item" onclick="closeSearch();dlFile('${url}','${esc(f.name)}')">
        <div class="sr-icon" style="background:${cat.bg}">${fileIcon(f.name)}</div>
        <div class="sr-info"><div class="sr-name">${hi}</div><div class="sr-meta">${cat.icon} ${cat.label} · ${fmtSize(f.size)}</div></div>
      </div>`;
    }else{
      const m=item.m;
      const snippet=(m.content||'').slice(0,80).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),x=>`<span class="sr-highlight">${x}</span>`);
      return `<div class="sr-item" onclick="closeSearch();scrollToMsg('${m.id}')">
        <div class="sr-icon" style="background:var(--bg4)">💬</div>
        <div class="sr-info"><div class="sr-name">${snippet}</div><div class="sr-meta">文字消息 · ${new Date(m.timestamp).toLocaleDateString('zh-CN')}</div></div>
      </div>`;
    }
  }).join('');
}
function scrollToMsg(id){
  showScreen('chat');
  setTimeout(()=>{
    const el=document.querySelector(`.mr[data-id="${id}"]`);
    if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='2px solid var(--accent)';setTimeout(()=>el.style.outline='',1800);}
  },200);
}

/* ============================================================
   FIX #9: MEDIA PREVIEW (images + video + audio)
============================================================ */
function openMP(url,name,images=[],idx=0){
  S.mpItems=images.length?images:[url];
  S.mpIdx=images.length?idx:0;
  S.mpCurrentName=name;
  _showMP(url,name);
}
function _showMP(url,name){
  const actualUrl=S.mpItems[S.mpIdx]||url;
  const actualName=name||actualUrl.split('/').pop();
  document.getElementById('mp-name').textContent=actualName;
  document.getElementById('mp-dl').onclick=()=>dlFile(actualUrl,actualName);
  document.getElementById('mp-prev').style.display=S.mpItems.length>1?'flex':'none';
  document.getElementById('mp-next').style.display=S.mpItems.length>1?'flex':'none';
  const content=document.getElementById('mp-content');
  // Determine type from URL/name
  const n=actualName.toLowerCase();
  const eV=/\.(mp4|mov|avi|mkv|webm|m4v)$/i.test(n);
  const eA=/\.(mp3|wav|flac|aac|ogg|m4a)$/i.test(n);
  if(eV){
    content.innerHTML=`<video controls autoplay style="max-width:90vw;max-height:70vh;border-radius:10px" onclick="event.stopPropagation()">
      <source src="${actualUrl}">你的浏览器不支持视频播放
    </video>`;
  }else if(eA){
    content.innerHTML=`<div style="padding:30px;text-align:center" onclick="event.stopPropagation()">
      <div style="font-size:48px;margin-bottom:16px">🎵</div>
      <div style="font-size:14px;color:rgba(255,255,255,.7);margin-bottom:16px">${actualName}</div>
      <audio controls autoplay style="min-width:280px">
        <source src="${actualUrl}">你的浏览器不支持音频播放
      </audio>
    </div>`;
  }else{
    content.innerHTML=`<img src="${actualUrl}" alt="${actualName}" onclick="event.stopPropagation()">`;
  }
  document.getElementById('media-preview').style.display='flex';
}
function mpNav(dir){
  S.mpIdx=(S.mpIdx+dir+S.mpItems.length)%S.mpItems.length;
  const url=S.mpItems[S.mpIdx];
  _showMP(url,url.split('/').pop());
}
function closeMP(){
  document.getElementById('media-preview').style.display='none';
  document.getElementById('mp-content').innerHTML='';
}

function helpSection(icon,title,desc){
  return `<div style="margin-bottom:14px;padding:12px 14px;background:var(--bg3);border-radius:12px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
      <span style="font-size:17px">${icon}</span>
      <strong style="font-size:13px">${title}</strong>
    </div>
    <div style="font-size:12.5px;color:var(--text2);line-height:1.65">${desc}</div>
  </div>`;
}

============================================================ */
/* FIX #3: correct Bearer auth + UTF-8 support */
async function ghRaw(path,opts={},token){
  const url=path.startsWith('http')?path:`https://api.github.com${path}`;
  return fetch(url,{...opts,headers:{'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','User-Agent':'GitDrive-App','Content-Type':'application/json',...(opts.headers||{})}});
}
async function gh(path,opts={}){
  return ghRaw(path,opts,S.token);
}

function rawUrl(path){
  /* FIX #8: encode Chinese filenames; avoid double-encoding if already encoded */
  const parts=path.split('/');
  const encoded=parts.map(p=>{
    try{ return encodeURIComponent(decodeURIComponent(p)); }
    catch(e){ return encodeURIComponent(p); }
  }).join('/');
  return `https://raw.githubusercontent.com/${S.user}/${S.repo}/main/${encoded}`;
}
function dlFile(url,name){const a=document.createElement('a');a.href=url;a.download=name;a.target='_blank';a.click();}
function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px';}
function isImg(name){return /\.(jpg|jpeg|png|gif|webp|svg|avif|bmp|heic)$/i.test(name);}
function isVideo(name){return /\.(mp4|mov|avi|mkv|webm|m4v)$/i.test(name);}
function isAudio(name){return /\.(mp3|wav|flac|aac|ogg|m4a)$/i.test(name);}
function ext(name){return(name.split('.').pop()||'').toLowerCase();}
function esc(s){return(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}
/* FIX #3: file icons with Microsoft-style brand colors */
function fileIconColor(name){
  const e=ext(name);
  /* Images */
  if(/^(jpg|jpeg|png|gif|webp|svg|avif|bmp|heic)$/.test(e))return {icon:'IMG',color:'#10b981',bg:'#d1fae5'};
  /* Video */
  if(/^(mp4|mov|avi|mkv|webm|m4v)$/.test(e))return {icon:'VID',color:'#ef4444',bg:'#fee2e2'};
  /* Audio */
  if(/^(mp3|wav|flac|aac|ogg|m4a)$/.test(e))return {icon:'AUD',color:'#8b5cf6',bg:'#ede9fe'};
  /* PDF — red like Acrobat */
  if(/^pdf$/.test(e))return {icon:'PDF',color:'#dc2626',bg:'#fee2e2'};
  /* Word — Microsoft blue */
  if(/^(doc|docx)$/.test(e))return {icon:'DOC',color:'#2563eb',bg:'#dbeafe'};
  /* Excel — Microsoft green */
  if(/^(xls|xlsx|csv|ods)$/.test(e))return {icon:'XLS',color:'#16a34a',bg:'#dcfce7'};
  /* PowerPoint — Microsoft orange-red */
  if(/^(ppt|pptx|key|odp)$/.test(e))return {icon:'PPT',color:'#ea580c',bg:'#ffedd5'};
  /* Plain text / markdown */
  if(/^(txt|md|log|rtf)$/.test(e))return {icon:'TXT',color:'#64748b',bg:'#f1f5f9'};
  /* Code */
  if(/^(js|ts|jsx|tsx|py|java|c|cpp|html|css|json|xml|yaml|go|rs|php|sh|rb)$/.test(e))return {icon:'</> ',color:'#0891b2',bg:'#cffafe'};
  /* Archives */
  if(/^(zip|rar|7z|tar|gz|bz2)$/.test(e))return {icon:'ZIP',color:'#92400e',bg:'#fef3c7'};
  /* Apps */
  if(/^(apk|exe|ipa|dmg|pkg|deb|rpm)$/.test(e))return {icon:'APP',color:'#6366f1',bg:'#e0e7ff'};
  return {icon:'FILE',color:'#64748b',bg:'#f1f5f9'};
}
function fileIcon(name){
  const e=ext(name);
  /* Keep emojis for image/video/audio in chat bubbles for visual richness */
  if(/^(jpg|jpeg|png|gif|webp|svg|avif|bmp|heic)$/.test(e))return '🖼️';
  if(/^(mp4|mov|avi|mkv|webm|m4v)$/.test(e))return '🎬';
  if(/^(mp3|wav|flac|aac|ogg|m4a)$/.test(e))return '🎵';
  /* FIX #3: colored label badges for documents */
  const fc=fileIconColor(name);
  return `<span style="font-size:11px;font-weight:900;letter-spacing:-.02em;color:${fc.color};background:${fc.bg};padding:3px 5px;border-radius:5px;line-height:1;font-family:'JetBrains Mono',monospace">${fc.icon}</span>`;
}
function fmtSize(b){if(!b)return '';if(b<1024)return b+'B';if(b<1048576)return (b/1024).toFixed(1)+'KB';return (b/1048576).toFixed(1)+'MB';}
function toast(msg,type=''){
  const c=document.getElementById('toasts');const el=document.createElement('div');
  el.className='toast '+(type==='ok'?'ok':type==='err'?'err':type==='warn'?'warn':'');
  el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),2800);
}

if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
