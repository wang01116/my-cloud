<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#111318">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GitDrive">
<title>GitDrive</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ========================================================
   CSS VARIABLES & THEMES
======================================================== */
:root {
  --bg:        #111318;
  --bg2:       #18191f;
  --bg3:       #1e2028;
  --bg4:       #252830;
  --bg5:       #2c3040;
  --surface:   rgba(255,255,255,0.04);
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.11);
  --border3:   rgba(255,255,255,0.18);
  --text:      #eef0f4;
  --text2:     #9098aa;
  --text3:     #5a6172;
  --accent:    #4f8ef7;
  --accent2:   #6fa3ff;
  --accent3:   #3870e0;
  --glow:      rgba(79,142,247,0.18);
  --glow2:     rgba(79,142,247,0.08);
  --out-bg:    #1a4dd4;
  --out-bg2:   #1e58e8;
  --in-bg:     #1e2028;
  --green:     #34d058;
  --red:       #f85149;
  --orange:    #fb923c;
  --yellow:    #fbbf24;
  --purple:    #a78bfa;
  --pink:      #f472b6;
  --teal:      #2dd4bf;
  --r:         22px;
  --r-sm:      12px;
  --r-xs:      8px;
  --sh:        0 8px 40px rgba(0,0,0,0.5);
  --sh2:       0 2px 12px rgba(0,0,0,0.3);
  --dur:       0.18s;
  --ease:      cubic-bezier(.4,0,.2,1);
}
[data-theme="light"] {
  --bg:        #f2f3f7;
  --bg2:       #ffffff;
  --bg3:       #f8f9fb;
  --bg4:       #eef0f5;
  --bg5:       #e4e7ef;
  --surface:   rgba(0,0,0,0.03);
  --border:    rgba(0,0,0,0.07);
  --border2:   rgba(0,0,0,0.11);
  --border3:   rgba(0,0,0,0.18);
  --text:      #0d1117;
  --text2:     #5a6478;
  --text3:     #9098aa;
  --accent:    #2563eb;
  --accent2:   #3b7ef0;
  --accent3:   #1d56d4;
  --glow:      rgba(37,99,235,0.14);
  --glow2:     rgba(37,99,235,0.06);
  --out-bg:    #2563eb;
  --out-bg2:   #3b7ef0;
  --in-bg:     #ffffff;
  --sh:        0 4px 24px rgba(0,0,0,0.1);
  --sh2:       0 2px 8px rgba(0,0,0,0.08);
}

/* ========================================================
   RESET & BASE
======================================================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Outfit',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
button{font-family:inherit}
input,textarea{font-family:inherit}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ========================================================
   LAYOUT
======================================================== */
#app{display:flex;height:100dvh;position:relative}

/* ========================================================
   LOGIN SCREEN
======================================================== */
#login-screen{
  position:fixed;inset:0;z-index:200;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.login-wrap{
  width:100%;max-width:400px;
  animation:fadeSlideUp .4s var(--ease) both;
}
.login-logo-ring{
  width:72px;height:72px;margin:0 auto 24px;
  background:linear-gradient(135deg,#4f8ef7,#a78bfa);
  border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  font-size:34px;
  box-shadow:0 0 0 8px rgba(79,142,247,.12),0 0 40px rgba(79,142,247,.3);
}
.login-h{font-size:26px;font-weight:800;text-align:center;margin-bottom:4px}
.login-sub{color:var(--text2);font-size:13px;text-align:center;margin-bottom:32px}
.login-card{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:24px;padding:32px;
  box-shadow:var(--sh);
}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase}
.field input{
  width:100%;padding:12px 14px;
  background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:var(--r-sm);color:var(--text);
  font-size:14px;outline:none;
  transition:border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease);
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.btn-login{
  width:100%;padding:14px;
  background:linear-gradient(135deg,#4f8ef7,#a78bfa);
  border:none;border-radius:var(--r-sm);color:#fff;
  font-size:15px;font-weight:700;cursor:pointer;
  transition:opacity var(--dur),transform var(--dur);
  margin-top:8px;letter-spacing:.02em;
}
.btn-login:hover{opacity:.9;transform:translateY(-1px)}
.btn-login:active{transform:translateY(0)}
.login-hint{
  margin-top:16px;font-size:11px;color:var(--text3);
  text-align:center;line-height:1.7;
}
#login-err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;display:none;font-weight:500}

/* ========================================================
   SIDEBAR
======================================================== */
#sidebar{
  width:260px;min-width:260px;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:relative;z-index:20;
  transition:transform .28s var(--ease);
}
.sb-top{
  padding:14px 14px 10px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.sb-logo{
  width:38px;height:38px;flex-shrink:0;
  background:linear-gradient(135deg,#4f8ef7,#a78bfa);
  border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:19px;
}
.sb-title{font-weight:800;font-size:15px;flex:1}
.sb-acts{display:flex;gap:4px}
.ib{
  width:30px;height:30px;border:none;background:transparent;
  color:var(--text2);border-radius:var(--r-xs);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  transition:background var(--dur),color var(--dur);
}
.ib:hover{background:var(--bg3);color:var(--text)}

.sb-search{padding:10px 12px;border-bottom:1px solid var(--border)}
.sb-search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1.5px solid var(--border);
  border-radius:10px;padding:7px 10px;
  transition:border-color var(--dur);cursor:pointer;
}
.sb-search-box:hover,.sb-search-box:focus-within{border-color:var(--accent)}
.sb-search-box input{
  background:none;border:none;outline:none;color:var(--text);
  font-size:13px;flex:1;
}
.sb-search-box input::placeholder{color:var(--text3)}

.sb-nav{padding:8px 8px 0;display:flex;flex-direction:column;gap:1px}
.nav-it{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:11px;cursor:pointer;
  color:var(--text2);font-weight:600;font-size:13.5px;
  border:none;background:transparent;width:100%;text-align:left;
  transition:background var(--dur),color var(--dur);
  position:relative;
}
.nav-it:hover{background:var(--bg3);color:var(--text)}
.nav-it.active{background:var(--glow);color:var(--accent2)}
.nav-it .ni{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.nav-badge{
  margin-left:auto;background:var(--accent);color:#fff;
  font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px;min-width:18px;text-align:center;
}

.sb-sec{
  padding:16px 18px 5px;
  font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text3);
}

.sb-foot{
  margin-top:auto;padding:12px 16px;
  border-top:1px solid var(--border);
  font-size:11px;color:var(--text3);
  display:flex;flex-direction:column;gap:3px;
}
.sb-foot-author{
  font-size:12px;font-weight:600;color:var(--text2);
  display:flex;align-items:center;gap:6px;
}
.sb-foot-author .dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);box-shadow:0 0 6px var(--green);
  flex-shrink:0;
}

/* ========================================================
   MAIN
======================================================== */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ========================================================
   TOP BAR (shared)
======================================================== */
.topbar{
  padding:11px 18px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;z-index:10;
  backdrop-filter:blur(20px);
}
.topbar-info{flex:1;overflow:hidden}
.topbar-title{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-sub{font-size:11px;color:var(--text2);margin-top:1px}
.menu-btn{display:none}

/* ========================================================
   CHAT SCREEN
======================================================== */
#chat-screen{display:flex;flex-direction:column;height:100%;flex-shrink:0}

/* Messages */
#msg-list{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px 14px 8px;
  display:flex;flex-direction:column;gap:1px;
  scroll-behavior:smooth;
}
.date-sep{
  display:flex;align-items:center;gap:10px;
  margin:14px 0 10px;color:var(--text3);font-size:11px;font-weight:600;
}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}

/* Message rows */
.mg{display:flex;flex-direction:column;gap:2px;margin-bottom:10px}
.mr{display:flex;align-items:flex-end;gap:7px;position:relative}
.mr.out{flex-direction:row-reverse}
.mr.out .av{display:none}
.av{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#4f8ef7,#a78bfa);
  display:flex;align-items:center;justify-content:center;font-size:12px;
  align-self:flex-end;
}

/* Bubble wrap */
.bw{
  display:flex;flex-direction:column;
  max-width:min(74%,500px);position:relative;
}
.mr.out .bw{align-items:flex-end}

/* Selection checkbox */
.msg-check{
  display:none;width:20px;height:20px;border-radius:50%;
  border:2px solid var(--border2);background:var(--bg3);
  cursor:pointer;flex-shrink:0;align-self:center;
  transition:all var(--dur);margin-right:2px;
  align-items:center;justify-content:center;font-size:11px;
}
.select-mode .msg-check{display:flex}
.msg-check.checked{background:var(--accent);border-color:var(--accent);color:#fff}

/* Bubble */
.bl{
  padding:9px 13px;border-radius:18px;
  position:relative;word-break:break-word;
  animation:bIn .22s var(--ease) both;
  line-height:1.58;font-size:14px;
}
@keyframes bIn{from{opacity:0;transform:scale(.92) translateY(5px)}to{opacity:1;transform:scale(1) translateY(0)}}
.bl.in{
  background:var(--in-bg);border:1px solid var(--border2);
  border-bottom-left-radius:5px;color:var(--text);
}
.bl.out{
  background:var(--out-bg);color:#fff;
  border-bottom-right-radius:5px;
  box-shadow:0 2px 12px rgba(79,142,247,.3);
}
.bl.out .mtime{color:rgba(255,255,255,.55)}

/* Markdown */
.bl p{margin-bottom:5px}.bl p:last-child{margin-bottom:0}
.bl code{background:rgba(0,0,0,.25);padding:1px 5px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px}
.bl pre{background:rgba(0,0,0,.35);padding:10px 12px;border-radius:8px;overflow-x:auto;margin:6px 0}
.bl pre code{background:none;padding:0}
.bl h1,.bl h2,.bl h3{margin:8px 0 4px;font-weight:700}
.bl ul,.bl ol{padding-left:18px;margin:4px 0}
.bl a{color:var(--accent2);text-decoration:none}
.bl.in code{background:rgba(0,0,0,.07)}
.bl.in pre{background:rgba(0,0,0,.05)}
.mtime{font-size:10px;color:var(--text3);margin-top:3px;text-align:right;display:flex;align-items:center;gap:4px;justify-content:flex-end}
.mtime-pinned{color:var(--yellow);font-size:9px}

/* File bubble */
.fstack{display:flex;flex-direction:column;gap:5px}
.fc{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:13px;padding:11px 13px;
  display:flex;align-items:center;gap:11px;
  min-width:210px;max-width:300px;cursor:pointer;
  transition:background var(--dur),transform var(--dur);
}
.fc:hover{background:var(--bg4);transform:scale(1.01)}
.bl.out .fc{background:rgba(0,0,0,.22);border-color:rgba(255,255,255,.13)}
.bl.out .fc:hover{background:rgba(0,0,0,.32)}
.fi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.fi-info{flex:1;overflow:hidden}
.fi-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-meta{font-size:11px;color:var(--text2);margin-top:2px}
.bl.out .fi-meta{color:rgba(255,255,255,.6)}

/* iMessage-style image stacking */
.img-stack{display:flex;flex-direction:column;gap:3px;border-radius:16px;overflow:hidden;max-width:260px}
.img-stack.multi{position:relative}
.img-item{position:relative;cursor:pointer;overflow:hidden;background:var(--bg3)}
.img-item img{width:100%;display:block;object-fit:cover;transition:transform .2s var(--ease)}
.img-item:hover img{transform:scale(1.03)}
.img-item .img-ov{
  position:absolute;inset:0;background:rgba(0,0,0,0);
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;font-size:22px;
}
.img-item:hover .img-ov{background:rgba(0,0,0,.28)}
/* Multi-image grid: 2 side by side */
.img-grid2{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.img-grid2 .img-item{aspect-ratio:1}
.img-grid2 .img-item img{height:100%}
/* 3+ images: big + small */
.img-grid3{display:grid;grid-template-columns:2fr 1fr;gap:3px}
.img-grid3 .img-item:first-child{grid-row:1/3}
.img-grid3 .img-item{aspect-ratio:1}
/* single */
.img-single .img-item{max-height:240px}
.img-single .img-item img{max-height:240px}

/* More count overlay */
.img-more-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;color:#fff;letter-spacing:-.02em;
}

/* Message actions hover */
.m-acts{
  display:none;gap:1px;
  position:absolute;top:-8px;z-index:5;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:16px;padding:3px 4px;
  box-shadow:var(--sh2);
}
.mr.out .m-acts{left:-4px;transform:translateX(-100%)}
.mr:not(.out) .m-acts{right:-4px;transform:translateX(100%)}
.bw:hover .m-acts{display:flex}
.ma{
  width:28px;height:28px;border:none;background:transparent;
  color:var(--text2);border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  transition:background var(--dur),color var(--dur);
}
.ma:hover{background:var(--bg3);color:var(--text)}

/* Pinned badge */
.pin-badge{
  position:absolute;top:-3px;right:-3px;
  background:var(--yellow);color:#000;
  font-size:9px;font-weight:800;padding:2px 5px;border-radius:99px;
}

/* ========================================================
   UPLOAD PROGRESS AREA
======================================================== */
#upload-area{padding:0 14px;max-height:120px;overflow-y:auto}
.up-prog{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:12px;padding:11px 14px;margin-bottom:6px;
  animation:fadeUp .2s var(--ease);
}
.up-name{font-size:12px;font-weight:600;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbar{background:var(--bg5);border-radius:3px;height:3px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:3px;transition:width .25s var(--ease);width:0%}

/* ========================================================
   INPUT AREA
======================================================== */
.input-wrap{
  background:var(--bg2);border-top:1px solid var(--border);
  padding:10px 14px;
  padding-bottom:max(10px,env(safe-area-inset-bottom));
  flex-shrink:0;z-index:10;
}
/* Select-mode bar */
.select-bar{
  display:none;align-items:center;gap:10px;
  padding:8px 14px;background:var(--glow);
  border-bottom:1px solid var(--border);
  font-size:13px;font-weight:600;color:var(--accent2);
}
.select-bar.show{display:flex}
.sel-count{flex:1}
.sel-del{
  padding:6px 14px;background:var(--red);color:#fff;
  border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;
  cursor:pointer;transition:opacity var(--dur);
}
.sel-del:hover{opacity:.85}
.sel-cancel{
  padding:6px 12px;background:var(--bg3);color:var(--text2);
  border:1px solid var(--border2);border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;
  cursor:pointer;transition:background var(--dur);
}
.sel-cancel:hover{background:var(--bg4)}

/* Cat chips */
.cat-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
.cat-chip{
  display:flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:20px;
  border:1.5px solid var(--border2);background:var(--bg3);
  cursor:pointer;white-space:nowrap;font-size:12px;font-weight:700;
  color:var(--text2);transition:all var(--dur);flex-shrink:0;
}
.cat-chip:hover{border-color:var(--accent2);color:var(--accent2)}
.cat-chip.active{border-color:var(--accent);background:var(--glow);color:var(--accent2)}
.cat-chip .ci{font-size:14px}

/* Input row */
.inp-row{display:flex;align-items:flex-end;gap:8px}
.inp-box{
  flex:1;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:22px;display:flex;align-items:flex-end;
  padding:8px 12px;gap:8px;
  transition:border-color var(--dur),box-shadow var(--dur);
}
.inp-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
#ti{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:14px;resize:none;
  max-height:130px;min-height:22px;line-height:1.52;padding:0;
}
#ti::placeholder{color:var(--text3)}
.att-btn,.snd-btn{
  width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;transition:all var(--dur);
}
.att-btn{background:var(--bg4);color:var(--text2)}
.att-btn:hover{background:var(--glow);color:var(--accent2)}
.snd-btn{background:var(--accent);color:#fff;box-shadow:0 2px 10px var(--glow)}
.snd-btn:hover{background:var(--accent2);transform:scale(1.06)}
.snd-btn:active{transform:scale(.97)}
#fi{display:none}

/* Drag overlay */
.drag-ov{
  display:none;position:fixed;inset:0;z-index:99;
  background:rgba(79,142,247,.08);border:3px dashed var(--accent);
  align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:var(--accent2);
  letter-spacing:.02em;backdrop-filter:blur(4px);
  animation:fadeIn .15s var(--ease);
}
.drag-ov.show{display:flex}

/* ========================================================
   FILES SCREEN
======================================================== */
#files-screen{display:none;flex-direction:column;height:100%}

.files-top{
  padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;flex-wrap:wrap;gap:8px;flex-shrink:0;
}
.files-title{font-size:17px;font-weight:800;flex:1;min-width:100px}
.files-tb{display:flex;gap:6px;align-items:center}

.tb-btn{
  padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;
  border:1.5px solid var(--border2);background:var(--bg3);
  color:var(--text2);cursor:pointer;transition:all var(--dur);white-space:nowrap;
}
.tb-btn:hover{border-color:var(--accent);color:var(--accent2)}
.tb-btn.active{border-color:var(--accent);background:var(--glow);color:var(--accent2)}

.view-tog{display:flex;border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.vb{
  padding:6px 9px;background:var(--bg3);border:none;
  color:var(--text2);cursor:pointer;font-size:14px;transition:all var(--dur);
}
.vb.active{background:var(--glow);color:var(--accent2)}

/* Filter rows */
.filter-row{
  padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;
  align-items:center;
}
.filter-row::-webkit-scrollbar{display:none}
.fr-chip{
  padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;
  border:1.5px solid var(--border2);background:var(--bg3);
  color:var(--text2);cursor:pointer;transition:all var(--dur);white-space:nowrap;flex-shrink:0;
}
.fr-chip:hover{border-color:var(--accent);color:var(--accent2)}
.fr-chip.active{border-color:var(--accent);background:var(--glow);color:var(--accent2)}
.fr-sep{width:1px;height:16px;background:var(--border2);flex-shrink:0;margin:0 2px}

/* Files search bar */
.files-search{
  padding:8px 14px;border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.fs-box{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1.5px solid var(--border);
  border-radius:10px;padding:7px 12px;
  transition:border-color var(--dur);
}
.fs-box:focus-within{border-color:var(--accent)}
.fs-box input{
  background:none;border:none;outline:none;color:var(--text);
  font-size:13px;flex:1;
}
.fs-box input::placeholder{color:var(--text3)}

/* Files grid */
#fg{
  flex:1;overflow-y:auto;padding:14px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;align-content:start;
}
#fg.list-view{grid-template-columns:1fr;gap:5px}
#fg::-webkit-scrollbar{width:3px}

/* Grid card */
.fgi{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;cursor:pointer;
  transition:border-color var(--dur),transform var(--dur),box-shadow var(--dur);
  animation:fadeUp .22s var(--ease) both;
  position:relative;
}
.fgi:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 24px var(--glow)}
.fgi.selected{border-color:var(--accent);background:var(--glow2)}

.fgi-check{
  position:absolute;top:8px;left:8px;z-index:3;
  width:22px;height:22px;border-radius:50%;
  border:2px solid rgba(255,255,255,.6);background:rgba(0,0,0,.3);
  display:none;align-items:center;justify-content:center;font-size:11px;
  color:#fff;cursor:pointer;transition:all var(--dur);backdrop-filter:blur(4px);
}
.select-mode .fgi-check{display:flex}
.fgi.selected .fgi-check{background:var(--accent);border-color:var(--accent)}

/* Image thumb */
.fgi-img-wrap{
  width:100%;aspect-ratio:1/1;overflow:hidden;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
}
.fgi-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s var(--ease)}
.fgi:hover .fgi-img-wrap img{transform:scale(1.05)}
.fgi-icon-wrap{
  width:100%;height:100px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;font-size:36px;
}
.fgi-ext{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);background:var(--bg4);padding:2px 6px;border-radius:4px}

.fgi-info{padding:9px 11px}
.fgi-name{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fgi-meta{font-size:10.5px;color:var(--text2);margin-top:2px}
.fgi-cat{display:inline-flex;align-items:center;gap:3px;font-size:10px;margin-top:5px;padding:2px 7px;border-radius:8px;font-weight:700}

/* List item */
.fgi.list-item{
  display:flex;align-items:center;gap:12px;padding:10px 14px;
  border-radius:12px;
}
.fgi.list-item .fgi-img-wrap{width:42px;height:42px;flex-shrink:0;border-radius:9px;aspect-ratio:unset}
.fgi.list-item .fgi-icon-wrap{width:42px;height:42px;font-size:20px;gap:2px}
.fgi.list-item .fgi-ext{font-size:8px;padding:1px 4px}
.fgi.list-item .fgi-info{padding:0;flex:1;overflow:hidden}
.fgi.list-item .fgi-name{font-size:13px}
.fgi.list-item .li-acts{display:flex;gap:3px;flex-shrink:0}
.fgi.list-item .fgi-check{position:static;width:20px;height:20px;flex-shrink:0;display:none}
.select-mode .fgi.list-item .fgi-check{display:flex}

/* Fav star */
.fav-star{
  position:absolute;top:7px;right:7px;z-index:3;
  font-size:14px;line-height:1;text-shadow:0 1px 4px rgba(0,0,0,.5);
}

/* ========================================================
   SEARCH OVERLAY
======================================================== */
#search-overlay{
  position:fixed;inset:0;z-index:150;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  display:none;align-items:flex-start;justify-content:center;
  padding:60px 20px 20px;
  animation:fadeIn .15s var(--ease);
}
#search-overlay.show{display:flex}
.search-modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:20px;width:100%;max-width:540px;
  overflow:hidden;box-shadow:var(--sh);
  animation:slideUp .2s var(--ease);
}
.search-inp-row{
  display:flex;align-items:center;gap:10px;padding:14px 16px;
  border-bottom:1px solid var(--border);
}
.search-inp-row input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:16px;font-weight:500;
}
.search-inp-row input::placeholder{color:var(--text3)}
.search-results{max-height:400px;overflow-y:auto}
.sr-empty{padding:32px;text-align:center;color:var(--text3);font-size:13px}
.sr-item{
  display:flex;align-items:center;gap:12px;padding:11px 16px;
  cursor:pointer;transition:background var(--dur);border-bottom:1px solid var(--border);
}
.sr-item:hover{background:var(--bg3)}
.sr-item:last-child{border-bottom:none}
.sr-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sr-info{flex:1;overflow:hidden}
.sr-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-meta{font-size:11px;color:var(--text2);margin-top:2px}
.sr-highlight{color:var(--accent2)}

/* ========================================================
   MODAL
======================================================== */
.m-ov{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadeIn .15s var(--ease);
}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:20px;padding:26px;
  width:100%;max-width:420px;
  box-shadow:var(--sh);
  animation:slideUp .2s var(--ease);
}
.modal-t{font-size:17px;font-weight:800;margin-bottom:16px}
.modal-p{color:var(--text2);font-size:13px;margin-bottom:18px;line-height:1.65}
.modal-inp{
  width:100%;padding:11px 13px;
  background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:10px;color:var(--text);font-size:14px;outline:none;
  margin-bottom:16px;resize:vertical;min-height:50px;
  transition:border-color var(--dur),box-shadow var(--dur);
}
.modal-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-g{
  padding:9px 18px;border-radius:9px;
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;
  transition:all var(--dur);
}
.btn-g:hover{background:var(--bg4)}
.btn-d{
  padding:9px 18px;border-radius:9px;
  background:var(--red);border:none;color:#fff;
  cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;
  transition:opacity var(--dur);
}
.btn-d:hover{opacity:.85}
.btn-a{
  padding:9px 18px;border-radius:9px;
  background:var(--accent);border:none;color:#fff;
  cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;
  transition:all var(--dur);
}
.btn-a:hover{background:var(--accent2)}
/* Move-to category modal */
.cat-move-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.cat-move-item{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:12px 8px;border-radius:12px;
  border:1.5px solid var(--border2);background:var(--bg3);cursor:pointer;
  font-size:12px;font-weight:700;color:var(--text2);transition:all var(--dur);
}
.cat-move-item:hover,.cat-move-item.selected{border-color:var(--accent);background:var(--glow);color:var(--accent2)}
.cat-move-item span{font-size:24px}

/* ========================================================
   LIGHTBOX
======================================================== */
#lb{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.93);backdrop-filter:blur(16px);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  animation:fadeIn .15s var(--ease);
}
.lb-top{
  position:absolute;top:0;left:0;right:0;
  padding:16px 20px;display:flex;align-items:center;gap:12px;
  background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);
}
.lb-name{flex:1;font-size:13px;font-weight:600;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-act{
  width:36px;height:36px;border:none;border-radius:50%;
  background:rgba(255,255,255,.12);color:#fff;
  cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;
  transition:background var(--dur);
}
.lb-act:hover{background:rgba(255,255,255,.22)}
#lb img{max-width:90vw;max-height:80vh;border-radius:10px;object-fit:contain;box-shadow:0 0 80px rgba(0,0,0,.8)}
.lb-arrow{
  position:absolute;width:44px;height:44px;
  border:none;border-radius:50%;
  background:rgba(255,255,255,.12);color:#fff;
  cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:background var(--dur);top:50%;transform:translateY(-50%);
}
.lb-arrow:hover{background:rgba(255,255,255,.22)}
#lb-prev{left:16px}
#lb-next{right:16px}

/* ========================================================
   TOAST
======================================================== */
#toasts{
  position:fixed;bottom:76px;left:50%;transform:translateX(-50%);
  z-index:999;display:flex;flex-direction:column;gap:5px;align-items:center;pointer-events:none;
}
.toast{
  background:var(--bg2);border:1px solid var(--border2);
  color:var(--text);padding:9px 18px;border-radius:20px;
  font-size:13px;font-weight:600;box-shadow:var(--sh);white-space:nowrap;
  animation:toastIn .2s var(--ease);
}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
.toast.warn{border-color:var(--yellow);color:var(--yellow)}

/* ========================================================
   EMPTY STATE
======================================================== */
.empty-st{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;padding:40px;text-align:center;color:var(--text2);
}
.empty-ic{font-size:52px;opacity:.3}
.empty-t{font-size:18px;font-weight:800;color:var(--text)}
.empty-s{font-size:13px;max-width:260px;line-height:1.7}

/* ========================================================
   KEYFRAMES
======================================================== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:scale(.88) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* ========================================================
   RESPONSIVE
======================================================== */
@media(max-width:640px){
  #sidebar{
    position:fixed;left:0;top:0;bottom:0;z-index:50;
    transform:translateX(-100%);
    box-shadow:8px 0 40px rgba(0,0,0,.5);
  }
  #sidebar.open{transform:translateX(0)}
  .menu-btn{display:flex !important}
  #sb-ov{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.45);display:none}
  #sb-ov.show{display:block}
  .bw{max-width:88%}
  #lb img{max-width:96vw;max-height:72vh}
  .lb-arrow{display:none}
  .files-top{flex-wrap:wrap}
}

/* ========================================================
   MISC
======================================================== */
.sep-line{height:1px;background:var(--border);margin:4px 0}
.spin{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="sb-ov" onclick="closeSb()"></div>
<div class="drag-ov" id="drag-ov">📂 拖放文件上传</div>

<!-- ========================================================
     LOGIN
======================================================== -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo-ring">☁️</div>
    <div class="login-h">GitDrive</div>
    <div class="login-sub">以对话方式使用 GitHub 仓库作为私人云盘</div>
    <div class="login-card">
      <div class="field"><label>GitHub 用户名</label><input id="lu" placeholder="octocat" autocomplete="username"></div>
      <div class="field"><label>仓库名称</label><input id="lr" placeholder="my-drive"></div>
      <div class="field"><label>Personal Access Token</label><input id="lt" type="password" placeholder="ghp_xxxxxxxx" autocomplete="current-password"></div>
      <button class="btn-login" onclick="doLogin()">连接仓库</button>
      <div id="login-err"></div>
    </div>
    <div class="login-hint">凭据仅保存在本地浏览器中，不会上传到任何服务器</div>
  </div>
</div>

<!-- ========================================================
     MAIN APP
======================================================== -->
<div id="app" style="display:none">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sb-top">
      <div class="sb-logo">☁️</div>
      <div class="sb-title">GitDrive</div>
      <div class="sb-acts">
        <button class="ib" onclick="openSearch()" title="全局搜索">🔍</button>
        <button class="ib" id="theme-btn" onclick="toggleTheme()" title="切换主题">🌙</button>
        <button class="ib" onclick="doLogout()" title="退出">🚪</button>
      </div>
    </div>

    <div class="sb-search">
      <div class="sb-search-box" onclick="openSearch()">
        <span style="color:var(--text3);font-size:13px">🔍</span>
        <input readonly placeholder="搜索文件…" onclick="openSearch()">
        <span style="color:var(--text3);font-size:11px;font-weight:600">⌘K</span>
      </div>
    </div>

    <nav class="sb-nav">
      <button class="nav-it active" onclick="showScreen('chat')" id="n-chat">
        <span class="ni">💬</span> 对话云盘
      </button>
      <button class="nav-it" onclick="showScreen('files')" id="n-files">
        <span class="ni">📁</span> 所有文件
        <span class="nav-badge" id="files-cnt">0</span>
      </button>
      <button class="nav-it" onclick="showFilesFiltered('fav')" id="n-fav">
        <span class="ni">⭐</span> 收藏
        <span class="nav-badge" id="fav-cnt">0</span>
      </button>
      <button class="nav-it" onclick="showFilesFiltered('archive')" id="n-arc">
        <span class="ni">📦</span> 归档
      </button>
    </nav>

    <div class="sb-sec">文件分类</div>
    <!-- ===== CATEGORIES NAV — 修改 CATEGORIES 数组即可同步更新 ===== -->
    <nav class="sb-nav" id="cat-nav"></nav>

    <div class="sb-foot">
      <div class="sb-foot-author"><span class="dot"></span>Wangcy</div>
      <span id="sb-repo" style="font-family:'JetBrains Mono',monospace;font-size:10px">-</span>
      <span id="sb-stat">就绪</span>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main">

    <!-- ====== CHAT SCREEN ====== -->
    <div id="chat-screen">
      <div class="topbar">
        <button class="ib menu-btn" onclick="openSb()">☰</button>
        <div class="topbar-info">
          <div class="topbar-title" id="hd-title">GitDrive</div>
          <div class="topbar-sub" id="hd-sub">连接中…</div>
        </div>
        <button class="ib" onclick="openSearch()" title="搜索">🔍</button>
        <button class="ib" onclick="toggleSelectMode()" title="多选">☑️</button>
        <button class="ib" onclick="refreshAll()" title="刷新">🔄</button>
      </div>

      <!-- Select bar -->
      <div class="select-bar" id="sel-bar">
        <span class="sel-count" id="sel-cnt">已选 0 条</span>
        <button class="sel-cancel" onclick="exitSelectMode()">取消</button>
        <button class="sel-del" onclick="deleteSelected()">删除所选</button>
      </div>

      <div id="msg-list">
        <div class="empty-st" id="empty-chat">
          <div class="empty-ic">💬</div>
          <div class="empty-t">开始使用 GitDrive</div>
          <div class="empty-s">发送文字或上传文件，以聊天方式存储到 GitHub 仓库</div>
        </div>
      </div>

      <div id="upload-area"></div>

      <div class="input-wrap">
        <div class="cat-row" id="cat-chips"></div>
        <div class="inp-row">
          <button class="att-btn" onclick="document.getElementById('fi').click()">📎</button>
          <div class="inp-box">
            <textarea id="ti" placeholder="发送消息…支持 Markdown" rows="1" oninput="ar(this)" onkeydown="hk(event)"></textarea>
          </div>
          <button class="snd-btn" onclick="sendText()">➤</button>
        </div>
        <input type="file" id="fi" multiple onchange="handleFiles(this.files)">
      </div>
    </div>

    <!-- ====== FILES SCREEN ====== -->
    <div id="files-screen">
      <div class="files-top">
        <button class="ib menu-btn" onclick="openSb()">☰</button>
        <div class="files-title" id="files-screen-title">所有文件</div>
        <div class="files-tb">
          <select id="sort-sel" onchange="renderFG()" style="padding:6px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;outline:none">
            <option value="time-desc">最新优先</option>
            <option value="time-asc">最早优先</option>
            <option value="name">文件名</option>
            <option value="size">大小</option>
          </select>
          <button class="tb-btn" id="sel-all-btn" onclick="toggleFGSelect()">多选</button>
          <button class="tb-btn active" onclick="syncFiles()">🔄 同步</button>
          <div class="view-tog">
            <button class="vb active" id="vb-g" onclick="setView('grid')">⊞</button>
            <button class="vb" id="vb-l" onclick="setView('list')">☰</button>
          </div>
        </div>
      </div>

      <!-- Category filter -->
      <div class="filter-row" id="fg-cat-row"></div>

      <!-- Type filter -->
      <div class="filter-row" id="fg-type-row"></div>

      <!-- Search -->
      <div class="files-search">
        <div class="fs-box">
          <span style="color:var(--text3)">🔍</span>
          <input id="fg-search" placeholder="在此页搜索文件名…" oninput="renderFG()">
          <button class="ib" onclick="document.getElementById('fg-search').value='';renderFG()" style="font-size:12px">✕</button>
        </div>
      </div>

      <!-- Files select bar -->
      <div class="select-bar" id="fg-sel-bar" style="display:none">
        <span class="sel-count" id="fg-sel-cnt">已选 0 个</span>
        <button class="sel-cancel" onclick="exitFGSelect()">取消</button>
        <button class="btn-g" onclick="moveSelectedFiles()" style="font-size:12px;padding:6px 12px">移动分类</button>
        <button class="sel-del" onclick="deleteSelectedFiles()">删除所选</button>
      </div>

      <div id="fg"></div>
    </div>

  </main>
</div>

<!-- ====== SEARCH OVERLAY ====== -->
<div id="search-overlay" onclick="closeSearch()">
  <div class="search-modal" onclick="event.stopPropagation()">
    <div class="search-inp-row">
      <span style="font-size:18px">🔍</span>
      <input id="g-search" placeholder="搜索文件名、内容…" oninput="doGlobalSearch()" autofocus>
      <button class="ib" onclick="closeSearch()">✕</button>
    </div>
    <div class="search-results" id="g-results">
      <div class="sr-empty">输入关键词开始搜索</div>
    </div>
  </div>
</div>

<!-- ====== LIGHTBOX ====== -->
<div id="lb" onclick="closeLB()">
  <div class="lb-top" onclick="event.stopPropagation()">
    <span id="lb-name" class="lb-name"></span>
    <button class="lb-act" id="lb-dl" title="下载">⬇</button>
    <button class="lb-act" onclick="closeLB()">✕</button>
  </div>
  <button class="lb-arrow" id="lb-prev" onclick="event.stopPropagation();lbNav(-1)">‹</button>
  <img id="lb-img" src="" alt="" onclick="event.stopPropagation()">
  <button class="lb-arrow" id="lb-next" onclick="event.stopPropagation();lbNav(1)">›</button>
</div>

<!-- ====== MODAL CONTAINER ====== -->
<div id="mc"></div>
<!-- ====== TOAST CONTAINER ====== -->
<div id="toasts"></div>

<script>
/* ============================================================
   GLOBAL STATE
============================================================ */
const S = {
  user:'', repo:'', token:'',
  messages:[],        // {id, type, content, files, category, timestamp, pinned, sha}
  msgSha:null,
  allFiles:[],        // from GitHub API — only inside category folders
  favorites:new Set(),// Set of file paths
  archived:new Set(), // Set of file paths
  metaSha:null,       // SHA of gitdrive-meta.json
  currentCat:'other',
  filesCat:'all',
  filesType:'all',
  filesView:'grid',
  filesMode:'all',    // 'all' | 'fav' | 'archive' | catId
  selectMode:false,
  selectedMsgs:new Set(),
  fgSelectMode:false,
  fgSelected:new Set(),
  darkMode:true,
  lbImages:[],        // current lightbox image list
  lbIdx:0,
};

/* ============================================================
   ===== CATEGORIES — 修改此数组以自定义分类 =====
   id:    folder name in GitHub repo (must be URL-safe)
   label: display name
   icon:  emoji icon
   color: accent color
   bg:    background tint
============================================================ */
const CATEGORIES = [
  { id:'law',       label:'法学',   icon:'⚖️',  color:'#4f8ef7', bg:'rgba(79,142,247,.15)'   },
  { id:'envlaw',    label:'环境法', icon:'🌿',  color:'#34d058', bg:'rgba(52,208,88,.15)'    },
  { id:'entertain', label:'娱乐',   icon:'🎬',  color:'#fb923c', bg:'rgba(251,146,60,.15)'   },
  { id:'work',      label:'办公',   icon:'💼',  color:'#a78bfa', bg:'rgba(167,139,250,.15)'  },
  { id:'other',     label:'其他',   icon:'📦',  color:'#9098aa', bg:'rgba(144,152,170,.15)'  },
  { id:'text',      label:'文字',   icon:'📝',  color:'#fbbf24', bg:'rgba(251,191,36,.15)'   },
];
/* ===== END CATEGORIES ===== */

const catMap = Object.fromEntries(CATEGORIES.map(c=>[c.id,c]));

// FILE TYPE GROUPS for filter
const TYPE_GROUPS = [
  { id:'all',   label:'全部',   exts:[] },
  { id:'img',   label:'图片',   exts:['jpg','jpeg','png','gif','webp','svg','bmp','avif'] },
  { id:'doc',   label:'文档',   exts:['pdf','doc','docx','txt','md','rtf','odt'] },
  { id:'sheet', label:'表格',   exts:['xls','xlsx','csv','ods'] },
  { id:'slide', label:'演示',   exts:['ppt','pptx','key','odp'] },
  { id:'video', label:'视频',   exts:['mp4','mov','avi','mkv','webm','m4v'] },
  { id:'audio', label:'音频',   exts:['mp3','wav','flac','aac','ogg','m4a'] },
  { id:'code',  label:'代码',   exts:['js','ts','py','java','c','cpp','html','css','json','xml','yaml','go','rs','php'] },
  { id:'arch',  label:'压缩包', exts:['zip','rar','7z','tar','gz','bz2'] },
];

/* ============================================================
   INIT
============================================================ */
window.onload = () => {
  const saved = localStorage.getItem('gd-creds');
  if (saved) { const d=JSON.parse(saved); S.user=d.user; S.repo=d.repo; S.token=d.token; launchApp(); }
  const th = localStorage.getItem('gd-theme')||'dark';
  if (th==='light') { document.documentElement.setAttribute('data-theme','light'); S.darkMode=false; document.getElementById('theme-btn').textContent='☀️'; }

  // Global drag-drop
  document.addEventListener('dragover', e=>{ e.preventDefault(); document.getElementById('drag-ov').classList.add('show'); });
  document.addEventListener('dragleave', e=>{ if (!e.relatedTarget) document.getElementById('drag-ov').classList.remove('show'); });
  document.addEventListener('drop', e=>{
    e.preventDefault();
    document.getElementById('drag-ov').classList.remove('show');
    if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
  });

  // Keyboard shortcut
  document.addEventListener('keydown', e=>{
    if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); openSearch(); }
    if (e.key==='Escape') { closeSearch(); closeLB(); closeModal(); }
  });
};

/* ============================================================
   LOGIN / LOGOUT
============================================================ */
async function doLogin() {
  const u=document.getElementById('lu').value.trim();
  const r=document.getElementById('lr').value.trim();
  const t=document.getElementById('lt').value.trim();
  const err=document.getElementById('login-err');
  if (!u||!r||!t) { err.textContent='请填写所有字段'; err.style.display='block'; return; }
  err.style.display='none';
  const btn=document.querySelector('.btn-login');
  btn.innerHTML='<span class="spin">⟳</span> 连接中…'; btn.disabled=true;
  try {
    const res=await gh(`/repos/${u}/${r}`);
    if (!res.ok) throw new Error('仓库访问失败，请检查凭据');
    S.user=u; S.repo=r; S.token=t;
    localStorage.setItem('gd-creds',JSON.stringify({user:u,repo:r,token:t}));
    launchApp();
  } catch(e) { err.textContent=e.message; err.style.display='block'; }
  btn.innerHTML='连接仓库'; btn.disabled=false;
}

function doLogout() {
  if (!confirm('确定退出？凭据将从本地清除。')) return;
  localStorage.removeItem('gd-creds'); location.reload();
}

async function launchApp() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('sb-repo').textContent=`${S.user}/${S.repo}`;
  document.getElementById('hd-title').textContent=S.repo;
  buildCatUI();
  await loadAll();
}

/* ============================================================
   CATEGORY UI
============================================================ */
function buildCatUI() {
  // Sidebar nav
  document.getElementById('cat-nav').innerHTML = CATEGORIES.map(c=>`
    <button class="nav-it" onclick="showFilesFiltered('${c.id}')" id="cn-${c.id}">
      <span class="ni">${c.icon}</span>${c.label}
    </button>`).join('');

  // Chat chips
  document.getElementById('cat-chips').innerHTML = CATEGORIES.map(c=>`
    <button class="cat-chip ${S.currentCat===c.id?'active':''}" onclick="selCat('${c.id}')" id="cc-${c.id}">
      <span class="ci">${c.icon}</span>${c.label}
    </button>`).join('');

  if (S.currentCat==='all') selCat('other');

  // Files cat filter
  document.getElementById('fg-cat-row').innerHTML =
    `<button class="fr-chip active" onclick="setFCat('all')" id="fc-all">全部</button>
     <button class="fr-chip" onclick="setFCat('fav')" id="fc-fav">⭐ 收藏</button>
     <button class="fr-chip" onclick="setFCat('archive')" id="fc-archive">📦 归档</button>
     <span class="fr-sep"></span>` +
    CATEGORIES.map(c=>`<button class="fr-chip" onclick="setFCat('${c.id}')" id="fc-${c.id}">${c.icon} ${c.label}</button>`).join('');

  // Type filter
  document.getElementById('fg-type-row').innerHTML =
    TYPE_GROUPS.map((g,i)=>`<button class="fr-chip ${i===0?'active':''}" onclick="setFType('${g.id}')" id="ft-${g.id}">${g.label}</button>`).join('');
}

function selCat(id) {
  S.currentCat=id;
  document.querySelectorAll('.cat-chip').forEach(el=>el.classList.remove('active'));
  const c=document.getElementById('cc-'+id); if(c) c.classList.add('active');
}

/* ============================================================
   DATA LOADING
============================================================ */
async function loadAll() {
  document.getElementById('hd-sub').textContent='加载中…';
  document.getElementById('sb-stat').textContent='同步中…';
  try {
    await Promise.all([loadMessages(), loadMeta(), loadRepoFiles()]);
    updateStats();
  } catch(e) {
    document.getElementById('hd-sub').textContent='加载失败';
    toast('加载失败: '+e.message,'err');
  }
}

async function loadMessages() {
  const r=await gh(`/repos/${S.user}/${S.repo}/contents/gitdrive-messages.json`);
  if (r.ok) {
    const d=await r.json();
    S.messages=JSON.parse(atob(d.content.replace(/\n/g,'')));
    S.msgSha=d.sha;
  } else { S.messages=[]; S.msgSha=null; }
  renderMsgs();
}

async function loadMeta() {
  const r=await gh(`/repos/${S.user}/${S.repo}/contents/gitdrive-meta.json`);
  if (r.ok) {
    const d=await r.json();
    const meta=JSON.parse(atob(d.content.replace(/\n/g,'')));
    S.favorites=new Set(meta.favorites||[]);
    S.archived=new Set(meta.archived||[]);
    S.metaSha=d.sha;
  } else { S.favorites=new Set(); S.archived=new Set(); S.metaSha=null; }
  updateFavCount();
}

async function loadRepoFiles() {
  /* Only load files that are inside a known category folder */
  const files=[];
  for (const cat of CATEGORIES) {
    const r=await gh(`/repos/${S.user}/${S.repo}/contents/${cat.id}`);
    if (r.ok) {
      const items=await r.json();
      if (Array.isArray(items)) {
        items.forEach(item=>{ if(item.type==='file') files.push({...item, category:cat.id}); });
      }
    }
  }
  S.allFiles=files;
}

async function syncFiles() {
  toast('同步中…');
  await loadAll();
  toast('同步完成','ok');
}

async function refreshAll() {
  toast('刷新中…');
  await loadAll();
  toast('已刷新','ok');
}

function updateStats() {
  const cnt=S.allFiles.length;
  document.getElementById('files-cnt').textContent=cnt;
  document.getElementById('hd-sub').textContent=`${cnt} 个文件`;
  document.getElementById('sb-stat').textContent=`${cnt} 个文件 · 就绪`;
  updateFavCount();
  renderFG();
}

function updateFavCount() {
  document.getElementById('fav-cnt').textContent=S.favorites.size||'';
}

/* ============================================================
   SAVE
============================================================ */
async function saveMsgs() {
  const body={message:'Update messages [GitDrive]',content:btoa(unescape(encodeURIComponent(JSON.stringify(S.messages,null,2))))};
  if(S.msgSha) body.sha=S.msgSha;
  const r=await gh(`/repos/${S.user}/${S.repo}/contents/gitdrive-messages.json`,{method:'PUT',body:JSON.stringify(body)});
  if(r.ok){const d=await r.json(); S.msgSha=d.content.sha;}
}

async function saveMeta() {
  const meta={favorites:[...S.favorites],archived:[...S.archived]};
  const body={message:'Update meta [GitDrive]',content:btoa(unescape(encodeURIComponent(JSON.stringify(meta))))};
  if(S.metaSha) body.sha=S.metaSha;
  const r=await gh(`/repos/${S.user}/${S.repo}/contents/gitdrive-meta.json`,{method:'PUT',body:JSON.stringify(body)});
  if(r.ok){const d=await r.json(); S.metaSha=d.content.sha;}
}

/* ============================================================
   SEND TEXT
============================================================ */
async function sendText() {
  const el=document.getElementById('ti');
  const txt=el.value.trim(); if(!txt) return;
  el.value=''; ar(el);
  const msg={id:Date.now().toString(),type:'text',content:txt,category:S.currentCat,timestamp:new Date().toISOString()};
  S.messages.push(msg);
  renderMsgs(); scrollBot();
  await saveMsgs();
}

function hk(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText();} }

/* ============================================================
   UPLOAD FILES
============================================================ */
async function handleFiles(files) {
  for (const f of Array.from(files)) await uploadFile(f);
  await loadRepoFiles(); updateStats();
  // Refresh file list in message objects (downloadUrl)
  renderMsgs();
}

async function uploadFile(file) {
  const cat=catMap[S.currentCat]||catMap['other'];
  const path=`${cat.id}/${file.name}`;

  const pid='p'+Date.now();
  const pEl=document.createElement('div');
  pEl.className='up-prog'; pEl.id=pid;
  pEl.innerHTML=`<div class="up-name">${file.name}</div><div class="pbar"><div class="pfill" id="pf${pid}"></div></div>`;
  document.getElementById('upload-area').appendChild(pEl);

  try {
    const b64=await toB64(file, pct=>{ const el=document.getElementById('pf'+pid); if(el) el.style.width=Math.round(pct/2)+'%'; });
    let sha;
    const chk=await gh(`/repos/${S.user}/${S.repo}/contents/${path}`);
    if(chk.ok){const d=await chk.json(); sha=d.sha;}
    const body={message:`Add ${file.name} [GitDrive]`,content:b64};
    if(sha) body.sha=sha;
    const pf=document.getElementById('pf'+pid); if(pf) pf.style.width='80%';
    const r=await gh(`/repos/${S.user}/${S.repo}/contents/${path}`,{method:'PUT',body:JSON.stringify(body)});
    if(!r.ok) throw new Error('上传失败');
    const rd=await r.json();
    if(pf) pf.style.width='100%';

    const msg={id:Date.now().toString(),type:'file',
      files:[{name:file.name,path,size:file.size,mime:file.type,sha:rd.content.sha,downloadUrl:rd.content.download_url}],
      category:cat.id,timestamp:new Date().toISOString()};
    S.messages.push(msg);
    renderMsgs(); scrollBot();
    await saveMsgs();
    toast(`${file.name} 已上传`,'ok');
  } catch(e){ toast(e.message,'err'); }
  finally{ setTimeout(()=>pEl.remove(),700); }
}

function toB64(file,prog){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onprogress=e=>{if(e.lengthComputable&&prog) prog(e.loaded/e.total*100);};
    fr.onload=()=>res(fr.result.split(',')[1]);
    fr.onerror=rej;
    fr.readAsDataURL(file);
  });
}

/* ============================================================
   RENDER MESSAGES
============================================================ */
function renderMsgs() {
  const el=document.getElementById('msg-list');
  const empt=document.getElementById('empty-chat');
  if(!S.messages.length){empt.style.display='flex'; return;}
  empt.style.display='none';

  // Group by day
  const days={};
  S.messages.forEach(m=>{
    const d=new Date(m.timestamp).toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
    if(!days[d]) days[d]=[];
    days[d].push(m);
  });

  let html='';
  for(const[date,msgs] of Object.entries(days)){
    html+=`<div class="date-sep">${date}</div>`;
    msgs.forEach(m=>{html+=renderMsg(m);});
  }
  html+=`<div id="empty-chat" style="display:none" class="empty-st"></div>`;
  el.innerHTML=html;

  // Attach checkboxes
  if(S.selectMode){
    document.getElementById('msg-list').classList.add('select-mode');
    S.selectedMsgs.forEach(id=>{
      const cb=document.querySelector(`.msg-check[data-id="${id}"]`);
      if(cb) cb.classList.add('checked');
    });
  }
}

function renderMsg(m) {
  const time=new Date(m.timestamp).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  const cat=catMap[m.category]||catMap['other'];
  let bContent='';

  if(m.type==='text') {
    const md=marked.parse(m.content||'');
    bContent=`<div class="bl out" data-id="${m.id}">${md}
      <div class="mtime">${m.pinned?'<span class="mtime-pinned">📌</span>':''} ${time}</div>
    </div>`;
  } else if(m.type==='file') {
    const files=m.files||[];
    const imgs=files.filter(f=>isImg(f.name));
    const docs=files.filter(f=>!isImg(f.name));

    let imgHtml='', docHtml='';
    if(imgs.length) {
      const thumbs=imgs.map((f,i)=>{
        const url=rawUrl(f.path);
        const more=(i===2&&imgs.length>3)?`<div class="img-more-overlay">+${imgs.length-3}</div>`:'';
        return `<div class="img-item" onclick="openLB('${url}','${f.name}',${JSON.stringify(imgs.map(x=>rawUrl(x.path)))},${i})">${more}
          <img src="${url}" loading="lazy" alt="${f.name}">
          <div class="img-ov">🔍</div>
        </div>`;
      }).slice(0,3);

      let gridClass='img-single';
      if(imgs.length===2) gridClass='img-grid2';
      else if(imgs.length>=3) gridClass='img-grid3';

      imgHtml=`<div class="img-stack ${gridClass}">${thumbs.join('')}</div>`;
    }
    if(docs.length) {
      docHtml=docs.map(f=>`
        <div class="fc" onclick="dlFile('${rawUrl(f.path)}','${f.name}')">
          <div class="fi-icon" style="background:${cat.bg}">${fileIcon(f.name)}</div>
          <div class="fi-info">
            <div class="fi-name">${f.name}</div>
            <div class="fi-meta">${fmtSize(f.size)} · ${cat.icon} ${cat.label}</div>
          </div>
        </div>`).join('');
    }
    bContent=`<div class="bl out" data-id="${m.id}" style="padding:6px">
      ${imgHtml?`<div class="fstack">${imgHtml}</div>`:''}
      ${docHtml?`<div class="fstack" style="margin-top:${imgHtml?'5px':'0'}">${docHtml}</div>`:''}
      <div class="mtime" style="padding:2px 6px 0">${m.pinned?'<span class="mtime-pinned">📌</span>':''} ${time}</div>
    </div>`;
  }

  return `<div class="mg">
    <div class="mr out" data-id="${m.id}">
      <div class="msg-check ${S.selectedMsgs.has(m.id)?'checked':''}" data-id="${m.id}" onclick="toggleMsgSelect('${m.id}')">✓</div>
      <div class="bw">
        ${bContent}
        ${m.pinned?`<div class="pin-badge">📌</div>`:''}
        <div class="m-acts">
          <button class="ma" onclick="pinMsg('${m.id}')" title="${m.pinned?'取消置顶':'置顶'}">${m.pinned?'📌':'📍'}</button>
          <button class="ma" onclick="dlMsg('${m.id}')" title="下载">⬇</button>
          <button class="ma" onclick="editMsg('${m.id}')" title="编辑/重命名">✏️</button>
          <button class="ma" onclick="delMsg('${m.id}')" title="删除">🗑</button>
        </div>
      </div>
    </div>
  </div>`;
}

function scrollBot(){const el=document.getElementById('msg-list');el.scrollTop=el.scrollHeight;}

/* ============================================================
   MESSAGE ACTIONS
============================================================ */
async function pinMsg(id) {
  const m=S.messages.find(x=>x.id===id); if(!m) return;
  m.pinned=!m.pinned;
  renderMsgs();
  await saveMsgs();
  toast(m.pinned?'已置顶':'已取消置顶');
}

function dlMsg(id) {
  const m=S.messages.find(x=>x.id===id); if(!m) return;
  if(m.type==='text'){
    const blob=new Blob([m.content],{type:'text/plain'});
    dlFile(URL.createObjectURL(blob),'msg-'+id+'.txt');
  } else if(m.files){ m.files.forEach(f=>dlFile(rawUrl(f.path),f.name)); }
}

async function editMsg(id) {
  const m=S.messages.find(x=>x.id===id); if(!m) return;
  if(m.type==='text'){
    showInputModal('编辑内容','内容',m.content,async val=>{
      m.content=val; renderMsgs(); await saveMsgs(); toast('已保存','ok');
    });
  } else if(m.files&&m.files.length) {
    renameFileInMsg(m,m.files[0]);
  }
}

async function renameFileInMsg(m, f) {
  showInputModal('重命名文件','新文件名',f.name,async newName=>{
    if(!newName||newName===f.name) return;
    const folder=f.path.includes('/')?f.path.substring(0,f.path.lastIndexOf('/')):f.category;
    const newPath=`${folder}/${newName}`;
    const r=await gh(`/repos/${S.user}/${S.repo}/contents/${f.path}`);
    const d=await r.json();
    await gh(`/repos/${S.user}/${S.repo}/contents/${newPath}`,{method:'PUT',body:JSON.stringify({message:`Rename to ${newName} [GitDrive]`,content:d.content.replace(/\n/g,'')})});
    await gh(`/repos/${S.user}/${S.repo}/contents/${f.path}`,{method:'DELETE',body:JSON.stringify({message:`Delete old ${f.name} [GitDrive]`,sha:d.sha})});
    f.path=newPath; f.name=newName;
    await saveMsgs(); await loadRepoFiles(); updateStats(); renderMsgs();
    toast(`已重命名为 ${newName}`,'ok');
  });
}

async function delMsg(id) {
  const m=S.messages.find(x=>x.id===id); if(!m) return;
  showConfirm('删除消息','确认删除此消息？文件消息会同时从仓库删除文件。',async()=>{
    if(m.files) for(const f of m.files){
      const r=await gh(`/repos/${S.user}/${S.repo}/contents/${f.path}`);
      if(r.ok){const d=await r.json();await gh(`/repos/${S.user}/${S.repo}/contents/${f.path}`,{method:'DELETE',body:JSON.stringify({message:`Delete ${f.name} [GitDrive]`,sha:d.sha})});}
    }
    S.messages=S.messages.filter(x=>x.id!==id);
    renderMsgs(); await saveMsgs(); await loadRepoFiles(); updateStats();
    toast('已删除','ok');
  });
}

/* ============================================================
   SELECT MODE (chat)
============================================================ */
function toggleSelectMode() {
  S.selectMode=!S.selectMode;
  S.selectedMsgs.clear();
  document.getElementById('msg-list').classList.toggle('select-mode',S.selectMode);
  document.getElementById('sel-bar').classList.toggle('show',S.selectMode);
  if(!S.selectMode) renderMsgs();
}
function exitSelectMode(){S.selectMode=false;S.selectedMsgs.clear();document.getElementById('msg-list').classList.remove('select-mode');document.getElementById('sel-bar').classList.remove('show');renderMsgs();}
function toggleMsgSelect(id){
  if(S.selectedMsgs.has(id)) S.selectedMsgs.delete(id); else S.selectedMsgs.add(id);
  const cb=document.querySelector(`.msg-check[data-id="${id}"]`);
  if(cb) cb.classList.toggle('checked',S.selectedMsgs.has(id));
  document.getElementById('sel-cnt').textContent=`已选 ${S.selectedMsgs.size} 条`;
}
async function deleteSelected(){
  if(!S.selectedMsgs.size) return;
  showConfirm('批量删除',`确认删除选中的 ${S.selectedMsgs.size} 条消息？`,async()=>{
    for(const id of S.selectedMsgs){
      const m=S.messages.find(x=>x.id===id); if(!m) continue;
      if(m.files) for(const f of m.files){
        const r=await gh(`/repos/${S.user}/${S.repo}/contents/${f.path}`);
        if(r.ok){const d=await r.json();await gh(`/repos/${S.user}/${S.repo}/contents/${f.path}`,{method:'DELETE',body:JSON.stringify({message:`Delete ${f.name} [GitDrive]`,sha:d.sha})});}
      }
    }
    S.messages=S.messages.filter(x=>!S.selectedMsgs.has(x.id));
    exitSelectMode(); await saveMsgs(); await loadRepoFiles(); updateStats();
    toast('批量删除完成','ok');
  });
}

/* ============================================================
   FILES GRID SCREEN
============================================================ */
function showScreen(name){
  document.getElementById('chat-screen').style.display=name==='chat'?'flex':'none';
  document.getElementById('files-screen').style.display=name==='files'?'flex':'none';
  ['n-chat','n-files'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('n-'+name).classList.add('active');
  if(name==='files'){S.filesMode='all';setFCat('all');renderFG();}
  closeSb();
}

function showFilesFiltered(mode){
  // mode: 'fav' | 'archive' | catId
  S.filesMode=mode;
  document.getElementById('n-files').classList.remove('active');
  document.getElementById('files-screen').style.display='flex';
  document.getElementById('chat-screen').style.display='none';

  if(mode==='fav'){ document.getElementById('files-screen-title').textContent='⭐ 收藏'; setFCat('fav'); }
  else if(mode==='archive'){ document.getElementById('files-screen-title').textContent='📦 归档'; setFCat('archive'); }
  else { document.getElementById('files-screen-title').textContent='所有文件'; setFCat(mode); }
  renderFG(); closeSb();
}

function setFCat(id){
  S.filesCat=id;
  document.querySelectorAll('#fg-cat-row .fr-chip').forEach(el=>el.classList.remove('active'));
  const btn=document.getElementById('fc-'+id); if(btn) btn.classList.add('active');
  renderFG();
}
function setFType(id){
  S.filesType=id;
  document.querySelectorAll('#fg-type-row .fr-chip').forEach(el=>el.classList.remove('active'));
  const btn=document.getElementById('ft-'+id); if(btn) btn.classList.add('active');
  renderFG();
}
function setView(v){
  S.filesView=v;
  document.getElementById('vb-g').classList.toggle('active',v==='grid');
  document.getElementById('vb-l').classList.toggle('active',v==='list');
  renderFG();
}

function renderFG(){
  const grid=document.getElementById('fg');
  let files=[...S.allFiles];

  // Filter by mode / cat
  if(S.filesCat==='fav') files=files.filter(f=>S.favorites.has(f.path));
  else if(S.filesCat==='archive') files=files.filter(f=>S.archived.has(f.path));
  else if(S.filesCat!=='all') files=files.filter(f=>f.category===S.filesCat);

  // Type filter
  if(S.filesType!=='all'){
    const grp=TYPE_GROUPS.find(g=>g.id===S.filesType);
    if(grp) files=files.filter(f=>grp.exts.includes(ext(f.name)));
  }

  // Search
  const q=(document.getElementById('fg-search')?.value||'').trim().toLowerCase();
  if(q) files=files.filter(f=>f.name.toLowerCase().includes(q));

  // Sort
  const sort=document.getElementById('sort-sel')?.value||'time-desc';
  const msgByPath={};
  S.messages.forEach(m=>{if(m.files) m.files.forEach(f=>{msgByPath[f.path]=m.timestamp;});});
  if(sort==='time-desc') files.sort((a,b)=>(msgByPath[b.path]||'')>(msgByPath[a.path]||'')?1:-1);
  else if(sort==='time-asc') files.sort((a,b)=>(msgByPath[a.path]||'')>(msgByPath[b.path]||'')?1:-1);
  else if(sort==='name') files.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='size') files.sort((a,b)=>(b.size||0)-(a.size||0));

  if(!files.length){
    grid.innerHTML=`<div style="grid-column:1/-1"><div class="empty-st"><div class="empty-ic">📭</div><div class="empty-t">没有文件</div><div class="empty-s">上传文件后将显示在这里</div></div></div>`;
    grid.className=S.filesView==='list'?'list-view':'';
    return;
  }

  const isList=S.filesView==='list';
  if(isList) grid.classList.add('list-view'); else grid.classList.remove('list-view');

  grid.innerHTML=files.map((f,i)=>{
    const cat=catMap[f.category]||catMap['other'];
    const isImage=isImg(f.name);
    const url=rawUrl(f.path);
    const msgT=msgByPath[f.path]?new Date(msgByPath[f.path]).toLocaleDateString('zh-CN'):'';
    const isFav=S.favorites.has(f.path);
    const isArc=S.archived.has(f.path);
    const isSel=S.fgSelected.has(f.path);
    const fileExt=ext(f.name).toUpperCase();

    const thumb=isImage
      ?`<div class="fgi-img-wrap"><img src="${url}" loading="lazy" alt="${f.name}"></div>`
      :`<div class="fgi-icon-wrap" style="background:${cat.bg}">${fileIcon(f.name)}<span class="fgi-ext">${fileExt}</span></div>`;

    const favStar=isFav?`<div class="fav-star">⭐</div>`:'';
    const arcBadge=isArc?`<div class="fav-star" style="right:26px;font-size:11px">📦</div>`:'';
    const selChk=`<div class="fgi-check ${isSel?'selected':''}" onclick="toggleFGItem('${f.path}',event)">✓</div>`;

    if(isList){
      return `<div class="fgi list-item ${isSel?'selected':''}" style="animation-delay:${i*.02}s" data-path="${f.path}">
        ${selChk}
        ${isImage?`<div class="fgi-img-wrap" onclick="openLB('${url}','${f.name}',[],0)">${thumb.match(/<div class="fgi-img-wrap">(.*?)<\/div>/s)?.[1]||''}</div>`
          :`<div class="fgi-icon-wrap" style="background:${cat.bg};width:42px;height:42px;border-radius:9px;font-size:20px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px">${fileIcon(f.name)}<span class="fgi-ext" style="font-size:8px;padding:1px 3px">${fileExt}</span></div>`}
        <div class="fgi-info">
          <div class="fgi-name">${f.name}</div>
          <div class="fgi-meta">${cat.icon} ${cat.label} · ${fmtSize(f.size)}${msgT?' · '+msgT:''}</div>
        </div>
        <div class="li-acts">
          <button class="ib" onclick="toggleFav('${f.path}')" title="${isFav?'取消收藏':'收藏'}">${isFav?'⭐':'☆'}</button>
          <button class="ib" onclick="toggleArc('${f.path}')" title="${isArc?'取消归档':'归档'}">${isArc?'📦':'🗄'}</button>
          <button class="ib" onclick="moveFile('${f.path}','${f.name}')" title="移动分类">↗</button>
          <button class="ib" onclick="renameGH('${f.path}','${f.name}')" title="重命名">✏️</button>
          <button class="ib" onclick="dlFile('${url}','${f.name}')" title="下载">⬇</button>
          <button class="ib" onclick="delFile('${f.path}','${f.sha}')" title="删除">🗑</button>
        </div>
      </div>`;
    } else {
      return `<div class="fgi ${isSel?'selected':''}" style="animation-delay:${i*.02}s" data-path="${f.path}">
        ${selChk}${favStar}${arcBadge}
        ${isImage?`<div class="fgi-img-wrap" style="cursor:pointer" onclick="openLB('${url}','${f.name}',${JSON.stringify(files.filter(x=>isImg(x.name)).map(x=>rawUrl(x.path)))},${files.filter(x=>isImg(x.name)).findIndex(x=>x.path===f.path)})">${thumb.match(/<div class="fgi-img-wrap">(.*?)<\/div>/s)?.[1]||''}</div>`:thumb}
        <div class="fgi-info">
          <div class="fgi-name">${f.name}</div>
          <div class="fgi-meta">${fmtSize(f.size)}${msgT?' · '+msgT:''}</div>
          <span class="fgi-cat" style="background:${cat.bg};color:${cat.color}">${cat.icon} ${cat.label}</span>
        </div>
      </div>`;
    }
  }).join('');

  // Right-click context on grid items
  grid.querySelectorAll('.fgi:not(.list-item)').forEach(el=>{
    el.addEventListener('contextmenu',e=>{
      e.preventDefault();
      const path=el.dataset.path;
      const f=S.allFiles.find(x=>x.path===path); if(!f) return;
      showContextMenu(e,f);
    });
  });
}

function showContextMenu(e, f) {
  closeModal();
  const url=rawUrl(f.path);
  const isFav=S.favorites.has(f.path);
  const isArc=S.archived.has(f.path);
  const mc=document.getElementById('mc');
  mc.innerHTML=`<div class="m-ov" onclick="closeModal()" style="align-items:flex-start;justify-content:flex-start;padding:0">
    <div class="modal" style="position:fixed;top:${Math.min(e.clientY,window.innerHeight-300)}px;left:${Math.min(e.clientX,window.innerWidth-200)}px;padding:6px;min-width:170px;max-width:200px;border-radius:14px" onclick="event.stopPropagation()">
      ${ctxBtn('⭐ '+(isFav?'取消收藏':'收藏'),()=>toggleFav(f.path))}
      ${ctxBtn('📦 '+(isArc?'取消归档':'归档'),()=>toggleArc(f.path))}
      ${ctxBtn('↗ 移动分类',()=>moveFile(f.path,f.name))}
      ${ctxBtn('✏️ 重命名',()=>renameGH(f.path,f.name))}
      ${ctxBtn('⬇ 下载',()=>dlFile(url,f.name))}
      <div style="height:1px;background:var(--border);margin:3px 0"></div>
      ${ctxBtn('🗑 删除',()=>delFile(f.path,f.sha),true)}
    </div>
  </div>`;
  mc._cbs={};
}

function ctxBtn(label, cb, danger=false){
  const id='cb'+Math.random().toString(36).slice(2);
  setTimeout(()=>{const el=document.getElementById(id);if(el)el.onclick=()=>{closeModal();cb();};},0);
  return `<div id="${id}" style="padding:8px 12px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:${danger?'var(--red)':'var(--text)'};transition:background var(--dur)" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''">${label}</div>`;
}

/* ============================================================
   FAVORITES & ARCHIVE
============================================================ */
async function toggleFav(path) {
  if(S.favorites.has(path)) S.favorites.delete(path); else S.favorites.add(path);
  updateFavCount(); await saveMeta(); renderFG();
  toast(S.favorites.has(path)?'已收藏':'已取消收藏');
}

async function toggleArc(path) {
  if(S.archived.has(path)) S.archived.delete(path); else S.archived.add(path);
  await saveMeta(); renderFG();
  toast(S.archived.has(path)?'已归档':'已取消归档');
}

/* ============================================================
   MOVE FILE (change category folder)
============================================================ */
async function moveFile(path, name) {
  const curCat=path.split('/')[0];
  let chosen=curCat;
  const mc=document.getElementById('mc');
  mc.innerHTML=`<div class="m-ov"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-t">移动到分类</div>
    <div class="cat-move-grid" id="cmg">
      ${CATEGORIES.map(c=>`<div class="cat-move-item ${c.id===curCat?'selected':''}" onclick="pickMoveCat('${c.id}')" id="cmi-${c.id}">
        <span>${c.icon}</span>${c.label}
      </div>`).join('')}
    </div>
    <div class="modal-btns">
      <button class="btn-g" onclick="closeModal()">取消</button>
      <button class="btn-a" onclick="doMoveFile('${path}','${name}')">确认移动</button>
    </div>
  </div></div>`;
  window._moveCat=curCat;
}

function pickMoveCat(id){
  window._moveCat=id;
  document.querySelectorAll('.cat-move-item').forEach(el=>el.classList.remove('selected'));
  document.getElementById('cmi-'+id).classList.add('selected');
}

async function doMoveFile(oldPath, name){
  const newCat=window._moveCat;
  const newPath=`${newCat}/${name}`;
  if(oldPath===newPath){closeModal();return;}
  closeModal();
  try{
    const r=await gh(`/repos/${S.user}/${S.repo}/contents/${oldPath}`);
    const d=await r.json();
    await gh(`/repos/${S.user}/${S.repo}/contents/${newPath}`,{method:'PUT',body:JSON.stringify({message:`Move ${name} to ${newCat} [GitDrive]`,content:d.content.replace(/\n/g,'')})});
    await gh(`/repos/${S.user}/${S.repo}/contents/${oldPath}`,{method:'DELETE',body:JSON.stringify({message:`Remove old ${name} [GitDrive]`,sha:d.sha})});
    // Update favorites/archived refs
    if(S.favorites.has(oldPath)){S.favorites.delete(oldPath);S.favorites.add(newPath);}
    if(S.archived.has(oldPath)){S.archived.delete(oldPath);S.archived.add(newPath);}
    // Update message refs
    S.messages.forEach(m=>{if(m.files) m.files.forEach(f=>{if(f.path===oldPath){f.path=newPath;f.category=newCat;}});});
    await Promise.all([saveMsgs(),saveMeta()]);
    await loadRepoFiles(); updateStats();
    toast(`已移动到 ${catMap[newCat].label}`,'ok');
  } catch(e){toast('移动失败: '+e.message,'err');}
}

/* ============================================================
   FG SELECT MODE
============================================================ */
function toggleFGSelect(){
  S.fgSelectMode=!S.fgSelectMode;
  S.fgSelected.clear();
  document.getElementById('fg-sel-bar').style.display=S.fgSelectMode?'flex':'none';
  document.getElementById('sel-all-btn').textContent=S.fgSelectMode?'取消多选':'多选';
  document.getElementById('fg').classList.toggle('select-mode',S.fgSelectMode);
  renderFG();
}
function exitFGSelect(){S.fgSelectMode=false;S.fgSelected.clear();document.getElementById('fg-sel-bar').style.display='none';document.getElementById('sel-all-btn').textContent='多选';document.getElementById('fg').classList.remove('select-mode');renderFG();}
function toggleFGItem(path,e){
  e.stopPropagation();
  if(!S.fgSelectMode) return;
  if(S.fgSelected.has(path)) S.fgSelected.delete(path); else S.fgSelected.add(path);
  document.getElementById('fg-sel-cnt').textContent=`已选 ${S.fgSelected.size} 个`;
  renderFG();
}
async function deleteSelectedFiles(){
  if(!S.fgSelected.size) return;
  showConfirm('批量删除',`确认删除选中的 ${S.fgSelected.size} 个文件？`,async()=>{
    for(const path of S.fgSelected){
      const r=await gh(`/repos/${S.user}/${S.repo}/contents/${path}`);
      if(r.ok){const d=await r.json();await gh(`/repos/${S.user}/${S.repo}/contents/${path}`,{method:'DELETE',body:JSON.stringify({message:`Delete ${path.split('/').pop()} [GitDrive]`,sha:d.sha})});}
      S.favorites.delete(path); S.archived.delete(path);
    }
    S.messages=S.messages.map(m=>{if(m.files)m.files=m.files.filter(f=>!S.fgSelected.has(f.path));return m;}).filter(m=>m.type==='text'||(m.files&&m.files.length));
    await Promise.all([saveMsgs(),saveMeta()]);
    exitFGSelect(); await loadRepoFiles(); updateStats(); renderMsgs();
    toast('批量删除完成','ok');
  });
}
async function moveSelectedFiles(){
  if(!S.fgSelected.size) return;
  const paths=[...S.fgSelected];
  let chosen=CATEGORIES[0].id;
  const mc=document.getElementById('mc');
  mc.innerHTML=`<div class="m-ov"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-t">批量移动到分类</div>
    <div class="cat-move-grid" id="cmg">
      ${CATEGORIES.map(c=>`<div class="cat-move-item ${c.id===chosen?'selected':''}" onclick="pickMoveCat('${c.id}')" id="cmi-${c.id}">
        <span>${c.icon}</span>${c.label}
      </div>`).join('')}
    </div>
    <div class="modal-btns">
      <button class="btn-g" onclick="closeModal()">取消</button>
      <button class="btn-a" onclick="doBatchMove(${JSON.stringify(paths)})">移动 ${paths.length} 个</button>
    </div>
  </div></div>`;
  window._moveCat=chosen;
}
async function doBatchMove(paths){
  const newCat=window._moveCat; closeModal();
  for(const oldPath of paths){
    const name=oldPath.split('/').pop();
    const newPath=`${newCat}/${name}`;
    if(oldPath===newPath) continue;
    try{
      const r=await gh(`/repos/${S.user}/${S.repo}/contents/${oldPath}`);
      const d=await r.json();
      await gh(`/repos/${S.user}/${S.repo}/contents/${newPath}`,{method:'PUT',body:JSON.stringify({message:`Move ${name} [GitDrive]`,content:d.content.replace(/\n/g,'')})});
      await gh(`/repos/${S.user}/${S.repo}/contents/${oldPath}`,{method:'DELETE',body:JSON.stringify({message:`Remove old ${name} [GitDrive]`,sha:d.sha})});
      if(S.favorites.has(oldPath)){S.favorites.delete(oldPath);S.favorites.add(newPath);}
      if(S.archived.has(oldPath)){S.archived.delete(oldPath);S.archived.add(newPath);}
      S.messages.forEach(m=>{if(m.files) m.files.forEach(f=>{if(f.path===oldPath){f.path=newPath;f.category=newCat;}});});
    } catch(e){toast('移动失败: '+e.message,'err');}
  }
  await Promise.all([saveMsgs(),saveMeta()]);
  exitFGSelect(); await loadRepoFiles(); updateStats();
  toast(`已移动到 ${catMap[newCat].label}`,'ok');
}

/* ============================================================
   RENAME / DELETE FILE (from files grid)
============================================================ */
async function renameGH(path,oldName){
  showInputModal('重命名','新文件名',oldName,async newName=>{
    if(!newName||newName===oldName) return;
    const folder=path.includes('/')?path.substring(0,path.lastIndexOf('/')):'.';
    const newPath=folder==='.'?newName:`${folder}/${newName}`;
    const r=await gh(`/repos/${S.user}/${S.repo}/contents/${path}`);
    const d=await r.json();
    await gh(`/repos/${S.user}/${S.repo}/contents/${newPath}`,{method:'PUT',body:JSON.stringify({message:`Rename to ${newName} [GitDrive]`,content:d.content.replace(/\n/g,'')})});
    await gh(`/repos/${S.user}/${S.repo}/contents/${path}`,{method:'DELETE',body:JSON.stringify({message:`Delete old ${oldName} [GitDrive]`,sha:d.sha})});
    if(S.favorites.has(path)){S.favorites.delete(path);S.favorites.add(newPath);}
    if(S.archived.has(path)){S.archived.delete(path);S.archived.add(newPath);}
    S.messages.forEach(m=>{if(m.files) m.files.forEach(f=>{if(f.path===path){f.path=newPath;f.name=newName;}});});
    await Promise.all([saveMsgs(),saveMeta()]);
    await loadRepoFiles(); updateStats(); renderMsgs();
    toast(`已重命名为 ${newName}`,'ok');
  });
}

async function delFile(path,sha){
  showConfirm('删除文件',`确认删除 ${path.split('/').pop()}？`,async()=>{
    const r=await gh(`/repos/${S.user}/${S.repo}/contents/${path}`);
    if(r.ok){const d=await r.json();await gh(`/repos/${S.user}/${S.repo}/contents/${path}`,{method:'DELETE',body:JSON.stringify({message:`Delete ${path.split('/').pop()} [GitDrive]`,sha:d.sha})});}
    S.favorites.delete(path); S.archived.delete(path);
    S.messages=S.messages.map(m=>{if(m.files)m.files=m.files.filter(f=>f.path!==path);return m;}).filter(m=>m.type==='text'||(m.files&&m.files.length));
    await Promise.all([saveMsgs(),saveMeta()]);
    await loadRepoFiles(); updateStats(); renderMsgs();
    toast('已删除','ok');
  });
}

/* ============================================================
   GLOBAL SEARCH
============================================================ */
function openSearch(){
  document.getElementById('search-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('g-search').focus(),100);
}
function closeSearch(){ document.getElementById('search-overlay').classList.remove('show'); }

function doGlobalSearch(){
  const q=document.getElementById('g-search').value.trim().toLowerCase();
  const results=document.getElementById('g-results');
  if(!q){results.innerHTML='<div class="sr-empty">输入关键词开始搜索</div>';return;}

  const matches=[];
  // Search files
  S.allFiles.forEach(f=>{
    if(f.name.toLowerCase().includes(q)) matches.push({type:'file',f});
  });
  // Search text messages
  S.messages.filter(m=>m.type==='text').forEach(m=>{
    if((m.content||'').toLowerCase().includes(q)) matches.push({type:'msg',m});
  });

  if(!matches.length){results.innerHTML='<div class="sr-empty">没有找到匹配的结果</div>';return;}

  results.innerHTML=matches.slice(0,20).map(item=>{
    if(item.type==='file'){
      const f=item.f;
