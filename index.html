<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GitDrive">
<title>GitDrive</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--bg4:#22272e;--bg5:#2d333b;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.1);--b3:rgba(255,255,255,.16);
  --t1:#e6edf3;--t2:#8b949e;--t3:#6e7681;
  --ac:#4493f8;--ac2:#79b8ff;
  --gl:rgba(68,147,248,.16);--gl2:rgba(68,147,248,.08);
  --ob:#1c50c0;--ib:#1c2128;
  --gr:#3fb950;--rd:#f85149;--or:#d29922;--pu:#bc8cff;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --dur:.16s;--ease:cubic-bezier(.4,0,.2,1);
}
[data-theme=light]{
  --bg:#f6f8fa;--bg2:#ffffff;--bg3:#f0f2f4;--bg4:#e8ebee;--bg5:#d8dbdf;
  --b1:rgba(0,0,0,.06);--b2:rgba(0,0,0,.1);--b3:rgba(0,0,0,.16);
  --t1:#1f2328;--t2:#656d76;--t3:#9198a1;
  --ac:#0969da;--ac2:#218bff;
  --gl:rgba(9,105,218,.14);--gl2:rgba(9,105,218,.06);
  --ob:#0969da;--ib:#ffffff;
  --gr:#1a7f37;--rd:#cf222e;--or:#9a6700;--pu:#8250df;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg);color:var(--t1);
  font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
}
button,input,textarea{font-family:inherit}
button{cursor:pointer}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}

/* ── LAYOUT ── */
#app{display:flex;height:100dvh;overflow:hidden}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;z-index:100;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  padding-top:max(16px,var(--sat));
  padding-bottom:max(16px,var(--sab));
}
.lw{width:100%;max-width:380px}
.lw-logo{
  width:60px;height:60px;margin:0 auto 20px;
  background:linear-gradient(135deg,#4493f8,#bc8cff);
  border-radius:16px;display:flex;align-items:center;justify-content:center;
  font-size:28px;box-shadow:0 0 0 6px rgba(68,147,248,.12);
}
.lw-h{font-size:24px;font-weight:700;text-align:center;margin-bottom:4px}
.lw-s{font-size:13px;color:var(--t2);text-align:center;margin-bottom:24px}
.lw-card{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;padding:24px}
.lw-field{margin-bottom:14px}
.lw-field label{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.lw-field input{
  width:100%;padding:10px 12px;
  background:var(--bg3);border:1px solid var(--b2);border-radius:8px;
  color:var(--t1);font-size:14px;outline:none;
  transition:border-color var(--dur),box-shadow var(--dur);
}
.lw-field input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--gl)}
.lw-btn{
  width:100%;padding:11px;margin-top:4px;
  background:var(--ac);border:none;border-radius:8px;
  color:#fff;font-size:14px;font-weight:600;
  transition:opacity var(--dur),transform var(--dur);
}
.lw-btn:hover{opacity:.88;transform:translateY(-1px)}
.lw-btn:active{transform:translateY(0)}
.lw-btn:disabled{opacity:.5;cursor:wait}
.lw-err{color:var(--rd);font-size:12px;margin-top:8px;text-align:center;display:none;font-weight:500}
.lw-hint{margin-top:12px;font-size:11px;color:var(--t3);text-align:center}

/* ── SIDEBAR ── */
#sidebar{
  width:256px;min-width:256px;background:var(--bg2);
  border-right:1px solid var(--b1);
  display:flex;flex-direction:column;
  transition:transform .26s var(--ease);
  padding-top:var(--sat);
}
.sb-hd{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;border-bottom:1px solid var(--b1)}
.sb-logo{width:34px;height:34px;background:linear-gradient(135deg,#4493f8,#bc8cff);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sb-title{font-weight:700;font-size:15px;flex:1}
.sb-acts{display:flex;gap:2px}
.ib{width:30px;height:30px;background:transparent;border:none;color:var(--t2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background var(--dur),color var(--dur)}
.ib:hover{background:var(--bg3);color:var(--t1)}
.sb-search{padding:8px 12px;border-bottom:1px solid var(--b1)}
.sb-sq{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--b1);border-radius:8px;padding:7px 10px;cursor:pointer;transition:border-color var(--dur)}
.sb-sq:hover{border-color:var(--ac)}
.sb-sq input{background:none;border:none;outline:none;color:var(--t1);font-size:12.5px;flex:1;cursor:pointer}
.sb-sq input::placeholder{color:var(--t3)}
.sb-nav{padding:8px 8px 0;display:flex;flex-direction:column;gap:1px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;color:var(--t2);font-weight:500;font-size:13.5px;border:none;background:transparent;width:100%;text-align:left;transition:background var(--dur),color var(--dur),transform var(--dur);cursor:pointer}
.ni:hover{background:var(--bg3);color:var(--t1)}
.ni:active{transform:scale(.98)}
.ni.on{background:var(--gl);color:var(--ac2);font-weight:600}
.ni .ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nb{margin-left:auto;background:var(--ac);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px}
.sb-sec{padding:14px 18px 4px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.sb-ft{margin-top:auto;padding:12px 16px max(12px,var(--sab));border-top:1px solid var(--b1);font-size:11px;color:var(--t3);display:flex;flex-direction:column;gap:3px}
.sb-author{font-size:12px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:5px}
.sb-author .dot{width:6px;height:6px;border-radius:50%;background:var(--gr);box-shadow:0 0 5px var(--gr);flex-shrink:0}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── TOPBAR ── */
.tb{
  display:flex;align-items:center;gap:6px;
  padding:10px 14px;
  padding-top:calc(10px + var(--sat));
  background:var(--bg2);border-bottom:1px solid var(--b1);
  flex-shrink:0;backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.tb-info{flex:1;overflow:hidden}
.tb-title{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-sub{font-size:11px;color:var(--t2);margin-top:1px}
.menu-btn{display:none}

/* ── CHAT SCREEN ── */
#chat-screen{display:flex;flex-direction:column;height:100%;overflow:hidden}
#msg-list{flex:1;overflow-y:auto;padding:14px 12px 8px;display:flex;flex-direction:column;gap:1px;scroll-behavior:smooth}
.ds{display:flex;align-items:center;gap:10px;margin:12px 0 8px;color:var(--t3);font-size:11px;font-weight:500}
.ds::before,.ds::after{content:'';flex:1;height:1px;background:var(--b1)}

/* ── MESSAGE ── */
.mg{display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
.mr{display:flex;align-items:flex-end;gap:6px}
.mr.out{flex-direction:row-reverse}
.bw{display:flex;flex-direction:column;max-width:min(72%,480px);position:relative}
.mr.out .bw{align-items:flex-end}

/* Bubble */
.bl{padding:9px 13px;border-radius:16px;word-break:break-word;line-height:1.55;font-size:14px;animation:bIn .2s var(--ease)}
@keyframes bIn{from{opacity:0;transform:scale(.94) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.bl.in{background:var(--ib);border:1px solid var(--b2);border-bottom-left-radius:4px}
.bl.out{background:var(--ob);color:#fff;border-bottom-right-radius:4px;box-shadow:0 2px 8px rgba(28,80,192,.35)}
.bl.out .mt{color:rgba(255,255,255,.5)}
.bl p{margin-bottom:5px}.bl p:last-child{margin-bottom:0}
.bl code{background:rgba(0,0,0,.22);padding:1px 5px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px}
.bl pre{background:rgba(0,0,0,.3);padding:10px 12px;border-radius:8px;overflow-x:auto;margin:6px 0}
.bl pre code{background:none}
.bl h1,.bl h2,.bl h3{margin:7px 0 3px;font-weight:700}
.bl ul,.bl ol{padding-left:18px;margin:4px 0}
.bl a{color:var(--ac2)}
.bl.in code{background:rgba(0,0,0,.07)}
.bl.in pre{background:rgba(0,0,0,.05)}
.mt{font-size:10px;color:var(--t3);margin-top:3px;text-align:right}

/* File bubble */
.bf{display:flex;flex-direction:column;gap:5px;padding:5px}
.fc{background:var(--bg3);border:1px solid var(--b2);border-radius:11px;padding:10px 12px;display:flex;align-items:center;gap:10px;min-width:180px;cursor:pointer;transition:background var(--dur)}
.fc:hover{background:var(--bg4)}
.bl.out .fc{background:rgba(0,0,0,.2);border-color:rgba(255,255,255,.12)}
.bl.out .fc:hover{background:rgba(0,0,0,.3)}
.fc-ic{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.fc-info{flex:1;overflow:hidden}
.fc-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc-meta{font-size:11px;color:var(--t2);margin-top:2px}
.bl.out .fc-meta{color:rgba(255,255,255,.6)}

/* Image grid */
.ig{display:grid;gap:3px;border-radius:12px;overflow:hidden;max-width:260px}
.ig.g1{grid-template-columns:1fr}
.ig.g2{grid-template-columns:1fr 1fr}
.ig.g3{grid-template-columns:2fr 1fr}
.ig.g3 .ic:first-child{grid-row:1/3}
.ig.gm{grid-template-columns:1fr 1fr}
.ic{position:relative;aspect-ratio:1;overflow:hidden;background:var(--bg3);cursor:pointer}
.ic img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.ic:hover img{transform:scale(1.04)}
.ic-ov{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:background .15s}
.ic:hover .ic-ov{background:rgba(0,0,0,.28)}
.ic-more{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}

/* Message actions */
.ma{display:none;flex-direction:row;gap:1px;margin-top:4px}
.bw:hover .ma{display:flex}
.bw.open .ma{display:flex}
.ma button{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 10px;background:var(--bg2);border:1px solid var(--b2);
  color:var(--t1);border-radius:10px;font-size:10px;font-weight:600;
  transition:background var(--dur),border-color var(--dur);white-space:nowrap;
}
.ma button:first-child{border-radius:10px 4px 4px 10px}
.ma button:last-child{border-radius:4px 10px 10px 4px}
.ma button:only-child{border-radius:10px}
.ma button:hover{background:var(--bg3);border-color:var(--b3)}
.ma button .mi{font-size:15px;font-weight:900}
.ma button.del{color:var(--rd)}
.ma button.del:hover{background:rgba(248,81,73,.1);border-color:rgba(248,81,73,.3)}

/* Select */
.ck{display:none;width:20px;height:20px;border-radius:50%;border:2px solid var(--b2);background:var(--bg3);flex-shrink:0;align-self:center;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all var(--dur);margin-right:2px}
.sel-mode .ck{display:flex}
.ck.on{background:var(--ac);border-color:var(--ac)}
.sel-bar{display:none;align-items:center;gap:8px;padding:8px 14px;background:var(--gl);border-bottom:1px solid var(--b1);font-size:13px;font-weight:600;color:var(--ac2);flex-shrink:0}
.sel-bar.on{display:flex}

/* Pending files */
.pend{display:none;gap:6px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.pend::-webkit-scrollbar{display:none}
.pf{position:relative;flex-shrink:0;width:64px;height:64px;border-radius:10px;overflow:hidden;background:var(--bg3);border:1px solid var(--b2)}
.pf img,.pf-icon{width:100%;height:100%}
.pf-icon{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;font-size:24px}
.pf-ext{font-size:8px;font-weight:800;color:var(--t3);text-transform:uppercase}
.pf-rm{position:absolute;top:2px;right:2px;width:17px;height:17px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;border:none}

/* Input */
.inp-wrap{background:var(--bg2);border-top:1px solid var(--b1);padding:10px 12px;padding-bottom:max(10px,var(--sab));flex-shrink:0}
.cat-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:7px;scrollbar-width:none;margin-top:2px}
.cat-row::-webkit-scrollbar{display:none}
.cc{display:flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--b2);background:var(--bg3);white-space:nowrap;font-size:12px;font-weight:600;color:var(--t2);transition:all var(--dur);flex-shrink:0;cursor:pointer}
.cc:hover{border-color:var(--ac2);color:var(--ac2);background:var(--bg4)}
.cc.on{border-color:var(--ac);background:var(--gl);color:var(--ac2);box-shadow:0 0 0 2px var(--gl)}
.inp-row{display:flex;align-items:flex-end;gap:8px}
.inp-box{flex:1;background:var(--bg3);border:1.5px solid var(--b2);border-radius:20px;display:flex;align-items:flex-end;padding:8px 12px;gap:8px;transition:border-color var(--dur),box-shadow var(--dur)}
.inp-box:focus-within{border-color:var(--ac);box-shadow:0 0 0 3px var(--gl)}
#ti{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:14px;resize:none;max-height:120px;min-height:22px;line-height:1.5;padding:0}
#ti::placeholder{color:var(--t3)}
.att,.snd{width:34px;height:34px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:all var(--dur)}
.att{background:var(--bg4);color:var(--t2)}
.att:hover{background:var(--gl);color:var(--ac2)}
.snd{background:var(--ac);color:#fff}
.snd:hover{filter:brightness(1.1);transform:scale(1.05)}
.snd:active{transform:scale(.97)}
#fi{display:none}
.dov{display:none;position:fixed;inset:0;z-index:90;background:rgba(68,147,248,.08);border:3px dashed var(--ac);align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--ac2);backdrop-filter:blur(4px)}
.dov.on{display:flex}

/* ── UP PROGRESS ── */
#up-area{padding:0 12px;max-height:110px;overflow-y:auto}
.up{background:var(--bg3);border:1px solid var(--b2);border-radius:10px;padding:10px 12px;margin-bottom:5px}
.up-name{font-size:12px;font-weight:600;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb{background:var(--bg5);border-radius:3px;height:3px;overflow:hidden}
.pf2{height:100%;background:linear-gradient(90deg,var(--ac),var(--pu));border-radius:3px;transition:width .25s;width:0}

/* ── FILES SCREEN ── */
#files-screen{display:none;flex-direction:column;height:100%}
.ft{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:10px 14px;padding-top:calc(10px + var(--sat));background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
.ft-title{font-size:16px;font-weight:700;flex:1;min-width:80px}
.ft-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.ftb{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;border:1.5px solid var(--b2);background:var(--bg3);color:var(--t2);transition:all var(--dur);white-space:nowrap}
.ftb:hover{border-color:var(--ac);color:var(--ac2)}
.ftb.on{border-color:var(--ac);background:var(--gl);color:var(--ac2)}
.ftb.danger{color:var(--rd)}
.vtog{display:flex;border:1px solid var(--b2);border-radius:7px;overflow:hidden}
.vb{padding:5px 8px;background:var(--bg3);border:none;color:var(--t2);font-size:14px;transition:all var(--dur)}
.vb.on{background:var(--gl);color:var(--ac2)}
.fr{padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;gap:5px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.fr::-webkit-scrollbar{display:none}
.fc2{padding:4px 11px;border-radius:14px;font-size:12px;font-weight:600;border:1.5px solid var(--b2);background:var(--bg3);color:var(--t2);transition:all var(--dur);white-space:nowrap;flex-shrink:0}
.fc2:hover{border-color:var(--ac);color:var(--ac2)}
.fc2.on{border-color:var(--ac);background:var(--gl);color:var(--ac2)}
.fc2-sep{width:1px;height:14px;background:var(--b2);flex-shrink:0;margin:0 2px}
.fsb{padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
.fsb-box{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1.5px solid var(--b1);border-radius:8px;padding:6px 11px;transition:border-color var(--dur)}
.fsb-box:focus-within{border-color:var(--ac)}
.fsb-box input{background:none;border:none;outline:none;color:var(--t1);font-size:13px;flex:1}
.fsb-box input::placeholder{color:var(--t3)}
.fg-selbar{display:none;align-items:center;gap:7px;padding:7px 12px;background:var(--gl);border-bottom:1px solid var(--b1);font-size:13px;font-weight:600;color:var(--ac2);flex-shrink:0}
.fg-selbar.on{display:flex}

/* Grid */
#fg{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(min(145px,45vw),1fr));gap:8px;align-content:start}
#fg.lv{grid-template-columns:1fr;gap:5px}
.gc{background:var(--bg2);border:1px solid var(--b1);border-radius:14px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;position:relative;transition:border-color var(--dur),box-shadow var(--dur),transform var(--dur);animation:fu .2s var(--ease) both;min-width:0}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.gc:hover{border-color:var(--ac);box-shadow:0 4px 20px var(--gl);transform:translateY(-1px)}
.gc.sel{border-color:var(--ac);background:var(--gl2)}
.gc-ck{position:absolute;top:7px;left:7px;z-index:3;width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.6);background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;font-size:10px;color:#fff;transition:all var(--dur);backdrop-filter:blur(4px)}
.sel-mode .gc-ck{display:flex}
.gc.sel .gc-ck{background:var(--ac);border-color:var(--ac)}
.gc-fav{position:absolute;top:7px;right:7px;z-index:3;font-size:14px;color:#fbbf24;text-shadow:0 1px 3px rgba(0,0,0,.5);line-height:1}
/* Unified square thumb */
.gc-thumb{width:100%;aspect-ratio:1;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.gc-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.gc:hover .gc-thumb img{transform:scale(1.04)}
.gc-icon{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;font-size:32px}
.gc-ext{font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);background:var(--bg4);padding:2px 6px;border-radius:4px}
.gc-info{padding:7px 8px 3px;flex-shrink:0}
.gc-name{font-size:11.5px;font-weight:600;line-height:1.38;max-height:2.76em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word;white-space:normal}
.gc-meta{font-size:10px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Card action bar */
.gc-acts{display:flex;align-items:center;justify-content:space-around;padding:4px 2px 6px;border-top:1px solid var(--b1);margin-top:auto;gap:0;flex-shrink:0}
.ga{background:none;border:none;color:var(--t2);font-size:13px;font-weight:700;padding:3px 4px;border-radius:6px;min-width:24px;height:26px;display:flex;align-items:center;justify-content:center;transition:background var(--dur),color var(--dur)}
.ga:hover{background:var(--bg3);color:var(--t1)}
.ga:active{background:var(--bg4)}
.ga.del{color:var(--rd)}.ga.del:hover{background:rgba(248,81,73,.1)}
.ga.fav-on{color:#fbbf24}

/* List item */
.li{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:11px;min-height:60px;background:var(--bg2);border:1px solid var(--b1);min-width:0;width:100%;overflow:hidden}
.li:hover{border-color:var(--b2)}
.li.sel{border-color:var(--ac);background:var(--gl2)}
.li-ck{width:20px;height:20px;border-radius:50%;border:2px solid var(--b2);background:var(--bg3);display:none;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0;transition:all var(--dur)}
.sel-mode .li-ck{display:flex}
.li-ck.on{background:var(--ac);border-color:var(--ac)}
.li-thumb{width:42px;height:42px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.li-thumb img{width:42px;height:42px;object-fit:cover}
.li-icon{font-size:22px;display:flex;flex-direction:column;align-items:center;gap:1px}
.li-icon .gc-ext{font-size:8px;padding:1px 3px}
.li-info{flex:1;overflow:hidden;min-width:0}
.li-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;max-width:100%}
.li-meta{font-size:11px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-acts-d{display:flex;gap:4px;align-items:center;flex-shrink:0}
.li-acts-m{display:flex;gap:2px;align-items:center;flex-shrink:0}
.la{width:30px;height:30px;background:transparent;border:none;color:var(--t2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;transition:background var(--dur),color var(--dur)}
.la:hover{background:var(--bg3);color:var(--t1)}
.la.del{color:var(--rd)}.la.del:hover{background:rgba(248,81,73,.1)}
.la.fav-on{color:#fbbf24;font-size:16px}

/* ── STATS/TRASH screens ── */
#stats-screen,#trash-screen{display:none;flex-direction:column;height:100%}
.screen-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.stat-hero{background:linear-gradient(135deg,#1c3f8c,#4e1a8a);border-radius:16px;padding:20px 22px;color:#fff}
.stat-sz{font-size:30px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.stat-sub{font-size:13px;opacity:.75}
.stat-sec{background:var(--bg2);border:1px solid var(--b2);border-radius:14px;padding:15px 16px}
.stat-sec-t{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.stat-row{margin-bottom:11px}
.stat-row-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.stat-row-label{font-size:13px;font-weight:600}
.stat-row-val{font-size:11px;color:var(--t2)}
.stat-bar{height:5px;border-radius:3px;background:var(--bg4);overflow:hidden}
.stat-fill{height:100%;border-radius:3px;transition:width .5s var(--ease)}

/* ── SEARCH ── */
#search-ov{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;padding:52px 16px 16px}
#search-ov.on{display:flex}
.sm{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;width:100%;max-width:520px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.sm-inp{display:flex;align-items:center;gap:9px;padding:14px 15px;border-bottom:1px solid var(--b1)}
.sm-inp input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:15px;font-weight:500}
.sm-inp input::placeholder{color:var(--t3)}
.sr{max-height:380px;overflow-y:auto}
.sr-empty{padding:28px;text-align:center;color:var(--t3);font-size:13px}
.sri{display:flex;align-items:center;gap:11px;padding:10px 15px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background var(--dur)}
.sri:hover{background:var(--bg3)}
.sri:last-child{border-bottom:none}
.sri-ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sri-info{flex:1;overflow:hidden}
.sri-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sri-meta{font-size:11px;color:var(--t2);margin-top:1px}
.hl{color:var(--ac2)}

/* ── MEDIA PREVIEW ── */
#mp{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.94);backdrop-filter:blur(14px);display:none;flex-direction:column;align-items:center;justify-content:center}
#mp.on{display:flex}
.mp-top{position:absolute;top:0;left:0;right:0;padding:14px 18px;padding-top:calc(14px + var(--sat));display:flex;align-items:center;gap:10px;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent)}
.mp-name{flex:1;font-size:13px;font-weight:600;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-btn{width:34px;height:34px;border:none;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background var(--dur)}
.mp-btn:hover{background:rgba(255,255,255,.22)}
#mp-content{max-width:92vw;max-height:78vh;display:flex;align-items:center;justify-content:center}
#mp-content img{max-width:90vw;max-height:78vh;border-radius:8px;object-fit:contain}
#mp-content video{max-width:90vw;max-height:70vh;border-radius:8px;background:#000}
#mp-content audio{min-width:260px}
.mp-arr{position:absolute;width:42px;height:42px;border:none;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:20px;top:50%;transform:translateY(-50%);transition:background var(--dur);display:flex;align-items:center;justify-content:center}
.mp-arr:hover{background:rgba(255,255,255,.22)}
#mp-pr{left:14px}#mp-nx{right:14px}

/* ── MODALS ── */
.mov{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px}
.md{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;padding:22px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.md-t{font-size:16px;font-weight:700;margin-bottom:14px}
.md-p{color:var(--t2);font-size:13px;margin-bottom:16px;line-height:1.65}
.md-inp{width:100%;padding:10px 12px;background:var(--bg3);border:1.5px solid var(--b2);border-radius:9px;color:var(--t1);font-size:14px;outline:none;margin-bottom:14px;resize:vertical;min-height:46px;transition:border-color var(--dur),box-shadow var(--dur)}
.md-inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--gl)}
.md-btns{display:flex;gap:7px;justify-content:flex-end;flex-wrap:wrap}
.btn-g{padding:8px 16px;border-radius:8px;background:var(--bg3);border:1px solid var(--b2);color:var(--t1);font-family:inherit;font-size:13px;font-weight:600;transition:all var(--dur)}
.btn-g:hover{background:var(--bg4)}
.btn-d{padding:8px 16px;border-radius:8px;background:var(--rd);border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:600;transition:opacity var(--dur)}
.btn-d:hover{opacity:.85}
.btn-a{padding:8px 16px;border-radius:8px;background:var(--ac);border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:600;transition:all var(--dur)}
.btn-a:hover{filter:brightness(1.08)}
.cmg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.cm-it{display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 8px;border-radius:10px;border:1.5px solid var(--b2);background:var(--bg3);font-size:12px;font-weight:600;color:var(--t2);transition:all var(--dur)}
.cm-it:hover,.cm-it.on{border-color:var(--ac);background:var(--gl);color:var(--ac2)}
.cm-it span{font-size:22px}

/* ── BOTTOM SHEET (mobile ctx) ── */
.bs-ov{position:fixed;inset:0;z-index:260;background:rgba(0,0,0,.5);display:flex;align-items:flex-end}
.bs{width:100%;background:var(--bg2);border-radius:18px 18px 0 0;padding:12px 14px max(16px,var(--sab));animation:bsUp .22s var(--ease)}
@keyframes bsUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.bs-handle{width:32px;height:3px;background:var(--b2);border-radius:2px;margin:0 auto 12px}
.bs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.bs-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 8px;background:var(--bg3);border-radius:10px;border:none;color:var(--t2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
.bs-btn span{font-size:20px}

/* ── CONTEXT MENU ── */
.cm{position:fixed;z-index:260;background:var(--bg2);border:1px solid var(--b2);border-radius:13px;padding:5px;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:170px}
.cmi{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:background var(--dur),color var(--dur)}
.cmi:hover{background:var(--bg3);color:var(--t1)}
.cmi.d{color:var(--rd)}.cmi.d:hover{background:rgba(248,81,73,.1)}
.cm-sep{height:1px;background:var(--b1);margin:4px 0}

/* ── TOASTS ── */
#toasts{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:5px;align-items:center;pointer-events:none}
.ts{background:var(--bg2);border:1px solid var(--b2);color:var(--t1);padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap;animation:tsIn .2s var(--ease)}
@keyframes tsIn{from{opacity:0;transform:scale(.88) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ts.ok{border-color:var(--gr);color:var(--gr)}
.ts.err{border-color:var(--rd);color:var(--rd)}
.ts.warn{border-color:var(--or);color:var(--or)}

/* ── EMPTY ── */
.emp{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:36px;text-align:center;color:var(--t2)}
.emp-ic{font-size:48px;opacity:.28}
.emp-t{font-size:17px;font-weight:700;color:var(--t1)}
.emp-s{font-size:13px;max-width:240px;line-height:1.7}

/* ── RESPONSIVE ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:640px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:60;transform:translateX(-100%);box-shadow:8px 0 32px rgba(0,0,0,.5)}
  #sidebar.open{transform:translateX(0)}
  .menu-btn{display:flex !important}
  #sb-ov{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.45);display:none}
  #sb-ov.on{display:block}
  .bw{max-width:88%}
  .mp-arr{display:none}
  .li-acts-d{display:none}
  /* FIX #1: mobile grid — 2 columns, cards fully visible */
  #fg{grid-template-columns:repeat(2,1fr) !important;padding:8px;gap:7px}
  .gc-name{font-size:11px}
  .gc-meta{font-size:10px}
  .ga{min-width:22px;height:24px;font-size:12px}
  /* FIX #2: mobile list — no horizontal scroll */
  #fg.lv{padding:8px}
  .li{padding:9px 10px;gap:8px}
  .li-info{min-width:0;overflow:hidden}
  .li-name{max-width:100%}
  .ma button{padding:5px 8px;font-size:11px}
}
@media(min-width:641px){
  .li-acts-m{display:none}
}
</style>

<body>

<div id="sb-ov" onclick="closeSb()"></div>
<div class="dov" id="dov">📂 拖入文件上传</div>
<div id="ctx-c"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lw">
    <div class="lw-logo">☁️</div>
    <div class="lw-h">GitDrive</div>
    <div class="lw-s">以对话方式使用 GitHub 仓库作为私人云盘</div>
    <div class="lw-card">
      <div class="lw-field"><label>GitHub 用户名</label><input id="lu" placeholder="octocat" autocomplete="username" spellcheck="false"></div>
      <div class="lw-field"><label>仓库名称</label><input id="lr" placeholder="my-drive" spellcheck="false"></div>
      <div class="lw-field"><label>Personal Access Token</label><input id="lt" type="password" placeholder="ghp_xxxxxxxx" autocomplete="current-password"></div>
      <button class="lw-btn" id="lbtn" onclick="doLogin()">连接仓库</button>
      <div class="lw-err" id="lerr"></div>
    </div>
    <div class="lw-hint">凭据仅存于本设备浏览器。Fine-grained token 需 Contents 读写权限。</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="sb-hd">
      <div class="sb-logo">☁️</div>
      <div class="sb-title">GitDrive</div>
      <div class="sb-acts">
        <button class="ib" onclick="openSearch()" title="搜索 ⌘K">🔍</button>
        <button class="ib" id="theme-btn" onclick="toggleTheme()">🌙</button>
        <button class="ib" onclick="doLogout()" title="退出">🚪</button>
      </div>
    </div>
    <div class="sb-search">
      <div class="sb-sq" onclick="openSearch()">
        <span style="font-size:12px;color:var(--t3)">🔍</span>
        <input readonly placeholder="搜索文件… ⌘K">
        <span style="font-size:11px;color:var(--t3)">⌘K</span>
      </div>
    </div>
    <nav class="sb-nav">
      <button class="ni on" onclick="showScr('chat')" id="n-chat"><span class="ico">💬</span>对话云盘</button>
      <button class="ni" onclick="showScr('files')" id="n-files"><span class="ico">📁</span>所有文件<span class="nb" id="fcnt">0</span></button>
      <button class="ni" onclick="showFav()" id="n-fav"><span class="ico">★</span>收藏<span class="nb" id="fav-cnt"></span></button>
      <button class="ni" onclick="showScr('trash')" id="n-trash"><span class="ico">🗑</span>回收站<span class="nb" id="trash-cnt"></span></button>
      <button class="ni" onclick="showScr('stats')" id="n-stats"><span class="ico">📊</span>统计</button>
      <button class="ni" onclick="showScr('memo')" id="n-memo"><span class="ico">📓</span>备忘录</button>
    </nav>
    <!-- ===== CATEGORIES NAV — 修改 CATS 数组即可同步更新 ===== -->
    <div class="sb-sec">文件分类</div>
    <nav class="sb-nav" id="cat-nav"></nav>
    <div class="sb-ft">
      <div class="sb-author"><span class="dot"></span>Wangcy</div>
      <span id="sb-repo" style="font-family:'JetBrains Mono',monospace;font-size:10px">-</span>
      <span id="sb-stat">就绪</span>
    </div>
  </aside>

  <main id="main">
    <!-- CHAT -->
    <div id="chat-screen">
      <div class="tb">
        <button class="ib menu-btn" onclick="openSb()">☰</button>
        <button class="ib" onclick="showHelp()" style="font-weight:800;font-size:13px">?</button>
        <div class="tb-info">
          <div class="tb-title" id="hd-t">GitDrive</div>
          <div class="tb-sub" id="hd-s">连接中…</div>
        </div>
        <button class="ib" onclick="openSearch()">🔍</button>
        <button class="ib" onclick="toggleSel()" title="多选">☑️</button>
        <button class="ib" onclick="clearChat()" title="清空历史视图">🗑</button>
        <button class="ib" onclick="refresh()" title="刷新">🔄</button>
      </div>
      <div class="sel-bar" id="sel-bar">
        <span style="flex:1" id="sel-cnt">已选 0 条</span>
        <button class="btn-g" onclick="dlSelMsgs()" style="font-size:12px;padding:5px 11px;color:var(--ac2)">↓ 下载</button>
        <button class="btn-g" onclick="exitSel()" style="font-size:12px;padding:5px 11px">取消</button>
        <button class="btn-d" onclick="delSelMsgs()" style="font-size:12px;padding:5px 11px">删除</button>
      </div>
      <!-- FIX #3: Restore bar — always visible when chat is cleared -->
      <div id="restore-bar" style="display:none;align-items:center;justify-content:center;gap:8px;padding:7px 14px;background:rgba(68,147,248,.1);border-bottom:1px solid rgba(68,147,248,.2);font-size:12px;font-weight:600;color:var(--ac2);flex-shrink:0">
        <span>📂 历史记录已隐藏</span>
        <button onclick="restoreChat()" style="background:var(--ac);color:#fff;border:none;border-radius:7px;padding:4px 12px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer">恢复显示</button>
      </div>
      <!-- FIX #4: Pinned items bar -->
      <div id="pinned-bar" style="display:none;flex-direction:column;gap:1px;max-height:120px;overflow-y:auto;background:var(--bg2);border-bottom:1.5px solid rgba(68,147,248,.25);flex-shrink:0"></div>
      <div id="msg-list">
        <div class="emp" id="empty-chat">
          <div class="emp-ic">💬</div>
          <div class="emp-t">开始使用 GitDrive</div>
          <div class="emp-s">发送文字或上传文件，以聊天方式存入 GitHub 仓库</div>
        </div>
      </div>
      <div id="up-area"></div>
      <div class="inp-wrap">
        <div class="pend" id="pend"></div>
        <div class="cat-row" id="cat-chips"></div>
        <div class="inp-row">
          <button class="att" onclick="document.getElementById('fi').click()">📎</button>
          <div class="inp-box">
            <textarea id="ti" placeholder="发送消息… 支持 Markdown" rows="1" oninput="ar(this)" onkeydown="hk(event)"></textarea>
          </div>
          <button class="snd" onclick="sendAll()">➤</button>
        </div>
        <input type="file" id="fi" multiple onchange="addPend(this.files);this.value=''">
      </div>
    </div>

    <!-- FILES -->
    <div id="files-screen">
      <div class="ft">
        <button class="ib menu-btn" onclick="openSb()">☰</button>
        <div class="ft-title" id="files-t">所有文件</div>
        <div class="ft-row">
          <select id="sort-sel" onchange="renderFG()" style="padding:5px 9px;border-radius:7px;background:var(--bg3);border:1px solid var(--b2);color:var(--t1);font-family:inherit;font-size:12px;outline:none">
            <option value="time-d">最新优先</option><option value="time-a">最早优先</option>
            <option value="name">文件名</option><option value="size">大小</option>
          </select>
          <button class="ftb" id="sel-all-btn" onclick="toggleFGSel()">多选</button>
          <button class="ftb" onclick="syncFiles()">🔄</button>
          <div class="vtog">
            <button class="vb on" id="vb-g" onclick="setView('grid')">⊞</button>
            <button class="vb" id="vb-l" onclick="setView('list')">☰</button>
          </div>
        </div>
      </div>
      <div class="fr" id="fg-cats"></div>
      <div class="fr" id="fg-types"></div>
      <div class="fsb">
        <div class="fsb-box">
          <span style="color:var(--t3)">🔍</span>
          <input id="fg-q" placeholder="搜索文件名…" oninput="renderFG()">
          <button class="ib" onclick="document.getElementById('fg-q').value='';renderFG()" style="font-size:11px">✕</button>
        </div>
      </div>
      <div class="fg-selbar" id="fg-selbar">
        <span style="flex:1" id="fg-selcnt">已选 0 个</span>
        <button class="btn-g" onclick="moveSel()" style="font-size:12px;padding:5px 11px">↗ 移动</button>
        <button class="btn-g" onclick="dlSel()" style="font-size:12px;padding:5px 11px;color:var(--ac2)">↓ 下载</button>
        <button class="btn-d" onclick="delSel()" style="font-size:12px;padding:5px 11px">删除</button>
      </div>
      <div id="fg"></div>
    </div>

<script>
// ============================================================
//  ===== CATEGORIES — 修改此数组即可自定义分类 =====
//  id:    GitHub 仓库文件夹名（仅英文/数字/连字符）
//  label: 显示名称  icon: emoji  color/bg: 颜色
// ============================================================
const CATS = [
  /* ★ 第一项为默认分类（新上传文件的默认落点） */
  {id:'uncat',     label:'无分类', icon:'📂', color:'#8b949e', bg:'rgba(139,148,158,.15)'},
  {id:'law',       label:'法学',   icon:'⚖️', color:'#4493f8', bg:'rgba(68,147,248,.15)'},
  {id:'envlaw',    label:'环境法', icon:'🌿', color:'#3fb950', bg:'rgba(63,185,80,.15)'},
  {id:'entertain', label:'娱乐',   icon:'🎬', color:'#d29922', bg:'rgba(210,153,34,.15)'},
  {id:'work',      label:'办公',   icon:'💼', color:'#bc8cff', bg:'rgba(188,140,255,.15)'},
  {id:'text',      label:'文字',   icon:'📝', color:'#ffa657', bg:'rgba(255,166,87,.15)'},
  {id:'other',     label:'其他',   icon:'📦', color:'#8b949e', bg:'rgba(139,148,158,.15)'},
];
// ===== END CATEGORIES =====

const TYPE_GROUPS = [
  {id:'all',  label:'全部',   exts:[]},
  {id:'img',  label:'图片',   exts:['jpg','jpeg','png','gif','webp','svg','avif','bmp','heic']},
  {id:'doc',  label:'文档',   exts:['pdf','doc','docx','txt','md','rtf','xls','xlsx','csv','ppt','pptx','key','odt']},
  {id:'vid',  label:'视频',   exts:['mp4','mov','avi','mkv','webm','m4v']},
  {id:'aud',  label:'音频',   exts:['mp3','wav','flac','aac','ogg','m4a']},
  {id:'code', label:'代码',   exts:['js','ts','py','java','c','cpp','html','css','json','go','rs','php','sh']},
  {id:'zip',  label:'压缩包', exts:['zip','rar','7z','tar','gz','bz2']},
  {id:'app',  label:'应用',   exts:['apk','exe','ipa','dmg','pkg','deb']},
];

const catMap = Object.fromEntries(CATS.map(c=>[c.id,c]));

const S = {
  user:'', repo:'', token:'',
  msgs:[], msgSha:null,
  files:[], meta:{favorites:[],archived:[]}, metaSha:null,
  trash:[], trashSha:null,
  cur:'uncat',          // current category for upload
  fCat:'all', fType:'all', fView:'grid',
  fgSel:false, fgSeled:new Set(),
  selMode:false, seled:new Set(),
  darkMode:true,
  mpItems:[], mpIdx:0,
  pend:[],              // pending files for upload
  clearTime:null,       // ISO time of last chat clear
  pinned:[],            // array of msg ids that are pinned to top
  memos:[],             // [{id,type:'todo'|'note',content,done?,createdAt,updatedAt}]
  memoSha:null,
};

// ── INIT ──────────────────────────────────────────────────
window.addEventListener('load', () => {
  const creds = localStorage.getItem('gd-creds');
  if (creds) {
    const d = JSON.parse(creds);
    S.user=d.user; S.repo=d.repo; S.token=d.token;
    launchApp();
  }
  const th = localStorage.getItem('gd-theme')||'dark';
  if (th==='light') { document.documentElement.setAttribute('data-theme','light'); S.darkMode=false; document.getElementById('theme-btn').textContent='☀️'; }
  document.addEventListener('dragover', e=>{ e.preventDefault(); document.getElementById('dov').classList.add('on'); });
  document.addEventListener('dragleave', e=>{ if(!e.relatedTarget) document.getElementById('dov').classList.remove('on'); });
  document.addEventListener('drop', e=>{ e.preventDefault(); document.getElementById('dov').classList.remove('on'); if(e.dataTransfer.files.length) addPend(e.dataTransfer.files); });
  document.addEventListener('keydown', e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();} if(e.key==='Escape'){closeSearch();closeMP();closeMd();} });
  document.addEventListener('click', ()=>document.getElementById('ctx-c').innerHTML='');
});

// ── LOGIN ──────────────────────────────────────────────────
async function doLogin() {
  const u=document.getElementById('lu').value.trim();
  const r=document.getElementById('lr').value.trim();
  const t=document.getElementById('lt').value.trim();
  const err=document.getElementById('lerr');
  if (!u||!r||!t) { err.textContent='请填写所有字段'; err.style.display='block'; return; }
  err.style.display='none';
  const btn=document.getElementById('lbtn');
  btn.textContent='连接中…'; btn.disabled=true;
  try {
    const res = await fetch('https://api.github.com/repos/'+u+'/'+r, {
      headers:{ 'Authorization':'Bearer '+t, 'Accept':'application/vnd.github+json', 'X-GitHub-Api-Version':'2022-11-28' }
    });
    if (res.status===401) throw new Error('Token 无效或已过期');
    if (res.status===403) throw new Error('权限不足，需开启 Contents 读写权限');
    if (res.status===404) throw new Error('仓库不存在，请检查用户名和仓库名');
    if (!res.ok) throw new Error('连接失败（HTTP '+res.status+'）');
    S.user=u; S.repo=r; S.token=t;
    localStorage.setItem('gd-creds', JSON.stringify({user:u,repo:r,token:t}));
    launchApp();
  } catch(e) { err.textContent=e.message; err.style.display='block'; }
  btn.textContent='连接仓库'; btn.disabled=false;
}

function doLogout() { if (!confirm('确定退出？')) return; localStorage.removeItem('gd-creds'); location.reload(); }

async function launchApp() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('sb-repo').textContent=S.user+'/'+S.repo;
  document.getElementById('hd-t').textContent=S.repo;
  S.clearTime = localStorage.getItem('gd-ct-'+S.user+'/'+S.repo)||null;
  // FIX #4: restore pinned items
  try{ S.pinned=JSON.parse(localStorage.getItem('gd-pins-'+S.user+'/'+S.repo)||'[]'); }catch{S.pinned=[];}
  buildUI();
  await loadAll();
}

// ── GITHUB API ─────────────────────────────────────────────
function ghUrl(path) { return 'https://api.github.com/repos/'+S.user+'/'+S.repo+'/contents/'+path; }
function ghHd() { return { 'Authorization':'Bearer '+S.token, 'Accept':'application/vnd.github+json', 'X-GitHub-Api-Version':'2022-11-28', 'Content-Type':'application/json' }; }
async function ghGet(path) { return fetch(ghUrl(path), {headers:ghHd()}); }
async function ghPut(path, body) { return fetch(ghUrl(path), {method:'PUT', headers:ghHd(), body:JSON.stringify(body)}); }
async function ghDel(path, sha) { return fetch(ghUrl(path), {method:'DELETE', headers:ghHd(), body:JSON.stringify({message:'Delete [GitDrive]', sha})}); }

function toB64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b));
  return btoa(bin);
}
function fromB64(b64) {
  const raw = atob(b64.replace(/\n/g,''));
  const bytes = Uint8Array.from(raw, c=>c.charCodeAt(0));
  return new TextDecoder('utf-8').decode(bytes);
}
function rawUrl(path) {
  const parts = path.split('/');
  return 'https://raw.githubusercontent.com/'+S.user+'/'+S.repo+'/main/'+parts.map(p=>{ try{return encodeURIComponent(decodeURIComponent(p));}catch{return encodeURIComponent(p);} }).join('/');
}
function ghPath(path) { return encodeURIComponent(path).replace(/%2F/g,'/'); }

// ── BUILD UI ───────────────────────────────────────────────
function buildUI() {
  // Cat nav sidebar
  document.getElementById('cat-nav').innerHTML = CATS.map(c=>
    '<button class="ni" onclick="showCatFiles(\''+c.id+'\')" id="cn-'+c.id+'"><span class="ico">'+c.icon+'</span>'+c.label+'</button>'
  ).join('');
  // Upload chips
  document.getElementById('cat-chips').innerHTML = CATS.map(c=>
    '<button class="cc '+(S.cur===c.id?'on':'')+'" onclick="selCat(\''+c.id+'\')" id="cc-'+c.id+'"><span>'+c.icon+'</span>'+c.label+'</button>'
  ).join('');
  selCat(CATS[0].id);
  // Files cat filter
  document.getElementById('fg-cats').innerHTML =
    '<button class="fc2 on" onclick="setFCat(\'all\')" id="fct-all">全部</button>'+
    '<button class="fc2" onclick="setFCat(\'fav\')" id="fct-fav">★ 收藏</button>'+
    '<span class="fc2-sep"></span>'+
    CATS.map(c=>'<button class="fc2" onclick="setFCat(\''+c.id+'\')" id="fct-'+c.id+'">'+c.icon+' '+c.label+'</button>').join('');
  // Type filter
  document.getElementById('fg-types').innerHTML = TYPE_GROUPS.map((g,i)=>
    '<button class="fc2 '+(i===0?'on':'')+'" onclick="setFType(\''+g.id+'\')" id="fty-'+g.id+'">'+g.label+'</button>'
  ).join('');
}
function selCat(id) {
  S.cur=id;
  document.querySelectorAll('.cc').forEach(e=>e.classList.remove('on'));
  const el=document.getElementById('cc-'+id); if(el) el.classList.add('on');
}
function setFCat(id) {
  S.fCat=id;
  document.querySelectorAll('#fg-cats .fc2').forEach(e=>e.classList.remove('on'));
  const el=document.getElementById('fct-'+id); if(el) el.classList.add('on');
  renderFG();
}
function setFType(id) {
  S.fType=id;
  document.querySelectorAll('#fg-types .fc2').forEach(e=>e.classList.remove('on'));
  const el=document.getElementById('fty-'+id); if(el) el.classList.add('on');
  renderFG();
}

// ── LOAD DATA ──────────────────────────────────────────────
async function loadAll() {
  document.getElementById('hd-s').textContent='加载中…';
  try {
    await Promise.all([loadMsgs(), loadMeta(), loadFiles(), loadMemos()]);
    updateStats();
  } catch(e) { document.getElementById('hd-s').textContent='加载失败'; toast('加载失败: '+e.message,'err'); }
}
async function loadMsgs() {
  const r = await ghGet('gitdrive-messages.json');
  if (r.ok) { const d=await r.json(); S.msgs=JSON.parse(fromB64(d.content)); S.msgSha=d.sha; }
  else { S.msgs=[]; S.msgSha=null; }
  renderMsgs();
  renderPinnedBar();
}
async function loadMeta() {
  const r = await ghGet('gitdrive-meta.json');
  if (r.ok) { const d=await r.json(); S.meta=JSON.parse(fromB64(d.content)); S.metaSha=d.sha; }
  else { S.meta={favorites:[],archived:[]}; S.metaSha=null; }
  document.getElementById('fav-cnt').textContent=S.meta.favorites.length||'';
}
async function loadFiles() {
  const all=[];
  for (const cat of CATS) {
    const r = await ghGet(cat.id);
    if (r.ok) { const items=await r.json(); if(Array.isArray(items)) items.forEach(f=>{ if(f.type==='file') all.push({...f,category:cat.id}); }); }
  }
  S.files=all;
  // Sync: remove stale file refs from messages
  const paths=new Set(all.map(f=>f.path));
  let changed=false;
  S.msgs=S.msgs.map(m=>{
    if(m.type!=='file') return m;
    const before=m.files.length;
    m.files=m.files.filter(f=>paths.has(f.path));
    if(m.files.length<before) changed=true;
    return m;
  }).filter(m=>m.type==='text'||(m.files&&m.files.length>0));
  if(changed) await saveMsgs();
  // Load trash
  const tr=await ghGet('gitdrive-trash.json');
  if(tr.ok){const d=await tr.json();S.trash=JSON.parse(fromB64(d.content));S.trashSha=d.sha;}
  else{S.trash=[];S.trashSha=null;}
  // Auto-purge 30-day trash
  const now=Date.now(); const before=S.trash.length;
  S.trash=S.trash.filter(t=>(now-new Date(t.deletedAt).getTime())<30*24*3600*1000);
  if(S.trash.length<before) await saveTrash();
  document.getElementById('trash-cnt').textContent=S.trash.length||'';
}
function updateStats() {
  const cnt=S.files.length, sz=S.files.reduce((a,f)=>a+(f.size||0),0);
  document.getElementById('fcnt').textContent=cnt;
  document.getElementById('hd-s').textContent=cnt+' 个文件 · '+fmtSz(sz);
  document.getElementById('sb-stat').textContent=cnt+' 个文件 · '+fmtSz(sz);
  renderFG();
}
async function saveMsgs() {
  const body={message:'Update messages [GitDrive]', content:toB64(JSON.stringify(S.msgs,null,2))};
  if(S.msgSha) body.sha=S.msgSha;
  const r=await ghPut('gitdrive-messages.json',body);
  if(r.ok){const d=await r.json();S.msgSha=d.content.sha;}
  else{const e=await r.json();toast('保存失败: '+(e.message||r.status),'err');}
}
async function saveMeta() {
  const body={message:'Update meta [GitDrive]', content:toB64(JSON.stringify(S.meta))};
  if(S.metaSha) body.sha=S.metaSha;
  const r=await ghPut('gitdrive-meta.json',body);
  if(r.ok){const d=await r.json();S.metaSha=d.content.sha;}
}
async function saveTrash() {
  const body={message:'Update trash [GitDrive]', content:toB64(JSON.stringify(S.trash))};
  if(S.trashSha) body.sha=S.trashSha;
  const r=await ghPut('gitdrive-trash.json',body);
  if(r.ok){const d=await r.json();S.trashSha=d.content.sha;}
  document.getElementById('trash-cnt').textContent=S.trash.length||'';
}
async function refresh(){toast('刷新中…');await loadAll();toast('已刷新','ok');}
async function syncFiles(){toast('同步中…');await loadAll();toast('同步完成','ok');}

// ── PENDING FILES ─────────────────────────────────────────
function addPend(files) {
  Array.from(files).forEach(f=>S.pend.push(f));
  renderPend();
}
function rmPend(i){S.pend.splice(i,1);renderPend();}
function renderPend(){
  const el=document.getElementById('pend');
  if(!S.pend.length){el.style.display='none';return;}
  el.style.display='flex';
  el.innerHTML=S.pend.map((f,i)=>{
    const isImg=isImage(f.name);
    let inner=isImg
      ? '<img src="'+URL.createObjectURL(f)+'" alt="" style="width:100%;height:100%;object-fit:cover" onload="URL.revokeObjectURL(this.src)">'
      : '<div class="pf-icon">'+fileIcon(f.name)+'<span class="pf-ext">'+xExt(f.name).toUpperCase()+'</span></div>';
    return '<div class="pf" title="'+esc(f.name)+'">'+inner+'<button class="pf-rm" onclick="rmPend('+i+')">✕</button></div>';
  }).join('');
}

// ── SEND ─────────────────────────────────────────────────
async function sendAll() {
  const txt=document.getElementById('ti').value.trim();
  const files=[...S.pend];
  if(!txt&&!files.length) return;
  // FIX #5: Duplicate detection — check if any file already exists in repo
  if(files.length){
    const cat=catMap[S.cur]||CATS[0];
    const dupes=files.filter(f=>{
      // Check same filename in ANY category folder
      return S.files.some(existing=>existing.name===f.name);
    });
    if(dupes.length>0){
      const dupeInfo=dupes.map(f=>{
        const existing=S.files.find(e=>e.name===f.name);
        return f.name+' （已在 '+(catMap[existing.category]?.label||existing.category)+' 中）';
      }).join('、');
      const proceed=await new Promise(res=>{
        showDupeModal(dupeInfo,cat.label,res);
      });
      if(!proceed) return;
    }
  }
  document.getElementById('ti').value=''; ar(document.getElementById('ti'));
  S.pend=[]; renderPend();
  if(files.length) await uploadFiles(files,txt);
  else {
    const msg={id:Date.now().toString(),type:'text',content:txt,category:S.cur,timestamp:new Date().toISOString()};
    S.msgs.push(msg); renderMsgs(); scrollBot();
    await saveMsgs();
  }
}
function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAll();}}

async function uploadFiles(files,caption) {
  const cat=catMap[S.cur]||CATS[0];
  const uploaded=[];
  for(const f of files) {
    const path=cat.id+'/'+f.name;
    const pid='p'+Date.now()+Math.random().toString(36).slice(2);
    const pEl=document.createElement('div');
    pEl.className='up';
    pEl.innerHTML='<div class="up-name">'+f.name+'</div><div class="pb"><div class="pf2" id="pf2-'+pid+'"></div></div>';
    document.getElementById('up-area').appendChild(pEl);
    try {
      const b64 = await new Promise((res,rej)=>{
        const fr=new FileReader();
        fr.onprogress=e=>{if(e.lengthComputable){const el=document.getElementById('pf2-'+pid);if(el)el.style.width=Math.round(e.loaded/e.total*70)+'%';}};
        fr.onload=()=>res(fr.result.split(',')[1]);
        fr.onerror=rej;
        fr.readAsDataURL(f);
      });
      let sha;
      const chk=await ghGet(ghPath(path));
      if(chk.ok){const d=await chk.json();sha=d.sha;}
      const body={message:'Add '+f.name+' [GitDrive]',content:b64};
      if(sha) body.sha=sha;
      const pf=document.getElementById('pf2-'+pid);if(pf)pf.style.width='85%';
      const r=await ghPut(ghPath(path),body);
      if(!r.ok) throw new Error('上传失败: '+f.name);
      const rd=await r.json();
      if(pf)pf.style.width='100%';
      uploaded.push({name:f.name,path,size:f.size,mime:f.type,sha:rd.content.sha,downloadUrl:rd.content.download_url});
    } catch(e){toast(e.message,'err');}
    finally{setTimeout(()=>pEl.remove(),600);}
  }
  if(!uploaded.length) return;
  const msg={id:Date.now().toString(),type:'file',files:uploaded,caption:caption||'',category:cat.id,timestamp:new Date().toISOString()};
  S.msgs.push(msg); renderMsgs(); scrollBot();
  await saveMsgs(); await loadFiles(); updateStats();
  toast(uploaded.length+' 个文件已上传','ok');
}

// ── RENDER MESSAGES ───────────────────────────────────────
function renderMsgs() {
  const el=document.getElementById('msg-list');
  // Filter by clearTime
  const vis = S.clearTime ? S.msgs.filter(m=>m.timestamp>S.clearTime) : S.msgs;
  const empty=document.getElementById('empty-chat');
  // FIX #3: always update restore bar visibility
  const restoreBar=document.getElementById('restore-bar');
  if(restoreBar) restoreBar.style.display=(S.clearTime&&S.msgs.length>0)?'flex':'none';

  if(!vis.length){
    el.innerHTML='';
    empty.style.display='flex';
    if(S.clearTime&&S.msgs.length>0){
      empty.innerHTML='<div class="emp-ic">🗂️</div><div class="emp-t">历史记录已清空</div><div class="emp-s">新发送的内容会正常显示在这里</div>';
    } else {
      empty.innerHTML='<div class="emp-ic">💬</div><div class="emp-t">开始使用 GitDrive</div><div class="emp-s">发送文字或上传文件，以聊天方式存入 GitHub 仓库</div>';
    }
    return;
  }
  empty.style.display='none';
  // Group by day
  const days={};
  vis.forEach(m=>{
    const d=new Date(m.timestamp).toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
    if(!days[d]) days[d]=[];
    days[d].push(m);
  });
  let html = '';
  for(const[date,ms] of Object.entries(days)){
    html+='<div class="ds">'+date+'</div>';
    ms.forEach(m=>{html+=renderMsg(m);});
  }
  el.innerHTML=html;
  if(S.selMode) el.classList.add('sel-mode'); else el.classList.remove('sel-mode');
  S.seled.forEach(id=>{
    const ck=el.querySelector('.ck[data-id="'+id+'"]');
    if(ck) ck.classList.add('on');
  });
  // Touch events for mobile actions
  el.querySelectorAll('.bw').forEach(bw=>{
    let timer,startY=0;
    bw.addEventListener('touchstart',e=>{
      startY=e.touches[0].clientY;
      timer=setTimeout(()=>{
        el.querySelectorAll('.bw.open').forEach(b=>{if(b!==bw)b.classList.remove('open');});
        bw.classList.toggle('open');
        scrollActsIntoView(bw);
      },360);
    },{passive:true});
    bw.addEventListener('touchend',e=>{clearTimeout(timer);},{passive:true});
    bw.addEventListener('touchmove',()=>clearTimeout(timer),{passive:true});
    bw.addEventListener('mouseleave',()=>bw.classList.remove('open'));
  });
  el.addEventListener('touchstart',e=>{
    if(!e.target.closest('.bw')) el.querySelectorAll('.bw.open').forEach(b=>b.classList.remove('open'));
  },{passive:true});
}
function scrollActsIntoView(bw){
  requestAnimationFrame(()=>{
    const acts=bw.querySelector('.ma');
    if(!acts) return;
    const rect=acts.getBoundingClientRect();
    const iH=document.querySelector('.inp-wrap')?.offsetHeight||110;
    const lim=window.innerHeight-iH-8;
    if(rect.bottom>lim) document.getElementById('msg-list').scrollBy({top:rect.bottom-lim+10,behavior:'smooth'});
  });
}
function scrollBot(){const el=document.getElementById('msg-list');el.scrollTop=el.scrollHeight;}

function renderMsg(m) {
  const time=new Date(m.timestamp).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  const cat=catMap[m.category]||CATS[0];
  let inner='';
  if(m.type==='text'){
    const md=marked.parse(m.content||'');
    inner='<div class="bl out" data-id="'+m.id+'">'+md+'<div class="mt">'+time+'</div></div>';
  } else {
    const files=m.files||[];
    const imgs=files.filter(f=>isImage(f.name));
    const docs=files.filter(f=>!isImage(f.name));
    let imgH='',docH='';
    if(imgs.length){
      let gc='g1'; if(imgs.length===2)gc='g2'; else if(imgs.length===3)gc='g3'; else if(imgs.length>=4)gc='gm';
      const shown=imgs.slice(0,4), extra=imgs.length-4;
      const cells=shown.map((f,i)=>{
        const url=rawUrl(f.path);
        const isLast=i===3&&extra>0;
        const imgUrls=JSON.stringify(imgs.map(x=>rawUrl(x.path)));
        return '<div class="ic" onclick="openMP(\''+url+'\',\''+esc(f.name)+'\','+imgUrls+','+i+')">'+(isLast?'<div class="ic-more">+'+(extra+1)+'</div>':'')+'<img src="'+url+'" loading="lazy" alt="'+esc(f.name)+'"><div class="ic-ov"></div></div>';
      }).join('');
      imgH='<div class="ig '+gc+'">'+cells+'</div>';
    }
    if(docs.length){
      docH=docs.map(f=>{
        const url=rawUrl(f.path);
        const isMedia=isVid(f.name)||isAud(f.name);
        const onclick=isMedia?"openMP('"+url+"','"+esc(f.name)+"',[],0)":"dlFile('"+url+"','"+esc(f.name)+"')";
        return '<div class="fc" onclick="'+onclick+'"><div class="fc-ic" style="background:'+cat.bg+'">'+fileIcon(f.name)+'</div><div class="fc-info"><div class="fc-name">'+f.name+'</div><div class="fc-meta">'+fmtSz(f.size)+' · '+cat.icon+' '+cat.label+(isMedia?' · 点击播放':'')+'</div></div></div>';
      }).join('');
    }
    const cap=m.caption?'<div style="font-size:13px;margin-bottom:6px;opacity:.9">'+esc(m.caption)+'</div>':'';
    inner='<div class="bl out" data-id="'+m.id+'" style="padding:5px"><div class="bf">'+cap+(imgH?'<div>'+imgH+'</div>':'')+(docH?'<div>'+docH+'</div>':'')+'</div><div class="mt" style="padding:2px 6px 0">'+time+'</div></div>';
  }
  const isFile=m.type==='file';
  const actions='<div class="ma">'
    +'<button onclick="dlMsg(\''+m.id+'\')" class=""><span class="mi">↓</span>下载</button>'
    +(isFile?'<button onclick="renMsg(\''+m.id+'\')" class=""><span class="mi">✎</span>重命名</button>':'<button onclick="editMsg(\''+m.id+'\')" class=""><span class="mi">✎</span>编辑</button>')
    +'<button onclick="delMsg(\''+m.id+'\')" class="del"><span class="mi">✕</span>删除</button></div>';
  const ckClass='ck'+(S.seled.has(m.id)?' on':'');
  return '<div class="mg"><div class="mr out" data-id="'+m.id+'"><div class="'+ckClass+'" data-id="'+m.id+'" onclick="toggleSeled(\''+m.id+'\')">✓</div><div class="bw">'+inner+actions+'</div></div></div>';
}

// ── MSG ACTIONS ───────────────────────────────────────────
function dlMsg(id){
  const m=S.msgs.find(x=>x.id===id);if(!m)return;
  if(m.type==='text'){const b=new Blob([m.content],{type:'text/plain'});dlFile(URL.createObjectURL(b),'msg-'+id+'.txt');}
  else if(m.files) m.files.forEach(f=>dlFile(rawUrl(f.path),f.name));
}
function editMsg(id){
  const m=S.msgs.find(x=>x.id===id);if(!m)return;
  showInput('编辑内容','内容',m.content,async v=>{m.content=v;renderMsgs();await saveMsgs();toast('已保存','ok');});
}
function renMsg(id){
  const m=S.msgs.find(x=>x.id===id);if(!m||!m.files||!m.files.length)return;
  const f=m.files.find(f=>!isImage(f.name));
  if(!f){toast('图片不支持重命名','warn');return;}
  showInput('重命名','新文件名',f.name,async newName=>{
    if(!newName||newName===f.name)return;
    const folder=f.path.includes('/')?f.path.substring(0,f.path.lastIndexOf('/')):'';
    const newPath=folder?folder+'/'+newName:newName;
    const r=await ghGet(ghPath(f.path));if(!r.ok)return;
    const d=await r.json();
    await ghPut(ghPath(newPath),{message:'Rename to '+newName+' [GitDrive]',content:d.content.replace(/\n/g,'')});
    await ghDel(ghPath(f.path),d.sha);
    f.path=newPath;f.name=newName;
    await saveMsgs();await loadFiles();updateStats();renderMsgs();
    toast('已重命名为 '+newName,'ok');
  });
}
async function delMsg(id){
  const m=S.msgs.find(x=>x.id===id);if(!m)return;
  showConfirm('删除消息','确认删除？文件会移至回收站。',async()=>{
    if(m.files) for(const f of m.files) await moveToTrash(f.path,f.name,f.size);
    S.msgs=S.msgs.filter(x=>x.id!==id);
    renderMsgs();await saveMsgs();await loadFiles();updateStats();
    toast('已删除','ok');
  });
}

function toggleSel(){S.selMode=!S.selMode;S.seled.clear();document.getElementById('sel-bar').classList.toggle('on',S.selMode);if(!S.selMode)renderMsgs();}
function exitSel(){S.selMode=false;S.seled.clear();document.getElementById('sel-bar').classList.remove('on');renderMsgs();}
function toggleSeled(id){
  if(S.seled.has(id))S.seled.delete(id);else S.seled.add(id);
  const ck=document.querySelector('.ck[data-id="'+id+'"]');
  if(ck)ck.classList.toggle('on',S.seled.has(id));
  document.getElementById('sel-cnt').textContent='已选 '+S.seled.size+' 条';
}
function dlSelMsgs(){
  let n=0;
  S.seled.forEach(id=>{
    const m=S.msgs.find(x=>x.id===id);if(!m)return;
    if(m.type==='text'){setTimeout(()=>dlFile(URL.createObjectURL(new Blob([m.content],{type:'text/plain'})),'msg-'+id+'.txt'),n*200);n++;}
    else if(m.files) m.files.forEach(f=>{setTimeout(()=>dlFile(rawUrl(f.path),f.name),n*200);n++;});
  });
  toast('已触发 '+n+' 个下载','ok');
}
async function delSelMsgs(){
  if(!S.seled.size)return;
  showConfirm('批量删除','确认删除选中的 '+S.seled.size+' 条？',async()=>{
    for(const id of S.seled){
      const m=S.msgs.find(x=>x.id===id);if(!m)continue;
      if(m.files) for(const f of m.files) await moveToTrash(f.path,f.name,f.size);
    }
    S.msgs=S.msgs.filter(x=>!S.seled.has(x.id));
    exitSel();await saveMsgs();await loadFiles();updateStats();
    toast('批量删除完成','ok');
  });
}

// ── PIN SYSTEM ────────────────────────────────────────────
function togglePin(id){
  const i=S.pinned.indexOf(id);
  if(i>=0) S.pinned.splice(i,1);
  else S.pinned.push(id);
  renderMsgs();
  renderPinnedBar();
  // Persist pinned to localStorage
  localStorage.setItem('gd-pins-'+S.user+'/'+S.repo,JSON.stringify(S.pinned));
  toast(S.pinned.includes(id)?'已置顶':'已取消置顶');
}
function renderPinnedBar(){
  const bar=document.getElementById('pinned-bar');
  if(!bar) return;
  if(!S.pinned.length){bar.style.display='none';return;}
  bar.style.display='flex';
  const items=S.pinned.map(id=>{
    const m=S.msgs.find(x=>x.id===id);
    if(!m) return '';
    let preview='';
    if(m.type==='text') preview=(m.content||'').replace(/[#*`>]/g,'').slice(0,50).trim();
    else if(m.files&&m.files.length) preview='📎 '+m.files.map(f=>f.name).join(', ').slice(0,40);
    const t=new Date(m.timestamp).toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
    return '<div onclick="jumpToPin(''+id+'')" style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;border-bottom:1px solid var(--b1);transition:background var(--dur)" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''">'
      +'<span style="color:var(--ac2);font-size:13px;flex-shrink:0">📌</span>'
      +'<span style="flex:1;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1)">'+esc(preview)+'</span>'
      +'<span style="font-size:10px;color:var(--t3);flex-shrink:0">'+t+'</span>'
      +'<button onclick="event.stopPropagation();togglePin(''+id+'')" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;flex-shrink:0">✕</button>'
      +'</div>';
  }).join('');
  bar.innerHTML=items||'';
}
function jumpToPin(id){
  // If msg is hidden by clearTime, restore first
  const m=S.msgs.find(x=>x.id===id);
  if(!m) return;
  if(S.clearTime&&m.timestamp<=S.clearTime){
    S.clearTime=null;
    localStorage.removeItem('gd-ct-'+S.user+'/'+S.repo);
    renderMsgs();
    setTimeout(()=>scrollToMsgById(id),300);
  } else {
    scrollToMsgById(id);
  }
}
function scrollToMsgById(id){
  const el=document.querySelector('.mr[data-id="'+id+'"]');
  if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='2px solid var(--ac)';setTimeout(()=>el.style.outline='',2000);}
}

  document.getElementById('vb-l').classList.toggle('on',v==='list');

function renderFG(){
  const grid=document.getElementById('fg');
  let files=[...S.files];
  if(S.fCat==='fav') files=files.filter(f=>S.meta.favorites.includes(f.path));
  else if(S.fCat!=='all') files=files.filter(f=>f.category===S.fCat);
  if(S.fType!=='all'){const g=TYPE_GROUPS.find(x=>x.id===S.fType);if(g)files=files.filter(f=>g.exts.includes(xExt(f.name)));}
  const q=(document.getElementById('fg-q')?.value||'').trim().toLowerCase();
  if(q)files=files.filter(f=>f.name.toLowerCase().includes(q));
  const sort=document.getElementById('sort-sel')?.value||'time-d';
  const byPath={};S.msgs.forEach(m=>{if(m.files)m.files.forEach(f=>{byPath[f.path]=m.timestamp;});});
  if(sort==='time-d')files.sort((a,b)=>(byPath[b.path]||'')>(byPath[a.path]||'')?1:-1);
  else if(sort==='time-a')files.sort((a,b)=>(byPath[a.path]||'')>(byPath[b.path]||'')?1:-1);
  else if(sort==='name')files.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='size')files.sort((a,b)=>(b.size||0)-(a.size||0));
  if(!files.length){
    grid.innerHTML='<div style="grid-column:1/-1"><div class="emp"><div class="emp-ic">📭</div><div class="emp-t">没有文件</div></div></div>';
    if(S.fView==='list')grid.classList.add('lv');else grid.classList.remove('lv');
    return;
  }
  const isList=S.fView==='list';
  if(isList)grid.classList.add('lv');else grid.classList.remove('lv');
  grid.innerHTML=files.map((f,i)=>{
    const cat=catMap[f.category]||CATS[0];
    const img=isImage(f.name), med=isVid(f.name)||isAud(f.name);
    const url=rawUrl(f.path);
    const t=byPath[f.path]?new Date(byPath[f.path]).toLocaleDateString('zh-CN'):'';
    const fav=S.meta.favorites.includes(f.path);
    const sel=S.fgSeled.has(f.path);
    const ext2=xExt(f.name).toUpperCase();
    const onclick=img?"openMP('"+url+"','"+esc(f.name)+"',"+JSON.stringify(files.filter(x=>isImage(x.name)).map(x=>rawUrl(x.path)))+","+files.filter(x=>isImage(x.name)).findIndex(x=>x.path===f.path)+")"
      :med?"openMP('"+url+"','"+esc(f.name)+"',[],0)":"dlFile('"+url+"','"+esc(f.name)+"')";
    if(isList){
      return '<div class="li '+(sel?'sel':'')+'" style="animation-delay:'+i*.02+'s" data-path="'+f.path+'">'
        +'<div class="li-ck '+(sel?'on':'')+'" onclick="tgFGItem(\''+f.path+'\',event)">✓</div>'
        +(img?'<div class="li-thumb" onclick="'+onclick+'" style="cursor:pointer"><img src="'+url+'" loading="lazy" alt=""></div>'
          :'<div class="li-thumb" onclick="'+onclick+'" style="cursor:pointer"><div class="li-icon">'+fileIcon(f.name)+'<span class="gc-ext">'+ext2+'</span></div></div>')
        +'<div class="li-info" onclick="'+onclick+'" style="cursor:pointer"><div class="li-name">'+f.name+'</div><div class="li-meta">'+cat.icon+' '+cat.label+' · '+fmtSz(f.size)+(t?' · '+t:'')+'</div></div>'
        +'<div class="li-acts-m"><button class="la '+(fav?'fav-on':'')+'" onclick="tgFav(\''+f.path+'\')">'+(fav?'★':'☆')+'</button><button class="la del" onclick="delFile(\''+f.path+'\',\''+f.sha+'\')">✕</button></div>'
        +'<div class="li-acts-d"><button class="la '+(fav?'fav-on':'')+'" onclick="tgFav(\''+f.path+'\')" title="收藏">'+(fav?'★':'☆')+'</button><button class="la" onclick="mvFile(\''+f.path+'\',\''+esc(f.name)+'\')" title="移动" style="color:var(--ac2)">↗</button>'+(img?'':'<button class="la" onclick="rnFile(\''+f.path+'\',\''+esc(f.name)+'\')" title="重命名">✎</button>')+'<button class="la" onclick="dlFile(\''+url+'\',\''+esc(f.name)+'\')" title="下载" style="color:var(--ac2)">↓</button><button class="la del" onclick="delFile(\''+f.path+'\',\''+f.sha+'\')" title="删除">✕</button></div>'
        +'</div>';
    } else {
      return '<div class="gc '+(sel?'sel':'')+'" style="animation-delay:'+i*.02+'s" data-path="'+f.path+'">'
        +'<div class="gc-ck '+(sel?'on':'')+'" onclick="tgFGItem(\''+f.path+'\',event)">✓</div>'
        +(fav?'<div class="gc-fav">★</div>':'')
        +'<div class="gc-thumb" style="'+(img?'':'background:'+cat.bg)+';" onclick="'+onclick+'">'
        +(img?'<img src="'+url+'" loading="lazy" alt="'+esc(f.name)+'">'
          :'<div class="gc-icon">'+fileIcon(f.name)+'<span class="gc-ext">'+ext2+'</span></div>')
        +'</div>'
        +'<div class="gc-info"><div class="gc-name">'+f.name+'</div><div class="gc-meta">'+fmtSz(f.size)+(t?' · '+t:'')+'</div></div>'
        +'<div class="gc-acts">'
        +'<button class="ga '+(fav?'fav-on':'')+'" onclick="tgFav(\''+f.path+'\')" title="收藏">'+(fav?'★':'☆')+'</button>'
        +'<button class="ga" onclick="mvFile(\''+f.path+'\',\''+esc(f.name)+'\')" title="移动">↗</button>'
        +(img?'':'<button class="ga" onclick="rnFile(\''+f.path+'\',\''+esc(f.name)+'\')" title="重命名">✎</button>')
        +'<button class="ga" onclick="dlFile(\''+url+'\',\''+esc(f.name)+'\')" title="下载" style="color:var(--ac2)">↓</button>'
        +'<button class="ga del" onclick="delFile(\''+f.path+'\',\''+f.sha+'\')" title="删除">✕</button>'
        +'</div></div>';
    }
  }).join('');
  // Long-press on mobile for list items
  grid.querySelectorAll('.li').forEach(el=>{
    let timer;
    el.addEventListener('touchstart',()=>{timer=setTimeout(()=>{const f=S.files.find(x=>x.path===el.dataset.path);if(f)showBS(f);},450);},{passive:true});
    el.addEventListener('touchend',()=>clearTimeout(timer),{passive:true});
    el.addEventListener('touchmove',()=>clearTimeout(timer),{passive:true});
  });
  // Right-click on grid cards
  grid.querySelectorAll('.gc').forEach(el=>{
    el.addEventListener('contextmenu',e=>{e.preventDefault();const f=S.files.find(x=>x.path===el.dataset.path);if(f)showCtxM(e.clientX,e.clientY,f);});
  });
  if(S.fgSel)grid.classList.add('sel-mode');else grid.classList.remove('sel-mode');
}

function exitFGSel(){S.fgSel=false;S.fgSeled.clear();document.getElementById('fg-selbar').classList.remove('on');document.getElementById('sel-all-btn').textContent='多选';renderFG();}

async function delSel(){
  if(!S.fgSeled.size)return;
  showConfirm('批量移至回收站','将 '+S.fgSeled.size+' 个文件移至回收站？',async()=>{

      if(f) await moveToTrash(path,f.name,f.size);
    }
    S.msgs=S.msgs.map(m=>{if(m.files)m.files=m.files.filter(f=>!S.fgSeled.has(f.path));return m;}).filter(m=>m.type==='text'||(m.files&&m.files.length>0));
    S.meta.favorites=S.meta.favorites.filter(p=>!S.fgSeled.has(p));
    await Promise.all([saveMsgs(),saveMeta()]);
    exitFGSel();await loadFiles();updateStats();renderMsgs();
    toast('已移至回收站','ok');
  });
}
function moveSel(){
  if(!S.fgSeled.size)return;
  window._mvPaths=[...S.fgSeled];
  window._mvCat=CATS[0].id;
  showMd('<div class="md-t">移动 '+window._mvPaths.length+' 个文件</div><div class="cmg">'
    +CATS.map(c=>'<div class="cm-it '+(c.id===CATS[0].id?'on':'')+'" onclick="pickCat(\''+c.id+'\')" id="cmi-'+c.id+'"><span>'+c.icon+'</span>'+c.label+'</div>').join('')
    +'</div><div class="md-btns"><button class="btn-g" onclick="closeMd()">取消</button><button class="btn-a" onclick="doBatchMv()">移动</button></div>');
}
function pickCat(id){
  window._mvCat=id;
  document.querySelectorAll('.cm-it').forEach(e=>e.classList.remove('on'));
  const el=document.getElementById('cmi-'+id);if(el)el.classList.add('on');
}
async function doBatchMv(){
  const paths=window._mvPaths||[], newCat=window._mvCat; closeMd();
  for(const oldPath of paths){
    const name=oldPath.split('/').pop(),newPath=newCat+'/'+name;
    if(oldPath===newPath)continue;
    try{
      const r=await ghGet(ghPath(oldPath));if(!r.ok)continue;
      const d=await r.json();
      await ghPut(ghPath(newPath),{message:'Move '+name+' [GitDrive]',content:d.content.replace(/\n/g,'')});
      await ghDel(ghPath(oldPath),d.sha);
      if(S.meta.favorites.includes(oldPath)){S.meta.favorites=S.meta.favorites.filter(x=>x!==oldPath);S.meta.favorites.push(newPath);}
      S.msgs.forEach(m=>{if(m.files)m.files.forEach(f=>{if(f.path===oldPath){f.path=newPath;f.category=newCat;}});});
    }catch(e){toast('移动失败: '+name,'err');}
  }
  await Promise.all([saveMsgs(),saveMeta()]);
  exitFGSel();await loadFiles();updateStats();
  toast('已移动到 '+(catMap[newCat]?.label||newCat),'ok');
}

async function rnFile(path,oldName){
  if(isImage(oldName)){toast('图片不支持重命名','warn');return;}
  showInput('重命名','新文件名',oldName,async newName=>{
    if(!newName||newName===oldName)return;
    const folder=path.includes('/')?path.substring(0,path.lastIndexOf('/')):'';
    const newPath=folder?folder+'/'+newName:newName;
    const r=await ghGet(ghPath(path));if(!r.ok)return;
    const d=await r.json();
    await ghPut(ghPath(newPath),{message:'Rename to '+newName+' [GitDrive]',content:d.content.replace(/\n/g,'')});
    await ghDel(ghPath(path),d.sha);
    if(S.meta.favorites.includes(path)){S.meta.favorites=S.meta.favorites.filter(x=>x!==path);S.meta.favorites.push(newPath);}
    S.msgs.forEach(m=>{if(m.files)m.files.forEach(f=>{if(f.path===path){f.path=newPath;f.name=newName;}});});
    await Promise.all([saveMsgs(),saveMeta()]);
    await loadFiles();updateStats();renderMsgs();
    toast('已重命名为 '+newName,'ok');
  });
