function tgFav(path){var i=S.meta.favorites.indexOf(path);if(i>=0)S.meta.favorites.splice(i,1);else S.meta.favorites.push(path);saveMeta().then(function(){renderFG();document.getElementById('fav-cnt').textContent=S.meta.favorites.length||'';toast(S.meta.favorites.indexOf(path)>=0?'\u5DF2\u6536\u85CF':'\u5DF2\u53D6\u6D88\u6536\u85CF');});}
function mvFile(path,name){window._mvPaths=[path];window._mvCat=CATS[0].id;var html='<div class="md-t">\u79FB\u52A8\u5230\u5206\u7C7B</div><div class="cmg">'+CATS.map(function(c,i){return'<div class="cm-it'+(i===0?' on':'')+'" data-cid="'+c.id+'"><span>'+c.icon+'</span>'+c.label+'</div>';}).join('')+'</div><div class="md-btns"><button class="btn-g" id="mv-cancel">\u53D6\u6D88</button><button class="btn-a" id="mv-ok">\u79FB\u52A8</button></div>';showMd(html);document.querySelectorAll('.cm-it').forEach(function(el){el.addEventListener('click',function(){window._mvCat=this.dataset.cid;document.querySelectorAll('.cm-it').forEach(function(x){x.classList.remove('on');});this.classList.add('on');});});document.getElementById('mv-cancel').addEventListener('click',closeMd);document.getElementById('mv-ok').addEventListener('click',doBatchMv);}
function rnFile(path,oldName){if(isImage(oldName)){toast('\u56FE\u7247\u4E0D\u652F\u6301\u91CD\u547D\u540D','warn');return;}showInput('\u91CD\u547D\u540D','\u65B0\u6587\u4EF6\u540D',oldName,function(newName){if(!newName||newName===oldName)return;var folder=path.includes('/')?path.substring(0,path.lastIndexOf('/')):'';var newPath=folder?folder+'/'+newName:newName;ghGet(ghPath(path)).then(function(r){if(!r.ok)return;return r.json().then(function(d){return ghPut(ghPath(newPath),{message:'Rename [GitDrive]',content:d.content.replace(/\n/g,'')}).then(function(){return ghDel(ghPath(path),d.sha);});});}).then(function(){var fi=S.meta.favorites.indexOf(path);if(fi>=0){S.meta.favorites.splice(fi,1);S.meta.favorites.push(newPath);}S.msgs.forEach(function(m){if(m.files)m.files.forEach(function(f){if(f.path===path){f.path=newPath;f.name=newName;}});});return Promise.all([saveMsgs(),saveMeta()]);}).then(function(){return loadFiles();}).then(function(){updateStats();renderMsgs();toast('\u5DF2\u91CD\u547D\u540D\u4E3A '+newName,'ok');});});}
function delFile(path,sha){var name=path.split('/').pop();showConfirm('\u79FB\u81F3\u56DE\u6536\u7AD9','\u5C06 '+name+' \u79FB\u81F3\u56DE\u6536\u7AD9\uFF1F',function(){var f=S.files.find(function(x){return x.path===path;});moveToTrash(path,name,f&&f.size||0).then(function(){S.meta.favorites=S.meta.favorites.filter(function(x){return x!==path;});S.msgs=S.msgs.map(function(m){if(m.files)m.files=m.files.filter(function(f){return f.path!==path;});return m;}).filter(function(m){return m.type==='text'||(m.files&&m.files.length>0);});return Promise.all([saveMsgs(),saveMeta()]);}).then(function(){return loadFiles();}).then(function(){updateStats();renderMsgs();toast('\u5DF2\u79FB\u81F3\u56DE\u6536\u7AD9','ok');});});}
function moveToTrash(origPath,name,size){var trashPath=APP_CONFIG.trashFolder+'/'+Date.now()+'_'+name;return ghGet(ghPath(origPath)).then(function(r){if(!r.ok)return;return r.json().then(function(d){return ghPut(ghPath(trashPath),{message:'Trash [GitDrive]',content:d.content.replace(/\n/g,'')}).then(function(){return ghDel(ghPath(origPath),d.sha);}).then(function(){S.trash.push({origPath:origPath,trashPath:trashPath,name:name,deletedAt:new Date().toISOString(),size:size||0,category:origPath.split('/')[0]});return saveTrash();});});}).catch(function(e){toast('\u56DE\u6536\u7AD9\u64CD\u4F5C\u5931\u8D25: '+e.message,'err');});}
function restoreFromTrash(idx){var item=S.trash[idx];if(!item)return;var cat=catMap[item.category]||CATS[0],dest=cat.id+'/'+item.name;ghGet(ghPath(item.trashPath)).then(function(r){if(!r.ok)throw new Error('\u6587\u4EF6\u4E0D\u5B58\u5728');return r.json();}).then(function(d){return ghPut(ghPath(dest),{message:'Restore [GitDrive]',content:d.content.replace(/\n/g,'')}).then(function(){return ghDel(ghPath(item.trashPath),d.sha);});}).then(function(){S.trash.splice(idx,1);return saveTrash();}).then(function(){return loadFiles();}).then(function(){updateStats();renderTrash();toast('\u5DF2\u6062\u590D\u5230 '+cat.label,'ok');}).catch(function(e){toast('\u6062\u590D\u5931\u8D25: '+e.message,'err');});}
function hardDelTrash(idx){var item=S.trash[idx];if(!item)return;showConfirm('\u6C38\u4E45\u5220\u9664','\u6C38\u4E45\u5220\u9664 '+item.name+'\uFF1F\u6B64\u64CD\u4F5C\u4E0D\u53EF\u64A4\u9500\u3002',function(){ghGet(ghPath(item.trashPath)).then(function(r){if(r.ok)return r.json().then(function(d){return ghDel(ghPath(item.trashPath),d.sha);});}).then(function(){S.trash.splice(idx,1);return saveTrash();}).then(function(){renderTrash();toast('\u5DF2\u6C38\u4E45\u5220\u9664');}).catch(function(){});});}
function emptyTrash(){if(!S.trash.length){toast('\u56DE\u6536\u7AD9\u4E3A\u7A7A');return;}showConfirm('\u6E05\u7A7A\u56DE\u6536\u7AD9','\u6C38\u4E45\u5220\u9664\u5168\u90E8 '+S.trash.length+' \u4E2A\u6587\u4EF6\uFF1F',function(){var chain=Promise.resolve();S.trash.forEach(function(item){chain=chain.then(function(){return ghGet(ghPath(item.trashPath)).then(function(r){if(r.ok)return r.json().then(function(d){return ghDel(ghPath(item.trashPath),d.sha);});}).catch(function(){});});});chain.then(function(){S.trash=[];return saveTrash();}).then(function(){renderTrash();toast('\u56DE\u6536\u7AD9\u5DF2\u6E05\u7A7A','ok');});});}

function setFCat(id){S.fCat=id;document.querySelectorAll('#fg-cats .fc2').forEach(function(b){b.classList.toggle('on',b.dataset.fcat===id);});renderFG();}
function setFType(id){S.fType=id;document.querySelectorAll('#fg-types .fc2').forEach(function(b){b.classList.toggle('on',b.dataset.ftype===id);});renderFG();}
function showScr(name){
  ['chat','files','trash','stats'].forEach(function(n){

    var ni=document.getElementById('n-'+n);if(ni)ni.classList.remove('on');
  });

}
function showFav(){showScr('files');setFCat('fav');}
function showCatFiles(id){showScr('files');setFCat(id);}
function setView(v){S.fView=v;document.getElementById('vb-g').classList.toggle('on',v==='grid');document.getElementById('vb-l').classList.toggle('on',v==='list');renderFG();}
function renderFG(){
  var grid=document.getElementById('fg');if(!grid)return;
  var files=S.files.slice();
  if(S.fCat==='fav')files=files.filter(function(f){return S.meta.favorites.indexOf(f.path)>=0;});
  else if(S.fCat!=='all')files=files.filter(function(f){return f.category===S.fCat;});
  if(S.fType!=='all'){var g=TYPE_GROUPS.find(function(x){return x.id===S.fType;});if(g)files=files.filter(function(f){return g.exts.indexOf(xExt(f.name))>=0;});}
  var q=(document.getElementById('fg-q').value||'').trim().toLowerCase();
  if(q)files=files.filter(function(f){return f.name.toLowerCase().indexOf(q)>=0;});
  var sort=document.getElementById('sort-sel').value||'time-d';
  var byPath={};S.msgs.forEach(function(m){if(m.files)m.files.forEach(function(f){byPath[f.path]=m.timestamp;});});
  if(sort==='time-d')files.sort(function(a,b){return(byPath[b.path]||'')>(byPath[a.path]||'')?1:-1;});
  else if(sort==='time-a')files.sort(function(a,b){return(byPath[a.path]||'')>(byPath[b.path]||'')?1:-1;});
  else if(sort==='name')files.sort(function(a,b){return a.name.localeCompare(b.name);});
  else if(sort==='size')files.sort(function(a,b){return(b.size||0)-(a.size||0);});
  if(S.fView==='list')grid.classList.add('lv');else grid.classList.remove('lv');
  if(S.fgSel)grid.classList.add('sel-mode');else grid.classList.remove('sel-mode');
  grid.innerHTML='';
  if(!files.length){var emp=document.createElement('div');emp.style.cssText='grid-column:1/-1';emp.innerHTML='<div class="emp"><div class="emp-ic">\u{1F4ED}</div><div class="emp-t">\u6CA1\u6709\u6587\u4EF6</div></div>';grid.appendChild(emp);return;}
  files.forEach(function(f,i){
    var cat=catMap[f.category]||CATS[0],img=isImage(f.name),med=isVid(f.name)||isAud(f.name);
    var url=rawUrl(f.path),t=byPath[f.path]?new Date(byPath[f.path]).toLocaleDateString('zh-CN'):'';
    var fav=S.meta.favorites.indexOf(f.path)>=0,sel=!!S.fgSeled[f.path],ext2=xExt(f.name).toUpperCase();
    if(S.fView==='list')grid.appendChild(buildLI(f,cat,img,med,url,t,fav,sel,ext2,i));
    else grid.appendChild(buildGC(f,cat,img,med,url,t,fav,sel,ext2,i));
  });
  grid.querySelectorAll('.li').forEach(function(li){var timer;li.addEventListener('touchstart',function(){timer=setTimeout(function(){var fi=S.files.find(function(x){return x.path===li.dataset.path;});if(fi)showBS(fi);},450);},{passive:true});li.addEventListener('touchend',function(){clearTimeout(timer);},{passive:true});li.addEventListener('touchmove',function(){clearTimeout(timer);},{passive:true});});
  grid.querySelectorAll('.gc').forEach(function(gc){gc.addEventListener('contextmenu',function(e){e.preventDefault();var fi=S.files.find(function(x){return x.path===gc.dataset.path;});if(fi)showCtxM(e.clientX,e.clientY,fi);});});
}
function buildGC(f,cat,img,med,url,t,fav,sel,ext2,i){
  var d=document.createElement('div');d.className='gc'+(sel?' sel':'');d.style.animationDelay=i*0.02+'s';d.dataset.path=f.path;
  var ck=document.createElement('div');ck.className='gc-ck'+(sel?' on':'');ck.textContent='\u2713';ck.addEventListener('click',function(e){e.stopPropagation();tgFGItem(f.path);});d.appendChild(ck);
  if(fav){var fstar=document.createElement('div');fstar.className='gc-fav';fstar.textContent='\u2605';d.appendChild(fstar);}
  var thumb=document.createElement('div');thumb.className='gc-thumb';if(!img)thumb.style.background=cat.bg;
  if(img){var im=document.createElement('img');im.src=url;im.loading='lazy';im.alt=f.name;thumb.appendChild(im);}
  else{var ic=document.createElement('div');ic.className='gc-icon';ic.innerHTML=fileIcon(f.name)+'<span class="gc-ext">'+ext2+'</span>';thumb.appendChild(ic);}
  if(img)thumb.addEventListener('click',function(){var imgs=S.files.filter(function(x){return isImage(x.name)&&(S.fCat==='all'||x.category===S.fCat);});openMP(url,f.name,imgs.map(function(x){return rawUrl(x.path);}),imgs.findIndex(function(x){return x.path===f.path;}));});
  else if(med)thumb.addEventListener('click',function(){openMP(url,f.name,[],0);});
  else thumb.addEventListener('click',function(){dlFile(url,f.name);});
  d.appendChild(thumb);
  var info=document.createElement('div');info.className='gc-info';info.innerHTML='<div class="gc-name">'+esc(f.name)+'</div><div class="gc-meta">'+fmtSz(f.size)+(t?' \u00B7 '+t:'')+'</div>';d.appendChild(info);
  var acts=document.createElement('div');acts.className='gc-acts';
  function ga(ic,cls,fn){var b=document.createElement('button');b.className='ga'+(cls?' '+cls:'');b.textContent=ic;b.addEventListener('click',function(e){e.stopPropagation();fn();});return b;}
  acts.appendChild(ga(fav?'\u2605':'\u2606',fav?'fav-on':'',function(){tgFav(f.path);}));
  acts.appendChild(ga('\u2197','',function(){mvFile(f.path,f.name);}));
  if(!img)acts.appendChild(ga('\u270E','',function(){rnFile(f.path,f.name);}));

  acts.appendChild(ga('\u2139','',function(){showFileDetail(f);}));
  acts.appendChild(ga('\u2193','',function(){dlFile(url,f.name);}));
  acts.appendChild(ga('\u2715','del',function(){delFile(f.path,f.sha);}));
  d.appendChild(acts);return d;
}
function buildLI(f,cat,img,med,url,t,fav,sel,ext2,i){
  var d=document.createElement('div');d.className='li'+(sel?' sel':'');d.style.animationDelay=i*0.02+'s';d.dataset.path=f.path;
  var ck=document.createElement('div');ck.className='li-ck'+(sel?' on':'');ck.textContent='\u2713';ck.addEventListener('click',function(){tgFGItem(f.path);});d.appendChild(ck);
  var th=document.createElement('div');th.className='li-thumb';
  if(img){var im=document.createElement('img');im.src=url;im.loading='lazy';th.appendChild(im);}
  else{th.innerHTML='<div class="li-icon">'+fileIcon(f.name)+'<span class="gc-ext">'+ext2+'</span></div>';}
  th.addEventListener('click',function(){if(img||med)openMP(url,f.name,[],0);else dlFile(url,f.name);});d.appendChild(th);
  var info=document.createElement('div');info.className='li-info';
  info.innerHTML='<div class="li-name">'+esc(f.name)+'</div><div class="li-meta">'+cat.icon+' '+cat.label+' \u00B7 '+fmtSz(f.size)+(t?' \u00B7 '+t:'')+'</div>';
  info.addEventListener('click',function(){if(img||med)openMP(url,f.name,[],0);else dlFile(url,f.name);});d.appendChild(info);
  function la(ic,cls,fn){var b=document.createElement('button');b.className='la'+(cls?' '+cls:'');b.textContent=ic;b.addEventListener('click',function(e){e.stopPropagation();fn();});return b;}
  var actsm=document.createElement('div');actsm.className='li-acts-m';
  actsm.appendChild(la(fav?'\u2605':'\u2606',fav?'fav-on':'',function(){tgFav(f.path);}));
  actsm.appendChild(la('\u2715','del',function(){delFile(f.path,f.sha);}));d.appendChild(actsm);
  var actsd=document.createElement('div');actsd.className='li-acts-d';
  actsd.appendChild(la(fav?'\u2605':'\u2606',fav?'fav-on':'',function(){tgFav(f.path);}));

function doAddMemo(txt,atts,catId){
  var inp=document.getElementById('memo-inp');inp.value='';arTA(inp);S.memoAttPending=[];renderMemoAttPreview();
  if(!atts.length){
    S.memos.unshift({id:Date.now().toString(),type:S.memoType,content:txt,done:false,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),attachments:[]});
    renderMemoList();saveMemos();toast('\u5DF2\u4FDD\u5B58','ok');return;
  }
  // 上传附件
  var cat=catMap[catId]||CATS[0];
  var uploaded=[],chain=Promise.resolve();
  atts.forEach(function(f){
    chain=chain.then(function(){
      var path=cat.id+'/'+f.name;
      return new Promise(function(res,rej){var fr=new FileReader();fr.onload=function(){res(fr.result.split(',')[1]);};fr.onerror=rej;fr.readAsDataURL(f);})
      .then(function(b64){
        return ghGet(ghPath(path)).then(function(chk){if(chk.ok)return chk.json().then(function(cd){return cd.sha;});})
        .then(function(sha){var body={message:'Memo attachment [GitDrive]',content:b64};if(sha)body.sha=sha;return ghPut(ghPath(path),body);})
        .then(function(r){if(!r.ok)throw new Error('\u4E0A\u4F20\u5931\u8D25: '+f.name);return r.json();})
        .then(function(rd){uploaded.push({name:f.name,path:path,size:f.size,sha:rd.content.sha,category:cat.id});});
      }).catch(function(e){toast(e.message,'err');});
    });
  });
  chain.then(function(){
    S.memos.unshift({id:Date.now().toString(),type:S.memoType,content:txt,done:false,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),attachments:uploaded});
    renderMemoList();
    return saveMemos().then(function(){return Promise.all([loadMeta(),loadFiles()]);}).then(function(){updateStats();toast('\u5DF2\u4FDD\u5B58\uFF0C'+uploaded.length+'\u4E2A\u9644\u4EF6\u5DF2\u4E0A\u4F20','ok');});
  });
}

function editMemo(id){var m=S.memos.find(function(x){return x.id===id;});if(!m)return;showInput('\u7F16\u8F91\u5907\u5FD8','\u5185\u5BB9',m.content,function(v){m.content=v;m.updatedAt=new Date().toISOString();renderMemoList();saveMemos();toast('\u5DF2\u4FDD\u5B58','ok');});}

  if(!atts.length){
    showConfirm('\u5220\u9664\u5907\u5FD8','\u786E\u8BA4\u5220\u9664\uFF1F',function(){S.memos=S.memos.filter(function(x){return x.id!==id;});renderMemoList();saveMemos();toast('\u5DF2\u5220\u9664');});

  showMd('<div class="md-t">\u5220\u9664\u5907\u5FD8</div><div class="md-p">\u8BE5\u5907\u5FD8\u6709 '+atts.length+' \u4E2A\u9644\u4EF6\uFF0C\u5982\u4F55\u5904\u7406\uFF1F</div><div class="md-btns" style="flex-direction:column;align-items:stretch;gap:8px"><button class="btn-d" id="memo-del-all">\u5220\u9664\u5907\u5FD8\uFF0C\u5C06\u9644\u4EF6\u4E00\u5E76\u79FB\u81F3\u56DE\u6536\u7AD9</button><button class="btn-or" id="memo-del-keep">\u5220\u9664\u5907\u5FD8\uFF0C\u4FDD\u7559\u9644\u4EF6\uFF08\u79FB\u5165\u65E0\u5206\u7C7B\uFF09</button><button class="btn-g" id="memo-del-cancel">\u53D6\u6D88</button></div>');
  document.getElementById('memo-del-cancel').addEventListener('click',closeMd);
  document.getElementById('memo-del-all').addEventListener('click',function(){
    closeMd();
    var chain=Promise.resolve();
    atts.forEach(function(att){chain=chain.then(function(){return moveToTrash(att.path,att.name,att.size||0);});});
    chain.then(function(){S.memos=S.memos.filter(function(x){return x.id!==id;});renderMemoList();return saveMemos();}).then(function(){return loadFiles();}).then(function(){updateStats();toast('\u5907\u5FD8\u548C\u9644\u4EF6\u5DF2\u5220\u9664','ok');});
  });
  document.getElementById('memo-del-keep').addEventListener('click',function(){
    closeMd();
    // 将附件移入无分类
    var uncat=CATS[0].id;

    atts.forEach(function(att){
      if(att.category===uncat){return;}
      chain=chain.then(function(){
        var newPath=uncat+'/'+att.name;
        return ghGet(ghPath(att.path)).then(function(r){if(!r.ok)return;return r.json().then(function(d){return ghPut(ghPath(newPath),{message:'Move to uncat [GitDrive]',content:d.content.replace(/\n/g,'')}).then(function(){return ghDel(ghPath(att.path),d.sha);});});}).catch(function(){});
      });
    });
    chain.then(function(){S.memos=S.memos.filter(function(x){return x.id!==id;});renderMemoList();return saveMemos();}).then(function(){return loadFiles();}).then(function(){updateStats();toast('\u5907\u5FD8\u5DF2\u5220\u9664\uFF0C\u9644\u4EF6\u5DF2\u4FDD\u7559','ok');});
  });
}
function renderMemoList(){
  var el=document.getElementById('msg-list');if(!el)return;
  var list=S.memos.slice();
  if(S.memoFilter==='todo')list=list.filter(function(m){return m.type==='todo'&&!m.done;});
  else if(S.memoFilter==='note')list=list.filter(function(m){return m.type==='note';});
  else if(S.memoFilter==='done')list=list.filter(function(m){return m.done;});
  var empty=document.getElementById('empty-chat');
  if(!list.length){
    el.innerHTML='';empty.style.display='flex';
    empty.innerHTML='<div class="emp-ic">\u{1F4D3}</div><div class="emp-t">\u6682\u65E0\u5907\u5FD8</div><div class="emp-s">\u7528\u4E0B\u65B9\u8F93\u5165\u6846\u6DFB\u52A0\u5F85\u529E\u6216\u7B14\u8BB0</div>';
    return;
  }
  empty.style.display='none';el.innerHTML='';
  list.forEach(function(m){
    var t=new Date(m.createdAt).toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
    var wrap=document.createElement('div');wrap.className='memo-card-wrap';
    var card=document.createElement('div');card.className='memo-card'+(m.done?' todo-done':'');
    var top=document.createElement('div');top.style.cssText='display:flex;align-items:flex-start;gap:10px';
    if(m.type==='todo'){
      var chk=document.createElement('button');
      chk.style.cssText='flex-shrink:0;width:20px;height:20px;border-radius:5px;border:2px solid '+(m.done?'var(--gr)':'var(--b3)')+';background:'+(m.done?'var(--gr)':'transparent')+';color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px';
      chk.textContent=m.done?'\u2713':'';chk.addEventListener('click',function(){toggleMemoDone(m.id);});top.appendChild(chk);
    }else{var ico=document.createElement('span');ico.style.cssText='flex-shrink:0;font-size:15px;margin-top:1px';ico.textContent='\u{1F4DD}';top.appendChild(ico);}
    var body=document.createElement('div');body.className='memo-body';body.style.cssText='flex:1;min-width:0';
    if(m.type==='note')body.innerHTML=marked.parse(m.content||'');
    else{var sp=document.createElement('span');if(m.done)sp.style.cssText='text-decoration:line-through;color:var(--t3)';sp.textContent=m.content||'';body.appendChild(sp);}
    top.appendChild(body);card.appendChild(top);
    // 附件列表
    if(m.attachments&&m.attachments.length){
      var attsDiv=document.createElement('div');attsDiv.className='memo-atts';
      m.attachments.forEach(function(att){
        var link=document.createElement('span');link.className='memo-att-link';link.innerHTML=fileIcon(att.name)+'<span>'+esc(att.name)+'</span>';
        link.addEventListener('click',function(){var url=rawUrl(att.path);if(isImage(att.name)||isVid(att.name)||isAud(att.name))openMP(url,att.name,[],0);else dlFile(url,att.name);});attsDiv.appendChild(link);
      });card.appendChild(attsDiv);
    }
    var ft=document.createElement('div');ft.className='memo-ft';
    var dt=document.createElement('span');dt.className='memo-date';dt.textContent=t;ft.appendChild(dt);
    var eb=document.createElement('button');eb.className='memo-act';eb.textContent='\u270E \u7F16\u8F91';eb.addEventListener('click',function(){editMemo(m.id);});ft.appendChild(eb);
    var db=document.createElement('button');db.className='memo-act del';db.textContent='\u2715 \u5220\u9664';db.addEventListener('click',function(){delMemo(m.id);});ft.appendChild(db);
    card.appendChild(ft);wrap.appendChild(card);el.appendChild(wrap);
  });
}

function openSearch(){document.getElementById('search-ov').classList.add('on');setTimeout(function(){document.getElementById('g-q').focus();},80);}
function closeSearch(){document.getElementById('search-ov').classList.remove('on');}
function doSearch(){
  var q=document.getElementById('g-q').value.trim().toLowerCase(),res=document.getElementById('g-res');
  if(!q){res.innerHTML='<div class="sr-empty">\u8F93\u5165\u5173\u952E\u8BCD\u5F00\u59CB\u641C\u7D22</div>';return;}
  var matches=[];
  S.files.forEach(function(f){if(f.name.toLowerCase().indexOf(q)>=0)matches.push({t:'file',f:f});});
  S.msgs.filter(function(m){return m.type==='text';}).forEach(function(m){if((m.content||'').toLowerCase().indexOf(q)>=0)matches.push({t:'msg',m:m});});
  S.memos.forEach(function(m){if((m.content||'').toLowerCase().indexOf(q)>=0)matches.push({t:'memo',m:m});});
  if(!matches.length){res.innerHTML='<div class="sr-empty">\u6CA1\u6709\u627E\u5230\u5339\u914D\u7ED3\u679C</div>';return;}
  function hi(s){return s.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),function(m){return'<span class="hl">'+m+'</span>';});}
  res.innerHTML='';
  matches.slice(0,20).forEach(function(item){
    var d=document.createElement('div');d.className='sri';
    if(item.t==='file'){var f=item.f,cat=catMap[f.category]||CATS[0];d.innerHTML='<div class="sri-ic" style="background:'+cat.bg+'">'+fileIcon(f.name)+'</div><div class="sri-info"><div class="sri-name">'+hi(esc(f.name))+'</div><div class="sri-meta">'+cat.icon+' '+cat.label+' \u00B7 '+fmtSz(f.size)+'</div></div>';d.addEventListener('click',function(){closeSearch();dlFile(rawUrl(f.path),f.name);});}
    else if(item.t==='msg'){var m=item.m;d.innerHTML='<div class="sri-ic" style="background:var(--bg3)">\u{1F4AC}</div><div class="sri-info"><div class="sri-name">'+hi(esc((m.content||'').slice(0,70)))+'</div><div class="sri-meta">\u6587\u5B57\u6D88\u606F \u00B7 '+new Date(m.timestamp).toLocaleDateString('zh-CN')+'</div></div>';d.addEventListener('click',function(){closeSearch();if(S.chatMode!=='chat')setChatMode('chat');setTimeout(function(){scrollToId(m.id);},200);});}
    else{var m=item.m;d.innerHTML='<div class="sri-ic" style="background:var(--bg3)">\u{1F4D3}</div><div class="sri-info"><div class="sri-name">'+hi(esc((m.content||'').slice(0,70)))+'</div><div class="sri-meta">\u5907\u5FD8\u5F55 \u00B7 '+new Date(m.createdAt).toLocaleDateString('zh-CN')+'</div></div>';d.addEventListener('click',function(){closeSearch();setChatMode('memo');});}
    res.appendChild(d);
  });
}

// SECTION 13: UI 构建（buildUI）
// ══════════════════════════════════════════════════════════════
function buildUI(){
  // 侧边栏分类导航
  var n='';
  CATS.forEach(function(c){n+='<button class="ni-cat" data-cid="'+c.id+'"><span class="ico">'+c.icon+'</span>'+c.label+'<span class="ni-cat-dot"></span></button>';});
  document.getElementById('cat-nav').innerHTML=n;
  document.querySelectorAll('#cat-nav .ni-cat').forEach(function(b){b.addEventListener('click',function(){showCatFiles(this.dataset.cid);});});
  // 上传分类 chips
  var chips='';
  CATS.forEach(function(c){chips+='<button class="cc'+(c.id===S.cur?' on':'')+'" data-cid="'+c.id+'">'+c.icon+' '+c.label+'</button>';});
  document.getElementById('cat-chips').innerHTML=chips;
  document.querySelectorAll('#cat-chips .cc').forEach(function(b){b.addEventListener('click',function(){selCat(this.dataset.cid);});});
  // 文件网格分类筛选
  var cf='<button class="fc2 on" data-fcat="all">\u5168\u90E8</button><button class="fc2" data-fcat="fav">\u2605 \u6536\u85CF</button><span class="fc2-sep"></span>';
  CATS.forEach(function(c){cf+='<button class="fc2" data-fcat="'+c.id+'">'+c.icon+' '+c.label+'</button>';});
  document.getElementById('fg-cats').innerHTML=cf;
  document.querySelectorAll('#fg-cats .fc2').forEach(function(b){b.addEventListener('click',function(){setFCat(this.dataset.fcat);});});
  // 文件类型筛选
  var tf='';
  TYPE_GROUPS.forEach(function(g,i){tf+='<button class="fc2'+(i===0?' on':'')+'" data-ftype="'+g.id+'">'+g.label+'</button>';});
  document.getElementById('fg-types').innerHTML=tf;
  document.querySelectorAll('#fg-types .fc2').forEach(function(b){b.addEventListener('click',function(){setFType(this.dataset.ftype);});});
  // 回收站天数提示
  var hint=document.getElementById('trash-days-hint');if(hint)hint.textContent=APP_CONFIG.trashDays;
  // 作者信息
  var au=document.getElementById('sb-author');if(au)au.textContent=APP_CONFIG.author;
}
function selCat(id){S.cur=id;document.querySelectorAll('#cat-chips .cc').forEach(function(b){b.classList.toggle('on',b.dataset.cid===id);});}

// SECTION 14: 登录 & 初始化
// ══════════════════════════════════════════════════════════════
function doLogin(){
  var u=document.getElementById('lu').value.trim();
  var r=document.getElementById('lr').value.trim();
  var t=document.getElementById('lt').value.trim();
  var err=document.getElementById('lerr');
  if(!u||!r||!t){err.textContent='\u8BF7\u586B\u5199\u6240\u6709\u5B57\u6BB5';err.style.display='block';return;}
  err.style.display='none';
  var btn=document.getElementById('lbtn');
  btn.textContent='\u8FDE\u63A5\u4E2D\u2026';btn.disabled=true;
  fetch('https://api.github.com/repos/'+encodeURIComponent(u)+'/'+encodeURIComponent(r),{
    headers:{'Authorization':'Bearer '+t,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}
  }).then(function(res){
    if(res.status===401)throw new Error('Token \u65E0\u6548\u6216\u5DF2\u8FC7\u671F');
    if(res.status===403)throw new Error('\u6743\u9650\u4E0D\u8DB3\uFF0C\u8BF7\u5F00\u542F Contents \u8BFB\u5199\u6743\u9650');
    if(res.status===404)throw new Error('\u4ED3\u5E93\u4E0D\u5B58\u5728\uFF0C\u8BF7\u68C0\u67E5\u7528\u6237\u540D\u548C\u4ED3\u5E93\u540D');
    if(!res.ok)throw new Error('\u8FDE\u63A5\u5931\u8D25\uFF08HTTP '+res.status+'\uFF09');
    S.user=u;S.repo=r;S.token=t;
    localStorage.setItem(APP_CONFIG.credKey,JSON.stringify({user:u,repo:r,token:t}));
    launchApp();
  }).catch(function(e){
    err.textContent=e.message;err.style.display='block';
  }).finally(function(){
    btn.textContent='\u8FDE\u63A5\u4ED3\u5E93';btn.disabled=false;
  });
}
function doLogout(){if(!confirm('\u786E\u5B9A\u9000\u51FA\uFF1F'))return;localStorage.removeItem(APP_CONFIG.credKey);location.reload();}
function launchApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('sb-repo').textContent=S.user+'/'+S.repo;
  document.getElementById('hd-t').textContent=S.repo;
  S.clearTime=localStorage.getItem(APP_CONFIG.clearTimePrefix+S.user+'/'+S.repo)||null;
  try{S.pinned=JSON.parse(localStorage.getItem(APP_CONFIG.pinnedPrefix+S.user+'/'+S.repo)||'[]');}catch(e){S.pinned=[];}
  initCatMap();
  buildUI();
  loadAll();
}
